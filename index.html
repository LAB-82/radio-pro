<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trance & Techno Radio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    height: 100vh;
}

#sidebar {
    width: 300px;
    background: #141414;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    padding: 10px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}

.station:hover { background:#222; }

.station.active { background:#2a2a2a; font-weight:bold; }

#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#header {
    padding: 12px;
    background: #1a1a1a;
    font-size: 18px;
    font-weight: bold;
}

#meta {
    padding: 8px 12px;
    background: #151515;
    color: #ccc;
    font-size: 13px;
}

#playerBox {
    flex: 1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

#radioPlayer {
    width: 90%;
    height: 90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#bigPlay {
    font-size:70px;
    cursor:pointer;
}

#bottomBar {
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 18px;
    border-radius:30px;
    display:flex;
    gap:18px;
}

audio { display:none; }
.station.active{background:#333;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 TRANCE & TECHNO RADIO WORLD</div>

<div id="meta">🌍 Live Electronic Music Streams</div>

<div id="playerBox">

<div id="radioPlayer">

<div id="bigPlay" onclick="togglePlay()">▶</div>

<div id="bottomBar">
<div onclick="prev()">⏮</div>
<div onclick="togglePlay()">⏯</div>
<div onclick="next()">⏭</div>
<div onclick="mute()">🔊</div>
</div>

</div>

</div>

<audio id="audio"></audio>

</div>

<script>

// 🌍 REALNE STACJE TRANCE / TECHNO
const stations = [
"DI.FM Trance",
"DI.FM Techno",
"Afterhours.FM Trance",
"AH.FM Main Stage",
"Trance Energy Radio",
"1Mix Trance",
"1Mix Techno",
"Party107 Trance",
"EDM Radio Trance",
"Sunshine Live Techno",
"Technobase FM",
"Pure FM Trance",
"ETN FM Trance",
"Global DJ Broadcast",
"Radio Record Trance"
];

// 🎧 REALNE STREAMY (public radio / online stations)
const streams = [
"https://prem2.di.fm/trance_hi",
"https://prem2.di.fm/techno_hi",
"https://listen.afterhours.fm/aafm",
"https://ah.fm/stream",
"https://stream.tranceenergy.nl/stream",
"https://listen.1mix.co.uk/1mix_trance",
"https://listen.1mix.co.uk/1mix_techno",
"https://stream.party107.com/party107",
"https://edmradio.ru:8000/trance",
"https://stream.sunshine-live.de/techno",
"https://technobase.fm/stream",
"https://purefm.de/stream",
"https://etn.fm/stream",
"https://di.fm/globaldj",
"https://radiorecord.hostingradio.ru/trance96.aacp"
];

let i = 0;
let playing = false;

const audio = document.getElementById("audio");
const sidebar = document.getElementById("sidebar");

function load(x){
    i = x;

    document.querySelectorAll(".station").forEach((el,idx)=>{
        el.classList.toggle("active", idx===i);
    });

    audio.pause();
    audio.src = streams[i];
    audio.load();

    if(playing){
        audio.play().catch(()=>alert("Stream zablokowany lub offline"));
    }
}

stations.forEach((s,idx)=>{
    const div = document.createElement("div");
    div.className="station";
    div.innerText=s;
    div.onclick=()=>load(idx);
    sidebar.appendChild(div);
});

function togglePlay(){
    playing = !playing;

    if(playing){
        audio.play().catch(()=>alert("Kliknij ponownie (blokada autoplay)"));
    } else {
        audio.pause();
    }
}

function prev(){
    load((i-1+stations.length)%stations.length);
}

function next(){
    load((i+1)%stations.length);
}

function mute(){
    audio.muted = !audio.muted;
}

load(0);

</script>

</body>
</html>
