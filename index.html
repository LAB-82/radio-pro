<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{
background:#eaeaea;
color:#000;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}

canvas{
display:block;
height:260px;
border-radius:8px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}

body.day .volumeWrapper{
background:#d6d6d6;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}

body.day button{
background:#d6d6d6;
color:#000;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

#stations{
width:90%;
max-width:900px;
margin-top:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.station{
background:#111;
border:1px solid #222;
padding:12px;
border-radius:10px;
cursor:pointer;
text-align:center;
transition:0.2s;
}

.station:active{
transform:scale(0.96);
border-color:#ff2a2a;
}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">

<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>

</div>

<!-- 🔥 STACJE -->
<div id="stations"></div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>

const audio = document.getElementById("audio");

/* 🔥 STABILNE POLSKIE STREAMY (REALNE MP3 / HLS) */
const stations = [

{ name:"Muzyczne Radio", url:"https://stream.rcs.revma.com/gzwc1xcq042vv" },

{ name:"Polskie Radio Jedynka", url:"https://stream2.polskieradio.pl/pr1_pr1-128.mp3" },

{ name:"Polskie Radio Dwójka", url:"https://stream2.polskieradio.pl/pr2_pr2-128.mp3" },

{ name:"Polskie Radio Trójka", url:"https://stream2.polskieradio.pl/pr3_pr3-128.mp3" },

{ name:"Polskie Radio Czwórka", url:"https://stream2.polskieradio.pl/pr4_pr4-128.mp3" },

{ name:"Polskie Radio Dzieciom", url:"https://stream2.polskieradio.pl/prd_prd-128.mp3" },

{ name:"Radio Wrocław", url:"https://stream4.nadaje.com:9001/radiowroclaw" },

{ name:"Radio Wnet", url:"https://stream.rcs.revma.com/wnet" },

{ name:"Radio dla Ciebie", url:"https://stream.rdc.pl/stream" },

{ name:"Polskie Radio Chopin", url:"https://stream2.polskieradio.pl/chopin-128.mp3" }

];

/* UI RENDER */
const container = document.getElementById("stations");

stations.forEach(s=>{

const div = document.createElement("div");
div.className="station";
div.innerText = s.name;

div.onclick = ()=>play(s.url);

container.appendChild(div);

});

/* PLAYER */
function play(url){

stopRadio();

audio.src = url;

audio.play().catch(e=>{
alert("STREAM ERROR");
console.log(e);
});

}

function stopRadio(){
audio.pause();
audio.src="";
}

/* reszta Twojego UI zostaje */
const volume = document.getElementById("volume");
const muteBtn = document.getElementById("muteBtn");
const modeBtn = document.getElementById("modeBtn");

function muteRadio(){
audio.muted = !audio.muted;
}

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume = volume.value;
});

audio.volume = 0.5;

</script>

</body>
</html>
