<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{
background:#eaeaea;
color:#000;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 6px #ff2a2a,0 0 12px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}

canvas{
display:block;
height:260px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

body.day .volumeWrapper{
background:#d6d6d6;
box-shadow:0 0 10px #ff2a2a;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
border:2px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

#volume{
width:120px;
height:10px;
background:#000;
border:1px solid #ff2a2a;
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");
const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

let audioCtx, analyser, source, dataArray;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=1024;
analyser.smoothingTimeConstant=0.85;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src=STREAM_URL;
audio.play();
draw();
}

function stopRadio(){ audio.pause(); }
function muteRadio(){ audio.muted=!audio.muted; }

volume.addEventListener("input",()=>audio.volume=parseFloat(volume.value));

function resizeCanvas(){
let dpr=window.devicePixelRatio||1;
let w=document.getElementById("title").offsetWidth;

canvas.width=w*dpr;
canvas.height=260*dpr;

canvas.style.width=w+"px";
canvas.style.height="260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

let w=canvas.width/window.devicePixelRatio;
let h=canvas.height/window.devicePixelRatio;

ctx.clearRect(0,0,w,h);

/* ===== VECTEEZY STYLE EQ ===== */
let bars=70;
let step=Math.floor(dataArray.length/bars);
let barW=w/bars;
let mid=h/2;

for(let i=0;i<bars;i++){

let v=dataArray[i*step]||0;
let amp=(v/255)*(h*0.45);

/* gradient by position */
let hue=200 + (i/bars)*160;
ctx.fillStyle=`hsl(${hue},100%,55%)`;

/* TOP */
ctx.fillRect(i*barW,mid-amp,barW-1,amp);

/* BOTTOM (mirror) */
ctx.fillRect(i*barW,mid,barW-1,amp);
}
}
</script>

</body>
</html>
