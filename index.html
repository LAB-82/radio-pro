<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=OCR-A&display=swap" rel="stylesheet">
<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Rajdhani', 'OCR-A', monospace;
font-weight: 500;
letter-spacing: 1px;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

#title{
font-family: 'Rajdhani', 'OCR-A', monospace;
font-weight: 800;
font-size:88px;
margin-top:50px;

letter-spacing: 4px;
text-transform: uppercase;
}

@keyframes cyberpunk-title {
0% { text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000; }
100% { text-shadow:0 0 8px #ff2a2a,0 0 20px #ff0000,0 0 40px #ff0000,0 0 15px rgba(255,255,255,0.3); }
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,42,42,0.4), inset 0 0 15px rgba(255,255,255,0.08);
position: relative;
z-index: 10;
border: 2px solid rgba(255,42,42,0.6);
}

canvas{
display:block;
height:260px;
border-radius:6px;
filter: drop-shadow(0 0 12px rgba(255,0,0,0.5)) brightness(1.03);
animation: canvas-flicker 3s ease-in-out infinite alternate;
}

@keyframes canvas-flicker {
0% { filter: drop-shadow(0 0 12px rgba(255,0,0,0.5)) brightness(1.03); }
100% { filter: drop-shadow(0 0 18px rgba(255,0,0,0.7)) brightness(1.06); }
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
position: relative;
z-index: 20;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 15px #ff2a2a, 0 0 25px rgba(255,255,255,0.15), inset 0 0 10px rgba(255,255,255,0.08);
transition: all 0.3s ease;
position: relative;
border-radius: 4px;
}

.volumeWrapper::before {
content: 'VOL';

left: 50%;

letter-spacing: 1px;
border: 1px solid rgba(255,42,42,0.5);
text-shadow: 0 0 3px rgba(255,255,255,0.3);
font-family: 'Rajdhani', monospace;
font-weight: 600;
}
