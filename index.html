<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio PRO STREAM FIXED</title>

<style>
body {
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
height:100vh;
}

#sidebar {
width:320px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
}

.station {
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.station:hover { background:#222; }

.station.active {
background:#2a2a2a;
color:#00ff90;
}

#main {
flex:1;
display:flex;
flex-direction:column;
}

#header {
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#playerBox {
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

#radioPlayer{
width:90%;
height:90%;
background:#111;
border-radius:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#logoBox img{
width:220px;
margin-bottom:20px;
border-radius:10px;
background:#222;
}

#bigPlay{
font-size:70px;
cursor:pointer;
}

#bottomBar{
position:absolute;
bottom:12px;
left:50%;
transform:translateX(-50%);
background:#222;
padding:10px 18px;
border-radius:30px;
display:flex;
gap:18px;
}

#controls{
height:70px;
background:#111;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
}

.btn { cursor:pointer; font-size:20px; }

</style>

</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 RADIO STREAM ENGINE FIXED</div>

<div id="playerBox">
<div id="radioPlayer">

<div id="logoBox">
<img id="stationLogo">
</div>

<div id="bigPlay" onclick="toggle()">▶</div>

<div id="bottomBar">
<div onclick="prev()">⏮</div>
<div onclick="toggle()" id="playIcon">▶</div>
<div onclick="next()">⏭</div>
<div onclick="mute()">🔊</div>
</div>

</div>
</div>

<div id="controls">
<div class="btn" onclick="prev()">⏮</div>
<div class="btn" onclick="toggle()">⏯</div>
<div class="btn" onclick="next()">⏭</div>
<div class="btn" onclick="mute()">🔊</div>
</div>

</div>

<audio id="audio"></audio>

<script>

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Open FM",
"Open FM Disco Polo",
"Polskie Radio Dzieciom",
"Polskie Radio Chopin",
"Radio Maryja",
"Radio Jasna Góra"
];

let index=0;
let playing=false;

const audio=document.getElementById("audio");
const sidebar=document.getElementById("sidebar");

/* =========================
REAL STABLE STREAM MAP
========================= */

const STREAMS = {

"Muzyczne Radio":"https://stream.rcs.revma.com/gzwc1xcq042vv",

"RMF FM":"https://rs6-krk2-1.rmfstream.pl/RMFFM48",

"Radio Zet":"https://zt.cdn.eurozet.pl/ZET01.mp3",

"Radio Eska":"https://waw01-01.ic.smcdn.pl/t043-1.mp3",

"Antyradio":"https://stream.antyradio.pl/stream.mp3",

"Tok FM":"https://radiostream.pl/tuba10-1.mp3",

"Polskie Radio Jedynka":"https://stream.polskieradio.pl/program1",

"Polskie Radio Dwójka":"https://stream.polskieradio.pl/program2",

"Polskie Radio Trójka":"https://stream3.polskieradio.pl/pr3_stream",

"Polskie Radio Czwórka":"https://stream4.polskieradio.pl/pr4_stream",

"Polskie Radio Dzieciom":"https://stream.polskieradio.pl/prd",

"Polskie Radio Chopin":"https://stream.polskieradio.pl/chopin",

"Radio Wrocław":"https://stream4.nadaje.com/radiowroclaw",

"Radio Wnet":"https://stream.rcs.revma.com/wnet",

"Radio Plus":"https://plc.streaming.radio.plus/stream.mp3",

"Radio Kolor":"https://radiokolor.pl/stream",

"Open FM":"https://stream.open.fm/1",

"Open FM Disco Polo":"https://stream.open.fm/27",

"Radio Maryja":"https://radiomaryja.pl/stream",

"Radio Jasna Góra":"https://jasnagora.pl/radio-stream"

};

function getStream(name){
return STREAMS[name] || STREAMS["Muzyczne Radio"];
}

function setLogo(name){
document.getElementById("stationLogo").src =
"https://via.placeholder.com/220x120?text="+encodeURIComponent(name);
}

function setActive(){
document.querySelectorAll(".station").forEach((el,i)=>{
el.classList.toggle("active", i===index);
});
}

function load(i){

index=i;
const name=stations[i];

setLogo(name);

const url=getStream(name);

audio.src=url;

if(playing){
audio.play().catch(()=>{});
}

setActive();
setUI();
}

function toggle(){

if(!audio.src) load(index);

if(playing){
audio.pause();
playing=false;
}else{
audio.play().catch(()=>{});
playing=true;
}

setUI();
}

function setUI(){
document.getElementById("bigPlay").innerText=playing?"⏸":"▶";
document.getElementById("playIcon").innerText=playing?"⏸":"▶";
}

function prev(){
index=(index-1+stations.length)%stations.length;
load(index);
}

function next(){
index=(index+1)%stations.length;
load(index);
}

function mute(){
audio.muted=!audio.muted;
}

/* BUILD SIDEBAR */

stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;
div.onclick=()=>load(i);
sidebar.appendChild(div);
});

load(0);

</script>

</body>
</html>
