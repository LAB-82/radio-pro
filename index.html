<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO APK</title>

<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial;}
h1{text-align:center;color:red;font-size:18px;}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}

.card{
background:#111;
padding:14px;
border-radius:12px;
text-align:center;
border:1px solid #222;
cursor:pointer;
}

.card:active{transform:scale(0.97);border-color:red;}

.logo{
width:42px;height:42px;margin:auto;
background:red;border-radius:10px;
display:flex;align-items:center;justify-content:center;
font-size:10px;
}

#player{
position:fixed;bottom:0;width:100%;
background:#111;padding:10px;
text-align:center;
}
button{padding:10px;border:1px solid red;background:black;color:white;}
</style>
</head>

<body>

<h1>🔥 RADIO APK SYSTEM</h1>

<div class="grid" id="grid"></div>

<div id="player">
<button onclick="stop()">STOP</button>
</div>

<audio id="audio"></audio>

<script>

const API = "https://TWOJ-BACKEND.onrender.com/api/";

const stations = [
{ id:"rmf", name:"RMF FM" },
{ id:"zet", name:"Radio ZET" },
{ id:"eska", name:"Radio Eska" },
{ id:"jedynka", name:"PR Jedynka" },
{ id:"trojka", name:"PR Trójka" }
];

const audio = document.getElementById("audio");

async function play(id){

stop();

const r = await fetch(API + id);
const data = await r.json();

audio.src = data.stream;
audio.load();

audio.play().catch(e=>{
alert("PLAY ERROR");
console.log(e);
});

}

function stop(){
audio.pause();
audio.src="";
}

const grid = document.getElementById("grid");

stations.forEach(s=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`<div class="logo">${s.name.slice(0,3)}</div><div>${s.name}</div>`;
d.onclick=()=>play(s.id);
grid.appendChild(d);
});

</script>

</body>
</html>
