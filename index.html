<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#ff2a2a;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

body.day{
background:#eaeaea;
color:#ff2a2a;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
}

canvas{
display:block;
height:260px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:stretch;
justify-content:center;
width:100%;
}

button{
width:160px;
height:45px;
background:transparent;
color:#ff2a2a;
cursor:pointer;
font-family:'Orbitron';
border:2px solid #ff2a2a;
box-sizing:border-box;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #ff2a2a;
box-sizing:border-box;
}

#volume{
width:120px;
height:10px;
appearance:none;
background:transparent;
border:1px solid #ff2a2a;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
background:#ff2a2a;
cursor:pointer;
}

#volume::-moz-range-thumb{
width:16px;
height:16px;
background:#ff2a2a;
cursor:pointer;
border:none;
}

#modeBtn{
font-size:22px;
width:66px;
height:45px;
background:transparent;
border:2px solid #ff2a2a;
color:#ff2a2a;
box-sizing:border-box;
}

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
font-size:20px;
}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

const controls=document.getElementById("controls");
const title=document.getElementById("title");

let audioCtx, analyser, source, dataArray;
let peaks=[];
let animationStarted=false;

audio.volume=volume.value;

/* AUDIO SETUP */
function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
analyser.smoothingTimeConstant=0.7;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

/* PLAY */
function playRadio(){
setupAudio();

if(audioCtx.state==="suspended"){
audioCtx.resume();
}

audio.src=STREAM_URL;
audio.play();

if(!animationStarted){
animationStarted=true;
draw();
}
}

/* STOP */
function stopRadio(){
audio.pause();
for(let i=0;i<peaks.length;i++) peaks[i]=0;
}

/* MUTE */
function muteRadio(){
audio.muted=!audio.muted;
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

/* VOLUME */
volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

/* RESIZE */
function resizeCanvas(){
let dpr=window.devicePixelRatio||1;
let width=title.offsetWidth;

canvas.width=width*dpr;
canvas.height=260*dpr;

canvas.style.width=width+"px";
canvas.style.height="260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);

controls.style.width=width+"px";
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

/* DRAW LOOP */
function draw(){
requestAnimationFrame(draw);

if(!analyser)return;

analyser.getByteFrequencyData(dataArray);
drawEQ();
}

/* EQ */
function drawEQ(){

let dpr=window.devicePixelRatio||1;
let width=canvas.width/dpr;
let height=canvas.height/dpr;

ctx.clearRect(0,0,width,height);

let bars=Math.max(1,Math.floor(width/8));
let barWidth=width/bars;
let step=Math.floor(dataArray.length/bars);

ctx.fillStyle="#ff2a2a";

for(let i=0;i<bars;i++){

let value=dataArray[i*step]||0;
let h=(value/255)*height;

let x=i*barWidth;
let y=height-h;

ctx.fillRect(x,y,barWidth-1,h);
}
}
</script>

</body>
</html>
