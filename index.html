<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE DEBUG MODE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#playerBox{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

#panel{
text-align:center;
padding:20px;
}

#status{
margin-top:15px;
font-size:13px;
color:#9f9;
white-space:pre-line;
}

button{
background:#222;
color:#fff;
border:none;
padding:10px 14px;
cursor:pointer;
border-radius:6px;
margin:5px;
}

button:hover{background:#333;}

</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO DEBUG ENGINE (100% DIAGNOSTIC MODE)</div>

<div id="playerBox">
<div id="panel">

<button onclick="start()">▶ START RADIO</button>
<button onclick="stop()">■ STOP</button>

<div id="status">CLICK START TO BEGIN</div>

<audio id="audio" controls></audio>

</div>
</div>

</div>

<script>

const stations = [
"Muzyczne Radio",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Tok FM",
"Antyradio",
"Radio Maryja",
"Radio Rodzina"
];

const STREAMS = {
"Muzyczne Radio":"https://stream.muzyczneradio.pl:8000/stream.mp3",
"RMF FM":"https://rs6-krk2-cyfronet.rmfstream.pl/RMFFM48",
"Radio Zet":"https://zt.cdn.eurozet.pl/ZET128.mp3",
"Radio Eska":"https://waw.ic.smcdn.pl/t043-1.mp3",
"Tok FM":"https://radiostream.pl/tuba10-1.mp3",
"Antyradio":"https://stream.antyradio.pl/stream.mp3",
"Radio Maryja":"http://s1.slotex.pl:7070/stream",
"Radio Rodzina":"https://stream.radirodzina.pl/stream"
};

const audio = document.getElementById("audio");
const status = document.getElementById("status");

let current = 0;
let started = false;

function log(msg){
status.innerText = msg;
console.log(msg);
}

function load(i){
current = i;

const name = stations[i];
const url = STREAMS[name];

log("Loading: " + name + "\nURL: " + url);

if(!url){
log("❌ NO STREAM URL");
return;
}

audio.src = url;

audio.onerror = () => {
log("❌ AUDIO ERROR (stream blocked or invalid)");
};

audio.oncanplay = () => {
log("✅ STREAM READY: " + name);
};

audio.onplaying = () => {
log("▶ PLAYING: " + name);
};
}

function start(){
started = true;
log("Starting audio...");

load(current);

audio.play()
.then(()=>log("▶ PLAY SUCCESS"))
.catch(err=>{
log("❌ PLAY BLOCKED:\n" + err);
});
}

function stop(){
audio.pause();
audio.src = "";
log("■ STOPPED");
}

/* UI */
stations.forEach((s,i)=>{
const div = document.createElement("div");
div.className = "station";
div.innerText = s;
div.onclick = ()=>load(i);
document.getElementById("stations").appendChild(div);
});

</script>

</body>
</html>
