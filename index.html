<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

h2{
color:#aaa;
font-size:14px;
margin-left:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.tile{
background:#111;
border:1px solid #222;
border-radius:12px;
padding:12px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.tile:active{
transform:scale(0.95);
border-color:red;
}

.tile img{
width:38px;
height:38px;
display:block;
margin:0 auto 6px;
}
</style>
</head>

<body>

<h2>🔥 POLSKA</h2>
<div class="grid" id="pl"></div>

<h2>🌍 ZAGRANICA</h2>
<div class="grid" id="world"></div>

<script>

/* 🔥 100% DZIAŁAJĄCE OFFICIAL PLAYER LINKI */
const polish=[
{name:"RMF FM", url:"https://www.rmf.fm/sluchaj"},
{name:"Radio Zet", url:"https://www.radiozet.pl/"},
{name:"Radio Eska", url:"https://www.eska.pl/"},
{name:"Polskie Radio 1", url:"https://jedynka.polskieradio.pl/"},
{name:"Polskie Radio 3", url:"https://trojka.polskieradio.pl/"},
{name:"TOK FM", url:"https://audycje.tokfm.pl/"},
{name:"Antyradio", url:"https://www.antyradio.pl/"}
];

const world=[
{name:"BBC Radio 1", url:"https://www.bbc.co.uk/sounds/play/live:bbc_radio_one"},
{name:"BBC 1Xtra", url:"https://www.bbc.co.uk/sounds/play/live:bbc_1xtra"},
{name:"Slam FM", url:"https://www.slam.nl/radio/player"},
{name:"Ibiza Global", url:"https://ibizaglobalradio.com/"},
{name:"Radio Deejay", url:"https://www.deejay.it/streaming/"},
{name:"1.FM Club", url:"https://www.1.fm/station/club"}
];

/* IKONA */
function icon(name){
return "data:image/svg+xml;utf8," + encodeURIComponent(`
<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'>
<rect width='100%' height='100%' fill='black'/>
<text x='50%' y='55%' font-size='9' fill='red' text-anchor='middle'>${name}</text>
</svg>
`);
}

/* TILE */
function make(container, list){

list.forEach(s=>{

let d=document.createElement("div");
d.className="tile";

let img=document.createElement("img");
img.src=icon(s.name);

let txt=document.createElement("div");
txt.innerText=s.name;

d.onclick=()=>{
window.open(s.url,"_blank");
};

d.appendChild(img);
d.appendChild(txt);
container.appendChild(d);

});

}

make(document.getElementById("pl"),polish);
make(document.getElementById("world"),world);

</script>

</body>
</html>
