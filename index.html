<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE v3</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
    display:flex;
    gap:10px;
    align-items:center;
}

.station:hover { background:#222; }

.station.active {
    background:#2a2a2a;
    color:#00ff90;
}

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#radioPlayer{
    width:90%;
    height:90%;
    background:#111;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    gap:40px;
}

/* LEFT */
#center {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* LOGO */
#logoBox img{
    width:180px;
    height:180px;
    border-radius:20px;
    background:#222;
}

/* PLAY */
#bigPlay{
    font-size:70px;
    cursor:pointer;
    margin-top:10px;
}

/* RIGHT CONTROLS */
#controlsPanel{
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#1a1a1a;
    padding:12px;
    border-radius:12px;
    align-items:center;
}

.ctrl {
    cursor:pointer;
    font-size:16px;
    background:#222;
    padding:8px 12px;
    border-radius:8px;
    width:90px;
    text-align:center;
}

.ctrl:hover {
    background:#333;
}

#volume {
    width:90px;
}

/* bottom bar kept */
#bottomBar{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 18px;
    border-radius:30px;
    display:flex;
    gap:18px;
}

.activeDot {
    width:8px;
    height:8px;
    border-radius:50%;
    background:#00ff90;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 RADIO ENGINE v3 (AGGREGATOR)</div>

<div id="playerBox">
    <div id="radioPlayer">

        <!-- CENTER -->
        <div id="center">
            <div id="logoBox">
                <img id="stationLogo" src="">
            </div>

            <div id="bigPlay" onclick="toggle()">▶</div>
        </div>

        <!-- RIGHT PANEL -->
        <div id="controlsPanel">
            <div class="ctrl" onclick="play()">PLAY</div>
            <div class="ctrl" onclick="stop()">STOP</div>
            <div class="ctrl" onclick="mute()">MUTE</div>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.6">
        </div>

    </div>
</div>

</div>

<audio id="audio"></audio>

<script>

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Polish Radio London 24",
"Polskie Radio Dzieciom",
"Polskie Radio Chopin",
"Radio Republika",
"Radio Maryja",
"Radio Jasna Góra"
];

const audio = document.getElementById("audio");
const sidebar = document.getElementById("sidebar");
const volume = document.getElementById("volume");

let index = 0;
let playing = false;
let cache = {};
let candidates = [];

audio.volume = volume.value;

/* ---------------------------
   RADIO BROWSER AGGREGATOR
----------------------------*/
async function resolve(name){

    if(cache[name]) return cache[name];

    try {
        const r = await fetch(
          `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?limit=10`
        );
        const data = await r.json();

        if(!data || !data.length) return [];

        const urls = data
            .map(s => s.url_resolved)
            .filter(Boolean);

        cache[name] = urls;
        return urls;

    } catch(e){
        return [];
    }
}

/* ---------------------------
   DEAD STREAM HANDLER
----------------------------*/
let currentTry = 0;

async function load(i){

    index = i;
    const name = stations[i];

    setLogo(name);

    candidates = await resolve(name);
    currentTry = 0;

    if(!candidates.length){
        audio.src = "";
        return;
    }

    playCandidate();
}

function playCandidate(){

    if(currentTry >= candidates.length){
        console.log("ALL STREAMS FAILED");
        return;
    }

    const url = candidates[currentTry];
    audio.src = url;

    audio.play().catch(() => {
        currentTry++;
        playCandidate();
    });

    monitorStream();
}

/* detect dead stream */
function monitorStream(){
    audio.onerror = () => {
        currentTry++;
        playCandidate();
    };

    setTimeout(() => {
        if(audio.readyState < 2){
            currentTry++;
            playCandidate();
        }
    }, 5000);
}

/* ---------------------------
   UI
----------------------------*/
function setLogo(name){
    document.getElementById("stationLogo").src =
      "https://logo.clearbit.com/" +
      encodeURIComponent(name.toLowerCase().replace(/\s/g,'') + ".com");
}

function play(){
    if(!audio.src) load(index);
    audio.play();
    playing = true;
}

function stop(){
    audio.pause();
    playing = false;
}

function mute(){
    audio.muted = !audio.muted;
}

function toggle(){
    if(audio.paused){
        play();
    } else {
        stop();
    }
}

/* volume */
volume.addEventListener("input", () => {
    audio.volume = volume.value;
});

/* sidebar */
stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerHTML = `<span class="activeDot"></span> ${s}`;
    div.onclick = () => load(i);
    sidebar.appendChild(div);
});

load(0);

</script>

</body>
</html>
