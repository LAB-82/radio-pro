<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    height: 100vh;
}

/* LISTA */
#sidebar {
    width: 320px;
    background: #141414;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    padding: 10px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}

.station:hover {
    background: #222;
}

/* MAIN */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
#header {
    padding: 12px;
    background: #1a1a1a;
    font-weight: bold;
}

/* META */
#meta {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    background: #151515;
    font-size: 13px;
    color: #bbb;
}

/* PLAYER AREA (jak screen) */
#playerBox {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
}

#radioCard {
    width: 320px;
    background: #111;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

#logo {
    width: 200px;
    height: 200px;
    object-fit: contain;
    background: #222;
    border-radius: 10px;
    margin-bottom: 10px;
}

#stationName {
    font-size: 16px;
    margin-bottom: 10px;
    color: #ddd;
}

/* CONTROLS */
#controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

.btn {
    font-size: 22px;
    cursor: pointer;
    user-select: none;
}

/* AUDIO */
audio {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

    <div id="header">🎧 Radio Player</div>

    <div id="meta">
        <div>⭐⭐⭐⭐☆</div>
        <div>Głosy: 1070</div>
        <div>❤️ 🔔 📤</div>
    </div>

    <div id="playerBox">
        <div id="radioCard">
            <img id="logo" src="">
            <div id="stationName">Wybierz stację</div>

            <audio id="audio" controls></audio>

            <div id="controls">
                <div class="btn" onclick="prev()">⏮</div>
                <div class="btn" onclick="toggle()">⏯</div>
                <div class="btn" onclick="next()">⏭</div>
                <div class="btn" onclick="volume()">🔊</div>
            </div>
        </div>
    </div>

</div>

<script>

/* 🔥 LISTA STACJI (Twoja + Muzyczne Radio) */
const stations = [
    { name: "Muzyczne Radio Jelenia Góra", url: "https://streaming.gra.fm/muzyczneradio" },
    { name: "Polskie Radio Jedynka", url: "https://stream3.polskieradio.pl/PR1.mp3" },
    { name: "Polskie Radio Dwójka", url: "https://stream3.polskieradio.pl/PR2.mp3" },
    { name: "Polskie Radio Trójka", url: "https://stream3.polskieradio.pl/PR3.mp3" },
    { name: "Polskie Radio Czwórka", url: "https://stream3.polskieradio.pl/PR4.mp3" },
    { name: "Radio Wrocław", url: "https://stream.radiowroclaw.pl:8000/rw_main" },
    { name: "TOK FM", url: "https://radiostream.pl/tuba9-1.mp3" },
    { name: "Antyradio", url: "https://n-4-1.dcs.redcdn.pl/sc/o2/Eurozet/live/antyradio.livx" },
    { name: "Radio Maryja", url: "https://radio-maryja.pl/live.mp3" }
];

const sidebar = document.getElementById("sidebar");
const audio = document.getElementById("audio");
const logo = document.getElementById("logo");
const stationName = document.getElementById("stationName");

let index = 0;

/* 🎧 PLAY */
function play(i) {
    index = i;

    stationName.textContent = stations[i].name;
    logo.src = "https://via.placeholder.com/200x200?text=RADIO";

    audio.src = stations[i].url;
    audio.play();
}

/* ⏯ */
function toggle() {
    if (audio.paused) audio.play();
    else audio.pause();
}

/* NEXT/PREV */
function next() {
    index = (index + 1) % stations.length;
    play(index);
}

function prev() {
    index = (index - 1 + stations.length) % stations.length;
    play(index);
}

function volume() {
    audio.volume = audio.volume === 0 ? 1 : 0;
}

/* LISTA */
stations.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "station";
    div.textContent = s.name;
    div.onclick = () => play(i);
    sidebar.appendChild(div);
});

</script>

</body>
</html>
