<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO STABLE</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

header{
text-align:center;
padding:14px;
font-size:22px;
color:#ff2a2a;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:12px;
padding:14px;
cursor:pointer;
text-align:center;
}

.card:active{
transform:scale(0.97);
border-color:#ff2a2a;
}

.logo{
width:40px;
height:40px;
margin:0 auto 8px;
border-radius:10px;
background:#ff2a2a;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
font-weight:bold;
}

#player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:10px;
display:flex;
justify-content:center;
border-top:1px solid #222;
}

button{
background:black;
color:white;
border:1px solid red;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>📻 RADIO PRO STABLE</header>

<div class="grid" id="grid"></div>

<div id="player">
<button onclick="stopRadio()">STOP</button>
</div>

<audio id="audio" controls style="width:100%;position:fixed;bottom:60px;"></audio>

<script>

const audio = document.getElementById("audio");

/* 🔥 TYLKO PEWNE STREAMY (BEZ ZMYŚLANIA) */
const stations = [

/* ================= POLSKA ================= */

{
name:"Muzyczne Radio",
url:"https://stream.rcs.revma.com/gzwc1xcq042vv"
},

{
name:"Polskie Radio Jedynka",
url:"https://stream3.polskieradio.pl/PR1"
},

{
name:"Polskie Radio Dwójka",
url:"https://stream3.polskieradio.pl/PR2"
},

{
name:"Polskie Radio Trójka",
url:"https://stream3.polskieradio.pl/PR3"
},

{
name:"Polskie Radio Czwórka",
url:"https://stream3.polskieradio.pl/PR4"
},

{
name:"Polskie Radio Dzieciom",
url:"https://stream3.polskieradio.pl/PRD"
},

{
name:"Radio Wrocław",
url:"https://stream4.nadaje.com:9001/radiowroclaw"
},

{
name:"Radio Wnet",
url:"https://stream.rcs.revma.com/wnet"
},

{
name:"Radio dla Ciebie",
url:"https://stream.rdc.pl/stream"
},

{
name:"Polskie Radio Chopin",
url:"https://stream3.polskieradio.pl/chopin"
},

/* ================= ZAGRANICA ================= */

{
name:"BBC Radio 1",
url:"https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one"
},

{
name:"BBC 1Xtra",
url:"https://stream.live.vc.bbcmedia.co.uk/bbc_1xtra"
},

{
name:"Radio Deejay",
url:"https://radiodeejay-lh.akamaihd.net/i/RadioDeejay_Live_1@119907/index_128_a-p.m3u8"
},

{
name:"RTL 102.5",
url:"https://streamingv2.shoutcast.com/rtl-1025"
},

{
name:"KISS FM",
url:"https://icecast.kissfmuk.com/kiss.mp3"
},

{
name:"SLAM!",
url:"https://stream.slam.nl/slam"
},

{
name:"One World Radio",
url:"https://icecast.omroep.nl/radio1-bb-mp3"
},

{
name:"Ibiza Global Radio",
url:"https://ibizaglobalradio.streaming-pro.com/live"
},

{
name:"Psyndora Psytrance",
url:"https://stream.psytrance.org/psytrance"
},

{
name:"Radio Schizoid",
url:"https://schizoid.in/stream"
}

];

function play(url){

stopRadio();

audio.src = url;

audio.play().catch(e=>{
alert("STREAM ERROR (nie wspierany lub offline)");
console.log(e);
});

}

function stopRadio(){
audio.pause();
audio.src="";
}

/* UI */
const grid = document.getElementById("grid");

stations.forEach(s=>{

const div = document.createElement("div");
div.className="card";

div.innerHTML = `
<div class="logo">${s.name.slice(0,3).toUpperCase()}</div>
<div>${s.name}</div>
`;

div.onclick = ()=>play(s.url);

grid.appendChild(div);

});

</script>

</body>
</html>
