<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

.header{
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#ff2a2a;
}

/* 🔥 TOP 6 GRID (APP STYLE) */
.top{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:16px;
padding:10px;
text-align:center;
cursor:pointer;
border:1px solid #222;
transition:0.2s;
}

.card:active{
transform:scale(0.95);
border-color:red;
}

/* 🔥 REAL APP ICON */
.logo{
width:52px;
height:52px;
border-radius:14px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
background:linear-gradient(45deg,#ff2a2a,#111);
}

.name{
font-size:11px;
margin-top:6px;
opacity:0.9;
}

/* PLAYER BAR */
#player{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:center;
gap:10px;
padding:10px;
border-top:1px solid #222;
}

button{
padding:10px 14px;
background:#000;
border:1px solid #ff2a2a;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 RADIO PRO APP</div>

<h3 style="padding-left:10px;color:#aaa">⭐ ULUBIONE (TOP 6)</h3>
<div class="top" id="top"></div>

<h3 style="padding-left:10px;color:#aaa">📻 STACJE</h3>
<div class="grid" id="grid"></div>

<div id="player">
<button onclick="stop()">STOP</button>
</div>

<audio id="audio"></audio>

<script>

const API = "https://TWOJ-SERVER.onrender.com/api/";

let current = null;
let hls = null;

const stations = [

{ id:"rmf", name:"RMF FM" },
{ id:"zet", name:"Radio ZET" },
{ id:"eska", name:"Radio Eska" },
{ id:"tokfm", name:"TOK FM" },

{ id:"bbc1", name:"BBC Radio 1" },
{ id:"bbc1x", name:"BBC 1Xtra" },

{ id:"slam", name:"SLAM FM" },
{ id:"oneworld", name:"One World Radio" }

];

/* 🔥 PLAYER ENGINE */
function play(id){

fetch(API + id)
.then(r=>r.json())
.then(data=>{

stop();

const audio = document.getElementById("audio");

if(data.stream.includes(".m3u8")){
if(Hls.isSupported()){
hls = new Hls();
hls.loadSource(data.stream);
hls.attachMedia(audio);
hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
audio.play();
});
}
}else{
audio.src = data.stream;
audio.play().catch(()=>alert("PLAY ERROR"));
}

current = id;

saveFav(id);

});

}

function stop(){
const audio = document.getElementById("audio");

if(hls){
hls.destroy();
hls = null;
}

audio.pause();
audio.src="";
}

/* 🔥 ULUBIONE */
function saveFav(id){

let fav = JSON.parse(localStorage.getItem("fav") || "[]");

fav = fav.filter(f=>f!==id);
fav.unshift(id);
fav = fav.slice(0,6);

localStorage.setItem("fav",JSON.stringify(fav));

renderFav();

}

/* TOP 6 */
function renderFav(){

const fav = JSON.parse(localStorage.getItem("fav") || "[]");

const box = document.getElementById("top");
box.innerHTML="";

fav.forEach(id=>{
const s = stations.find(x=>x.id===id);
if(s){
const d=document.createElement("div");
d.className="card";
d.innerHTML=`<div class="logo">${s.name.slice(0,3)}</div><div class="name">${s.name}</div>`;
d.onclick=()=>play(s.id);
box.appendChild(d);
}
});

}

/* GRID */
function render(){

const grid=document.getElementById("grid");

stations.forEach(s=>{

let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<div class="logo">${s.name.slice(0,3)}</div>
<div class="name">${s.name}</div>
`;

d.onclick=()=>play(s.id);

grid.appendChild(d);

});

}

render();
renderFav();

</script>

</body>
</html>
