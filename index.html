<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio - Test</title>
<style>
  body {
    margin: 0; font-family: Arial; background:#000; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;
  }
  #startBtn {
    padding: 15px 30px; font-size:16px; background:#222; border:none; border-radius:8px; cursor:pointer;
  }
  #content {
    display:none; width:100%; flex-direction:row; height: calc(100vh - 50px);
  }
  #sidebar {
    width:300px; background:#111; overflow:auto; padding:10px; height:100%;
  }
  #stations {
    display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
  }
  .station {
    background:#222; padding:10px; border-radius:8px; cursor:pointer; text-align:center;
  }
  .station:hover {
    background:#333;
  }
  #player {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px;
  }
  #logo { width:160px; height:120px; background:#333; margin-bottom:10px; }
  #status { margin-top:10px; }
</style>
</head>
<body>

<button id="startBtn">Kliknij, aby uruchomić radio</button>
<div id="content">
  <div id="sidebar">
    <div id="stations"></div>
  </div>
  <div id="player">
    <div id="logo"></div>
    <audio id="audio" controls></audio>
    <div id="status">Oczekiwanie...</div>
  </div>
</div>

<script>
const stations = [
  {name:"RMF FM", stream:"https://rmf.stream.kielce.pl/rmf_fm.mp3"},
  {name:"Radio Zet", stream:"https://streaming.radiozet.pl/RadioZet.mp3"},
  {name:"Radio Plus", stream:"https://icecast.radio.net/radioplus"},
  {name:"Polskie Radio", stream:"https://polskieradio.pl/Content/Radio/Stream/PolskieRadio.mp3"}
];

const audio = document.getElementById("audio");
const status = document.getElementById("status");

document.getElementById("startBtn").onclick = () => {
  document.getElementById("startBtn").style.display="none";
  document.getElementById("content").style.display="flex";
  initStations();
  loadStation(0);
};

function initStations() {
  const container = document.getElementById("stations");
  stations.forEach((s, i) => {
    const div = document.createElement("div");
    div.className="station";
    div.innerText=s.name;
    div.onclick= ()=> loadStation(i);
    container.appendChild(div);
  });
}

function loadStation(i) {
  const s=stations[i];
  status.innerText="Ładowanie: "+s.name;
  audio.src=s.stream;
  audio.play().then(() => {
    status.innerText="Graj: "+s.name;
  }).catch(()=> {
    status.innerText="Kliknij odtwarzanie ręcznie.";
  });
}
</script>

</body>
</html>
