<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:"Orbitron",sans-serif;
color:#ff2a2a;
}

/* ================= ARASAKA GRID (KLUCZ DO STYLU) ================= */
body{
background:
linear-gradient(90deg, rgba(255,0,0,0.03) 1px, transparent 1px),
linear-gradient(0deg, rgba(255,0,0,0.03) 1px, transparent 1px);
background-size:40px 40px;
}

/* ================= TITLE (PRECYZYJNY HUD STYLE) ================= */
#title{
font-size:72px;
margin-top:30px;
text-align:center;
letter-spacing:12px;
text-transform:uppercase;

color:#ff2a2a;

text-shadow:
0 0 8px #ff0000,
0 0 25px rgba(255,0,0,0.6);
}

/* ================= FIXED HUD FRAME (BRAK ROZJEŻDŻANIA) ================= */
#proEqualizer{
display:block;
margin:20px auto;

/* 🔥 KLUCZ: stała ramka jak HUD */
width:900px;
max-width:95vw;
height:260px;

border:1px solid rgba(255,0,0,0.35);
border-radius:6px;

background:rgba(0,0,0,0.35);

box-shadow:
inset 0 0 30px rgba(255,0,0,0.2),
0 0 20px #ff0000;
}

/* ================= CANVAS LOCK ================= */
canvas{
display:block;
width:900px !important;
height:260px !important;
}

/* ================= CONTROLS (ARASAKA ALIGN GRID) ================= */
#controls{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
margin-top:10px;
flex-wrap:wrap;
}

/* ================= BUTTONS (HUD PRECYZJA) ================= */
button{
width:150px;
height:44px;

background:#050000;
color:#ff2a2a;

border:1px solid rgba(255,0,0,0.6);

font-family:"Orbitron",sans-serif;
letter-spacing:2px;
text-transform:uppercase;

box-shadow:
0 0 10px rgba(255,0,0,0.5),
inset 0 0 10px rgba(255,0,0,0.2);

cursor:pointer;
transition:0.15s;
}

button:hover{
box-shadow:
0 0 25px #ff0000,
0 0 60px rgba(255,0,0,0.4);
transform:translateY(-1px);
}

/* ================= VOLUME (HUD BAR) ================= */
.volumeWrapper{
width:150px;
height:44px;

display:flex;
align-items:center;
justify-content:center;

background:#050000;
border:1px solid rgba(255,0,0,0.6);

box-shadow:0 0 12px rgba(255,0,0,0.5);
}

#volume{
width:120px;
height:5px;
appearance:none;
background:#000;
border:1px solid #ff2a2a;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:12px;
height:12px;
background:#ff2a2a;
box-shadow:0 0 10px #ff0000;
cursor:pointer;
}

/* ================= LINK (WRÓCONY, STABILNY) ================= */
#bottomLink{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
font-size:16px;
letter-spacing:2px;
opacity:0.8;
}

/* ================= MOBILE FIX ================= */
@media (max-width:768px){

#title{
font-size:36px;
letter-spacing:6px;
}

#proEqualizer{
height:180px;
}

canvas{
height:180px !important;
width:95vw !important;
}

button, .volumeWrapper{
width:130px;
height:40px;
}

}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">

<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE</button>

<div class="volumeWrapper">
<input id="volume" type="range">
</div>

</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>

const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

let audio=document.getElementById("audio");
let volume=document.getElementById("volume");
let canvas=document.getElementById("proEqualizer");
let ctx=canvas.getContext("2d");

let audioCtx, analyser, source, dataArray;
let animationStarted=false;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src=STREAM_URL;
audio.play();
if(!animationStarted){animationStarted=true;draw();}
}

function stopRadio(){
audio.pause();
}

function muteRadio(){
audio.muted=!audio.muted;
}

/* ================= FIX: ARASAKA STABLE EQ ================= */
function draw(){
requestAnimationFrame(draw);
if(!analyser||!dataArray)return;

analyser.getByteFrequencyData(dataArray);

/* 🔥 KLUCZ: STAŁA RAMA = brak rozjazdu */
let w=900;
let h=260;

canvas.width=w;
canvas.height=h;

ctx.clearRect(0,0,w,h);

let bars=60;
let barW=w/bars;

for(let i=0;i<bars;i++){
let v=dataArray[i]||0;
let bh=(v/255)*h;

ctx.fillStyle="#ff2a2a";
ctx.fillRect(i*barW,h-bh,barW*0.7,bh);
}
}

</script>

</body>
</html>
