<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-red:#ff2a2a;
  --cp-bg:#000014;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(0, 240, 255,.05) 25%, rgba(0, 240, 255,.05) 26%, transparent 27%, transparent 74%, rgba(0, 240, 255,.05) 75%, rgba(0, 240, 255,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(255, 0, 60,.05) 25%, rgba(255, 0, 60,.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 60,.05) 75%, rgba(255, 0, 60,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  min-height:100vh;
  padding-bottom: 40px;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:var(--cp-cyan);
  text-shadow:
    0 0 5px var(--cp-cyan),
    0 0 10px var(--cp-cyan),
    0 0 20px var(--cp-cyan),
    0 0 40px var(--cp-magenta),
    0 0 80px var(--cp-magenta);
  position: relative;
  animation: flicker 3s infinite alternate;
}

@keyframes flicker {
  0%, 18%, 22%, 25%, 53%, 57%, 100% {
    text-shadow:
      0 0 5px var(--cp-cyan),
      0 0 10px var(--cp-cyan),
      0 0 20px var(--cp-cyan),
      0 0 40px var(--cp-magenta),
      0 0 80px var(--cp-magenta);
    opacity: 1;
  }
  20%, 24%, 55% {
    text-shadow: none;
    opacity: 0.8;
  }
}

#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
  border:2px solid var(--cp-cyan);
  box-shadow: 0 0 10px var(--cp-cyan), 0 0 20px var(--cp-magenta), inset 0 0 20px rgba(0,240,255,0.2);
  width: 600px;
  height: 260px;
  display: block;
  box-sizing: border-box;
}

canvas{
  display: block;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
  align-items: center;
}

.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a1a;
  border:2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.3);
  box-sizing: border-box;
}

button{
  width:160px;
  height:45px;
  background:#0a0a1a;
  color:var(--cp-cyan);
  cursor:pointer;
  border:2px solid var(--cp-cyan);
  font-family:'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.2);
  transition: all 0.15s ease;
  box-sizing: border-box;
}

button:hover{
  background:var(--cp-cyan);
  color:#000014;
  box-shadow: 0 0 15px var(--cp-cyan), 0 0 30px var(--cp-magenta);
  transform: translateY(-1px);
}

button:active{
  transform: translateY(1px);
  box-shadow: 0 0 5px var(--cp-cyan);
}
