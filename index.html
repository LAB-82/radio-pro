<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=OCR-A&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Rajdhani','OCR-A',monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* CYBERPUNK TITLE */
#title{
  font-size:88px;
  margin-top:50px;
  color:#ff2a2a;
  text-transform:uppercase;
  position:relative;
  animation: glitch 2s infinite;
}

#title::before,
#title::after{
  content:attr(data-text);
  position:absolute;
  left:0;
}

#title::before{
  color:#00ffff;
  z-index:-1;
  transform:translate(2px,0);
}

#title::after{
  color:#ff00ff;
  z-index:-2;
  transform:translate(-2px,0);
}

@keyframes glitch{
  0%{transform:skew(0deg);}
  20%{transform:skew(2deg);}
  40%{transform:skew(-2deg);}
  60%{transform:skew(1deg);}
  80%{transform:skew(-1deg);}
  100%{transform:skew(0deg);}
}

/* CANVAS */
#proEqualizer{
  margin:30px 0;
  border:2px solid #ff2a2a;
  box-shadow:0 0 20px red;
}

canvas{
  height:260px;
}

/* CONTROLS */
#controls{
  display:flex;
  gap:8px;
}

button{
  width:160px;
  height:45px;
  background:#111;
  color:#fff;
  border:2px solid #ff2a2a;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

/* GLITCH BUTTON */
button::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,#fff,transparent);
  left:-100%;
}

button:hover::before{
  left:100%;
  transition:0.5s;
}

.volumeWrapper{
  width:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #ff2a2a;
}

#volume{
  width:120px;
}

.playActive{color:#00ff00;}
.stopActive{color:#ff4444;}
.muteActive{color:#ffaa00;}

#bottomLink a{
  color:#ff2a2a;
}

/* scanlines */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.03) 3px
  );
  pointer-events:none;
}
</style>
</head>

<body>

<div id="title" data-text="Muzyczne Radio">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const playBtn=document.getElementById("playBtn");
const stopBtn=document.getElementById("stopBtn");
const muteBtn=document.getElementById("muteBtn");

const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

audio.volume=parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let peaks=[];
let animationStarted=false;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=1024;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);

for(let i=0;i<300;i++) peaks[i]=0;
}

function playRadio(){
setupAudio();

if(audioCtx.state==="suspended"){
audioCtx.resume();
}

audio.src=STREAM_URL;
audio.play();

playBtn.classList.add("playActive");
stopBtn.classList.remove("stopActive");

if(!animationStarted){
animationStarted=true;
draw();
}
}

/* ✅ NAPRAWA */
function stopRadio(){
audio.pause();

stopBtn.classList.add("stopActive");
playBtn.classList.remove("playActive");

setTimeout(()=>{
stopBtn.classList.remove("stopActive");
},1000);

for(let i=0;i<peaks.length;i++){
peaks[i]=0;
}
}

function muteRadio(){
audio.muted=!audio.muted;
muteBtn.classList.toggle("muteActive");
}

volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

function resizeCanvas(){
let width=600;
canvas.width=width;
canvas.height=260;
canvas.style.width=width+"px";
canvas.style.height="260px";
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

function draw(){
requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

let bars=80;
let barWidth=canvas.width/bars;

for(let i=0;i<bars;i++){
let value=dataArray[i]||0;
let h=(value/255)*canvas.height;

ctx.fillStyle="#ff0000";
ctx.fillRect(i*barWidth,canvas.height-h,barWidth-2,h);
}
}

resizeCanvas();
</script>

</body>
</html>
