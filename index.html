<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-bg:#000014;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(0, 240, 255,.05) 25%, rgba(0, 240, 255,.05) 26%, transparent 27%, transparent 74%, rgba(0, 240, 255,.05) 75%, rgba(0, 240, 255,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(255, 0, 60,.05) 25%, rgba(255, 0, 60,.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 60,.05) 75%, rgba(255, 0, 60,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  min-height:100vh;
  padding-bottom: 40px;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:var(--cp-cyan);
  text-shadow:
    0 0 5px var(--cp-cyan),
    0 0 10px var(--cp-cyan),
    0 0 20px var(--cp-cyan),
    0 0 40px var(--cp-magenta),
    0 0 80px var(--cp-magenta);
}

#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
  border:2px solid var(--cp-cyan);
  box-shadow: 0 0 10px var(--cp-cyan), 0 0 20px var(--cp-magenta), inset 0 0 20px rgba(0,240,255,0.2);
  width: 600px;
  height: 260px;
  display: block;
}

canvas{
  display: block;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
}

.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a1a;
  border:2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.3);
}

button{
  width:160px;
  height:45px;
  background:#0a0a1a;
  color:var(--cp-cyan);
  cursor:pointer;
  border:2px solid var(--cp-cyan);
  font-family:'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.2);
  transition: all 0.15s ease;
}

button:hover{
  background:var(--cp-cyan);
  color:#000014;
  box-shadow: 0 0 15px var(--cp-cyan), 0 0 30px var(--cp-magenta);
  transform: translateY(-1px);
}

button:active{
  transform: translateY(1px);
  box-shadow: 0 0 5px var(--cp-cyan);
}

#volume{
  width:120px;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #0a0a1a;
  border: 1px solid var(--cp-cyan);
  outline: none;
}

#volume::-webkit-slider-thumb{
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  background: var(--cp-yellow);
  cursor: pointer;
  border: 2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
  border-radius: 2px;
}

#volume::-moz-range-thumb{
  width: 16px;
  height: 16px;
  background: var(--cp-yellow);
  cursor: pointer;
  border: 2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
  border-radius: 2px;
}

#volume::-webkit-slider-runnable-track{
  background: linear-gradient(90deg, var(--cp-magenta), var(--cp-cyan));
  height: 4px;
}

#volume::-moz-range-track{
  background: linear-gradient(90deg, var(--cp-magenta), var(--cp-cyan));
  height: 4px;
}

.playActive{
  color:#000014!important;
  background: var(--cp-cyan)!important;
  box-shadow: 0 0 20px var(--cp-cyan), 0 0 40px var(--cp-cyan)!important;
}
.stopActive{
  color:#000014!important;
  background: var(--cp-magenta)!important;
  border-color: var(--cp-magenta)!important;
  box-shadow: 0 0 20px var(--cp-magenta), 0 0 40px var(--cp-magenta)!important;
}
.muteActive{
  color:#000014!important;
  background: var(--cp-yellow)!important;
  border-color: var(--cp-yellow)!important;
  box-shadow: 0 0 20px var(--cp-yellow), 0 0 40px var(--cp-yellow)!important;
}

#bottomLink{
  margin-top:10px;
}

#bottomLink a{
  color:var(--cp-cyan);
  text-decoration:none;
  font-family:'Orbitron', sans-serif;
  text-shadow: 0 0 5px var(--cp-cyan);
  transition: 0.2s;
}

#bottomLink a:hover{
  color:var(--cp-yellow);
  text-shadow: 0 0 10px var(--cp-yellow), 0 0 20px var(--cp-magenta);
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
  <button id="playBtn" onclick="playRadio()">PLAY</button>
  <button id="stopBtn" onclick="stopRadio()">STOP</button>
  <button id="muteBtn" onclick="muteRadio()">MUTE</button>

  <div class="volumeWrapper">
    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
  </div>
</div>

<div id="bottomLink">
  <a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL = "https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio = document.getElementById("audio");
const volume = document.getElementById("volume");
const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");
const muteBtn = document.getElementById("muteBtn");
const canvas = document.getElementById("proEqualizer");
const ctx = canvas.getContext("2d");

audio.crossOrigin = "anonymous";
audio.volume = parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let peaks = [];
let animationStarted = false;

function setupAudio() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  source = audioCtx.createMediaElementSource(audio);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.8;

  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  for(let i = 0; i < 300; i++) peaks[i] = 0;
}

async function playRadio() {
  setupAudio();

  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }

  if (audio.src!== STREAM_URL) {
    audio.src = STREAM_URL;
  }

  audio.play().catch(err => {
    console.error("Błąd odtwarzania:", err);
  });

  playBtn.classList.add("playActive");
  stopBtn.classList.remove("stopActive");

  if (!animationStarted) {
    animationStarted = true;
    draw();
  }
}

function stopRadio() {
  audio.pause();

  stopBtn.classList.add("stopActive");
  playBtn.classList.remove("playActive");

  setTimeout(() => {
    stopBtn.classList.remove("stopActive");
  }, 1000);

  for(let i = 0; i < peaks.length; i++) {
    peaks[i] = 0;
  }
}

function muteRadio() {
  audio.muted =!audio.muted;
  muteBtn.classList.toggle("muteActive");
}

volume.addEventListener("input", () => {
  let val = parseFloat(volume.value);
  audio.volume = val;
});

function resizeCanvas() {
  let dpr = window.devicePixelRatio || 1;
  let width = 600;

  canvas.width = width * dpr;
  canvas.height = 260 * dpr;

  canvas.style.width = width + "px";
  canvas.style.height = "260px";

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}

window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

function draw() {
  requestAnimationFrame(draw);

  if (!analyser ||!dataArray) return;

  analyser.getByteFrequencyData(dataArray);
  drawEQ();
}

function drawEQ() {
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.width / dpr;
  const heightCanvas = canvas.height / dpr;

  ctx.fillStyle = '#000014';
  ctx.fillRect(0, 0, width, heightCanvas);

  const bars = 80;
  const barWidth = width / bars;
  const step = Math.floor(dataArray.length / bars * 1.5);

  const yOffset = 8;
  const maxHeight = heightCanvas * 0.92;

  const barGradient = ctx.createLinearGradient(0, heightCanvas,
