<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Player</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f0f;
        color: #fff;
        padding: 20px;
        min-height: 100vh;
    }

  .player {
        max-width: 480px;
        margin: 0 auto;
        background: #1a1a1a;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

  .header {
        padding: 24px;
        text-align: center;
        background: #242424;
        border-bottom: 1px solid #333;
    }

  .clock {
        font-size: 48px;
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 8px;
        font-variant-numeric: tabular-nums;
    }

  .now-playing {
        font-size: 14px;
        color: #888;
        min-height: 20px;
    }

  .now-playing.active {
        color: #1db954;
    }

  .controls {
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        background: #1a1a1a;
    }

  .play-btn {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: none;
        background: #1db954;
        color: #000;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s, background 0.2s;
    }

  .play-btn:hover {
        transform: scale(1.05);
        background: #1ed760;
    }

  .play-btn:active {
        transform: scale(0.95);
    }

  .stations {
        max-height: 60vh;
        overflow-y: auto;
    }

  .station {
        padding: 18px 24px;
        border-bottom: 1px solid #2a2a2a;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

  .station:hover {
        background: #242424;
    }

  .station.active {
        background: #282828;
        border-left: 3px solid #1db954;
        padding-left: 21px;
    }

  .station.disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

  .station-name {
        font-size: 16px;
        font-weight: 500;
    }

  .station.active.station-name {
        color: #1db954;
    }

  .playing-indicator {
        display: none;
        width: 4px;
        height: 16px;
        background: #1db954;
        animation: pulse 1s infinite;
    }

  .station.active.playing-indicator {
        display: block;
    }
