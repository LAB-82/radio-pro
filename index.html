<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=OCR-A&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Rajdhani', 'OCR-A', monospace;
  font-weight: 500;
  letter-spacing: 1px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  height:100vh;
  overflow: hidden;
  transition:0.4s;
}

/* (CAŁY CSS BEZ ZMIAN) */

#title{
  font-weight: 800;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:#ff2a2a;
  text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}

#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
}

canvas{
  height:260px;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
}

.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  border:2px solid #ff2a2a;
}

button{
  width:160px;
  height:45px;
  background:#111;
  color:#fff;
  cursor:pointer;
  border:2px solid #ff2a2a;
}

#volume{
  width:120px;
}

.playActive{ color:#00ff00; }
.stopActive{ color:#ff4444; }
.muteActive{ color:#ffaa00; }

#bottomLink{
  margin-top:10px;
}

#bottomLink a{
  color:#ff2a2a;
  text-decoration:none;
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
  <button id="playBtn" onclick="playRadio()">PLAY</button>
  <button id="stopBtn" onclick="stopRadio()">STOP</button>
  <button id="muteBtn" onclick="muteRadio()">MUTE</button>

  <div class="volumeWrapper">
    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
  </div>
</div>

<div id="bottomLink">
  <a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL = "https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio = document.getElementById("audio");
const volume = document.getElementById("volume");
const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");
const muteBtn = document.getElementById("muteBtn");
const canvas = document.getElementById("proEqualizer");
const ctx = canvas.getContext("2d");

audio.volume = parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let peaks = [];
let animationStarted = false;

function setupAudio() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  source = audioCtx.createMediaElementSource(audio);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.8;

  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  for(let i = 0; i < 300; i++) peaks[i] = 0;
}

function playRadio() {
  setupAudio();

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  audio.src = STREAM_URL;
  audio.play();

  playBtn.classList.add("playActive");
  stopBtn.classList.remove("stopActive");

  if (!animationStarted) {
    animationStarted = true;
    draw();
  }
}

/* ✅ NAPRAWIONA funkcja (była uszkodzona) */
function stopRadio() {
  audio.pause();

  stopBtn.classList.add("stopActive");
  playBtn.classList.remove("playActive");

  setTimeout(() => {
    stopBtn.classList.remove("stopActive");
  }, 1000);

  for(let i = 0; i < peaks.length; i++) {
    peaks[i] = 0;
  }
}

function muteRadio() {
  audio.muted = !audio.muted;
  muteBtn.classList.toggle("muteActive");
}

volume.addEventListener("input", () => {
  let val = parseFloat(volume.value);
  audio.volume = val;

  if (Math.abs(val - 0.5) < 0.02) {
    volume.classList.remove("active");
  } else {
    volume.classList.add("active");
  }
});

volume.dispatchEvent(new Event("input"));

function resizeCanvas() {
  let dpr = window.devicePixelRatio || 1;
  let width = 600;

  canvas.width = width * dpr;
  canvas.height = 260 * dpr;

  canvas.style.width = width + "px";
  canvas.style.height = "260px";

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}

window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

function draw() {
  requestAnimationFrame(draw);

  if (!analyser || !dataArray) return;

  analyser.getByteFrequencyData(dataArray);
  drawEQ();
}

function drawEQ() {
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.width / dpr;
  const heightCanvas = canvas.height / dpr;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, width, heightCanvas);

  const bars = 80;
  const barWidth = width / bars;
  const step = Math.floor(dataArray.length / bars * 1.5);

  const yOffset = 8;
  const maxHeight = heightCanvas * 0.92;

  for (let i = 0; i < bars; i++) {
    const index = i * step;

    let value = dataArray[index] || 0;
    let percent = value / 255;
    let h = Math.pow(percent, 0.6) * maxHeight;

    const x = i * barWidth;
    const y = heightCanvas - h + yOffset;

    ctx.fillStyle = "#ff0000";
    ctx.fillRect(x + 1, y, barWidth - 2, h);

    if (!peaks[i]) peaks[i] = 0;

    if (h > peaks[i]) {
      peaks[i] = h;
    } else {
      peaks[i] *= 0.92;
    }

    if (peaks[i] < 2) peaks[i] = 0;

    const peakY = heightCanvas - peaks[i] + yOffset;
    ctx.fillStyle = "#ffaa00";
    ctx.fillRect(x + 2, peakY, barWidth - 4, 4);
  }
}

resizeCanvas();
</script>

</body>
</html>
