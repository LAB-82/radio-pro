<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio App PRO</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:300px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:12px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.station:hover { background:#222; }

.station.active {
    background:#1f1f1f;
    color:#00ff90;
    font-weight:bold;
}

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-size:18px;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

#radioPlayer {
    width:400px;
    text-align:center;
}

#logoBox img {
    width:240px;
    border-radius:10px;
    background:#111;
}

#bigPlay {
    font-size:70px;
    cursor:pointer;
    margin-top:20px;
}

#controls {
    height:70px;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
}

.btn { cursor:pointer; font-size:22px; }
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 RADIO APP PRO</div>

<div id="playerBox">
    <div id="radioPlayer">
        <div id="logoBox">
            <img id="logo">
        </div>

        <div id="bigPlay" onclick="toggle()">▶</div>
    </div>
</div>

<div id="controls">
    <div class="btn" onclick="prev()">⏮</div>
    <div class="btn" onclick="toggle()">⏯</div>
    <div class="btn" onclick="next()">⏭</div>
    <div class="btn" onclick="mute()">🔊</div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   FULL VERIFIED STATIONS
========================= */

const stations = [

{
name:"RMF FM",
stream:"https://rs6-krk2.rmfstream.pl/rmf_fm",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/RMF_FM_logo.svg/512px-RMF_FM_logo.svg.png"
},

{
name:"Radio ZET",
stream:"https://zt.cdn.eurozet.pl/ZET.mp3",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Radio_ZET_logo_2021.svg/512px-Radio_ZET_logo_2021.svg.png"
},

{
name:"Radio ESKA",
stream:"https://waw01-01.ic.smcdn.pl/t043-1.mp3",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Radio_Eska_logo.svg/512px-Radio_Eska_logo.svg.png"
},

{
name:"Antyradio",
stream:"https://antyradio-01.cdn.eurozet.pl/antyradio.mp3",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Antyradio_logo.svg/512px-Antyradio_logo.svg.png"
},

{
name:"TOK FM",
stream:"https://radiostream.pl/tuba10-1.mp3",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/TOK_FM_logo.svg/512px-TOK_FM_logo.svg.png"
},

{
name:"Polskie Radio Jedynka",
stream:"https://stream.polskieradio.pl/program1.mp3",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Polskie_Radio_Jedynka_logo_2018.svg/512px-Polskie_Radio_Jedynka_logo_2018.svg.png"
},

{
name:"Polskie Radio Trójka",
stream:"https://stream3.polskieradio.pl/pr3_aac128",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Polskie_Radio_Trojka_logo_2018.svg/512px-Polskie_Radio_Trojka_logo_2018.svg.png"
},

{
name:"Radio Wrocław",
stream:"https://stream4.nadaje.com/radiowroclaw",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Radio_Wroc%C5%82aw_logo.svg/512px-Radio_Wroc%C5%82aw_logo.svg.png"
},

{
name:"Radio Wnet",
stream:"https://stream.rcs.revma.com/wnet",
logo:"https://radio-wnet.pl/wp-content/uploads/2020/06/logo.png"
},

{
name:"Muzyczne Radio",
stream:"https://stream.rcs.revma.com/gzwc1xcq042vv",
logo:"https://www.muzyczneradio.pl/logo.png"
}

];

/* ========================= */

let index = 0;
let playing = false;

const audio = document.getElementById("audio");
const sidebar = document.getElementById("sidebar");

function setActive(){
    document.querySelectorAll(".station").forEach((el,i)=>{
        el.classList.toggle("active", i===index);
    });
}

function load(i){

index=i;
const s=stations[i];

audio.src=s.stream;
document.getElementById("logo").src=s.logo;

if(playing){
    audio.play().catch(()=>next());
}

setUI();
setActive();
}

function toggle(){

if(!audio.src) load(index);

if(playing){
    audio.pause();
    playing=false;
}else{
    audio.play().catch(()=>next());
    playing=true;
}

setUI();
}

function setUI(){
document.getElementById("bigPlay").innerText=playing?"⏸":"▶";
}

function prev(){
index=(index-1+stations.length)%stations.length;
load(index);
}

function next(){
index=(index+1)%stations.length;
load(index);
}

function mute(){
audio.muted=!audio.muted;
}

/* FAIL SAFE */
audio.onerror=()=>next();

/* BUILD UI */
stations.forEach((s,i)=>{
let div=document.createElement("div");
div.className="station";
div.innerText=s.name;
div.onclick=()=>load(i);
sidebar.appendChild(div);
});

load(0);

</script>

</body>
</html>
