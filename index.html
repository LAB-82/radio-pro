<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{
background:#eaeaea;
color:#000;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}

canvas{
display:block;
height:260px;
border-radius:8px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}

body.day .volumeWrapper{
background:#d6d6d6;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}

/* klik zostaje (nic nie ruszam wizualnie) */
button:active{
transform:scale(0.96);
}

/* hover FIX – brak “niebieskiego focusa” i glitchy */
button:hover{
box-shadow:0 0 18px #ff0000;
}

/* usunięcie niebieskiego focusa */
button:focus{
outline:none;
box-shadow:0 0 10px #ff2a2a;
}

body.day button{
background:#d6d6d6;
color:#000;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

#volume{
width:120px;
height:10px;
appearance:none;
border-radius:10px;
outline:none;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

#volume.active{
box-shadow:0 0 10px #ff0000;
border:1px solid #ff0000;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red;
cursor:pointer;
}

#volume::-moz-range-thumb{
width:16px;
height:16px;
border:none;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red;
cursor:pointer;
}

.playActive{ color:#00ff00; text-shadow:0 0 10px #00ff00; }
.stopActive{ color:#ff4444; text-shadow:0 0 10px red; }

.muteActive{
color:#ffaa00;
text-shadow:0 0 10px orange;
animation:pulseMute 0.8s infinite alternate;
}

@keyframes pulseMute{
from{ transform:scale(1); }
to{ transform:scale(1.1); }
}

#modeBtn{
font-size:22px;
width:66px;
height:49px;
}

/* NIE DOTYKAM ikon ani linku – jak było */

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
text-shadow:0 0 6px red;
font-size:20px;
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const playBtn=document.getElementById("playBtn");
const stopBtn=document.getElementById("stopBtn");
const muteBtn=document.getElementById("muteBtn");
const modeBtn=document.getElementById("modeBtn");

audio.volume=parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;

/* ===== FIX RADIO (KLUCZOWE NAPRAWY) ===== */
function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
analyser.smoothingTimeConstant=0.5;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

async function playRadio(){

setupAudio();

try{
if(audioCtx.state === "suspended"){
await audioCtx.resume();
}

audio.src=STREAM_URL;
audio.load();
await audio.play();

playBtn.classList.add("playActive");
stopBtn.classList.remove("stopActive");

}catch(e){
console.log("RADIO ERROR:",e);
}
}

function stopRadio(){
audio.pause();

stopBtn.classList.add("stopActive");
playBtn.classList.remove("playActive");

setTimeout(()=>stopBtn.classList.remove("stopActive"),1000);
}

function muteRadio(){
audio.muted=!audio.muted;
muteBtn.classList.toggle("muteActive");
}

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume=volume.value;
});
</script>

</body>
</html>
