<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<!-- Cyberpunk 2077 fonts: Rajdhani (game UI) + OCR-A (terminal) -->
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=OCR-A&display=swap" rel="stylesheet">
<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Rajdhani', 'OCR-A', monospace;
font-weight: 500;
letter-spacing: 1px;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
position: relative;
overflow: hidden;
text-rendering: optimizeLegibility;
-webkit-font-smoothing: antialiased;
}

body::before {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image:
radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.04), transparent),
radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.03), transparent),
radial-gradient(0.5px 0.5px at 90px 40px, rgba(255,42,42,0.02), transparent);
background-repeat: repeat;
background-size: 80px 80px;
animation: static-noise 0.1s steps(1) infinite;
pointer-events: none;
z-index: 1;
mix-blend-mode: screen;
}

@keyframes static-noise {
0% { transform: translate(0, 0); }
100% { transform: translate(1px, 1px); }
}

#title{
font-family: 'Rajdhani', 'OCR-A', monospace;
font-weight: 800;
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000,
0 0 10px rgba(255,255,255,0.2);
animation: cyberpunk-title 4s ease-in-out infinite alternate;
filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
letter-spacing: 4px;
text-transform: uppercase;
}

@keyframes cyberpunk-title {
0% {
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000;
filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
}
100% {
text-shadow:0 0 8px #ff2a2a,0 0 20px #ff0000,0 0 40px #ff0000,0 0 80px #ff0000,
0 0 15px rgba(255,255,255,0.3);
filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
}
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,42,42,0.4), inset 0 0 15px rgba(255,255,255,0.08);
position: relative;
z-index: 10;
border: 2px solid rgba(255,42,42,0.6);
}

canvas{
display:block;
height:260px;
border-radius:6px;
filter: drop-shadow(0 0 12px rgba(255,0,0,0.5)) brightness(1.03);
animation: canvas-flicker 3s ease-in-out infinite alternate;
}

@keyframes canvas-flicker {
0% { filter: drop-shadow(0 0 12px rgba(255,0,0,0.5)) brightness(1.03); }
100% { filter: drop-shadow(0 0 18px rgba(255,0,0,0.7)) brightness(1.06); }
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
position: relative;
z-index: 20;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 15px #ff2a2a, 0 0 25px rgba(255,255,255,0.15), inset 0 0 10px rgba(255,255,255,0.08);
transition: all 0.3s ease;
position: relative;
border-radius: 4px;
font-family: 'Rajdhani', monospace;
font-weight: 600;
}

.volumeWrapper::before {
  content: 'VOL';
  position: absolute;
  font-size: 10px;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.9);
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 1px;
  border: 1px solid rgba(255,42,42,0.5);
  text-shadow: 0 0 3px rgba(255,255,255,0.3);
}
