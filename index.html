<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO LIVE</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
text-align:center;
padding:14px;
color:#ff2a2a;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:14px;
padding:12px;
cursor:pointer;
border:1px solid #222;
text-align:center;
}

.card:active{
transform:scale(0.96);
border-color:red;
}

.logo{
width:44px;
height:44px;
margin:auto;
border-radius:10px;
background:linear-gradient(45deg,#ff2a2a,#111);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:10px;
}

#player{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:flex;
justify-content:center;
gap:10px;
border-top:1px solid #222;
}

button{
padding:10px 14px;
background:black;
color:white;
border:1px solid red;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 RADIO PRO SYSTEM</div>

<div class="grid" id="grid"></div>

<div id="player">
<button onclick="stop()">STOP</button>
</div>

<audio id="audio"></audio>

<script>

const API = "https://TWOJ-BACKEND.onrender.com/api/stream/";

const stations = [
{ id:"rmf", name:"RMF FM" },
{ id:"zet", name:"Radio ZET" },
{ id:"eska", name:"Radio Eska" },
{ id:"jedynka", name:"PR Jedynka" },
{ id:"dwojka", name:"PR Dwójka" },
{ id:"trojka", name:"PR Trójka" },
{ id:"czworka", name:"PR Czwórka" },
{ id:"wroclaw", name:"Radio Wrocław" },
{ id:"wnet", name:"Radio Wnet" },
{ id:"rdc", name:"Radio RDC" },
{ id:"chopin", name:"PR Chopin" }
];

const audio = document.getElementById("audio");

async function play(id){

stop();

const res = await fetch(API + id);
const data = await res.json();

audio.src = data.stream;
audio.load();

audio.play().catch(e=>{
alert("PLAY ERROR: " + e.message);
console.log(e);
});

}

function stop(){
audio.pause();
audio.src="";
}

const grid = document.getElementById("grid");

stations.forEach(s=>{

let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<div class="logo">${s.name.slice(0,3)}</div>
<div>${s.name}</div>
`;

d.onclick=()=>play(s.id);

grid.appendChild(d);

});

</script>

</body>
</html>
