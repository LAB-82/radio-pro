<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026 FULL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
position:relative;
transition:0.2s;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}
.station.live{background:#1f7a3a;}

.star{
position:absolute;
top:4px;
right:6px;
font-size:12px;
cursor:pointer;
opacity:0.5;
}
.star.fav{opacity:1;color:gold;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

audio{
width:80%;
}

#logo{
width:160px;
height:120px;
object-fit:contain;
background:#111;
padding:8px;
border-radius:10px;
}

#status{
font-size:13px;
opacity:0.8;
white-space:pre-line;
}

button{ display:none; }

</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE PRO 2026 (SELF HEALING)</div>

<div id="player">

<img id="logo"/>

<audio id="audio" controls></audio>

<div id="status">READY</div>

</div>

</div>

<script>

const stations = [
"Muzyczne Radio",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Wrocław",
"Tok FM",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Rodzina",
"Polskie Radio"
];

const audio = document.getElementById("audio");
const status = document.getElementById("status");
const logo = document.getElementById("logo");

let current = 0;

let cache = JSON.parse(localStorage.getItem("radio_cache") || "{}");
let favs = JSON.parse(localStorage.getItem("radio_favs") || "[]");

function saveCache(){
localStorage.setItem("radio_cache", JSON.stringify(cache));
}

function saveFavs(){
localStorage.setItem("radio_favs", JSON.stringify(favs));
}

/* =========================
   🔥 TYLKO PEWNE POLSKIE LINKI
========================= */
const manualStreams = {
"Radio Plus":"https://www.radio-polska.pl/radio-plus-legnica",
"RMF FM":"https://www.radio-polska.pl/rmf-fm",
"Radio Zet":"https://www.radio-polska.pl/radio-zet",
"Radio Wrocław":"https://www.radio-polska.pl/pr-radio-wroclaw-1023",
"Tok FM":"https://www.radio-polska.pl/tok-fm",
"Radio Kolor":"https://www.radio-polska.pl/radio-kolor-103-fm",
"Radio Złote Przeboje":"https://www.radio-polska.pl/radio-zlote-przeboje",
"Planeta FM":"https://www.radio-polska.pl/planeta-fm",
"Radio Kampus":"https://www.radio-polska.pl/radio-kampus-971",
"Radio Rodzina":"https://www.radio-polska.pl/katolickie-radio-rodzina",
"Polskie Radio":"http://e.radio-polska.pl/embed/radio-poland-411263",
"Muzyczne Radio":"https://www.muzyczneradio.pl/index.php/player/lo.html?type=lo"
};

/* =========================
   LOGO (stabilne + fallback)
========================= */
async function setLogo(name){
try{
const res = await fetch(
`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=1`
);
const data = await res.json();

if(data[0]?.favicon){
logo.src = data[0].favicon;
return;
}
}catch(e){}

logo.src = "";
}

/* =========================
   STREAM RESOLVER (FIX: NIE NADPISUJE MANUALI)
========================= */
async function resolveStream(name){

/* 🔥 HARD LOCK – Twoje linki ZAWSZE pierwsze */
if(manualStreams[name]){
cache[name] = manualStreams[name];
saveCache();
return manualStreams[name];
}

/* cache fallback */
if(cache[name]){
return cache[name];
}

try{
const res = await fetch(
`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=5`
);
const data = await res.json();

const best = data.find(s =>
s.url_resolved &&
s.url_resolved.startsWith("http")
);

if(best){
cache[name] = best.url_resolved;
saveCache();
return best.url_resolved;
}

}catch(e){}

return null;
}

/* =========================
   LOAD
========================= */
async function load(i){

current = i;
const name = stations[i];

setLogo(name);

status.innerText = "ŁADOWANIE: " + name;

const url = await resolveStream(name);

if(!url){
status.innerText = "❌ BRAK STREAMU: " + name;
return;
}

audio.src = url;
audio.volume = 0.85; /* lekkie wyrównanie głośności */

audio.play()
.then(()=>{
status.innerText = "▶ GRA: " + name;
markLive(i);
})
.catch(()=>{
status.innerText = "⚠️ kliknij PLAY ręcznie";
});
}

/* LIVE */
function markLive(i){
document.querySelectorAll(".station").forEach((el,idx)=>{
el.classList.toggle("live", idx===i);
});
}

/* FAVORITES */
function toggleFav(name, el){
if(favs.includes(name)){
favs = favs.filter(f=>f!==name);
el.classList.remove("fav");
}else{
favs.push(name);
el.classList.add("fav");
}
saveFavs();
}

/* AUTO CACHE CLEAN */
setInterval(()=>{
cache = {};
localStorage.removeItem("radio_cache");
}, 600000);

/* SELF HEALING */
setInterval(async ()=>{
for(let i=0;i<stations.length;i++){
const name = stations[i];
if(!cache[name]){
try{
const res = await fetch(
`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=1`
);
const data = await res.json();
if(data[0]?.url_resolved){
cache[name] = data[0].url_resolved;
saveCache();
}
}catch(e){}
}
}
}, 300000);

/* CLEAR CACHE */
function clearCache(){
cache = {};
localStorage.removeItem("radio_cache");
}

/* UI */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;

const star=document.createElement("div");
star.className="star";
star.innerText="★";

if(favs.includes(s)) star.classList.add("fav");

star.onclick=(e)=>{
e.stopPropagation();
toggleFav(s, star);
};

div.appendChild(star);
div.onclick=()=>load(i);

document.getElementById("stations").appendChild(div);
});

</script>

</body>
</html>
