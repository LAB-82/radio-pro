<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio LIVE PRO</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
padding:12px;
text-align:center;
font-size:18px;
color:#ff2a2a;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:14px;
padding:12px;
cursor:pointer;
border:1px solid #222;
text-align:center;
transition:0.2s;
}

.card:active{
transform:scale(0.96);
border-color:red;
}

.logo{
width:44px;
height:44px;
margin:auto;
border-radius:10px;
background:linear-gradient(45deg,#ff2a2a,#111);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:10px;
}

.name{
font-size:12px;
margin-top:6px;
}

#player{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:center;
padding:10px;
border-top:1px solid #222;
}

button{
padding:10px 16px;
background:black;
color:white;
border:1px solid red;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 POLSKIE RADIO LIVE</div>

<div class="grid" id="grid"></div>

<div id="player">
<button onclick="stop()">STOP</button>
</div>

<audio id="audio"></audio>

<script>

/* 🔥 TWOJA LISTA */
const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Polskie Radio Dzieciom",
"Radio Wrocław",
"Radio Wnet",
"Radio dla Ciebie",
"Polskie Radio Chopin"
];

const audio = document.getElementById("audio");
let currentStream = null;

/* 🔥 RADIO BROWSER API (STABILNE STREAMY) */
async function getStream(name){

const url = `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}`;

const res = await fetch(url);
const data = await res.json();

/* bierzemy pierwszy działający stream */
return data?.[0]?.url_resolved || null;
}

/* 🔥 PLAY */
async function play(name){

stop();

const stream = await getStream(name);

if(!stream){
alert("Brak streamu: " + name);
return;
}

audio.src = stream;
audio.play().catch(e=>{
alert("PLAY ERROR");
console.log(e);
});

currentStream = stream;

}

/* STOP */
function stop(){
audio.pause();
audio.src="";
}

/* UI */
const grid = document.getElementById("grid");

stations.forEach(s=>{

let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<div class="logo">${s.slice(0,3).toUpperCase()}</div>
<div class="name">${s}</div>
`;

d.onclick=()=>play(s);

grid.appendChild(d);

});

</script>

</body>
</html>
