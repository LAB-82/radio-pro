<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO FIX (CLEAN)</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

/* GRID 3 COL */
#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
transition:0.2s;
font-size:12px;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#playerBox{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

/* PLAYER */
#radioPlayer{
width:90%;
height:90%;
background:#111;
border-radius:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

#logoBox img{
width:180px;
height:180px;
border-radius:12px;
background:#222;
margin-bottom:10px;
object-fit:cover;
}

/* CONTROLS */
#controls{
display:flex;
gap:10px;
align-items:center;
margin-top:10px;
}

button{
background:#222;
color:#fff;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
}

button:hover{background:#333;}

#volume{
width:120px;
}

#status{
margin-top:10px;
font-size:12px;
opacity:0.7;
}
</style>

</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE PRO FIX (REAL STREAMS + ORDER FIX)</div>

<div id="playerBox">
<div id="radioPlayer">

<div id="logoBox">
<img id="logo" />
</div>

<div id="controls">
<button onclick="play()">PLAY</button>
<button onclick="stop()">STOP</button>
<button onclick="mute()">MUTE</button>
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.6">
</div>

<div id="status">READY</div>

</div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   STATIONS (UNCHANGED ORDER)
========================= */

const stations = [
"Muzyczne Radio",
"Radio Plus",
"Radio Złote Przeboje",
"RMF FM",
"Radio Eska",
"Radio Eska Rock",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Wrocław",
"Planeta FM",
"Radio Wnet",
"Radio Kolor",
"Tok FM",
"Antyradio",
"Polskie Radio Dzieciom",
"Polskie Radio Chopin",
"Radio Kampus",
"Radio AH",
"Live Radio",
"Rock Radio",
"Radio Maryja",
"Radio Niepokalanów",
"Radio Rodzina"
];

/* =========================
   REAL STREAM MAP (FIXED)
   - ONLY TRUSTED SOURCES
========================= */

const STREAMS = {

"Muzyczne Radio":"https://stream.rcs.revma.com/gzwc1xcq042vv",

"RMF FM":"https://rs6-krk2-cyfronet.rmfstream.pl/RMFFM48",

"Radio Zet":"https://zt.cdn.eurozet.pl/ZET010.mp3",

"Radio Eska":"https://waw01-01.ic.smcdn.pl/t043-1.mp3",

"Radio Eska Rock":"https://waw01-01.ic.smcdn.pl/t050-1.mp3",

"Antyradio":"https://stream.antyradio.pl/stream.mp3",

"Tok FM":"https://radiostream.pl/tuba10-1.mp3",

"Polskie Radio Jedynka":"https://stream.polskieradio.pl/program1.mp3",

"Polskie Radio Dwójka":"https://stream.polskieradio.pl/program2.mp3",

"Polskie Radio Trójka":"https://stream.polskieradio.pl/program3.mp3",

"Polskie Radio Czwórka":"https://stream.polskieradio.pl/pr4_aac128",

"Polskie Radio Dzieciom":"https://stream.polskieradio.pl/prd.mp3",

"Polskie Radio Chopin":"https://stream.polskieradio.pl/chopin.mp3",

"Radio Wrocław":"https://stream4.nadaje.com/radiowroclaw",

"Radio Wnet":"https://stream.rcs.revma.com/wnet",

"Radio Plus":"https://plc.streaming.radio.plus/stream.mp3",

"Radio Kolor":"https://radiokolor.pl/stream",

"Radio Złote Przeboje":"https://stream.rcs.revma.com/zloteprzeboje",

"Planeta FM":"https://stream.rcs.revma.com/planetafm",

"Radio Kampus":"https://stream.rcs.revma.com/kampus",

"Rock Radio":"https://stream.rcs.revma.com/rockradio",

"Radio Maryja":"https://radiomaryja.pl/stream",

"Radio Niepokalanów":"https://radio-niepokalanow.pl/stream",

"Radio Rodzina":"https://radiorodzina.pl/stream"

};

/* ========================= */

const audio=document.getElementById("audio");
const logo=document.getElementById("logo");
const status=document.getElementById("status");
const volume=document.getElementById("volume");

let current=0;
let cache={};

volume.oninput=()=>audio.volume=volume.value;

/* =========================
   STREAM RESOLVER (SAFE)
========================= */

async function getStream(name){

if(STREAMS[name]) return STREAMS[name];

if(cache[name]) return cache[name];

try{
const res=await fetch(
`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}`
);

const data=await res.json();

if(!data.length){
status.innerText="NO STREAM";
return null;
}

const url=data[0].url_resolved;
cache[name]=url;
return url;

}catch(e){
status.innerText="ERROR STREAM";
return null;
}
}

/* =========================
   LOGO FIX (REAL API)
========================= */

function setLogo(name){
logo.src =
`https://www.radio-browser.info/backends/logos/${encodeURIComponent(name)}.png`;
}

/* ========================= */

async function load(i){

current=i;
const name=stations[i];

document.querySelectorAll(".station").forEach((el,idx)=>{
el.classList.toggle("active",idx===i);
});

setLogo(name);
status.innerText="LOADING...";

const url=await getStream(name);

if(!url){
audio.removeAttribute("src");
status.innerText="NO STREAM FOUND";
return;
}

audio.src=url;
audio.play().catch(()=>{});

status.innerText="PLAYING: "+name;
}

function play(){load(current);}
function stop(){audio.pause();audio.src="";status.innerText="STOPPED";}
function mute(){audio.muted=!audio.muted;}

stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;
div.onclick=()=>load(i);
document.getElementById("stations").appendChild(div);
});

load(0);

</script>

</body>
</html>
