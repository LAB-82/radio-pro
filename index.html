
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio PRO STREAM ENGINE</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.station:hover { background:#222; }

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#radioPlayer{
    width:90%;
    height:90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#logoBox img{
    width:220px;
    margin-bottom:20px;
}

#bigPlay{
    font-size:70px;
    cursor:pointer;
}

#bottomBar{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 18px;
    border-radius:30px;
    display:flex;
    gap:18px;
}

#controls {
    height:70px;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.btn { cursor:pointer; font-size:20px; }

.active { color:#00ff90; }
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 RADIO STREAM ENGINE</div>

<div id="playerBox">
    <div id="radioPlayer">

        <div id="logoBox">
            <img id="stationLogo" src="">
        </div>

        <div id="bigPlay" onclick="toggle()">▶</div>

        <div id="bottomBar">
            <div onclick="prev()">⏮</div>
            <div onclick="toggle()" id="playIcon">▶</div>
            <div onclick="next()">⏭</div>
            <div onclick="mute()">🔊</div>
        </div>

    </div>
</div>

<div id="controls">
    <div class="btn" onclick="prev()">⏮</div>
    <div class="btn" onclick="toggle()">⏯</div>
    <div class="btn" onclick="next()">⏭</div>
    <div class="btn" onclick="mute()">🔊</div>
</div>

</div>

<audio id="audio"></audio>

<script>

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Open FM",
"Open FM Disco Polo",
"Disco Radio",
"Polish Radio London 24",
"Polskie Radio Dzieciom",
"Polskie Radio Chopin",
"Radio Yanosik",
"Radio Republika",
"Radio dla Ciebie",
"Radio Maryja",
"Radio Jasna Góra"
];

let index=0;
let playing=false;
let hls=null;

const audio=document.getElementById("audio");
const sidebar=document.getElementById("sidebar");

let cache={};

// REAL STREAM RESOLVER (TO JEST KLUCZ)
async function resolveStream(name){

if(cache[name]) return cache[name];

try{
    const res = await fetch(
        `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?limit=1`
    );

    const data = await res.json();

    if(!data || data.length===0) return null;

    const url = data[0].url_resolved;

    cache[name]=url;
    return url;

}catch(e){
    return null;
}
}

function setLogo(name){
 document.getElementById("stationLogo").src =
 "https://via.placeholder.com/220x120?text="+encodeURIComponent(name);
}

async function load(i){

index=i;
let name=stations[i];

setLogo(name);

if(hls){hls.destroy();hls=null;}

let url = await resolveStream(name);

// fallback tylko jeśli API nie zwróci
if(!url){
    url="https://stream.rcs.revma.com/gzwc1xcq042vv";
}

if(url.includes(".m3u8")){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(audio);
}else{
    audio.src=url;
}

if(playing){
    audio.play().catch(()=>{});
}

setUI();
}

function toggle(){
 if(!audio.src) load(index);

 if(playing){
   audio.pause();
   playing=false;
 } else {
   audio.play().catch(()=>{});
   playing=true;
 }

 setUI();
}

function setUI(){
 document.getElementById("bigPlay").innerText=playing?"⏸":"▶";
 document.getElementById("playIcon").innerText=playing?"⏸":"▶";
}

function prev(){
 index=(index-1+stations.length)%stations.length;
 load(index);
}

function next(){
 index=(index+1)%stations.length;
 load(index);
}

function mute(){
 audio.muted=!audio.muted;
}

stations.forEach((s,i)=>{
 let div=document.createElement("div");
 div.className="station";
 div.innerText=s;
 div.onclick=()=>load(i);
 sidebar.appendChild(div);
});

load(0);

</script>

</body>
</html>
