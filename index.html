<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{background:#eaeaea;color:#000;}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
}

canvas{display:block;height:260px;}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}

button{
width:160px;height:45px;
background:#111;color:#fff;
cursor:pointer;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
transition:0.15s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.9);}

.playActive{color:#00ff00;}
.stopActive{color:#ff4444;}
.muteActive{color:#ffaa00;}

#modeBtn{width:66px;height:49px;}

.volumeWrapper{
width:160px;height:45px;
display:flex;align-items:center;justify-content:center;
background:#111;border:2px solid #ff2a2a;
}

#volume{width:120px;}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
font-size:20px;
display:flex;
align-items:center;
gap:10px;
}

.radioIcon{width:40px;height:40px;}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">
Muzyczne Radio
</a>
</div>

<audio id="audio" crossorigin="anonymous" playsinline></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const playBtn=document.getElementById("playBtn");
const stopBtn=document.getElementById("stopBtn");
const muteBtn=document.getElementById("muteBtn");
const modeBtn=document.getElementById("modeBtn");

audio.volume=0.5;

/* ===== AUDIO (SAFE MODE) ===== */
let audioCtx, analyser, source, dataArray;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

async function playRadio(){
try{
audio.src=STREAM_URL;
audio.load();

await audio.play();

setupAudio();
if(audioCtx.state==="suspended") await audioCtx.resume();

playBtn.classList.add("playActive");
stopBtn.classList.remove("stopActive");

}catch(e){
console.log("PLAY ERROR:",e);
alert("Radio nie może się uruchomić (blokada przeglądarki lub stream).");
}
}

function stopRadio(){
audio.pause();
audio.currentTime=0;

stopBtn.classList.add("stopActive");
playBtn.classList.remove("playActive");

setTimeout(()=>stopBtn.classList.remove("stopActive"),800);
}

function muteRadio(){
audio.muted=!audio.muted;
muteBtn.classList.toggle("muteActive");
}

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume=volume.value;
});
</script>

</body>
</html>
