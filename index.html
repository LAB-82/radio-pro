<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio App UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    height: 100vh;
}

/* LEWA LISTA */
#sidebar {
    width: 300px;
    background: #141414;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    padding: 10px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

.station:hover {
    background: #222;
}

.station.active{
    background:#2a2a2a;
    color:#fff;
    font-weight:bold;
}

/* PRAWA STRONA */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
#header {
    padding: 12px;
    background: #1a1a1a;
    font-size: 18px;
    font-weight: bold;
}

/* META */
#meta {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #151515;
    color: #ccc;
    font-size: 13px;
}

.star {
    color: gold;
}

.icon {
    cursor: pointer;
    font-size: 16px;
}

/* PLAYER AREA */
#playerBox {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    position: relative;
}

/* PLAYER */
#radioPlayer{
    width: 90%;
    height: 90%;
    background: #111;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

/* LOGO */
#logoBox img{
    width: 220px;
    height: auto;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px rgba(255,255,255,0.05);
}

/* BIG PLAY */
#bigPlay{
    font-size: 70px;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}

#bigPlay:hover{
    transform: scale(1.1);
}

/* BOTTOM BAR */
#bottomBar{
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    padding: 10px 18px;
    border-radius: 30px;
    display: flex;
    gap: 18px;
    font-size: 18px;
    cursor: pointer;
}

#bottomBar div{
    transition: 0.2s;
}

#bottomBar div:hover{
    transform: scale(1.2);
}

/* CONTROLS */
#controls {
    height: 70px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    border-top: 1px solid #222;
}

.btn {
    cursor: pointer;
    font-size: 20px;
    user-select: none;
}

audio{
    display:none;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

    <div id="header">🎧 Radio Player</div>

    <div id="meta">
        <div class="star">⭐⭐⭐⭐☆</div>
        <div>Głosy: 1070 • Średnia: 4.8</div>

        <div style="margin-left:auto; display:flex; gap:10px;">
            <div class="icon">❤️</div>
            <div class="icon">🔔</div>
            <div class="icon">📤 Udostępnij</div>
        </div>
    </div>

    <div id="playerBox">

        <div id="radioPlayer">

            <div id="logoBox">
                <img id="stationLogo" src="https://via.placeholder.com/220x120?text=RADIO" />
            </div>

            <div id="bigPlay" onclick="togglePlay()">▶</div>

            <div id="bottomBar">
                <div onclick="prev()">⏮</div>
                <div onclick="togglePlay()" id="playIcon">▶</div>
                <div onclick="next()">⏭</div>
                <div onclick="mute()">🔊</div>
            </div>

        </div>

    </div>

    <div id="controls">
        <div class="btn" onclick="prev()">⏮</div>
        <div class="btn" onclick="togglePlay()">⏯</div>
        <div class="btn" onclick="next()">⏭</div>
        <div class="btn" onclick="mute()">🔊</div>
    </div>

    <audio id="audio" autoplay></audio>

</div>

<script>

const STREAM_URL = "https://stream.live.vc.bbcmedia.co.uk/bbc_radio_fourlw";

const stations = [
    "Muzyczne Radio Jelenia Góra",
    "Polskie Radio Jedynka",
    "Polskie Radio Dwójka",
    "Polskie Radio Trójka",
    "Polskie Radio Czwórka",
    "Radio Plus",
    "RMF FM",
    "Radio Zet",
    "Radio Eska",
    "Radio Wrocław",
    "Radio Wnet",
    "Tok FM",
    "Antyradio",
    "Radio Kolor",
    "Open FM",
    "Open FM Disco Polo",
    "Disco Radio",
    "Polish Radio London 24",
    "Polskie Radio Dzieciom",
    "Polskie Radio Chopin",
    "Radio Yanosik",
    "Radio Republika",
    "Radio dla Ciebie",
    "Radio Maryja",
    "Radio Jasna Góra"
];

let index = 0;
let playing = false;

const sidebar = document.getElementById("sidebar");
const audio = document.getElementById("audio");

function updateLogo(name){
    document.getElementById("stationLogo").src =
        "https://via.placeholder.com/220x120?text=" + encodeURIComponent(name);
}

function setActive(){
    document.querySelectorAll(".station").forEach((el,i)=>{
        el.classList.toggle("active", i === index);
    });
}

function load(i){
    index = i;
    updateLogo(stations[i]);
    setActive();

    audio.src = STREAM_URL;

    if(playing){
        audio.play();
    }

    document.getElementById("bigPlay").innerText = playing ? "⏸" : "▶";
    document.getElementById("playIcon").innerText = playing ? "⏸" : "▶";
}

stations.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "station";
    div.innerText = s;
    div.onclick = () => load(i);
    sidebar.appendChild(div);
});

function togglePlay(){
    playing = !playing;

    if(playing){
        audio.src = STREAM_URL;
        audio.play();
    } else {
        audio.pause();
    }

    document.getElementById("bigPlay").innerText = playing ? "⏸" : "▶";
    document.getElementById("playIcon").innerText = playing ? "⏸" : "▶";
}

function prev(){
    index = (index - 1 + stations.length) % stations.length;
    load(index);
}

function next(){
    index = (index + 1) % stations.length;
    load(index);
}

function mute(){
    audio.muted = !audio.muted;
}

load(0);

</script>

</body>
</html>
