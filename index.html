<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:"Orbitron",sans-serif;
color:#ff2a2a;
}

/* ================= ARASAKA GRID (CIENKI TECHNICZNY) ================= */
body{
background:
linear-gradient(rgba(255,0,0,0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,0,0,0.06) 1px, transparent 1px);
background-size:50px 50px;
}

/* ================= TITLE ================= */
#title{
font-size:70px;
margin-top:30px;
text-align:center;
letter-spacing:10px;
text-transform:uppercase;

color:#ff2a2a;

text-shadow:
0 0 5px #ff0000,
0 0 15px rgba(255,0,0,0.6);
}

/* ================= HUD PANEL ================= */
#proEqualizer{
display:block;
margin:20px auto;

width:900px;
max-width:95vw;
height:260px;

background:rgba(0,0,0,0.35);

/* cienkie ramki jak na obrazku */
border:1px solid rgba(255,0,0,0.6);

box-shadow:
inset 0 0 20px rgba(255,0,0,0.2),
0 0 10px rgba(255,0,0,0.5);

/* 🔥 segmenty HUD */
position:relative;
}

/* 🔥 linie poziome HUD */
#proEqualizer::before{
content:"";
position:absolute;
left:0;
top:50%;
width:100%;
height:1px;
background:rgba(255,0,0,0.3);
}

/* 🔥 linie pionowe HUD */
#proEqualizer::after{
content:"";
position:absolute;
top:0;
left:33%;
width:1px;
height:100%;
background:rgba(255,0,0,0.25);
}

/* ================= CANVAS ================= */
canvas{
display:block;
width:900px !important;
height:260px !important;
}

/* ================= CONTROLS ================= */
#controls{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
margin-top:10px;
flex-wrap:wrap;
}

/* ================= BUTTONS ================= */
button{
width:150px;
height:44px;

background:#020000;
color:#ff2a2a;

border:1px solid rgba(255,0,0,0.8);

font-family:"Orbitron",sans-serif;
letter-spacing:2px;

box-shadow:
0 0 6px rgba(255,0,0,0.5),
inset 0 0 6px rgba(255,0,0,0.2);

cursor:pointer;
transition:0.15s;
}

button:hover{
box-shadow:
0 0 15px #ff0000;
}

/* ================= VOLUME ================= */
.volumeWrapper{
width:150px;
height:44px;

display:flex;
align-items:center;
justify-content:center;

background:#020000;
border:1px solid rgba(255,0,0,0.8);

box-shadow:0 0 8px rgba(255,0,0,0.5);
}

#volume{
width:120px;
height:4px;
appearance:none;
background:#000;
border:1px solid #ff2a2a;
}

/* 🔥 AKTYWNY TRACK */
#volume.active{
box-shadow:0 0 10px #ff0000;
}

/* 🔥 THUMB */
#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:10px;
height:10px;
background:#ff2a2a;
box-shadow:0 0 12px #ff0000;
cursor:pointer;
}

/* ================= LINK ================= */
#bottomLink{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
font-size:16px;
letter-spacing:2px;
opacity:0.9;
}

/* ================= MOBILE ================= */
@media (max-width:768px){

#title{
font-size:36px;
letter-spacing:6px;
}

#proEqualizer{
height:180px;
}

canvas{
height:180px !important;
width:95vw !important;
}

button, .volumeWrapper{
width:130px;
height:40px;
}

}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">

<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn">🌙</button>

</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>

const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

let audio=document.getElementById("audio");
let volume=document.getElementById("volume");
let canvas=document.getElementById("proEqualizer");
let ctx=canvas.getContext("2d");

let audioCtx, analyser, source, dataArray;
let animationStarted=false;

audio.volume=volume.value;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src=STREAM_URL;
audio.play();
if(!animationStarted){animationStarted=true;draw();}
}

function stopRadio(){
audio.pause();
}

function muteRadio(){
audio.muted=!audio.muted;
}

/* 🔥 ACTIVE VOLUME */
volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);

if(Math.abs(volume.value-0.5)>0.02){
volume.classList.add("active");
}else{
volume.classList.remove("active");
}
});

/* ================= EQ (CIENKI HUD STYLE) ================= */
function draw(){
requestAnimationFrame(draw);

if(!analyser||!dataArray)return;

analyser.getByteFrequencyData(dataArray);

let w=900;
let h=260;

canvas.width=w;
canvas.height=h;

ctx.clearRect(0,0,w,h);

let bars=90;
let barW=w/bars;

for(let i=0;i<bars;i++){
let v=dataArray[i]||0;
let bh=(v/255)*h;

ctx.fillStyle="#ff2a2a";

/* cienkie linie jak HUD */
ctx.fillRect(i*barW,h-bh,barW*0.4,bh);
}
}

</script>

</body>
</html>
