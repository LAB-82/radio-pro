<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POPULARNE STACJE RADIOWE ENGINE</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
#header {
    padding:14px;
    background:#1a1a1a;
    font-weight:bold;
}

/* LAYOUT */
#layout {
    display:flex;
    height:calc(100vh - 52px);
}

/* GRID LEFT */
#sidebar {
    flex:1;
    padding:20px;
    overflow:auto;
}

.title {
    color:#aaa;
    font-size:13px;
    margin-bottom:15px;
    letter-spacing:1px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:12px;
}

.station {
    background:#141414;
    border:1px solid #222;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    transition:0.2s;
}

.station:hover {
    background:#222;
}

.station.active {
    border-color:#00ff90;
    color:#00ff90;
    background:#2a2a2a;
}

/* RIGHT PLAYER */
#playerBox {
    width:340px;
    background:#111;
    border-left:1px solid #222;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
}

/* LOGO */
#logoBox img{
    width:170px;
    height:170px;
    border-radius:18px;
    background:#222;
}

/* ICONS ABOVE BUTTONS */
#icons {
    display:flex;
    gap:12px;
    font-size:18px;
    margin-top:10px;
}

/* CONTROLS */
.ctrl {
    width:140px;
    padding:10px;
    background:#222;
    border-radius:8px;
    text-align:center;
    cursor:pointer;
}

.ctrl:hover {
    background:#333;
}

#volume {
    width:140px;
}
</style>
</head>

<body>

<div id="header">🎧 POPULARNE STACJE RADIOWE</div>

<div id="layout">

<div id="sidebar">
    <div class="title">ONLINE RADIOBOX STREAM ENGINE</div>
    <div class="grid" id="grid"></div>
</div>

<div id="playerBox">

    <div id="logoBox">
        <img id="stationLogo">
    </div>

    <!-- ICONS ABOVE BUTTONS (FIXED) -->
    <div id="icons">▶ ⏹ 🔇 🔊</div>

    <div class="ctrl" onclick="play()">PLAY</div>
    <div class="ctrl" onclick="stop()">STOP</div>
    <div class="ctrl" onclick="mute()">MUTE</div>

    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.6">

</div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   STATIONS (ONLINE RADIOBOX BASED)
========================= */

const stations = [
{
 name:"Muzyczne Radio",
 url:"https://www.muzyczneradio.pl/index.php/player/hi.html?type=hi"
},
{
 name:"RMF FM",
 url:"https://onlineradiobox.com/pl/radiormf/?cs=pl.radiormf&played=1"
},
{
 name:"Radio Zet",
 url:"https://onlineradiobox.com/pl/radioeska/?cs=pl.radioeska&played=1"
},
{
 name:"Radio Eska",
 url:"https://onlineradiobox.com/pl/radioeska/?cs=pl.radioeska&played=1"
},
{
 name:"Radio Złote Przeboje",
 url:"https://onlineradiobox.com/pl/radiozloteprzeboje/?cs=pl.radiozloteprzeboje&played=1"
},
{
 name:"Jedynka",
 url:"https://onlineradiobox.com/pl/jedynka/?cs=pl.jedynka&played=1"
},
{
 name:"Dwójka",
 url:"https://onlineradiobox.com/pl/dwojka/?cs=pl.dwojka&played=1"
},
{
 name:"Trójka",
 url:"https://onlineradiobox.com/pl/trojka/?cs=pl.trojka&played=1"
},
{
 name:"Czwórka",
 url:"https://onlineradiobox.com/pl/czworka/?cs=pl.czworka&played=1"
},
{
 name:"TOK FM",
 url:"https://onlineradiobox.com/pl/tokfm/?cs=pl.tokfm&played=1"
},
{
 name:"Antyradio",
 url:"https://onlineradiobox.com/pl/antyradio94/?cs=pl.antyradio94&played=1"
},
{
 name:"Radio Wrocław",
 url:"https://onlineradiobox.com/pl/radiowroclaw/?cs=pl.radiowroclaw&played=1"
},
{
 name:"Radio WNET",
 url:"https://onlineradiobox.com/pl/wnet/?cs=pl.wnet&played=1"
},
{
 name:"Radio Maryja",
 url:"https://onlineradiobox.com/pl/maryja/?cs=pl.maryja&played=1"
},
{
 name:"Radio Kampus",
 url:"https://onlineradiobox.com/pl/kampus971/?cs=pl.kampus971&played=1"
}
];

/* =========================
   ENGINE (UNCHANGED CORE LOGIC)
========================= */

const audio = document.getElementById("audio");
const grid = document.getElementById("grid");
const volume = document.getElementById("volume");

let index = 0;
let cache = {};
let candidates = [];
let currentTry = 0;

audio.volume = volume.value;

/* STREAM RESOLVER */
async function resolve(name){

    if(cache[name]) return cache[name];

    try{
        const r = await fetch(
            `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?limit=10`
        );

        const data = await r.json();
        if(!data || !data.length) return [];

        const urls = data.map(s => s.url_resolved).filter(Boolean);

        cache[name] = urls;
        return urls;

    }catch(e){
        return [];
    }
}

/* LOAD ENGINE */
async function load(i){

    index = i;
    const station = stations[i];

    setLogo(station.name);
    setActive(i);

    candidates = await resolve(station.name);

    if(!candidates.length){
        candidates = [station.url];
    }

    currentTry = 0;
    playCandidate();
}

function playCandidate(){

    if(currentTry >= candidates.length) return;

    const url = candidates[currentTry];
    audio.src = url;

    audio.play().catch(()=>{
        currentTry++;
        playCandidate();
    });

    monitor();
}

function monitor(){
    audio.onerror = () => {
        currentTry++;
        playCandidate();
    };

    setTimeout(()=>{
        if(audio.readyState < 2){
            currentTry++;
            playCandidate();
        }
    }, 5000);
}

/* UI LOGO FROM ONLINE RADIOBOX */
function setLogo(name){
    document.getElementById("stationLogo").src =
        "https://www.onlineradiobox.com/img/logo/" +
        name.toLowerCase().replace(/\s/g,'') +
        ".png";
}

/* ACTIVE STATE */
function setActive(i){
    document.querySelectorAll(".station").forEach((el,idx)=>{
        el.classList.toggle("active", idx===i);
    });
}

/* CONTROLS */
function play(){
    if(!audio.src) load(index);
    audio.play();
}

function stop(){
    audio.pause();
}

function mute(){
    audio.muted = !audio.muted;
}

/* VOLUME */
volume.addEventListener("input", ()=>{
    audio.volume = volume.value;
});

/* GRID */
stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerHTML = s.name;
    div.onclick = ()=>load(i);
    grid.appendChild(div);
});

/* INIT */
load(0);

</script>

</body>
</html>
