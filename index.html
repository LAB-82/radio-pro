<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polskie Radio Online</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    font-size: 22px;
    background: #1a1a1a;
    font-weight: bold;
}

#stations {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 15px;
    padding-bottom: 100px;
}

.station {
    background: #1c1c1c;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
}

.station:hover {
    background: #2a2a2a;
    transform: scale(1.03);
}

.station img {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    margin-bottom: 8px;
}

#player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid #333;
}

button {
    padding: 8px 12px;
    border: none;
    background: #ff3b3b;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}
</style>
</head>

<body>

<header>📻 Polskie Radio Online</header>

<div id="stations"></div>

<div id="player">
    <div id="now">Kliknij stację aby rozpocząć</div>
    <button onclick="stopRadio()">Stop</button>
    <audio id="audio" controls></audio>
</div>

<script>

const stations = [
    { name: "RMF FM", img: "https://myradioonline.pl/images/rmffm.png", url: "https://rs6-krk2-cyfronet.rmfstream.pl/RMFFM48" },
    { name: "Radio ZET", img: "https://myradioonline.pl/images/radiozet.png", url: "https://zt03.cdn.eurozet.pl/ZET010.mp3" },
    { name: "Radio ESKA", img: "https://myradioonline.pl/images/eska.png", url: "https://waw02-01.cdn.eurozet.pl/eska.mp3" },
    { name: "VOX FM", img: "https://myradioonline.pl/images/voxfm.png", url: "https://stream.voxfm.pl/vox.mp3" },
    { name: "Antyradio", img: "https://myradioonline.pl/images/antyradio.png", url: "https://n-4-1.dcs.redcdn.pl/sc/o2/Eurozet/live/antyradio.livx" }
];

const stationsDiv = document.getElementById("stations");
const audio = document.getElementById("audio");
const now = document.getElementById("now");

function playRadio(station) {
    try {
        now.textContent = "Ładowanie: " + station.name;

        audio.pause();
        audio.src = station.url;
        audio.load();

        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise
                .then(() => {
                    now.textContent = "Gra: " + station.name;
                })
                .catch(err => {
                    now.textContent = "Błąd odtwarzania (blokada przeglądarki)";
                    console.error(err);
                });
        }

    } catch (e) {
        console.error(e);
        now.textContent = "Błąd odtwarzania";
    }
}

function createStation(station) {
    const div = document.createElement("div");
    div.className = "station";

    div.innerHTML = `
        <img src="${station.img}" onerror="this.src='https://via.placeholder.com/60'">
        <div>${station.name}</div>
    `;

    // 🔥 TYLKO KLIK — to działa zawsze
    div.addEventListener("click", () => {
        playRadio(station);
    });

    stationsDiv.appendChild(div);
}

stations.forEach(createStation);

function stopRadio() {
    audio.pause();
    audio.src = "";
    now.textContent = "Zatrzymano";
}

</script>

</body>
</html>
