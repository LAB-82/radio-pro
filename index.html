<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026 FULL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
position:relative;
transition:0.2s;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}
.station.live{background:#1f7a3a;}

.star{
position:absolute;
top:4px;
right:6px;
font-size:12px;
cursor:pointer;
opacity:0.5;
}
.star.fav{opacity:1;color:gold;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

audio{
width:80%;
}

#logo{
width:160px;
height:120px;
object-fit:contain;
background:#111;
padding:8px;
border-radius:10px;
}

#status{
font-size:13px;
opacity:0.8;
white-space:pre-line;
}

button{ display:none; }

</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE PRO 2026 (SELF HEALING)</div>

<div id="player">

<img id="logo"/>

<audio id="audio" controls></audio>

<div id="status">READY</div>

</div>

</div>

<script>

const stations = [
"Muzyczne Radio",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Wrocław",
"Tok FM",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Rodzina",
"Polskie Radio"
];

const audio = document.getElementById("audio");
const status = document.getElementById("status");
const logo = document.getElementById("logo");

let current = 0;

let cache = {};
let favs = [];

/* 🔥 STABILNE STREAMY AUDIO (REALNE) */
const manualStreams = {
"Muzyczne Radio":"http://stream4.nadaje.com:11986/muzyczneradio",
"Radio Plus":"http://plu-01.cdn.eurozet.pl:8406/",
"RMF FM":"https://rs7-krk2.rmfstream.pl/rmf_fm",
"Radio Zet":"https://stream.radiozet.pl/RadioZET.mp3",
"Radio Wrocław":"https://stream4.nadaje.com:8443/radiowroclaw",
"Tok FM":"https://radiostream.pl/tuba10-1.mp3",
"Radio Kolor":"https://stream.radiokolor.pl/kolor.mp3",
"Radio Złote Przeboje":"https://stream.radiozet.pl/ZlotePrzeboje.mp3",
"Planeta FM":"https://stream.radiozet.pl/PlanetaFM.mp3",
"Radio Kampus":"https://radiokampus.fm/stream.mp3",
"Radio Rodzina":"https://stream.radiopolska.pl/radio_rodzina.mp3",
"Polskie Radio":"https://stream.polskieradio.pl/program1.mp3"
};

/* LOGO */
async function setLogo(name){
try{
const res = await fetch(
`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=1`
);
const data = await res.json();

if(data[0]?.favicon){
logo.src = data[0].favicon;
return;
}
}catch(e){}

logo.src = "";
}

/* STREAM RESOLVER — tylko Twoje stacje */
async function resolveStream(name){
return manualStreams[name] || null;
}

/* LOAD */
async function load(i){

current = i;
const name = stations[i];

setLogo(name);

status.innerText = "ŁADOWANIE: " + name;

const url = await resolveStream(name);

if(!url){
status.innerText = "❌ BRAK STREAMU: " + name;
return;
}

audio.src = url;
audio.volume = 0.85;

audio.play()
.then(()=>{
status.innerText = "▶ GRA: " + name;
markLive(i);
})
.catch(()=>{
status.innerText = "⚠️ kliknij PLAY ręcznie";
});
}

/* LIVE */
function markLive(i){
document.querySelectorAll(".station").forEach((el,idx)=>{
el.classList.toggle("live", idx===i);
});
}

/* FAVORITES */
function toggleFav(name, el){
if(favs.includes(name)){
favs = favs.filter(f=>f!==name);
el.classList.remove("fav");
}else{
favs.push(name);
el.classList.add("fav");
}
}

/* UI */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;

const star=document.createElement("div");
star.className="star";
star.innerText="★";

star.onclick=(e)=>{
e.stopPropagation();
toggleFav(s, star);
};

div.appendChild(star);
div.onclick=()=>load(i);

document.getElementById("stations").appendChild(div);
});

</script>

</body>
</html>
