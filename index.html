<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio App UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    height: 100vh;
}

/* LEWA LISTA */
#sidebar {
    width: 300px;
    background: #141414;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    padding: 10px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

.station:hover {
    background: #222;
}

/* PRAWA STRONA */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
#header {
    padding: 12px;
    background: #1a1a1a;
    font-size: 18px;
    font-weight: bold;
}

/* OCENY / IKONY */
#meta {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #151515;
    color: #ccc;
    font-size: 13px;
}

.star {
    color: gold;
}

.icon {
    cursor: pointer;
    font-size: 16px;
}

/* PLAYER AREA */
#playerBox {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    position: relative;
}

/* iframe */
iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 10px;
}

/* 🔥 DODANY PANEL MYRADIOONLINE STYLE */
#radioOverlay {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.95);
    padding: 15px 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

#radioLogo {
    width: 40px;
    height: 40px;
    background: #333;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    text-align: center;
}

#playBtn {
    background: #1db954;
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}

#playBtn:hover {
    background: #1ed760;
}

#miniControls {
    display: flex;
    gap: 10px;
    font-size: 16px;
    cursor: pointer;
    color: #ccc;
}

/* DOLNY PANEL */
#controls {
    height: 70px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    border-top: 1px solid #222;
}

.btn {
    cursor: pointer;
    font-size: 20px;
    user-select: none;
}

#status {
    position: absolute;
    left: 320px;
    padding-left: 15px;
    font-size: 13px;
    color: #aaa;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div id="main">

    <div id="header">🎧 Radio Player</div>

    <div id="meta">
        <div class="star">⭐⭐⭐⭐☆</div>
        <div>Głosy: 1070 • Średnia: 4.8</div>

        <div style="margin-left:auto; display:flex; gap:10px;">
            <div class="icon">❤️</div>
            <div class="icon">🔔</div>
            <div class="icon">📤 Udostępnij</div>
        </div>
    </div>

    <div id="playerBox">

        <!-- 🔥 DODANY WZORZEC PLAYA -->
        <div id="radioOverlay">
            <div id="radioLogo">LOGO</div>
            <button id="playBtn" onclick="play()">PLAY</button>
            <div id="miniControls">
                <span onclick="prev()">⏮</span>
                <span onclick="next()">⏭</span>
                <span onclick="mute()">🔊</span>
            </div>
        </div>

        <iframe id="frame" src=""></iframe>
    </div>

    <div id="controls">
        <div class="btn" onclick="prev()">⏮</div>
        <div class="btn" onclick="play()">⏯</div>
        <div class="btn" onclick="next()">⏭</div>
        <div class="btn" onclick="mute()">🔊</div>
    </div>

</div>

<script>

// 📻 STACJE
const stations = [
    "Muzyczne Radio Jelenia Góra",
    "Polskie Radio Jedynka",
    "Polskie Radio Dwójka",
    "Polskie Radio Trójka",
    "Polskie Radio Czwórka",
    "Radio Plus",
    "RMF FM",
    "Radio Zet",
    "Radio Eska",
    "Radio Wrocław",
    "Radio Wnet",
    "Tok FM",
    "Antyradio",
    "Radio Kolor",
    "Open FM",
    "Open FM Disco Polo",
    "Disco Radio",
    "Polish Radio London 24",
    "Polskie Radio Dzieciom",
    "Polskie Radio Chopin",
    "Radio Yanosik",
    "Radio Republika",
    "Radio dla Ciebie",
    "Radio Maryja",
    "Radio Jasna Góra"
];

let index = 0;

const sidebar = document.getElementById("sidebar");
const frame = document.getElementById("frame");

function url(name) {
    return "https://myradioonline.pl/?s=" + encodeURIComponent(name);
}

function load(i) {
    index = i;
    frame.src = url(stations[i]);

    // update logo text
    document.getElementById("radioLogo").innerText =
        stations[i].split(" ").slice(0,2).join(" ");
}

stations.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "station";
    div.innerText = s;
    div.onclick = () => load(i);
    sidebar.appendChild(div);
});

function prev() {
    index = (index - 1 + stations.length) % stations.length;
    load(index);
}

function next() {
    index = (index + 1) % stations.length;
    load(index);
}

function play() {
    load(index);
}

function mute() {
    alert("Mute działa wewnątrz playera MyRadioOnline");
}

load(0);

</script>

</body>
</html>
