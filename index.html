<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO+</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
}

#title{
font-size:40px;
padding:20px;
color:#ff2a2a;
}

button{
width:90%;
margin:6px;
padding:14px;
background:#111;
color:white;
border:1px solid red;
font-size:16px;
}
</style>
</head>

<body>

<div id="title">📻 MUZYCZNE RADIO PRO+</div>

<button onclick="play('https://stream.rcs.revma.com/gzwc1xcq042vv')">Muzyczne Radio</button>

<button onclick="play('http://e.radio-polska.pl/embed/polskie-radio-program-i-pr1-jedynka-411258')">Polskie Radio Jedynka</button>

<button onclick="play('https://stream3.polskieradio.pl/PR2')">Polskie Radio Dwójka</button>

<button onclick="play('https://stream3.polskieradio.pl/PR3')">Polskie Radio Trójka</button>

<button onclick="play('https://stream3.polskieradio.pl/PR4')">Polskie Radio Czwórka</button>

<button onclick="play('https://stream3.polskieradio.pl/PRD')">Polskie Radio Dzieciom</button>

<button onclick="play('https://www.radio-polska.pl/radio-zlote-przeboje')">Złote Przeboje</button>

<button onclick="play('https://www.radio-polska.pl/radio-eska')">Radio Eska</button>

<button onclick="stop()">STOP</button>

<audio id="audio" controls style="width:100%;margin-top:20px;"></audio>

<script>

const audio = document.getElementById("audio");

function play(url){
audio.src = url;
audio.play().catch(e=>{
alert("STREAM ERROR");
console.log(e);
});
}

function stop(){
audio.pause();
audio.src = "";
}

</script>

</body>
</html>
