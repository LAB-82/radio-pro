<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
/* === TWÓJ CSS BEZ ZMIAN === */
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-red:#ff2a2a;
  --cp-bg:#000014;
}

/* (reszta CSS bez zmian — pominięta dla czytelności) */

</style>
</head>

<body>

<div id="title">RADIO PRO</div>

<div id="proEqualizer">
  <!-- 🔥 BRAKOWAŁO TEGO -->
  <canvas id="eqCanvas"></canvas>
</div>

<div id="controls">
  <!-- 🔥 DODANE ID (logika bez zmian, tylko selekcja naprawiona) -->
  <button id="playBtn">PLAY</button>
  <button id="stopBtn">STOP</button>
  <button id="muteBtn">MUTE</button>

  <div class="volumeWrapper">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<div id="bottomLink">
  <a href="#">CYBER RADIO</a>
</div>

<script>
// ================= AUDIO =================
const audio = new Audio("https://icecast.radiofrance.fr/fip-midfi.mp3");
audio.crossOrigin = "anonymous";
audio.preload = "none";

let audioCtx;
let analyser;
let source;
let dataArray;
let bufferLength;

// ================= CANVAS =================
const canvas = document.getElementById("eqCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ================= INIT AUDIO =================
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;

    // 🔥 KLUCZ DO PŁYNNOŚCI
    analyser.smoothingTimeConstant = 0.85;

    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);

    source = audioCtx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

// ================= CONTROLS =================
const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");
const muteBtn = document.getElementById("muteBtn");
const volume = document.getElementById("volume");

playBtn.addEventListener("click", () => {
  initAudio();
  audio.play();

  playBtn.classList.add("playActive");
  stopBtn.classList.remove("stopActive");
});

stopBtn.addEventListener("click", () => {
  audio.pause();
  audio.currentTime = 0;

  stopBtn.classList.add("stopActive");
  playBtn.classList.remove("playActive");
});

muteBtn.addEventListener("click", () => {
  audio.muted = !audio.muted;
  muteBtn.classList.toggle("muteActive");
});

volume.addEventListener("input", () => {
  audio.volume = volume.value;
});

// ================= EQUALIZER =================
function draw(){
  requestAnimationFrame(draw);

  if(!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const barWidth = (canvas.width / bufferLength) * 1.5;
  let x = 0;

  for(let i = 0; i < bufferLength; i++){
    const value = dataArray[i];
    const percent = value / 255;

    // 🔥 lepsza dynamika
    const height = canvas.height * percent;

    const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - height);
    gradient.addColorStop(0, "#ff003c");
    gradient.addColorStop(0.5, "#fcee09");
    gradient.addColorStop(1, "#00f0ff");

    ctx.fillStyle = gradient;

    ctx.fillRect(x, canvas.height - height, barWidth, height);

    x += barWidth + 2;
  }
}

draw();
</script>

</body>
</html>
