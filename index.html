<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-red:#ff2a2a;
  --cp-bg:#000014;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(0, 240, 255,.05) 25%, rgba(0, 240, 255,.05) 26%, transparent 27%, transparent 74%, rgba(0, 240, 255,.05) 75%, rgba(0, 240, 255,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(255, 0, 60,.05) 25%, rgba(255, 0, 60,.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 60,.05) 75%, rgba(255, 0, 60,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  min-height:100vh;
  padding-bottom: 40px;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:var(--cp-cyan);
  text-shadow:
    0 0 5px var(--cp-cyan),
    0 0 10px var(--cp-cyan),
    0 0 20px var(--cp-cyan),
    0 0 40px var(--cp-magenta),
    0 0 80px var(--cp-magenta);
  animation: flicker 3s infinite alternate;
}

@keyframes flicker {
  0%, 18%, 22%, 25%, 53%, 57%, 100% {
    text-shadow:
      0 0 5px var(--cp-cyan),
      0 0 10px var(--cp-cyan),
      0 0 20px var(--cp-cyan),
      0 0 40px var(--cp-magenta),
      0 0 80px var(--cp-magenta);
    opacity: 1;
  }
  20%, 24%, 55% {
    text-shadow: none;
    opacity: 0.8;
  }
}

#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
  width: 600px;
  height: 260px;
  display: block;
  box-sizing: border-box;
  position: relative;
  background: #000014;
  box-shadow: 0 0 10px var(--cp-cyan), 0 0 20px var(--cp-magenta), inset 0 0 20px rgba(0,240,255,0.2);
  border: 2px solid var(--cp-cyan);
  overflow: hidden;
}

#proEqualizer .cut{
  position: absolute;
  width: 0;
  height: 0;
  border-style: solid;
  z-index: 2;
}
#proEqualizer .cut.tl{ top: -2px; left: -2px; border-width: 0 0 8px 8px; border-color: transparent transparent var(--cp-bg) var(--cp-bg); }
#proEqualizer .cut.tr{ top: -2px; right: -2px; border-width: 8px 8px 0 0; border-color: var(--cp-bg) var(--cp-bg) transparent transparent; }
#proEqualizer .cut.bl{ bottom: -2px; left: -2px; border-width: 8px 0 0 8px; border-color: var(--cp-bg) transparent transparent var(--cp-bg); }
#proEqualizer .cut.br{ bottom: -2px; right: -2px; border-width: 0 8px 8px 0; border-color: transparent var(--cp-bg) var(--cp-bg) transparent; }

canvas{
  display: block;
  width: 100%;
  height: 100%;
  position: relative;
  z-index: 0;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
  align-items: center;
}

.volumeWrapper{

  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a1a;
  position: relative;
  box-sizing: border-box;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.3);

  overflow: hidden;
}

}

.volumeWrapper .cut.bl{ bottom: -2px; left: -2px; border-width: 8px 0 0 8px; border-color: var(--cp-bg) transparent transparent var(--cp-bg); }
.volumeWrapper .cut.br{ bottom: -2px; right: -2px; border-width: 0 8px 8px 0; border-color: transparent var(--cp-bg) var(--cp-bg) transparent; }

  height:45px;
  background:#0a0a1a;
  color:var(--cp-cyan);

  font-family:'Orbitron', sans-serif;

  position: relative;
  border: 2px solid var(--cp-cyan);

}
