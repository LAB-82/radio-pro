<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio FINAL</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}
.station:hover { background:#222; }

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#radioPlayer{
    width:90%;
    height:90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#logoBox img{
    width:220px;
    height:120px;
    object-fit:contain;
    margin-bottom:20px;
}

#bigPlay{
    font-size:70px;
    cursor:pointer;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 RADIO FINAL</div>

<div id="playerBox">
    <div id="radioPlayer">

        <div id="logoBox">
            <img id="stationLogo" src="">
        </div>

        <div id="bigPlay" onclick="toggle()">▶</div>

    </div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* TWOJE STACJE */
const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Polskie Radio Dzieciom",
"Polskie Radio Chopin",
"Radio Jasna Góra"
];

let index=0;
let playing=false;
let hls=null;

const audio=document.getElementById("audio");
const sidebar=document.getElementById("sidebar");

let cache={};

/* 🔥 REAL STREAM RESOLVER */
async function resolveStream(name){

if(cache[name]) return cache[name];

try{
    const res = await fetch(
        `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?limit=1`
    );

    const data = await res.json();

    if(!data || data.length===0) return null;

    const url = data[0].url_resolved;

    cache[name]=url;
    return url;

}catch(e){
    return null;
}
}

/* 🔥 REAL LOGO (możesz później podmienić lokalnie) */
function setLogo(name){

const logos = {
"RMF FM":"https://upload.wikimedia.org/wikipedia/commons/2/2e/RMF_FM_logo.png",
"Radio Zet":"https://upload.wikimedia.org/wikipedia/commons/3/3c/Radio_ZET_logo.png",
"Radio Eska":"https://upload.wikimedia.org/wikipedia/commons/9/9f/Radio_Eska_logo.png"
};

document.getElementById("stationLogo").src =
logos[name] || "https://via.placeholder.com/220x120?text="+encodeURIComponent(name);
}

/* LOAD */
async function load(i){

index=i;
let name=stations[i];

setLogo(name);

if(hls){hls.destroy();hls=null;}

let url = await resolveStream(name);

if(!url){
    audio.src="";
    return;
}

if(url.includes(".m3u8")){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(audio);
}else{
    audio.src=url;
}

if(playing){
    audio.play().catch(()=>{});
}

setUI();
}

/* PLAY */
function toggle(){

 if(!audio.src){
   load(index);
 }

 if(playing){
   audio.pause();
   playing=false;
 } else {
   audio.play().catch(()=>{});
   playing=true;
 }

 setUI();
}

/* UI */
function setUI(){
 document.getElementById("bigPlay").innerText=playing?"⏸":"▶";
}

/* SIDEBAR */
stations.forEach((s,i)=>{
 let div=document.createElement("div");
 div.className="station";
 div.innerText=s;
 div.onclick=()=>load(i);
 sidebar.appendChild(div);
});

/* START */
load(0);

</script>

</body>
</html>
