<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;font-family:Arial,Helvetica,sans-serif;background:#111;color:#fff;overflow:hidden}
body{background:linear-gradient(180deg,#1c1c1c 0%,#101010 100%)}

#app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,#2a2a2a 0%,#181818 100%);
}

#topbar{
  height:60px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 14px;
  background:#2b2b2b;
  border-bottom:1px solid rgba(255,255,255,.08);
}

#menu-btn{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#ddd;user-select:none;
}

#title{
  flex:1;
  font-size:20px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#clock{
  min-width:70px;
  text-align:center;
  font-family:monospace;
  font-size:15px;
  opacity:.9;
}

#grid-wrap{
  flex:1;
  min-height:0;
  overflow:hidden;
  padding:10px 10px 98px;
}

#stations{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:repeat(8,minmax(0,1fr));
  gap:8px;
  align-content:start;
}

.station{
  aspect-ratio:1/1;
  background:#f5f5f5;
  border-radius:12px;
  overflow:hidden;
  border:2px solid transparent;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px;
}

.station.active{
  border-color:#28a7d8;
  box-shadow:0 0 0 2px rgba(40,167,216,.18);
}

.station img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.station .label{
  text-align:center;
  font-size:13px;
  line-height:1.05;
  color:#111;
  padding:4px;
}

#status{
  position:absolute;
  left:12px;
  bottom:106px;
  font-size:12px;
  opacity:.75;
  pointer-events:none;
}

#playerbar{
  position:fixed;
  left:0;right:0;bottom:0;
  height:98px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  background:#171717;
  border-top:1px solid rgba(255,255,255,.08);
}

#playbtn{
  width:58px;height:58px;
  border:none;border-radius:50%;
  background:linear-gradient(180deg,#f7f7f7,#cfcfcf);
  color:#222;font-size:24px;
  cursor:pointer;
  flex:0 0 auto;
}

#seek{
  flex:1;
  height:8px;
  appearance:none;
  background:linear-gradient(90deg,#33aee4 0%,#33aee4 var(--p,50%),#4c4c4c var(--p,50%),#4c4c4c 100%);
  border-radius:999px;
  outline:none;
}
#seek::-webkit-slider-thumb{
  appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:#33aee4;border:3px solid #2b90b6;
  cursor:pointer;
}
#seek::-moz-range-thumb{
  width:20px;height:20px;border-radius:50%;
  background:#33aee4;border:3px solid #2b90b6;
  cursor:pointer;
}

#vol-wrap{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:120px;
  flex:0 0 auto;
}
#vol{
  width:70px;
  height:6px;
  appearance:none;
  background:linear-gradient(90deg,#33aee4 0%,#33aee4 var(--v,85%),#3d3d3d var(--v,85%),#3d3d3d 100%);
  border-radius:999px;
  outline:none;
}
#vol::-webkit-slider-thumb{
  appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:#33aee4;
  border:3px solid #2b90b6;
  cursor:pointer;
}
#vol::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;
  background:#33aee4;
  border:3px solid #2b90b6;
  cursor:pointer;
}

@media (max-width: 1200px){
  #stations{grid-template-columns:repeat(6,minmax(0,1fr))}
}
@media (max-width: 900px){
  #stations{grid-template-columns:repeat(4,minmax(0,1fr))}
}
@media (max-width: 640px){
  #title{font-size:15px}
  #stations{grid-template-columns:repeat(3,minmax(0,1fr))}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="menu-btn">☰</div>
    <div id="title">Radio online</div>
    <div id="clock">00:00</div>
  </div>

  <div id="grid-wrap">
    <div id="stations"></div>
  </div>

  <div id="status">Gotowy</div>

  <div id="playerbar">
    <button id="playbtn">▶</button>
    <input id="seek" type="range" min="0" max="100" value="50">
    <div id="vol-wrap">
      <span>🔊</span>
      <input id="vol" type="range" min="0" max="1" step="0.01" value="0.85">
    </div>
  </div>
</div>

<script>
const stations = [
  "RMF FM",
  "Złote Przeboje",
  "Antyradio",
  "Radio Wrocław",
  "Radio Kampus",
  "Czwórka",
  "Radio Chopin",
  "Polskie Radio Dzieciom"
];

const streams = {
  "RMF FM":"https://rs6-krk2.rmfstream.pl/rmf_fm",
  "Złote Przeboje":"https://stream.open.fm/201",
  "Antyradio":"https://player.antyradio.pl",
  "Radio Wrocław":"https://stream4.nadaje.com:8176/prw",
  "Radio Kampus":"https://stream.radiokampus.fm/kampus.mp3",
  "Czwórka":"https://stream3.polskieradio.pl/pr4_aac128",
  "Radio Chopin":"https://stream3.polskieradio.pl/pr2_aac128",
  "Polskie Radio Dzieciom":"https://stream3.polskieradio.pl/prd_aac128"
};

const stationsEl = document.getElementById("stations");
const status = document.getElementById("status");
const clock = document.getElementById("clock");
const playbtn = document.getElementById("playbtn");
const seek = document.getElementById("seek");
const vol = document.getElementById("vol");
const audio = new Audio();

audio.preload = "none";
audio.volume = parseFloat(vol.value);

let current = null;
let playing = false;

function updateClock(){
  const d = new Date();
  clock.textContent = d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

function setBar(el,val,key){
  el.style.setProperty(key,val + '%');
}
setBar(seek,50,'--p');
setBar(vol,85,'--v');

function setActive(name){
  document.querySelectorAll('.station').forEach(el => {
    el.classList.toggle('active', el.dataset.name === name);
  });
}

function setLogo(name, tile){
  const img = document.createElement('img');
  img.alt = name;
  img.src = `https://www.radio-browser.info/backends/logos/${encodeURIComponent(name)}.png?${Date.now()}`;
  img.onerror = () => {
    img.remove();
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = name;
    tile.appendChild(label);
  };
  tile.appendChild(img);
}

function render(){
  stationsEl.innerHTML = '';
  stations.forEach(name => {
    const tile = document.createElement('div');
    tile.className = 'station';
    tile.dataset.name = name;
    setLogo(name, tile);
    tile.addEventListener('click', () => selectStation(name));
    stationsEl.appendChild(tile);
  });
}

async function selectStation(name){
  current = name;
  setActive(name);
  const url = streams[name];
  if(!url){
    status.textContent = 'Brak streamu: ' + name;
    return;
  }
  status.textContent = 'Ładowanie: ' + name;
  try{
    audio.src = url;
    audio.volume = parseFloat(vol.value);
    await audio.play();
    playing = true;
    playbtn.textContent = '❚❚';
    status.textContent = 'Gra: ' + name;
  }catch(e){
    playing = false;
    playbtn.textContent = '▶';
    status.textContent = 'Kliknij ▶ aby uruchomić: ' + name;
  }
}

playbtn.addEventListener('click', async () => {
  if(!current){
    await selectStation(stations[0]);
    return;
  }
  if(playing){
    audio.pause();
    playing = false;
    playbtn.textContent = '▶';
    status.textContent = 'Wstrzymane';
  }else{
    try{
      await audio.play();
      playing = true;
      playbtn.textContent = '❚❚';
      status.textContent = 'Gra: ' + current;
    }catch(e){
      status.textContent = 'Nie można uruchomić odtwarzania';
    }
  }
});

seek.addEventListener('input', () => setBar(seek, seek.value, '--p'));
vol.addEventListener('input', () => {
  audio.volume = vol.value;
  setBar(vol, Math.round(vol.value * 100), '--v');
});

audio.addEventListener('waiting', () => status.textContent = 'Buforowanie...');
audio.addEventListener('playing', () => {
  playing = true;
  playbtn.textContent = '❚❚';
  if(current) status.textContent = 'Gra: ' + current;
});
audio.addEventListener('pause', () => {
  playing = false;
  playbtn.textContent = '▶';
});
audio.addEventListener('error', () => {
  status.textContent = 'Błąd streamu';
});

render();
setActive(stations[0]);
</script>
</body>
</html>
