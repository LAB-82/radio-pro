<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE v3 GRID</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

/* WRAPPER */
#layout {
    display:flex;
    height:calc(100vh - 50px);
}

/* LEFT GRID */
#sidebar {
    flex:1;
    padding:20px;
    overflow:auto;
}

/* TITLE */
#title {
    font-size:14px;
    color:#aaa;
    margin-bottom:15px;
}

/* GRID like radiofm-online */
.grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:12px;
}

.station {
    background:#141414;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:0.2s;
    border:1px solid #222;
}

.station:hover {
    background:#222;
}

.station.active {
    background:#2a2a2a;
    border-color:#00ff90;
    color:#00ff90;
}

/* RIGHT PANEL */
#playerBox {
    width:320px;
    background:#111;
    border-left:1px solid #222;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
}

/* LOGO */
#logoBox img{
    width:160px;
    height:160px;
    border-radius:20px;
    background:#222;
}

/* CONTROLS */
#controlsPanel {
    display:flex;
    flex-direction:column;
    gap:10px;
}

.ctrl {
    background:#222;
    padding:10px;
    text-align:center;
    border-radius:8px;
    cursor:pointer;
    width:120px;
}

.ctrl:hover {
    background:#333;
}

#volume {
    width:120px;
}

/* hidden big play removed */
</style>

</head>

<body>

<div id="header">🎧 RADIO ENGINE v3 — GRID MODE</div>

<div id="layout">

<!-- GRID -->
<div id="sidebar">
    <div id="title">POPULARNE STACJE RADIOWE</div>
    <div class="grid" id="grid"></div>
</div>

<!-- PLAYER -->
<div id="playerBox">

    <div id="logoBox">
        <img id="stationLogo" src="">
    </div>

    <div id="controlsPanel">
        <div class="ctrl" onclick="play()">PLAY</div>
        <div class="ctrl" onclick="stop()">STOP</div>
        <div class="ctrl" onclick="mute()">MUTE</div>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.6">
    </div>

</div>

</div>

<audio id="audio"></audio>

<script>

/* ================= STATIONS ================= */

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Polish Radio London 24",
"Polskie Radio Dzieciom",
"Polskie Radio Chopin",
"Radio Republika",
"Radio Maryja",
"Radio Jasna Góra"
];

const audio = document.getElementById("audio");
const grid = document.getElementById("grid");
const volume = document.getElementById("volume");

let index = 0;
let playing = false;
let cache = {};
let candidates = [];
let currentTry = 0;

audio.volume = volume.value;

/* ================= STREAM ENGINE (UNCHANGED LOGIC) ================= */

async function resolve(name){

    if(cache[name]) return cache[name];

    try {
        const r = await fetch(
          `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?limit=10`
        );

        const data = await r.json();
        if(!data || !data.length) return [];

        const urls = data.map(s => s.url_resolved).filter(Boolean);
        cache[name] = urls;
        return urls;

    } catch(e){
        return [];
    }
}

async function load(i){

    index = i;
    const name = stations[i];

    setLogo(name);

    setActive(i);

    candidates = await resolve(name);
    currentTry = 0;

    if(!candidates.length){
        audio.src = "";
        return;
    }

    playCandidate();
}

function playCandidate(){

    if(currentTry >= candidates.length) return;

    const url = candidates[currentTry];
    audio.src = url;

    audio.play().catch(() => {
        currentTry++;
        playCandidate();
    });

    monitorStream();
}

function monitorStream(){
    audio.onerror = () => {
        currentTry++;
        playCandidate();
    };

    setTimeout(() => {
        if(audio.readyState < 2){
            currentTry++;
            playCandidate();
        }
    }, 5000);
}

/* ================= UI ================= */

function setLogo(name){
    document.getElementById("stationLogo").src =
        "https://logo.clearbit.com/" +
        name.toLowerCase().replace(/\s/g,'') + ".com";
}

function setActive(i){
    document.querySelectorAll(".station").forEach((el,idx)=>{
        el.classList.toggle("active", idx === i);
    });
}

/* controls */
function play(){
    if(!audio.src) load(index);
    audio.play();
    playing = true;
}

function stop(){
    audio.pause();
    playing = false;
}

function mute(){
    audio.muted = !audio.muted;
}

volume.addEventListener("input", ()=>{
    audio.volume = volume.value;
});

/* ================= GRID BUILD ================= */

stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerHTML = "🔊 " + s;
    div.onclick = () => load(i);
    grid.appendChild(div);
});

/* INIT */
load(0);

</script>

</body>
</html>
