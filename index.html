<script>
const audio = new Audio("https://stream.radioparadise.com/mp3-192"); // możesz zmienić stream
audio.crossOrigin = "anonymous";

let audioCtx;
let analyser;
let source;
let dataArray;
let bufferLength;

const canvas = document.querySelector("#proEqualizer canvas") || document.querySelector("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ===== AUDIO INIT (FIX autoplay issue) =====
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;

    // 🔥 KLUCZ DO PŁYNNOŚCI
    analyser.smoothingTimeConstant = 0.85;

    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);

    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

// ===== CONTROLS =====
const playBtn = document.querySelector("button:nth-child(1)");
const stopBtn = document.querySelector("button:nth-child(2)");
const muteBtn = document.querySelector("button:nth-child(3)");
const volume = document.querySelector("#volume");

playBtn.addEventListener("click", () => {
  initAudio();
  audio.play();

  playBtn.classList.add("playActive");
  stopBtn.classList.remove("stopActive");
});

stopBtn.addEventListener("click", () => {
  audio.pause();
  audio.currentTime = 0;

  stopBtn.classList.add("stopActive");
  playBtn.classList.remove("playActive");
});

muteBtn.addEventListener("click", () => {
  audio.muted = !audio.muted;
  muteBtn.classList.toggle("muteActive");
});

volume.addEventListener("input", () => {
  audio.volume = volume.value;
});

// ===== EQUALIZER =====
function draw(){
  requestAnimationFrame(draw);

  if(!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const barWidth = canvas.width / bufferLength * 1.8;
  let x = 0;

  for(let i = 0; i < bufferLength; i++){
    const value = dataArray[i];

    // 🔥 lepsze skalowanie (bardziej "muzyczne")
    const percent = value / 255;
    const height = canvas.height * percent;

    // gradient cyberpunk
    const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - height);
    gradient.addColorStop(0, "#ff003c");
    gradient.addColorStop(0.5, "#fcee09");
    gradient.addColorStop(1, "#00f0ff");

    ctx.fillStyle = gradient;

    // 🔥 zaokrąglone słupki (ładniejsze)
    ctx.fillRect(x, canvas.height - height, barWidth, height);

    x += barWidth + 2;
  }
}

draw();
</script>
