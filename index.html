<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIO FIX</title>

<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;}
button{padding:14px;margin:10px;background:#111;color:#fff;border:1px solid red;}
</style>
</head>
<body>

<h2>🔥 STABLE RADIO FIX</h2>

<button onclick="play('BBC Radio 1')">BBC RADIO 1</button>
<button onclick="play('RMF FM')">RMF FM</button>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio");
const API = "https://TWOJ-SERWER.onrender.com/api/";

async function play(name){

try{

const res = await fetch(API + encodeURIComponent(name));
const data = await res.json();

audio.src = data.stream;
await audio.play();

}catch(e){
alert("STREAM ERROR");
console.log(e);
}

}

</script>

</body>
</html>
