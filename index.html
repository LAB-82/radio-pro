<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO SYSTEM</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial;
}

.header{
text-align:center;
padding:12px;
color:#ff2a2a;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:14px;
padding:10px;
text-align:center;
cursor:pointer;
border:1px solid #222;
}

.card:active{
transform:scale(0.95);
border-color:red;
}

.icon{
width:50px;
height:50px;
border-radius:12px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#ff2a2a,#111);
font-weight:bold;
}

#player{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:center;
padding:10px;
gap:10px;
}

button{
padding:10px 14px;
background:black;
color:white;
border:1px solid red;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 RADIO PRO SYSTEM</div>

<div class="grid" id="grid"></div>

<div id="player">
<button onclick="stop()">STOP</button>
</div>

<audio id="audio" controls style="display:none;"></audio>

<script>

const API = "https://TWOJ-SERVER.onrender.com/stream/";

const stations = [
{ id:"rmf", name:"RMF FM" },
{ id:"zet", name:"Radio ZET" },
{ id:"eska", name:"Radio Eska" },
{ id:"tokfm", name:"TOK FM" },
{ id:"bbc1", name:"BBC Radio 1" }
];

const audio = document.getElementById("audio");

function play(id){

fetch(API + id)
.then(r=>r.json())
.then(data=>{

audio.pause();
audio.src = data.stream;
audio.load();

audio.play().catch(e=>{
alert("PLAY ERROR");
console.log(e);
});

});

}

function stop(){
audio.pause();
audio.src="";
}

const grid = document.getElementById("grid");

stations.forEach(s=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="icon">${s.name.slice(0,3)}</div>
<div>${s.name}</div>
`;

div.onclick=()=>play(s.id);

grid.appendChild(div);

});

</script>

</body>
</html>
