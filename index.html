<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio FIXED FINAL</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
    padding-bottom:10px;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
}

.station:hover { background:#222; }

.station.active { background:#2a2a2a; color:#00ff90; }

.station img{
    width:22px;
    height:22px;
    border-radius:4px;
}

.station span.badge{
    margin-left:auto;
    font-size:12px;
    opacity:0.7;
}

.sidebarControls{
    padding:10px;
    border-bottom:1px solid #333;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5px;
}

.sidebarControls button{
    padding:6px;
    font-size:12px;
    cursor:pointer;
    background:#222;
    border:1px solid #333;
    color:white;
}

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#radioPlayer{
    width:90%;
    height:90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

#logoBox img{
    width:220px;
    margin-bottom:20px;
    border-radius:12px;
    background:#222;
}

#bigPlay{
    font-size:70px;
    cursor:pointer;
}

#bottomBar{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 18px;
    border-radius:30px;
    display:flex;
    gap:18px;
    cursor:pointer;
}

#controls {
    height:70px;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.btn { cursor:pointer; font-size:20px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

<div id="sidebar">

<!-- SIDEBAR CONTROLS -->
<div class="sidebarControls">
    <button onclick="toggle()">Play</button>
    <button onclick="stopRadio()">Stop</button>
    <button onclick="mute()">Mute</button>
    <button onclick="cycleVolume()">Volume</button>
</div>

</div>

<div id="main">

<div id="header">🎧 RADIO FIXED FINAL</div>

<div id="playerBox">
    <div id="radioPlayer">

        <div id="logoBox">
            <img id="stationLogo" src="">
        </div>

        <div id="bigPlay" onclick="toggle()">▶</div>

        <div id="bottomBar">
            <div onclick="prev()">⏮</div>
            <div onclick="toggle()" id="playIcon">▶</div>
            <div onclick="next()">⏭</div>
            <div onclick="mute()">🔊</div>
        </div>

    </div>
</div>

<div id="controls">
    <div class="btn" onclick="prev()">⏮</div>
    <div class="btn" onclick="toggle()">⏯</div>
    <div class="btn" onclick="next()">⏭</div>
    <div class="btn" onclick="mute()">🔊</div>
</div>

</div>

<audio id="audio"></audio>

<script>

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Open FM",
"Open FM Disco Polo",
"Disco Radio",
"Polish Radio London 24",
"Polskie Radio Dzieciom",
"Polskie Radio Chopin",
"Radio Yanosik",
"Radio Republika",
"Radio dla Ciebie",
"Radio Maryja",
"Radio Jasna Góra"
];

const fixedStreams = {
"Polskie Radio Czwórka":"https://stream.polskieradio.pl/pr4_aac128",
"Radio Eska":"https://waw01-01.ic.smcdn.pl/t040-1.mp3",
"Antyradio":"https://stream.antyradio.pl/stream.mp3",
"Open FM":"https://pldm.ml/radio/openfm.mp3",
"Open FM Disco Polo":"https://pldm.ml/radio/openfm_disco.mp3"
};

const fallback = null;

let index=0;
let playing=false;
let volumeStep=0.2;

const audio=document.getElementById("audio");
const sidebar=document.getElementById("sidebar");

let cache={};

function getStream(name){
    return fixedStreams[name] || null;
}

/* REAL ICONS (favicon fallback) */
function getIcon(name){
    return `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(name.toLowerCase().replace(/ /g,"")+".pl")}`;
}

function setLogo(name){
 document.getElementById("stationLogo").src =
 "https://via.placeholder.com/220x120?text="+encodeURIComponent(name);
}

function setActiveUI(){
 document.querySelectorAll(".station").forEach((el,i)=>{
    el.classList.toggle("active", i===index);
 });
}

function load(i){

index=i;
let name=stations[i];

setLogo(name);

let url=getStream(name);

if(!url){
    audio.removeAttribute("src");
    document.getElementById("playIcon").innerText="❌";
    return;
}

audio.src=url;

if(playing){
    audio.play().catch(()=>{});
}

setUI();
setActiveUI();
}

function toggle(){

if(!audio.src) load(index);

if(!audio.src){
    return;
}

if(playing){
    audio.pause();
    playing=false;
} else {
    audio.play().catch(()=>{});
    playing=true;
}

setUI();
}

function stopRadio(){
audio.pause();
audio.removeAttribute("src");
playing=false;
setUI();
}

function setUI(){
document.getElementById("bigPlay").innerText=playing?"⏸":"▶";
document.getElementById("playIcon").innerText=playing?"⏸":"▶";
}

function prev(){
index=(index-1+stations.length)%stations.length;
load(index);
}

function next(){
index=(index+1)%stations.length;
load(index);
}

function mute(){
audio.muted=!audio.muted;
}

function cycleVolume(){
audio.volume = audio.volume >= 1 ? 0 : audio.volume + volumeStep;
}

/* BUILD SIDEBAR */
stations.forEach((s,i)=>{
let div=document.createElement("div");
div.className="station";

div.innerHTML=`
<img src="${getIcon(s)}"
     onerror="this.src='https://via.placeholder.com/22'">
<span>${s}</span>
<span class="badge" id="b${i}">●</span>
`;

div.onclick=()=>load(i);
sidebar.appendChild(div);
});

load(0);

</script>

</body>
</html>
