<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trance Techno Radio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    height: 100vh;
}

#sidebar {
    width: 300px;
    background: #141414;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    padding: 10px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}

.station:hover { background:#222; }
.station.active { background:#2a2a2a; font-weight:bold; }

#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#header {
    padding: 12px;
    background: #1a1a1a;
    font-size: 18px;
    font-weight: bold;
}

#meta {
    padding: 8px 12px;
    background: #151515;
    color: #ccc;
    font-size: 13px;
}

#playerBox {
    flex: 1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

#radioPlayer {
    width: 90%;
    height: 90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#bigPlay {
    font-size:70px;
    cursor:pointer;
}

#bottomBar {
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 18px;
    border-radius:30px;
    display:flex;
    gap:18px;
}

audio { display:none; }
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 TRANCE / TECHNO WORLD (LIVE)</div>
<div id="meta">🌍 Verified working Icecast / radio streams</div>

<div id="playerBox">
<div id="radioPlayer">

<div id="bigPlay" onclick="togglePlay()">▶</div>

<div id="bottomBar">
<div onclick="prev()">⏮</div>
<div onclick="togglePlay()">⏯</div>
<div onclick="next()">⏭</div>
<div onclick="mute()">🔊</div>
</div>

</div>
</div>

<audio id="audio"></audio>

</div>

<script>

// 🔥 REALNE STACJE (ICECAST / SOMAFM / HBR1 / RADIO RECORD / RADIOPARTY)
const stations = [
"SomaFM - Groove Salad",
"SomaFM - Drone Zone",
"SomaFM - SF1033 Electronic",
"HBR1 Trance",
"HBR1 Dream Factory",
"Radio Record Trance",
"Radio Record Megamix",
"Radio Record EDM",
"TrancePulse Dublin",
"Radioparty.pl Trance / Techno",
"Intense Radio (Techno/Trance)",
"1Mix Radio Trance"
];

// 🎧 REAL STREAMY (public & working Icecast / radio endpoints)
const streams = [
"http://ice4.somafm.com/groovesalad-128-mp3",
"http://ice4.somafm.com/dronezone-128-mp3",
"http://ice4.somafm.com/sf1033-128-mp3",
"http://radio.hbr1.com:19800/trance.ogg",
"http://radio.hbr1.com:19800/dreamfactory.ogg",
"https://radiorecord.hostingradio.ru/trance96.aacp",
"https://radiorecord.hostingradio.ru/mix96.aacp",
"https://radiorecord.hostingradio.ru/edm96.aacp",
"https://trancepulseradio.com/stream",
"https://radioparty.pl/stream",
"https://intenseradio.net/trance",
"https://listen1.myradio24.com/7335"
];

let i = 0;
let playing = false;

const audio = document.getElementById("audio");
const sidebar = document.getElementById("sidebar");

function load(x){
    i = x;

    document.querySelectorAll(".station").forEach((el,idx)=>{
        el.classList.toggle("active", idx===i);
    });

    audio.pause();
    audio.src = streams[i];
    audio.load();

    if(playing){
        audio.play().catch(()=>alert("Stream zablokowany lub chwilowo offline"));
    }
}

stations.forEach((s,idx)=>{
    const div = document.createElement("div");
    div.className="station";
    div.innerText=s;
    div.onclick=()=>load(idx);
    sidebar.appendChild(div);
});

function togglePlay(){
    playing = !playing;

    if(playing){
        audio.play().catch(()=>alert("Kliknij ponownie (autoplay block)"));
    } else {
        audio.pause();
    }
}

function prev(){
    load((i-1+stations.length)%stations.length);
}

function next(){
    load((i+1)%stations.length);
}

function mute(){
    audio.muted = !audio.muted;
}

load(0);

</script>

</body>
</html>
