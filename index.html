<script>
function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

let w=canvas.width/window.devicePixelRatio;
let h=canvas.height/window.devicePixelRatio;

ctx.clearRect(0,0,w,h);

/* baseline */
let mid=h/2;

/* style gradient (subtle like vector image) */
let bars=85;
let step=Math.floor(dataArray.length/bars);
let barW=w/bars;

/* soft rainbow gradient horizontally */
let grad=ctx.createLinearGradient(0,0,w,0);
grad.addColorStop(0,"#ff0000");
grad.addColorStop(0.2,"#ff9900");
grad.addColorStop(0.4,"#ffee00");
grad.addColorStop(0.6,"#00ff66");
grad.addColorStop(0.8,"#0099ff");
grad.addColorStop(1,"#9900ff");

ctx.fillStyle=grad;

for(let i=0;i<bars;i++){

let v=dataArray[i*step]||0;

/* amplitude smoothing (important for “vector look”) */
let amp=(v/255)*(h*0.4);

let x=i*barW;

/* TOP */
ctx.fillRect(x,mid-amp,barW-1,amp);

/* BOTTOM mirror */
ctx.fillRect(x,mid,barW-1,amp);
}
}
</script>
