<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Moje Radio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
}

#title{
font-size:40px;
margin-top:20px;
color:#ff2a2a;
}

button{
width:90%;
margin:6px;
padding:14px;
background:#111;
color:white;
border:1px solid red;
font-size:16px;
}
</style>
</head>

<body>

<div id="title">📻 Moje Radio</div>

<button onclick="play('https://stream.rcs.revma.com/gzwc1xcq042vv')">Muzyczne Radio</button>

<button onclick="play('https://rs8-krk2-cyfronet.rmfstream.pl/RMFFM48.mp3')">RMF FM</button>

<button onclick="play('https://rs8-krk2-cyfronet.rmfstream.pl/RMFMAXXX48.mp3')">RMF MAXX</button>

<button onclick="play('https://zt01.cdn.eurozet.pl/ZET128.mp3')">Radio ZET</button>

<button onclick="play('https://waw01-02.cdn.eurozet.pl/ESKA.mp3')">Radio Eska</button>

<button onclick="play('https://waw01-02.cdn.eurozet.pl/ESKAROCK.mp3')">Eska ROCK</button>

<button onclick="play('https://zt01.cdn.eurozet.pl/POGODA.mp3')">Radio Pogoda</button>

<button onclick="play('https://antyradio.cdn.eurozet.pl/antyradio.mp3')">Antyradio</button>

<button onclick="play('https://stream4.nadaje.com:9001/radiowroclaw')">Radio Wrocław</button>

<button onclick="stop()">STOP</button>

<audio id="audio" controls style="width:100%;margin-top:20px;"></audio>

<script>

const audio = document.getElementById("audio");

function play(url){
audio.src = url;
audio.play().catch(()=>{
alert("Ta stacja nie może być odtworzona w tej przeglądarce");
});
}

function stop(){
audio.pause();
audio.src="";
}

</script>

</body>
</html>
