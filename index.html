<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 6px #ff2a2a;
}

canvas{
display:block;
height:260px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
justify-content:space-between;
}

.volumeWrapper{
width:160px;height:45px;
display:flex;align-items:center;justify-content:center;
background:#111;
border:2px solid #ff2a2a;
}

button{
width:160px;height:45px;
background:#111;color:white;
border:2px solid #ff2a2a;
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button onclick="playRadio()">PLAY</button>
<button onclick="stopRadio()">STOP</button>
<button onclick="muteRadio()">MUTE</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button>🌙</button>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

let audioCtx, analyser, source, dataArray;
let gradient;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=1024;
analyser.smoothingTimeConstant=0.85;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src=STREAM_URL;
audio.play();
draw();
}

function stopRadio(){ audio.pause(); }
function muteRadio(){ audio.muted=!audio.muted; }

volume.addEventListener("input",()=>audio.volume=parseFloat(volume.value));

function resizeCanvas(){
let dpr=window.devicePixelRatio||1;
let w=document.getElementById("title").offsetWidth;

canvas.width=w*dpr;
canvas.height=260*dpr;

canvas.style.width=w+"px";
canvas.style.height="260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);

/* CACHE GRADIENT (KLUCZ DO FPS) */
gradient=ctx.createLinearGradient(0,0,w,0);
gradient.addColorStop(0,"#ff0000");
gradient.addColorStop(0.25,"#ff9900");
gradient.addColorStop(0.5,"#ffee00");
gradient.addColorStop(0.75,"#00ff66");
gradient.addColorStop(1,"#0066ff");
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

let w=canvas.width/window.devicePixelRatio;
let h=canvas.height/window.devicePixelRatio;

ctx.clearRect(0,0,w,h);

/* minimal HUD */
ctx.fillStyle="rgba(255,255,255,0.05)";
for(let y=0;y<h;y+=25){
ctx.fillRect(0,y,w,1);
}

/* FAST SPECTRUM */
let bars=90;
let step=Math.floor(dataArray.length/bars);
let barW=w/bars;

ctx.fillStyle=gradient;

for(let i=0;i<bars;i++){

let v=dataArray[i*step]||0;
let barH=(v/255)*h*0.9;

ctx.fillRect(i*barW,h-barH,barW-1,barH);
}
}
</script>

</body>
</html>
