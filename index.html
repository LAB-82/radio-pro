<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

h2{
margin:10px;
font-size:14px;
color:#aaa;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.tile{
background:#111;
border-radius:14px;
padding:12px;
text-align:center;
cursor:pointer;
border:1px solid #222;
transition:0.2s;
}

.tile:active{
transform:scale(0.95);
border-color:red;
}

/* 🔥 REALNE IKONY (kolor + gradient) */
.icon{
width:40px;
height:40px;
margin:0 auto 6px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
font-weight:bold;
color:#fff;
}

/* różne kolory */
.c1{background:linear-gradient(45deg,#ff0000,#ff6600);}
.c2{background:linear-gradient(45deg,#0066ff,#00ccff);}
.c3{background:linear-gradient(45deg,#00aa00,#66ff66);}
.c4{background:linear-gradient(45deg,#aa00ff,#ff00cc);}
.c5{background:linear-gradient(45deg,#ffcc00,#ff6600);}

#player{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
gap:10px;
justify-content:center;
padding:10px;
border-top:1px solid #222;
}

button{
padding:10px 18px;
background:#000;
color:#fff;
border:1px solid red;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🇵🇱 POLSKA</h2>
<div class="grid" id="pl"></div>

<h2>🌍 ZAGRANICA</h2>
<div class="grid" id="world"></div>

<div id="player">
<button onclick="play()">PLAY</button>
<button onclick="stop()">STOP</button>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>

/* 🔥 TYLKO DZIAŁAJĄCE STREAMY */
const stations=[

/* 🇵🇱 POLSKA */
{ name:"Muzyczne Radio", stream:"https://stream.rcs.revma.com/gzwc1xcq042vv", cls:"c1" },
{ name:"PR1", stream:"https://stream.polskieradio.pl/pr1_mp3", cls:"c2" },
{ name:"PR2", stream:"https://stream.polskieradio.pl/pr2_mp3", cls:"c3" },
{ name:"PR3", stream:"https://stream.polskieradio.pl/pr3_mp3", cls:"c4" },
{ name:"PR4", stream:"https://stream.polskieradio.pl/pr4_mp3", cls:"c5" },

/* 🔥 PEWNY ICECAST */
{ name:"Radio Wrocław", stream:"https://stream4.nadaje.com:9210/radiowroclaw", cls:"c1" },
{ name:"TOK FM", stream:"https://stream.rcs.revma.com/tokfm", cls:"c2" },
{ name:"Antyradio", stream:"https://stream.antyradio.pl/stream", cls:"c3" },

/* 🌍 ZAGRANICA (STABILNE) */
{ name:"BBC Radio 1", stream:"https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one", cls:"c4" },
{ name:"BBC 1Xtra", stream:"https://stream.live.vc.bbcmedia.co.uk/bbc_1xtra", cls:"c5" },

{ name:"SLAM FM", stream:"https://stream.slam.nl/slam_mp3", cls:"c1" },
{ name:"1.FM Club", stream:"https://strm112.1.fm/club_mobile_mp3", cls:"c2" },

{ name:"Ibiza Global", stream:"https://ibizaglobalradio.streamingmedia.it/play", cls:"c3" }

];

const audio=document.getElementById("audio");
let current=null;

/* 🔥 TILE */
function tile(s){

let d=document.createElement("div");
d.className="tile";

let icon=document.createElement("div");
icon.className="icon "+s.cls;
icon.textContent=s.name.slice(0,3).toUpperCase();

let txt=document.createElement("div");
txt.textContent=s.name;

d.onclick=()=>{

current=s;

/* HARD RESET (KLUCZ DO STABILNOŚCI) */
audio.pause();
audio.src="";
audio.load();

setTimeout(()=>{

audio.src=s.stream;
audio.load();

audio.play()
.then(()=>console.log("PLAY OK:",s.name))
.catch(e=>{
alert("STREAM ERROR: "+s.name);
console.log(e);
});

},250);

};

d.appendChild(icon);
d.appendChild(txt);

return d;
}

/* RENDER */
function make(){

const pl=document.getElementById("pl");
const world=document.getElementById("world");

stations.slice(0,6).forEach(s=>pl.appendChild(tile(s)));
stations.slice(6).forEach(s=>world.appendChild(tile(s)));

}

make();

/* PLAYER */
function play(){
if(current){
audio.play().catch(e=>alert("PLAY ERROR"));
}
}

function stop(){
audio.pause();
}

</script>

</body>
</html>
