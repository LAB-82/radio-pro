<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio LIVE</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial;
}

.header{
padding:14px;
text-align:center;
font-size:18px;
color:#ff2a2a;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.station{
background:#141414;
border:1px solid #222;
border-radius:14px;
padding:12px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.station:active{
transform:scale(0.96);
border-color:#ff2a2a;
}

.logo{
width:48px;
height:48px;
border-radius:12px;
margin:0 auto 6px;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
font-weight:bold;
background:linear-gradient(45deg,#ff2a2a,#111);
}

.name{
font-size:11px;
opacity:0.9;
}

#controls{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:center;
gap:10px;
padding:10px;
background:#111;
border-top:1px solid #222;
}

button{
padding:10px 16px;
background:#000;
border:1px solid #ff2a2a;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 LIVE RADIO ENGINE</div>

<div class="grid" id="grid"></div>

<div id="controls">
<button onclick="stopRadio()">STOP</button>
</div>

<audio id="audio" controls style="display:none;"></audio>

<script>

const audio = document.getElementById("audio");
let hls = null;

/* 🔥 TYLKO STACJE KTÓRE REALNIE MAJĄ PUBLICZNE STREAMY */
const stations = [

/* 🇵🇱 POLSKA */
{ name:"RMF FM", url:"https://rs8-krk2-cyfronet.rmfstream.pl/RMFFM48.mp3" },
{ name:"Radio Zet", url:"https://zt01.cdn.eurozet.pl/ZET128.mp3" },
{ name:"Eska", url:"https://waw01-02.cdn.eurozet.pl/ESKA.mp3" },

{ name:"Polskie Radio 1", url:"https://stream.polskieradio.pl/pr1_mp3_128" },
{ name:"Polskie Radio 3", url:"https://stream.polskieradio.pl/pr3_mp3_128" },

{ name:"TOK FM", url:"https://radiostream.pl/tuba9-1.mp3" },

/* 🌍 ZAGRANICA */
{ name:"BBC Radio 1", url:"https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one" },
{ name:"BBC 1Xtra", url:"https://stream.live.vc.bbcmedia.co.uk/bbc_1xtra" },

{ name:"SLAM FM", url:"https://stream.slam.nl/slam_mp3" },

{ name:"1.FM Club", url:"https://strm112.1.fm/club_mobile_mp3" }

];

/* 🔥 PLAY ENGINE (REAL FIXED VERSION) */
function play(url){

stopRadio();

setTimeout(()=>{

if(url.includes(".m3u8")){
if(Hls.isSupported()){
hls = new Hls();
hls.loadSource(url);
hls.attachMedia(audio);
hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
audio.play();
});
}
}else{
audio.src = url;
audio.load();
audio.play().catch(e=>{
alert("PLAY ERROR: "+e.message);
console.log(e);
});
}

},200);

}

/* STOP */
function stopRadio(){
if(hls){
hls.destroy();
hls = null;
}
audio.pause();
audio.src = "";
}

/* UI */
const grid = document.getElementById("grid");

stations.forEach(s=>{

let d=document.createElement("div");
d.className="station";

d.innerHTML=`
<div class="logo">${s.name.slice(0,3)}</div>
<div class="name">${s.name}</div>
`;

d.onclick=()=>{
play(s.url);
};

grid.appendChild(d);

});

</script>

</body>
</html>
