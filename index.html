<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio PRO STREAM ENGINE FIX</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}
.station:hover { background:#222; }

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#radioPlayer{
    width:90%;
    height:90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

#logoBox img{
    width:220px;
    height:120px;
    object-fit:contain;
    margin-bottom:20px;
}

#bigPlay{
    font-size:80px;
    cursor:pointer;
    user-select:none;
}

#volumeBox{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 14px;
    border-radius:20px;
}

input[type="range"]{
    width:140px;
}
</style>

</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 RADIO PRO STREAM ENGINE (FIXED)</div>

<div id="playerBox">
    <div id="radioPlayer">

        <div id="logoBox">
            <img id="stationLogo" src="">
        </div>

        <div id="bigPlay" onclick="toggle()">▶</div>

        <div id="volumeBox">
            🔊 <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8">
        </div>

    </div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   TWOJA PEŁNA LISTA (NIC NIE USUNIĘTE)
   ========================= */

const stations = [
{ name:"Muzyczne Radio", url:"https://stream.rc.fm/muzyczne", logo:"https://www.muzyczneradio.pl/wp-content/uploads/logo.png" },

{ name:"Polskie Radio Jedynka", url:"https://stream.polskieradio.pl/program1.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3f/PR1_logo.png" },

{ name:"Polskie Radio Dwójka", url:"https://stream.polskieradio.pl/program2.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/8/8f/PR2_logo.png" },

{ name:"Polskie Radio Trójka", url:"https://stream.polskieradio.pl/program3.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/1/1b/PR3_logo.png" },

{ name:"Polskie Radio Czwórka", url:"https://stream.polskieradio.pl/program4.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/0/0a/PR4_logo.png" },

{ name:"Radio Plus", url:"https://stream4.nadaje.com:8000/radioplus", logo:"https://upload.wikimedia.org/wikipedia/commons/8/8d/Radio_Plus_logo.png" },

{ name:"RMF FM", url:"https://rs6-krk2.rmfstream.pl/RMFFM48", logo:"https://upload.wikimedia.org/wikipedia/commons/2/2e/RMF_FM_logo.png" },

{ name:"Radio Zet", url:"https://zt01.cdn.eurozet.pl/ZET010.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Radio_ZET_logo.png" },

{ name:"Radio Eska", url:"https://waw01-01.cdn.eurozet.pl/eska.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/9/9f/Radio_Eska_logo.png" },

{ name:"Radio Wrocław", url:"https://stream2.nadaje.com:8000/radiowroclaw", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Radio_Wroc%C5%82aw_logo.png" },

{ name:"Radio Wnet", url:"https://stream.wnet.fm/stream", logo:"https://upload.wikimedia.org/wikipedia/commons/8/8e/Radio_Wnet_logo.png" },

{ name:"Tok FM", url:"https://audioserver.interia.pl/tokfm.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/5/5b/TOK_FM_logo.png" },

{ name:"Antyradio", url:"https://n-16-7.dcs.redcdn.pl/sc/o2/Eurozet/live/antyradio.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Antyradio_logo.png" },

{ name:"Radio Kolor", url:"https://radiokolor-stream.smcloud.net/radiokolor.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/7/7a/Radio_Kolor_logo.png" },

{ name:"Polskie Radio Dzieciom", url:"https://stream.polskieradio.pl/dzieci.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/5/5d/PR_Dzieciom_logo.png" },

{ name:"Polskie Radio Chopin", url:"https://stream.polskieradio.pl/chopin.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/4/4a/Chopin_radio_logo.png" },

{ name:"Radio Maryja", url:"https://radiomaryja.pl/ramy/rm.m3u", logo:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Radio_Maryja_logo.png" },

{ name:"Radio Jasna Góra", url:"https://stream.jasnagora.pl/radio.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Jasna_Gora_logo.png" }
];

const audio = document.getElementById("audio");
audio.volume = 0.8;

let index = 0;

/* =========================
   FIXED STREAM ENGINE
   ========================= */

function load(i){
    index = i;

    const st = stations[i];

    document.getElementById("stationLogo").src =
        st.logo || "https://via.placeholder.com/220x120?text=Radio";

    audio.pause();
    audio.removeAttribute("src");
    audio.load();

    audio.src = st.url;

    const playPromise = audio.play();

    if(playPromise !== undefined){
        playPromise
            .then(()=>{
                // OK
            })
            .catch(()=>{
                // retry (BEZ psucia UI)
                setTimeout(()=>{
                    audio.play().catch(()=>{});
                }, 700);
            });
    }
}

function toggle(){
    if(audio.paused){
        audio.play().catch(()=>{
            setTimeout(()=>audio.play().catch(()=>{}), 700);
        });
    } else {
        audio.pause();
    }
}

/* volume */
document.getElementById("volume").addEventListener("input", (e)=>{
    audio.volume = e.target.value;
});

/* sidebar */
stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerText = s.name;
    div.onclick = ()=>load(i);
    document.getElementById("sidebar").appendChild(div);
});

load(0);

</script>

</body>
</html>
