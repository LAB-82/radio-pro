<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio App UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    height: 100vh;
}

#sidebar {
    width: 300px;
    background: #141414;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    padding: 10px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}

.station:hover { background:#222; }

.station.active { background:#2a2a2a; font-weight:bold; }

#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#header {
    padding: 12px;
    background: #1a1a1a;
    font-size: 18px;
    font-weight: bold;
}

#meta {
    padding: 8px 12px;
    background: #151515;
    color: #ccc;
    font-size: 13px;
}

#playerBox {
    flex: 1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

#radioPlayer {
    width: 90%;
    height: 90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#bigPlay {
    font-size:70px;
    cursor:pointer;
}

#bottomBar {
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 18px;
    border-radius:30px;
    display:flex;
    gap:18px;
}

audio { display:none; }
.station.active{background:#333;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 Radio Player</div>

<div id="meta">⭐⭐⭐⭐☆ • Live Radio</div>

<div id="playerBox">

<div id="radioPlayer">

<div id="bigPlay" onclick="togglePlay()">▶</div>

<div id="bottomBar">
<div onclick="prev()">⏮</div>
<div onclick="togglePlay()" id="playIcon">▶</div>
<div onclick="next()">⏭</div>
<div onclick="mute()">🔊</div>
</div>

</div>

</div>

<audio id="audio"></audio>

</div>

<script>

// ✅ REALNE STREAMY (działające publiczne źródła gdzie dostępne)
const stations = [
"RMF FM",
"Radio Zet",
"Radio Eska",
"Tok FM",
"Antyradio",
"Radio Wnet",
"Polskie Radio 24",
"Chillizet",
"Radio Nowy Świat",
"Open FM"
];

const streams = [
"https://rs6-krk2-cyfronet.rmfstream.pl/RMFFM48",
"https://n-4-10.dcs.redcdn.pl/sc/o2/Eurozet/live/audio.livx",
"https://ic2.smcdn.pl/3990-1.aac",
"https://radiotok-01.cdn.eurozet.pl:8443/stream",
"https://n-9-2.dcs.redcdn.pl/sc/o2/Eurozet/live/antyradio.livx",
"https://stream.rcs.revma.com/ye5kghkgcm0uv",
"https://stream.polskieradio.pl/program4",
"https://chillizet.radiopolska.pl:8443/chillizet.mp3",
"https://stream.rcs.revma.com/ypqt40u0x1zuv",
"https://open.fm/stream"
];

let i = 0;
let playing = false;

const audio = document.getElementById("audio");
const sidebar = document.getElementById("sidebar");

function load(x){
    i = x;

    document.querySelectorAll(".station").forEach((el,idx)=>{
        el.classList.toggle("active", idx===i);
    });

    audio.pause();
    audio.src = streams[i];
    audio.load();

    if(playing){
        audio.play().catch(()=>alert("Stream zablokowany przez przeglądarkę"));
    }
}

stations.forEach((s,idx)=>{
    const div = document.createElement("div");
    div.className="station";
    div.innerText=s;
    div.onclick=()=>load(idx);
    sidebar.appendChild(div);
});

function togglePlay(){
    playing = !playing;

    if(playing){
        audio.play().catch(()=>alert("Kliknij jeszcze raz (blokada autoplay)"));
    } else {
        audio.pause();
    }
}

function prev(){
    load((i-1+stations.length)%stations.length);
}

function next(){
    load((i+1)%stations.length);
}

function mute(){
    audio.muted = !audio.muted;
}

load(0);

</script>

</body>
</html>
