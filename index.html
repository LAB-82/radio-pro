<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cp-red:#ff2a2a;
  --cp-red-dark:#cc0000;
  --cp-red-glow:#ff4444;
  --cp-bg:#0a0000;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(255, 42, 42,.05) 25%, rgba(255, 42, 42,.05) 26%, transparent 27%, transparent 74%, rgba(255, 42, 42,.05) 75%, rgba(255, 42, 42,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(204, 0, 0,.05) 25%, rgba(204, 0, 0,.05) 26%, transparent 27%, transparent 74%, rgba(204, 0, 0,.05) 75%, rgba(204, 0, 0,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  min-height:100vh;
  padding-bottom: 40px;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:var(--cp-red);
  text-shadow:
    0 0 5px var(--cp-red),
    0 0 10px var(--cp-red),
    0 0 20px var(--cp-red),
    0 0 40px var(--cp-red-dark),
    0 0 80px var(--cp-red-dark);
}

#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
  border:2px solid var(--cp-red);
  box-shadow: 0 0 10px var(--cp-red), 0 0 20px var(--cp-red-dark), inset 0 0 20px rgba(255,42,42,0.2);
  width: 600px;
  height: 260px;
  display: block;
}

canvas{
  display: block;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
}

.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1a0000;
  border:2px solid var(--cp-red);
  box-shadow: 0 0 8px var(--cp-red), inset 0 0 8px rgba(255,42,42,0.3);
}

button{
  width:160px;
  height:45px;
  background:#1a0000;
  color:var(--cp-red);
  cursor:pointer;
  border:2px solid var(--cp-red);
  font-family:'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 0 8px var(--cp-red), inset 0 0 8px rgba(255,42,42,0.2);
  transition: all 0.15s ease;
}

button:hover{
  background:var(--cp-red);
  color:#000;
  box-shadow: 0 0 15px var(--cp-red), 0 0 30px var(--cp-red-dark);
  transform: translateY(-1px);
}

button:active{
  transform: translateY(1px);
  box-shadow: 0 0 5px var(--cp-red);
}

#volume{
  width:120px;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #1a0000;
  border: 1px solid var(--cp-red);
  outline: none;
}

#volume::-webkit-slider-thumb{
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  background: var(--cp-red-glow);
  cursor: pointer;
  border: 2px solid var(--cp-red);
  box-shadow: 0 0 8px var(--cp-red-glow), 0 0 15px var(--cp-red);
  border-radius: 2px;
}

#volume::-moz-range-thumb{
  width: 16px;
  height: 16px;
  background: var(--cp-red-glow);
  cursor: pointer;
  border: 2px solid var(--cp-red);
  box-shadow: 0 0 8px var(--cp-red-glow), 0 0 15px var(--cp-red);
  border-radius: 2px;
}

#volume::-webkit-slider-runnable-track{
  background: linear-gradient(90deg, var(--cp-red-dark), var(--cp-red));
  height: 4px;
}

#volume::-moz-range-track{
  background: linear-gradient(90deg, var(--cp-red-dark), var(--cp-red));
  height: 4px;
}

.playActive{
  color:#000!important;
  background: var(--cp-red)!important;
  box-shadow: 0 0 20px var(--cp-red), 0 0 40px var(--cp-red)!important;
}
.stopActive{
  color:#000!important;
  background: var(--cp-red-dark)!important;
  border-color: var(--cp-red-dark)!important;
  box-shadow: 0 0 20px var(--cp-red-dark), 0 0 40px var(--cp-red-dark)!important;
}
.muteActive{
  color:#000!important;
  background: var(--cp-red-glow)!important;
  border-color: var(--cp-red-glow)!important;
  box-shadow: 0 0 20px var(--cp-red-glow), 0 0 40px var(--cp-red-glow)!important;
}

#bottomLink{
  margin-top:10px;
}

#bottomLink a{
  color:var(--cp-red);
  text-decoration:none;
  font-family:'Orbitron', sans-serif;
  text-shadow: 0 0 5px var(--cp-red);
  transition: 0.2s;
}

#bottomLink a:hover{
  color:var(--cp-red-glow);
  text-shadow: 0 0 10px var(--cp-red-glow), 0 0 20px var(--cp-red);
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
  <button id="playBtn" onclick="playRadio()">PLAY</button>
  <button id="stopBtn" onclick="stopRadio()">STOP</button>
  <button id="muteBtn" onclick="muteRadio()">MUTE</button>
