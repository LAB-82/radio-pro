<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
position: relative;
overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.04), transparent),
    radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.03), transparent),
    radial-gradient(0.5px 0.5px at 90px 40px, rgba(255,42,42,0.02), transparent);
  background-repeat: repeat;
  background-size: 80px 80px;
  animation: static-noise 0.1s steps(1) infinite;
  pointer-events: none;
  z-index: 1;
  mix-blend-mode: screen;
}

@keyframes static-noise {
  0% { transform: translate(0, 0); }
  10% { transform: translate(-1px, 1px); }
  20% { transform: translate(1px, -1px); }
  30% { transform: translate(-1px, -2px); }
  100% { transform: translate(1px, 1px); }
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000,
            0 0 10px rgba(255,255,255,0.2);
animation: cyberpunk-title 4s ease-in-out infinite alternate;
filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
}

@keyframes cyberpunk-title {
  0% { 
    text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
  }
  100% { 
    text-shadow:0 0 8px #ff2a2a,0 0 20px #ff0000,0 0 40px #ff0000,0 0 80px #ff0000,
                0 0 15px rgba(255,255,255,0.3);
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
  }
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,42,42,0.4), inset 0 0 15px rgba(255,255,255,0.08);
position: relative;
z-index: 10;
}

canvas{
display:block;
height:260px;
border-radius:8px;
filter: drop-shadow(0 0 12px rgba(255,0,0,0.5)) brightness(1.03);
animation: canvas-flicker 3s ease-in-out infinite alternate;
}

@keyframes canvas-flicker {
  0% { filter: drop-shadow(0 0 12px rgba(255,0,0,0.5)) brightness(1.03); }
  100% { filter: drop-shadow(0 0 18px rgba(255,0,0,0.7)) brightness(1.06); }
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
position: relative;
z-index: 20;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 12px #ff2a2a, 0 0 20px rgba(255,255,255,0.12), inset 0 0 8px rgba(255,255,255,0.06);
transition: all 0.3s ease;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 12px #ff2a2a, 0 0 20px rgba(255,255,255,0.15), inset 0 0 8px rgba(255,255,255,0.05);
position: relative;
overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

button:hover::before {
  left: 100%;
}

#volume{
width:120px;
height:10px;
appearance:none;
border-radius:10px;
outline:none;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 8px #ff2a2a, inset 0 0 6px rgba(255,255,255,0.08);
}

#volume.active{
box-shadow:0 0 15px #ff0000, 0 0 25px rgba(255,255,255,0.2);
border:1px solid #ff0000;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 12px red,0 0 20px red, 0 0 6px rgba(255,255,255,0.3);
cursor:pointer;
}

#volume::-moz-range-thumb{
width:16px;
height:16px;
border:none;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 12px red,0 0 20px red, 0 0 6px rgba(255,255,255,0.3);
cursor:pointer;
}

.playActive{ 
color:#00ff00; 
text-shadow:0 0 12px #00ff00, 0 0 20px rgba(255,255,255,0.25);
box-shadow:0 0 20px #00ff00, 0 0 30px rgba(255,255,255,0.2);
}
.stopActive{ 
color:#ff4444; 
text-shadow:0 0 12px red, 0 0 20px rgba(255,255,255,0.15);
box-shadow:0 0 20px red, 0 0 30px rgba(255,255,255,0.12);
}

.muteActive{
color:#ffaa00;
text-shadow:0 0 12px orange, 0 0 20px rgba(255,255,255,0.25);
box-shadow:0 0 20px orange, 0 0 30px rgba(255,255,255,0.2);
animation:pulseMute 0.8s infinite alternate;
}

@keyframes pulseMute{
from{ 
transform:scale(1); 
box-shadow: 0 0 12px orange, 0 0 20px rgba(255,255,255,0.15); 
}
to{ 
transform:scale(1.08); 
box-shadow: 0 0 25px orange, 0 0 35px rgba(255,255,255,0.3); 
}
}

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
z-index: 20;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
text-shadow:0 0 8px red, 0 0 15px rgba(255,255,255,0.2);
font-size:20px;
transition: all 0.3s ease;
}

#bottomLink a:hover {
  text-shadow: 0 0 20px #ff2a2a, 0 0 30px rgba(255,255,255,0.35);
}

/* Vignette i Chromatic Aberration */
body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.65) 85%, rgba(255,0,0,0.08) 100%);
  pointer-events: none;
  z-index: 2;
}

/* Chromatic aberration na krawędziach */
.chrome-left::before,
.chrome-right::after {
  content: '';
  position: fixed;
  top: 0;
  width: 4px;
  height: 100%;
  pointer-events: none;
  z-index: 3;
}

.chrome-left::before {
  left: 0;
  background: linear-gradient(to bottom, rgba(0,0,255,0.25), transparent);
  box-shadow: 4px 0 0 rgba(255,0,0,0.2);
}

.chrome-right::after {
  right: 0;
  background: linear-gradient(to bottom, rgba(255,0,0,0.25), transparent);
  box-shadow: -4px 0 0 rgba(0,0,255,0.2);
}

.scanline {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(255,255,255,0.12) 25%, 
    rgba(255,42,42,0.2) 50%, 
    rgba(255,255,255,0.12) 75%, 
    transparent);
  box-shadow: 0 0 6px rgba(255,255,255,0.35);
  animation: scan-move 0.15s linear infinite;
  pointer-events: none;
  z-index: 4;
}

@keyframes scan-move {
  0% { transform: translateY(0); opacity: 0.5; }
  50% { opacity: 0.9; }
  100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body class="chrome-left chrome-right">
<!-- Dynamiczne scanlines -->
<script>
setInterval(() => {
  const scanline = document.createElement('div');
  scanline.className = 'scanline';
  document.body.appendChild(scanline);
  setTimeout(() => {
    if (scanline.parentNode) scanline.remove();
  }, 150);
}, 150);
</script>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const playBtn=document.getElementById("playBtn");
const stopBtn=document.getElementById("stopBtn");
const muteBtn=document.getElementById("muteBtn");

const title=document.getElementById("title");
const controls=document.getElementById("controls");

const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

audio.volume=parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let peaks=[];
let animationStarted=false;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
analyser.smoothingTimeConstant=0.5;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);

for(let i=0;i<300;i++) peaks[i]=0;
}

function playRadio(){

setupAudio();

if(audioCtx.state === "suspended"){
audioCtx.resume();
}

audio.src=STREAM_URL;
audio.play();

playBtn.classList.add("playActive");
stopBtn.classList.remove("stopActive");

if(!animationStarted){
animationStarted=true;
draw();
}
}

function stopRadio(){

audio.pause();

stopBtn.classList.add("stopActive");
playBtn.classList.remove("playActive");

setTimeout(()=>{
stopBtn.classList.remove("stopActive");
},1000);

for(let i=0;i<peaks.length;i++){
peaks[i]=0;
}
}

function muteRadio(){
audio.muted=!audio.muted;
muteBtn.classList.toggle("muteActive");
}

volume.addEventListener("input",()=>{
let val=parseFloat(volume.value);
audio.volume=val;

if(Math.abs(val-0.5)<0.02){
volume.classList.remove("active");
}else{
volume.classList.add("active");
}
});

volume.dispatchEvent(new Event("input"));

function resizeCanvas(){

let dpr = window.devicePixelRatio || 1;
let width = title.offsetWidth;

canvas.width = width * dpr;
canvas.height = 260 * dpr;

canvas.style.width = width + "px";
canvas.style.height = "260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr, dpr);

controls.style.width = width + "px";
}

window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

function draw(){
requestAnimationFrame(draw);

if(!analyser || !dataArray) return;

analyser.getByteFrequencyData(dataArray);
drawEQ();
}

function drawEQ(){

let dpr = window.devicePixelRatio || 1;
let width = canvas.width / dpr;
let heightCanvas = canvas.height / dpr;

ctx.clearRect(0,0,width,heightCanvas);

let bars = Math.max(1, Math.floor(width / 8));
let barWidth = width / bars;

let step=Math.max(1, Math.floor(dataArray.length/bars));

let yOffset = 5;
let maxHeight = heightCanvas * 0.9;

for(let i=0;i<bars;i++){

let index=i*step;

let value = dataArray[index] || 0;

let percent=value/255;
let h=Math.min(maxHeight, heightCanvas*percent);

let x=i*barWidth;
let y=heightCanvas-h + yOffset;

let gradient=ctx.createLinearGradient(0,heightCanvas,0,0);
gradient.addColorStop(0,"#ff0000");
gradient.addColorStop(0.6,"#ff5555");
gradient.addColorStop(1,"#ffffff");

ctx.fillStyle=gradient;

ctx.shadowBlur=5;
ctx.shadowColor="red";

ctx.fillRect(x,y,barWidth-1,h);

ctx.shadowBlur=0;

if(!peaks[i]) peaks[i]=0;

if(h>peaks[i]){
peaks[i]=h;
}else{
peaks[i]-=1.5;
}

if(peaks[i]<0) peaks[i]=0;

let peakY=heightCanvas-peaks[i] + yOffset;

ctx.fillStyle="#ff2222";
ctx.fillRect(x,peakY,barWidth-1,3);

}
}
</script>

</body>
</html>
