<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Production Radio Engine</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}
.station:hover { background:#222; }

#main {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#logo {
    width:220px;
    height:120px;
    object-fit:contain;
    margin-bottom:20px;
}

#status {
    margin-top:10px;
    color:#aaa;
    font-size:14px;
}

button {
    font-size:50px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
    <img id="logo">
    <button onclick="toggle()">▶</button>
    <div id="status">READY</div>
</div>

<audio id="audio"></audio>

<script>

/* =========================
   PRODUKCYJNA LISTA STACJI
   (tylko web-playable streams)
   ========================= */

const stations = [
{
    name:"Muzyczne Radio",
    url:"https://stream.rc.fm/muzyczne",
    logo:"https://www.muzyczneradio.pl/wp-content/uploads/logo.png"
},
{
    name:"RMF FM",
    url:"https://rs6-krk2.rmfstream.pl/RMFFM48",
    logo:"https://upload.wikimedia.org/wikipedia/commons/2/2e/RMF_FM_logo.png"
},
{
    name:"Radio Zet",
    url:"https://zt01.cdn.eurozet.pl/ZET010.mp3",
    logo:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Radio_ZET_logo.png"
},
{
    name:"Radio Eska",
    url:"https://waw01-01.cdn.eurozet.pl/eska.mp3",
    logo:"https://upload.wikimedia.org/wikipedia/commons/9/9f/Radio_Eska_logo.png"
}
];

const audio = document.getElementById("audio");

let current = 0;
let locked = false;

/* =========================
   CORE STREAM LOADER
   ========================= */

function setStatus(t){
    document.getElementById("status").innerText = t;
}

function load(i){

    if(locked) return;

    current = i;
    const st = stations[i];

    document.getElementById("logo").src = st.logo;

    setStatus("CONNECTING...");

    locked = true;

    audio.pause();
    audio.src = st.url;
    audio.load();

    const timeout = setTimeout(()=>{
        setStatus("STREAM TIMEOUT");
        locked = false;
    }, 7000);

    audio.oncanplay = () => {
        clearTimeout(timeout);

        audio.play()
        .then(()=>{
            setStatus("LIVE");
        })
        .catch(()=>{
            setStatus("BLOCKED PLAYBACK");
        })
        .finally(()=>{
            locked = false;
        });
    };

    audio.onerror = () => {
        clearTimeout(timeout);
        setStatus("STREAM ERROR");
        locked = false;
    };
}

/* =========================
   CONTROL
   ========================= */

function toggle(){
    if(audio.paused){
        load(current);
    } else {
        audio.pause();
        setStatus("PAUSED");
    }
}

/* =========================
   UI
   ========================= */

stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerText = s.name;
    div.onclick = ()=>load(i);
    document.getElementById("sidebar").appendChild(div);
});

load(0);

</script>

</body>
</html>
