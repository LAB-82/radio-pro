<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO FIX (STABLE)</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
transition:0.2s;
font-size:12px;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#playerBox{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

#radioPlayer{
width:90%;
height:90%;
background:#111;
border-radius:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

#logoBox img{
width:180px;
height:180px;
border-radius:12px;
background:#222;
margin-bottom:10px;
}

#controls{
display:flex;
gap:10px;
align-items:center;
margin-top:10px;
}

button{
background:#222;
color:#fff;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
}

button:hover{background:#333;}

#volume{width:120px;}
#status{margin-top:10px;font-size:12px;opacity:0.7;}
</style>

</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE PRO FIX (STABLE RESOLVER)</div>

<div id="playerBox">
<div id="radioPlayer">

<div id="logoBox">
<img id="logo"/>
</div>

<div id="controls">
<button onclick="play()">PLAY</button>
<button onclick="stop()">STOP</button>
<button onclick="mute()">MUTE</button>
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.6">
</div>

<div id="status">READY</div>

</div>
</div>

</div>

<audio id="audio"></audio>

<script>

const stations=[
"RMF FM","Radio Zet","Radio Eska","Radio Plus","Tok FM",
"Antyradio","Radio Wrocław","Radio Wnet","Radio Kolor",
"Radio Maryja","Jedynka","Dwojka","Trojka","Czworka",
"Dzieciom","Chopin","Kampus","Nepokalanow","Rodzina"
];

const audio=document.getElementById("audio");
const logo=document.getElementById("logo");
const status=document.getElementById("status");
const volume=document.getElementById("volume");

let current=0;
let cache={};

volume.oninput=()=>audio.volume=volume.value;

/* =========================
   🔥 FIXED RESOLVER v2
========================= */

async function getStream(name){

if(cache[name]) return cache[name];

status.innerText="SEARCHING STREAM...";

try{
const res=await fetch(
`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}`
);

const data=await res.json();

if(!data || !data.length){
status.innerText="NO STREAM FOUND";
return null;
}

/* 🔥 FILTER VALID STREAMS */
const valid = data.filter(s =>
s.url_resolved &&
(
s.url_resolved.endsWith(".mp3") ||
s.url_resolved.endsWith(".aac") ||
s.url_resolved.includes("stream")
)
);

/* fallback if filtering removes too much */
const best = valid[0] || data[0];

cache[name]=best.url_resolved;
return best.url_resolved;

}catch(e){
status.innerText="ERROR FETCHING STREAM";
return null;
}
}

function setLogo(name){
logo.src=`https://www.radio-browser.info/backends/logos/${encodeURIComponent(name)}.png`;
}

async function load(i){

current=i;
const name=stations[i];

document.querySelectorAll(".station").forEach((el,idx)=>{
el.classList.toggle("active",idx===i);
});

setLogo(name);

const url=await getStream(name);

if(!url){
audio.removeAttribute("src");
status.innerText="NO STREAM";
return;
}

audio.src=url;
audio.play().catch(()=>{});

status.innerText="PLAYING: "+name;
}

function play(){load(current);}
function stop(){audio.pause();audio.src="";status.innerText="STOPPED";}
function mute(){audio.muted=!audio.muted;}

stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;
div.onclick=()=>load(i);
document.getElementById("stations").appendChild(div);
});

volume.value=0.6;
audio.volume=0.6;

load(0);

</script>

</body>
</html>
