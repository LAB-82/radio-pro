<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026 GRID</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#1f1f1f;color:#fff;height:100vh;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;background:#262626}
#topbar{height:66px;display:flex;align-items:center;gap:16px;padding:0 16px;background:#2a2a2a;border-bottom:1px solid rgba(255,255,255,.08);flex:0 0 auto}
#menu-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;line-height:1;color:#ddd;user-select:none}
#title{font-size:22px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#f2f2f2}
#clock{min-width:82px;text-align:center;font-size:16px;color:#eee;font-family:monospace;opacity:.9}
#grid-wrap{flex:1;overflow:hidden;padding:10px 10px 104px}
#stations{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;max-height:100%;overflow:hidden}
.station{aspect-ratio:1/1;background:#f6f6f6;border-radius:14px;color:#111;display:flex;align-items:center;justify-content:center;padding:6px;cursor:pointer;overflow:hidden;border:2px solid transparent;position:relative;min-height:0}
.station:hover{transform:translateY(-1px)}
.station.active{border-color:#28a7d8;box-shadow:0 0 0 2px rgba(40,167,216,.18)}
.station img{width:100%;height:100%;object-fit:contain;display:block}
.station .label{text-align:center;font-size:14px;line-height:1.05;font-weight:500;white-space:pre-line;padding:4px;width:100%}
#playerbar{position:fixed;left:0;right:0;bottom:0;height:104px;background:#1d1d1d;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:12px 16px;gap:14px}
#playbtn{width:72px;height:72px;border-radius:50%;border:none;background:linear-gradient(180deg,#f7f7f7,#cfcfcf);color:#222;font-size:30px;box-shadow:inset 0 2px 8px rgba(0,0,0,.18),0 0 0 6px rgba(255,255,255,.08);cursor:pointer;flex:0 0 auto}
#seek{flex:1;height:8px;appearance:none;background:linear-gradient(90deg,#33aee4 0%,#33aee4 var(--p,50%),#4c4c4c var(--p,50%),#4c4c4c 100%);border-radius:999px;outline:none}
#seek::-webkit-slider-thumb{appearance:none;width:22px;height:22px;border-radius:50%;background:#33aee4;border:4px solid #2b90b6;box-shadow:0 0 0 4px rgba(51,174,228,.14);cursor:pointer}
#seek::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#33aee4;border:4px solid #2b90b6;cursor:pointer}
#vol-wrap{display:flex;align-items:center;gap:10px;min-width:170px;flex:0 0 auto}
#vol{width:96px;height:6px;appearance:none;background:linear-gradient(90deg,#33aee4 0%,#33aee4 var(--v,85%),#3d3d3d var(--v,85%),#3d3d3d 100%);border-radius:999px;outline:none}
#vol::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;background:#33aee4;border:3px solid #2b90b6;cursor:pointer}
#vol::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#33aee4;border:3px solid #2b90b6;cursor:pointer}
#status{position:absolute;left:16px;bottom:112px;font-size:12px;color:#d8d8d8;opacity:.75;pointer-events:none}
@media (max-width: 1200px){#stations{grid-template-columns:repeat(5,minmax(0,1fr))}#title{font-size:20px}}
@media (max-width: 760px){#topbar{height:60px;padding:0 10px;gap:8px}#title{font-size:15px}#clock{min-width:64px;font-size:14px}#stations{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}#grid-wrap{padding-bottom:98px}#playerbar{height:98px;padding:10px 12px;gap:10px}#playbtn{width:58px;height:58px;font-size:24px}#vol-wrap{min-width:108px}#vol{width:64px}#status{bottom:104px}}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="menu-btn">☰</div>
    <div id="title">Radio online</div>
    <div id="clock">00:00</div>
  </div>

  <div id="grid-wrap">
    <div id="stations"></div>
  </div>

  <div id="status">Gotowy</div>

  <div id="playerbar">
    <button id="playbtn">▶</button>
    <input id="seek" type="range" min="0" max="100" value="50">
    <div id="vol-wrap"><span>🔊</span><input id="vol" type="range" min="0" max="1" step="0.01" value="0.85"></div>
  </div>
</div>

<script>
const stations = ["RMF FM","Radio Zet","Tok FM","Radio Plus Legnica","Planeta FM","Muzyczne Radio","Radio Kolor","Radio Wrocław","Radio Złote Przeboje","Radio Kampus","Radio Rodzina"];

const streams = {
  "RMF FM":"https://rs6-krk2.rmfstream.pl/rmf_fm",
  "Radio Zet":"https://zt03.cdn.eurozet.pl/zet-net.mp3",
  "Tok FM":"https://radiostream.pl/tuba9-1.mp3",
  "Radio Plus Legnica":"http://pla.cdn.eurozet.pl/pla-net.mp3",
  "Planeta FM":"http://pla.cdn.eurozet.pl/pla-net.mp3",
  "Muzyczne Radio":"http://stream.rcs.revma.com/gzwc1xcq042vv",
  "Radio Kolor":"https://stream.rcs.revma.com/zbq79057xd3vv",
  "Radio Wrocław":"https://stream4.nadaje.com:8176/prw",
  "Radio Złote Przeboje":"https://zt02.cdn.eurozet.pl/zlote-przeboje.mp3",
  "Radio Kampus":"https://stream.radiokampus.fm/kampus.mp3",
  "Radio Rodzina":"https://stream3.nadaje.com:8400/radirodzina_mp3"
};

const stationsEl = document.getElementById("stations");
const audio = new Audio();
audio.preload = "none";

const playbtn = document.getElementById("playbtn");
const seek = document.getElementById("seek");
const vol = document.getElementById("vol");
const status = document.getElementById("status");
const clock = document.getElementById("clock");

let current = null;
let playing = false;

function updateClock(){
  const d = new Date();
  clock.textContent = d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

function setBar(el, value, key){
  el.style.setProperty(key, value + '%');
}

setBar(seek, 50, '--p');
setBar(vol, 85, '--v');

function setActive(name){
  document.querySelectorAll('.station').forEach(el => el.classList.toggle('active', el.dataset.name === name));
}

function render(){
  stationsEl.innerHTML = '';
  stations.forEach(name => {
    const tile = document.createElement('div');
    tile.className = 'station';
    tile.dataset.name = name;

    const img = document.createElement('img');
    img.alt = name;
    img.src = `https://www.radio-browser.info/backends/logos/${encodeURIComponent(name)}.png?${Date.now()}`;
    img.onerror = () => {
      img.remove();
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = name;
      tile.appendChild(label);
    };

    tile.appendChild(img);
    tile.addEventListener('click', () => selectStation(name));
    stationsEl.appendChild(tile);
  });
}

async function selectStation(name){
  current = name;
  setActive(name);
  status.textContent = 'Ładowanie: ' + name;
  const url = streams[name];
  if(!url){
    status.textContent = 'Brak streamu: ' + name;
    return;
  }
  try{
    audio.src = url;
    audio.volume = parseFloat(vol.value);
    await audio.play();
    playing = true;
    playbtn.textContent = '❚❚';
    status.textContent = 'Gra: ' + name;
  }catch(e){
    playing = false;
    playbtn.textContent = '▶';
    status.textContent = 'Kliknij ▶ aby uruchomić: ' + name;
  }
}

playbtn.addEventListener('click', async () => {
  if(!current){
    await selectStation(stations[0]);
    return;
  }
  if(playing){
    audio.pause();
    playing = false;
    playbtn.textContent = '▶';
    status.textContent = 'Wstrzymane';
  }else{
    try{
      await audio.play();
      playing = true;
      playbtn.textContent = '❚❚';
      status.textContent = 'Gra: ' + current;
    }catch(e){
      status.textContent = 'Nie można uruchomić odtwarzania';
    }
  }
});

seek.addEventListener('input', () => setBar(seek, seek.value, '--p'));
vol.addEventListener('input', () => {
  audio.volume = vol.value;
  setBar(vol, Math.round(vol.value * 100), '--v');
});

audio.addEventListener('waiting', () => status.textContent = 'Buforowanie...');
audio.addEventListener('playing', () => {
  playing = true;
  playbtn.textContent = '❚❚';
  if(current) status.textContent = 'Gra: ' + current;
});
audio.addEventListener('pause', () => {
  playing = false;
  playbtn.textContent = '▶';
});
audio.addEventListener('error', () => status.textContent = 'Błąd streamu');

render();
setActive(stations[0]);
</script>
</body>
</html>
