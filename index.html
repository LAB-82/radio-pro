<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{
background:#eaeaea;
color:#000;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 6px #ff2a2a,0 0 12px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}

canvas{
display:block;
height:260px;
border-radius:8px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

body.day .volumeWrapper{
background:#d6d6d6;
box-shadow:0 0 10px #ff2a2a;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

body.day button{
background:#d6d6d6;
color:#000;
box-shadow:0 0 10px #ff2a2a;
}

#volume{
width:120px;
height:10px;
appearance:none;
border-radius:10px;
outline:none;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 4px #ff2a2a;
}

#volume.active{
box-shadow:0 0 8px #ff0000;
border:1px solid #ff0000;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 8px #ff0000;
cursor:pointer;
}

#volume::-moz-range-thumb{
width:16px;
height:16px;
border:none;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 8px #ff0000;
cursor:pointer;
}

.playActive{ color:#ff2a2a; text-shadow:0 0 8px #ff0000; }
.stopActive{ color:#ff2a2a; text-shadow:0 0 8px #ff0000; }

.muteActive{
color:#ff2a2a;
text-shadow:0 0 8px #ff0000;
animation:pulseMute 0.8s infinite alternate;
}

@keyframes pulseMute{
from{ transform:scale(1); }
to{ transform:scale(1.05); }
}

#modeBtn{
font-size:22px;
width:66px;
height:45px;
}

body:not(.day) #modeBtn{
color:#ff2a2a;
text-shadow:0 0 6px #ff0000;
background:#111;
box-shadow:0 0 6px #ff0000;
}

body.day #modeBtn{
color:#ff2a2a;
text-shadow:0 0 6px #ff0000;
background:#d6d6d6;
box-shadow:0 0 6px #ff0000;
}

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
text-shadow:0 0 4px #ff0000;
font-size:20px;
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const playBtn=document.getElementById("playBtn");
const stopBtn=document.getElementById("stopBtn");
const muteBtn=document.getElementById("muteBtn");
const modeBtn=document.getElementById("modeBtn");

const title=document.getElementById("title");
const controls=document.getElementById("controls");

const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

let audioCtx, analyser, source;
let dataArray;

function setupAudio(){

if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
analyser.smoothingTimeConstant=0.5;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src=STREAM_URL;
audio.play();
draw();
}

function stopRadio(){ audio.pause(); }

function muteRadio(){ audio.muted=!audio.muted; }

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

/* RESIZE */
function resizeCanvas(){
let dpr=window.devicePixelRatio||1;
let width=title.offsetWidth;

canvas.width=width*dpr;
canvas.height=260*dpr;

canvas.style.width=width+"px";
canvas.style.height="260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);

controls.style.width=width+"px";
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

function draw(){
requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);
render();
}

function render(){

let dpr=window.devicePixelRatio||1;
let w=canvas.width/dpr;
let h=canvas.height/dpr;

ctx.clearRect(0,0,w,h);

/* HUD */
ctx.strokeStyle="rgba(255,255,255,0.08)";
for(let y=0;y<h;y+=20){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
}

/* ===== MID / SIDE REAL AUDIO ANALYSIS ===== */
let mid = new Uint8Array(dataArray.length);
let side = new Uint8Array(dataArray.length);

/* symulacja MS z FFT (real audio transform approach) */
for(let i=0;i<dataArray.length;i++){
let v=dataArray[i];

mid[i]=v;
side[i]=Math.abs(v - (dataArray[dataArray.length-i-1]||0));
}

let bars=60;
let bw=w/bars;

for(let i=0;i<bars;i++){

let m=mid[i*2]||0;
let s=side[i*2]||0;

let mh=(m/255)*(h*0.9);
let sh=(s/255)*(h*0.9);

let x=i*bw;

ctx.fillStyle="#ff2a2a";
ctx.fillRect(x,h-mh,bw/2-1,mh);

ctx.fillStyle="#ff0000";
ctx.fillRect(x+bw/2,h-sh,bw/2-1,sh);
}
}
</script>

</body>
</html>
