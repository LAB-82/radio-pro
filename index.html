<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
position: relative;
overflow: hidden;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
animation: cyberpunk-title 3s ease-in-out infinite alternate;
}

@keyframes cyberpunk-title {
  0% { filter: hue-rotate(0deg) drop-shadow(0 0 5px #ff2a2a); }
  100% { filter: hue-rotate(5deg) drop-shadow(0 0 15px #ff2a2a); }
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
position: relative;
box-shadow: 0 0 30px rgba(255,42,42,0.3);
}

canvas{
display:block;
height:260px;
border-radius:8px;
filter: drop-shadow(0 0 10px rgba(255,0,0,0.5));
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
position: relative;
z-index: 10;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a, inset 0 0 10px rgba(255,255,255,0.05);
transition: all 0.3s ease;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a, 0 0 20px rgba(255,255,255,0.1);
position: relative;
overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

button:hover::before {
  left: 100%;
}

#volume{
width:120px;
height:10px;
appearance:none;
border-radius:10px;
outline:none;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a, inset 0 0 5px rgba(255,255,255,0.05);
}

#volume.active{
box-shadow:0 0 10px #ff0000, 0 0 20px rgba(255,255,255,0.2);
border:1px solid #ff0000;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red, 0 0 5px rgba(255,255,255,0.3);
cursor:pointer;
}

#volume::-moz-range-thumb{
width:16px;
height:16px;
border:none;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red, 0 0 5px rgba(255,255,255,0.3);
cursor:pointer;
}

.playActive{ color:#00ff00; text-shadow:0 0 10px #00ff00, 0 0 20px rgba(255,255,255,0.2); }
.stopActive{ color:#ff4444; text-shadow:0 0 10px red, 0 0 20px rgba(255,255,255,0.1); }

.muteActive{
color:#ffaa00;
text-shadow:0 0 10px orange, 0 0 20px rgba(255,255,255,0.2);
animation:pulseMute 0.8s infinite alternate;
}

@keyframes pulseMute{
from{ transform:scale(1); box-shadow: 0 0 10px orange; }
to{ transform:scale(1.1); box-shadow: 0 0 20px orange, 0 0 30px rgba(255,255,255,0.3); }
}

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
z-index: 10;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
text-shadow:0 0 6px red, 0 0 12px rgba(255,255,255,0.2);
font-size:20px;
transition: all 0.3s ease;
}

#bottomLink a:hover {
  text-shadow: 0 0 20px #ff2a2a, 0 0 30px rgba(255,255,255,0.4);
}

/* Cyberpunk 2077 Effects */
.cyberpunk-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.scanlines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), rgba(255,42,42,0.2), transparent);
  animation: scan 0.08s linear infinite;
  box-shadow: 0 0 5px rgba(255,255,255,0.3);
}

@keyframes scan {
  0% { transform: translateY(0); opacity: 0.4; }
  50% { opacity: 0.8; }
  100% { transform: translateY(100vh); opacity: 0; }
}

.static-noise {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle at 20% 80%, rgba(255,255,255,0.05) 0.5px, transparent 1px),
    radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0.3px, transparent 0.8px),
    radial-gradient(circle at 40% 40%, rgba(255,42,42,0.02) 0.2px, transparent 0.6px);
  background-size: 80px 80px, 120px 120px, 200px 200px;
  animation: static-move 0.12s steps(2) infinite;
  opacity: 0.06;
  mix-blend-mode: screen;
}

@keyframes static-move {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(1px, -1px); }
  50% { transform: translate(-1px, 1px); }
  75% { transform: translate(1px, 1px); }
}

.vignette {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.7) 80%, rgba(255,0,0,0.1) 100%);
  pointer-events: none;
}
