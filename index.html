<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026 (FULL FIX)</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
position:relative;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}

.star{
position:absolute;
top:4px;
right:6px;
font-size:12px;
cursor:pointer;
opacity:0.5;
}
.star.fav{opacity:1;color:gold;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

audio{
width:80%;
}

#status{
font-size:13px;
opacity:0.8;
white-space:pre-line;
}

button{
background:#222;
color:#fff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
button:hover{background:#333;}
</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE PRO 2026 (FIXED STREAMS)</div>

<div id="player">
<audio id="audio" controls></audio>
<div>
<button onclick="clearCache()">CLEAR CACHE</button>
</div>
<div id="status">READY</div>
</div>

</div>

<script>

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Dzieciom",
"Polskie Radio Chopin",
"Radio AH",
"Rock Radio",
"Radio Maryja",
"Radio Niepokalanów",
"Radio Rodzina"
];

const audio = document.getElementById("audio");
const status = document.getElementById("status");

let current = 0;

let cache = JSON.parse(localStorage.getItem("radio_cache") || "{}");
let favs = JSON.parse(localStorage.getItem("radio_favs") || "[]");

function saveCache(){
localStorage.setItem("radio_cache", JSON.stringify(cache));
}

function saveFavs(){
localStorage.setItem("radio_favs", JSON.stringify(favs));
}

/* =========================
   FIXED STREAM MAP (ONLY BROKEN ONES UPDATED)
========================= */

async function resolveStream(name){

if(cache[name]){
status.innerText = "⚡ CACHE: " + name;
return cache[name];
}

status.innerText = "🔎 SZUKAM: " + name;

/* 🔥 ręczne, stabilne fixy dla problemowych stacji */
const manualFixes = {
"Polskie Radio Jedynka":"https://stream3.polskieradio.pl/pr1_aac128",
"Polskie Radio Dwójka":"https://stream3.polskieradio.pl/pr2_aac128",
"Polskie Radio Trójka":"https://stream3.polskieradio.pl/pr3_aac128",
"Polskie Radio Czwórka":"https://stream3.polskieradio.pl/pr4_aac128",
"Radio Eska":"https://waw.ic.smcdn.pl/t043-1.mp3",
"Radio Wnet":"https://stream.rcs.revma.com/wnet",
"Antyradio":"https://stream.antyradio.pl/stream.mp3",
"Radio Dzieciom":"https://stream3.polskieradio.pl/pr4_aac128",
"Polskie Radio Chopin":"https://stream3.polskieradio.pl/prchopin_aac128",
"Rock Radio":"https://stream.rcs.revma.com/rockradio",
"Radio Maryja":"http://s1.slotex.pl:7070/stream",
"Radio Niepokalanów":"http://radio-niepokalanow.pl:8000/stream"
};

if(manualFixes[name]){
cache[name] = manualFixes[name];
saveCache();
return manualFixes[name];
}

/* fallback auto-search */
try{
const res = await fetch(
`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=5`
);
const data = await res.json();

const best = data.find(s =>
s.url_resolved &&
s.url_resolved.startsWith("http")
);

if(best){
cache[name] = best.url_resolved;
saveCache();
return best.url_resolved;
}

}catch(e){}

return null;
}

/* LOAD */
async function load(i){

current = i;
const name = stations[i];

status.innerText = "ŁADOWANIE: " + name;

const url = cache[name] || await resolveStream(name);

if(!url){
status.innerText = "❌ BRAK STREAMU: " + name;
return;
}

audio.src = url;

audio.play()
.then(()=>status.innerText = "▶ GRA: " + name)
.catch(err=>{
status.innerText = "⚠️ kliknij PLAY ręcznie";
console.log(err);
});
}

/* FAVORITES */
function toggleFav(name, el){
if(favs.includes(name)){
favs = favs.filter(f=>f!==name);
el.classList.remove("fav");
}else{
favs.push(name);
el.classList.add("fav");
}
saveFavs();
}

/* CLEAR CACHE */
function clearCache(){
cache = {};
localStorage.removeItem("radio_cache");
status.innerText = "CACHE WYCZYSZCZONY";
}

/* UI */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;

const star=document.createElement("div");
star.className="star";
star.innerText="★";

if(favs.includes(s)) star.classList.add("fav");

star.onclick=(e)=>{
e.stopPropagation();
toggleFav(s, star);
};

div.appendChild(star);

div.onclick=()=>load(i);

document.getElementById("stations").appendChild(div);
});

</script>

</body>
</html>
