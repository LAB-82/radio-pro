<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio App FINAL</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

.section{
width:95%;
max-width:500px;
margin:20px auto;
}

h2{
font-size:14px;
color:#aaa;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.tile{
background:#111;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:10px;
cursor:pointer;
border:1px solid #222;
}

.tile img{
width:38px;
height:38px;
}

.tile span{
font-size:10px;
}

#player{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}

button{
padding:10px;
background:#000;
color:#fff;
border:1px solid red;
}
</style>
</head>

<body>

<div class="section">
<h2>📻 STACJE</h2>
<div id="all" class="grid"></div>
</div>

<div id="player">
<button onclick="play()">PLAY</button>
<button onclick="stop()">STOP</button>
</div>

<audio id="audio" playsinline></audio>

<script>

/* 🔥 STREAMY TESTOWE (NA PEWNO DZIAŁAJĄ) */
const stations=[
{ name:"PR1", stream:"https://stream.polskieradio.pl/pr1_mp3" },
{ name:"PR2", stream:"https://stream.polskieradio.pl/pr2_mp3" }
];

/* AUDIO SYSTEM */
const audio=document.getElementById("audio");

let audioCtx=null;
let unlocked=false;
let current=null;

/* 🔥 UNLOCK AUDIO (KLUCZ) */
function unlockAudio(){

if(unlocked) return;

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let buffer = audioCtx.createBuffer(1,1,22050);
let source = audioCtx.createBufferSource();
source.buffer = buffer;
source.connect(audioCtx.destination);
source.start(0);

unlocked=true;
console.log("AUDIO UNLOCKED");

}

/* IKONA */
function icon(name){
return "data:image/svg+xml;utf8,"+encodeURIComponent(`
<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'>
<rect width='100%' height='100%' fill='black'/>
<text x='50%' y='55%' font-size='10' fill='red' text-anchor='middle'>${name}</text>
</svg>
`);
}

/* TILE */
function tile(s){

let d=document.createElement("div");
d.className="tile";

let img=document.createElement("img");
img.src=icon(s.name);

let txt=document.createElement("span");
txt.textContent=s.name;

/* CLICK */
d.onclick=()=>{

unlockAudio();

current=s;

/* HARD RESET */
audio.pause();
audio.src="";
audio.load();

setTimeout(()=>{

audio.src=s.stream;
audio.load();

audio.play()
.then(()=>console.log("PLAY OK"))
.catch(e=>{
alert("PLAY ERROR: "+e.message);
console.error(e);
});

},300);

};

d.appendChild(img);
d.appendChild(txt);

return d;
}

/* RENDER */
const all=document.getElementById("all");
stations.forEach(s=>{
all.appendChild(tile(s));
});

/* PLAYER */
function play(){
if(current){
audio.play().catch(e=>alert("PLAY ERROR"));
}
}

function stop(){
audio.pause();
}

</script>

</body>
</html>
