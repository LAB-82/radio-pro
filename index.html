<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}
body.day{
background:#eaeaea;
color:#000;
}
#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}
#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}
canvas{
display:block;
height:260px;
border-radius:8px;
}
#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}
.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}
body.day .volumeWrapper{
background:#d6d6d6;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}
button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}
body.day button{
background:#d6d6d6;
color:#000;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}
#volume{
width:120px;
height:10px;
appearance:none;
border-radius:10px;
outline:none;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}
#volume.active{
box-shadow:0 0 10px #ff0000;
border:1px solid #ff0000;
}
#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red;
cursor:pointer;
}
#volume::-moz-range-thumb{
width:16px;
height:16px;
border:none;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red;
cursor:pointer;
}
.playActive{ color:#00ff00; text-shadow:0 0 10px #00ff00; }
