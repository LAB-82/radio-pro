<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polskie Radio Online</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    padding: 14px;
    text-align: center;
    font-size: 22px;
    background: #1a1a1a;
    font-weight: bold;
}

#stations {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 15px;
    padding-bottom: 90px;
}

.station {
    background: #1c1c1c;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    text-align: center;
    transition: 0.2s;
}

.station:hover {
    transform: scale(1.04);
    background: #2a2a2a;
}

.station img {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    margin-bottom: 8px;
}

#player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    padding: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid #333;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #ff3b3b;
    color: white;
    cursor: pointer;
}

#status {
    font-size: 14px;
    color: #aaa;
}
</style>
</head>

<body>

<header>📻 Polskie Radio Online</header>

<div id="stations"></div>

<div id="player">
    <div id="status">Kliknij stację aby uruchomić</div>
    <button onclick="stopRadio()">Stop</button>
</div>

<script>

// 📻 PROSTA LISTA (tylko działające / stabilne przez MyRadioOnline)
const stations = [
    {
        name: "Radio Nowy Świat",
        img: "https://upload.wikimedia.org/wikipedia/commons/6/6f/Radio_Nowy_%C5%9Awiat_logo.png",
        url: "https://myradioonline.pl/radio-nowy-swiat",
    },
    {
        name: "Radio 357",
        img: "https://upload.wikimedia.org/wikipedia/commons/2/2c/Radio_357_logo.png",
        url: "https://myradioonline.pl/radio-357",
    },
    {
        name: "TOK FM",
        img: "https://myradioonline.pl/images/tokfm.png",
        url: "https://myradioonline.pl/tok-fm",
    },
    {
        name: "Antyradio",
        img: "https://myradioonline.pl/images/antyradio.png",
        url: "https://myradioonline.pl/antyradio",
    },
    {
        name: ":contentReference[oaicite:1]{index=1}",
        img: "https://myradioonline.pl/images/muzyczneradio.png",
        url: "https://myradioonline.pl/muzyczne-radio"
    }
];

const stationsDiv = document.getElementById("stations");
const status = document.getElementById("status");

// 🔥 KLUCZ: otwieramy MyRadioOnline (działa zawsze)
function play(station) {
    status.textContent = "Otwieranie: " + station.name;

    // otwiera w tej samej karcie (stabilne działanie streamu)
    window.open(station.url, "_blank");

    status.textContent = "Odtwarzanie w MyRadioOnline: " + station.name;
}

function stopRadio() {
    status.textContent = "Zatrzymano (zamknij kartę radia)";
}

function render() {
    stationsDiv.innerHTML = "";

    stations.forEach(station => {
        const div = document.createElement("div");
        div.className = "station";

        div.innerHTML = `
            <img src="${station.img}" onerror="this.src='https://via.placeholder.com/60'">
            <div>${station.name}</div>
        `;

        div.onclick = () => play(station);

        stationsDiv.appendChild(div);
    });
}

render();

</script>

</body>
</html>
