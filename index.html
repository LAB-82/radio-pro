<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-red:#ff2a2a;
  --cp-bg:#000014;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(0, 240, 255,.05) 25%, rgba(0, 240, 255,.05) 26%, transparent 27%, transparent 74%, rgba(0, 240, 255,.05) 75%, rgba(0, 240, 255,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(255, 0, 60,.05) 25%, rgba(255, 0, 60,.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 60,.05) 75%, rgba(255, 0, 60,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  min-height:100vh;
  padding-bottom: 40px;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:var(--cp-cyan);
  text-shadow:
    0 0 5px var(--cp-cyan),
    0 0 10px var(--cp-cyan),
    0 0 20px var(--cp-cyan),
    0 0 40px var(--cp-magenta),
    0 0 80px var(--cp-magenta);
  animation: flicker 3s infinite alternate;
}

@keyframes flicker {
  0%, 18%, 22%, 25%, 53%, 57%, 100% {
    text-shadow:
      0 0 5px var(--cp-cyan),
      0 0 10px var(--cp-cyan),
      0 0 20px var(--cp-cyan),
      0 0 40px var(--cp-magenta),
      0 0 80px var(--cp-magenta);
    opacity: 1;
  }
  20%, 24%, 55% {
    text-shadow: none;
    opacity: 0.8;
  }
}

#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
  width: 600px;
  height: 260px;
  display: block;
  box-sizing: border-box;
  position: relative;
  background: #000014;
  box-shadow: 0 0 10px var(--cp-cyan), 0 0 20px var(--cp-magenta), inset 0 0 20px rgba(0,240,255,0.2);
}

#proEqualizer::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border: 2px solid var(--cp-cyan);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  pointer-events: none;
  z-index: 0;
}

canvas{
  width:100%;
  height:100%;
  display:block;
  position: relative;
  z-index: 1;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
  align-items: center;
}

.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a1a;
  position: relative;
  box-sizing: border-box;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.3);
}

.volumeWrapper::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border: 2px solid var(--cp-cyan);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  pointer-events: none;
  z-index: 0;
}

button{
  width:160px;
  height:45px;
  background:#0a0a1a;
  color:var(--cp-cyan);
  cursor:pointer;
  font-family:'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.2);
  transition: all 0.15s ease;
  box-sizing: border-box;
  position: relative;
  border: none;
  z-index: 1;
}

button::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border: 2px solid var(--cp-cyan);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  pointer-events: none;
  z-index: 0;
}

button:hover{
  background:var(--cp-cyan);
  color:#000014;
  box-shadow: 0 0 15px var(--cp-cyan), 0 0 30px var(--cp-magenta);
  transform: translateY(-1px);
}

button:active{
  transform: translateY(1px);
  box-shadow: 0 0 5px var(--cp-cyan);
}

#volume{
  width:120px;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #0a0a1a;
  border: 1px solid var(--cp-cyan);
  outline: none;
  margin: 0;
  position: relative;
  z-index: 2;
}

#volume::-webkit-slider-thumb{
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  background: var(--cp-yellow);
  cursor: pointer;
  border: 2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
  border-radius: 2px;
  margin-top: -7px;
}

#volume::-moz-range-thumb{
  width: 16px;
  height: 16px;
  background: var(--cp-yellow);
  cursor: pointer;
  border: 2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
  border-radius: 2px;
}

#volume::-webkit-slider-runnable-track{
  background: linear-gradient(90deg, var(--cp-magenta), var(--cp-cyan));
  height: 4px;
}

#volume::-moz-range-track{
  background: linear-gradient(90deg, var(--cp-magenta), var(--cp-cyan));
  height: 4px;
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<div id="proEqualizer">
  <canvas id="eqCanvas"></canvas>
</div>

<div id="controls">
  <button>PLAY</button>
  <button>STOP</button>
  <button>MUTE</button>

  <div class="volumeWrapper">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<script>
// ================= STREAM (ORYGINAŁ) =================
const audio = new Audio("https://stream.rcs.revma.com/gzwc1xcq042vv");
audio.crossOrigin = "anonymous";

// ================= AUDIO ENGINE =================
let ctx, analyser, src, data, bufferLen;

const canvas = document.getElementById("eqCanvas");
const c = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= INIT =================
function init(){
  if(!ctx){
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;

    // stabilne, naturalne audio
    analyser.smoothingTimeConstant = 0.82;

    bufferLen = analyser.frequencyBinCount;
    data = new Uint8Array(bufferLen);

    src = ctx.createMediaElementSource(audio);
    src.connect(analyser);
    analyser.connect(ctx.destination);
  }

  if(ctx.state === "suspended"){
    ctx.resume();
  }
}

// ================= CONTROLS (BEZ ZMIAN LOGIKI) =================
const btns = document.querySelectorAll("button");

btns[0].onclick = () => { init(); audio.play(); };
btns[1].onclick = () => { audio.pause(); audio.currentTime = 0; };
btns[2].onclick = () => { audio.muted =!audio.muted; };

document.getElementById("volume").oninput = e => {
  audio.volume = e.target.value;
};

// ================= EQ (FIX: CLAMP + BEZ WYSKAKIWANIA) =================
function draw(){
  requestAnimationFrame(draw);

  if(!analyser) return;

  analyser.getByteFrequencyData(data);

  c.clearRect(0,0,canvas.width,canvas.height);

  const barW = (canvas.width / bufferLen) * 1.8;
  let x = 0;

  for(let i=0;i<bufferLen;i++){

    let v = data[i];

    // 🔧 FIX KLUCZOWY: brak „wystrzału poza ramkę”
    const normalized = v / 255;
    const h = Math.min(canvas.height, normalized * canvas.height * 0.92);

    const grad = c.createLinearGradient(0,canvas.height,0,canvas.height-h);
    grad.addColorStop(0,"#ff003c");
    grad.addColorStop(0.5,"#fcee09");
    grad.addColorStop(1,"#00f0ff");

    c.fillStyle = grad;

    c.fillRect(
      x,
      canvas.height - h,
      barW,
      h
    );

    x += barW + 2;
  }
}

draw();
</script>

</body>
</html>
