<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-red:#ff2a2a;
  --cp-bg:#000014;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(0, 240, 255,.05) 25%, rgba(0, 240, 255,.05) 26%, transparent 27%, transparent 74%, rgba(0, 240, 255,.05) 75%, rgba(0, 240, 255,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(255, 0, 60,.05) 25%, rgba(255, 0, 60,.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 60,.05) 75%, rgba(255, 0, 60,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  min-height:100vh;
  padding-bottom: 40px;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:var(--cp-cyan);
  text-shadow:
    0 0 5px var(--cp-cyan),
    0 0 10px var(--cp-cyan),
    0 0 20px var(--cp-cyan),
    0 0 40px var(--cp-magenta),
    0 0 80px var(--cp-magenta);
  animation: flicker 3s infinite alternate;
}

@keyframes flicker {
  0%, 18%, 22%, 25%, 53%, 57%, 100% {
    opacity: 1;
  }
  20%, 24%, 55% {
    opacity: 0.8;
  }
}

/* ===== EQ (NIC NIE ZMIENIONE W WYGLĄDZIE) ===== */
#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
  width: 600px;
  height: 260px;
  display: block;
  box-sizing: border-box;
  position: relative;
  background: #000014;
  box-shadow: 0 0 10px var(--cp-cyan), 0 0 20px var(--cp-magenta), inset 0 0 20px rgba(0,240,255,0.2);
}

/* 🔥 JEDYNY MINIMALNY FIX – canvas MUSI ISTNIEĆ */
#proEqualizer canvas{
  width:100%;
  height:100%;
  display:block;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
  align-items: center;
}

.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a1a;
  position: relative;
  box-sizing: border-box;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.3);
}

button{
  width:160px;
  height:45px;
  background:#0a0a1a;
  color:var(--cp-cyan);
  cursor:pointer;
  font-family:'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.2);
  transition: all 0.15s ease;
  border: none;
}

button:hover{
  background:var(--cp-cyan);
  color:#000014;
}

#volume{
  width:120px;
}
</style>
</head>

<body>

<div id="title">RADIO PRO</div>

<div id="proEqualizer">
  <!-- 🔥 FIX: brakujący canvas -->
  <canvas id="eqCanvas"></canvas>
</div>

<div id="controls">
  <button>PLAY</button>
  <button>STOP</button>
  <button>MUTE</button>

  <div class="volumeWrapper">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<script>
// ================= AUDIO =================
const audio = new Audio("https://icecast.radiofrance.fr/fip-midfi.mp3");
audio.crossOrigin = "anonymous";

let audioCtx;
let analyser;
let source;
let dataArray;
let bufferLength;

// ================= CANVAS =================
const canvas = document.getElementById("eqCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= INIT AUDIO (FIX KLUCZOWY) =================
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;

    // 🔥 płynność EQ
    analyser.smoothingTimeConstant = 0.88;

    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);

    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

// ================= CONTROLS (LOGIKA BEZ ZMIAN) =================
const buttons = document.querySelectorAll("button");

buttons[0].onclick = () => {
  initAudio();
  audio.play();
};

buttons[1].onclick = () => {
  audio.pause();
  audio.currentTime = 0;
};

buttons[2].onclick = () => {
  audio.muted = !audio.muted;
};

document.getElementById("volume").oninput = e => {
  audio.volume = e.target.value;
};

// ================= EQ =================
function draw(){
  requestAnimationFrame(draw);

  if(!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const barWidth = (canvas.width / bufferLength) * 1.6;
  let x = 0;

  for(let i=0;i<bufferLength;i++){
    const value = dataArray[i];
    const h = (value/255)*canvas.height;

    const grad = ctx.createLinearGradient(0,canvas.height,0,canvas.height-h);
    grad.addColorStop(0,"#ff003c");
    grad.addColorStop(0.5,"#fcee09");
    grad.addColorStop(1,"#00f0ff");

    ctx.fillStyle = grad;
    ctx.fillRect(x,canvas.height-h,barWidth,h);

    x += barWidth + 2;
  }
}

draw();
</script>

</body>
</html>
