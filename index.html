<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-red:#ff2a2a;
  --cp-bg:#000014;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(0, 240, 255,.05) 25%, rgba(0, 240, 255,.05) 26%, transparent 27%, transparent 74%, rgba(0, 240, 255,.05) 75%, rgba(0, 240, 255,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(255, 0, 60,.05) 25%, rgba(255, 0, 60,.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 60,.05) 75%, rgba(255, 0, 60,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  color:var(--cp-cyan);
  text-shadow:
    0 0 5px var(--cp-cyan),
    0 0 10px var(--cp-cyan),
    0 0 20px var(--cp-cyan),
    0 0 40px var(--cp-magenta);
}

#proEqualizer{
  margin-top:30px;
  width:600px;
  height:260px;
  position:relative;
  background:#000014;
  box-shadow:0 0 10px var(--cp-cyan), 0 0 20px var(--cp-magenta), inset 0 0 20px rgba(0,240,255,0.2);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
}

button{
  width:160px;
  height:45px;
  background:#0a0a1a;
  color:var(--cp-cyan);
  font-family:'Orbitron', sans-serif;
  border:none;
  cursor:pointer;
}

.volumeWrapper{
  display:flex;
  align-items:center;
}

#volume{
  width:120px;
}
</style>
</head>

<body>

<div id="title">RADIO PRO</div>

<div id="proEqualizer">
  <canvas id="eqCanvas"></canvas>
</div>

<div id="controls">
  <button>PLAY</button>
  <button>STOP</button>
  <button>MUTE</button>

  <div class="volumeWrapper">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<script>
// ================= STREAM (POPRAWNY) =================
const audio = new Audio("https://stream.rcs.revma.com/gzwc1xcq042vv");
audio.crossOrigin = "anonymous";
audio.preload = "none";

// ================= AUDIO ENGINE =================
let ctx, analyser, src, data, bufferLen;

const canvas = document.getElementById("eqCanvas");
const c = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= INIT AUDIO =================
function init(){
  if(!ctx){
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = ctx.createAnalyser();

    // 🔥 REAL MUSIC RESPONSE SETTINGS
    analyser.fftSize = 512;                 // lepsza rozdzielczość basu
    analyser.smoothingTimeConstant = 0.78;  // naturalna dynamika

    bufferLen = analyser.frequencyBinCount;
    data = new Uint8Array(bufferLen);

    src = ctx.createMediaElementSource(audio);
    src.connect(analyser);
    analyser.connect(ctx.destination);
  }

  if(ctx.state === "suspended"){
    ctx.resume();
  }
}

// ================= CONTROLS =================
const btns = document.querySelectorAll("button");

btns[0].onclick = async () => {
  init();
  await audio.play();
};

btns[1].onclick = () => {
  audio.pause();
  audio.currentTime = 0;
};

btns[2].onclick = () => {
  audio.muted = !audio.muted;
};

document.getElementById("volume").oninput = e => {
  audio.volume = e.target.value;
};

// ================= EQ (REAL MUSIC FEEL) =================
function draw(){
  requestAnimationFrame(draw);

  if(!analyser) return;

  analyser.getByteFrequencyData(data);

  c.clearRect(0,0,canvas.width,canvas.height);

  const barW = (canvas.width / bufferLen) * 2.2;
  let x = 0;

  for(let i=0;i<bufferLen;i++){

    // 🔥 psychoakustyka (podbicie basu + mid presence)
    let v = data[i];

    if(i < 10) v *= 1.6;       // bass boost
    else if(i < 40) v *= 1.2;  // mid boost

    const h = (v/255) * canvas.height;

    const grad = c.createLinearGradient(0,canvas.height,0,canvas.height-h);
    grad.addColorStop(0,"#ff003c");
    grad.addColorStop(0.5,"#fcee09");
    grad.addColorStop(1,"#00f0ff");

    c.fillStyle = grad;
    c.fillRect(x, canvas.height - h, barW, h);

    x += barW + 2;
  }
}

draw();
</script>

</body>
</html>
