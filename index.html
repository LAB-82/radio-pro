<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NO FAIL ENGINE v2</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.station:hover { background:#222; }

.station.active{
    background:#2a2a2a;
    color:#00ff90;
    font-weight:bold;
}

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#radioPlayer{
    width:90%;
    height:90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

#logoBox img{
    width:220px;
    margin-bottom:20px;
    border-radius:10px;
    background:#222;
}

#bigPlay{
    font-size:70px;
    cursor:pointer;
    user-select:none;
}

#bottomBar{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 18px;
    border-radius:30px;
    display:flex;
    gap:18px;
}

#controls {
    height:70px;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.btn { cursor:pointer; font-size:20px; }
</style>

</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🔥 NO FAIL ENGINE v2</div>

<div id="playerBox">
    <div id="radioPlayer">

        <div id="logoBox">
            <img id="stationLogo">
        </div>

        <div id="bigPlay" onclick="toggle()">▶</div>

        <div id="bottomBar">
            <div onclick="prev()">⏮</div>
            <div onclick="toggle()" id="playIcon">▶</div>
            <div onclick="next()">⏭</div>
            <div onclick="mute()">🔊</div>
        </div>

    </div>
</div>

<div id="controls">
    <div class="btn" onclick="prev()">⏮</div>
    <div class="btn" onclick="toggle()">⏯</div>
    <div class="btn" onclick="next()">⏭</div>
    <div class="btn" onclick="mute()">🔊</div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   STATIONS
========================= */

const stations = [
"Muzyczne Radio",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Tok FM",
"Antyradio",
"Polskie Radio Jedynka",
"Polskie Radio Trójka",
"Radio Wrocław",
"Radio Wnet"
];

/* =========================
   CDN CACHE (LOCAL STORAGE)
========================= */

let cache = JSON.parse(localStorage.getItem("radio_cache") || "{}");

function saveCache(){
    localStorage.setItem("radio_cache", JSON.stringify(cache));
}

/* =========================
   MULTI SOURCE (SCRAPING BASE)
========================= */

const baseSources = {
"RMF FM":[
"https://rs6-krk2-cyfronet.rmfstream.pl/RMFFM48"
],
"Radio Zet":[
"https://zt.cdn.eurozet.pl/ZET010.mp3"
],
"Radio Eska":[
"https://waw01-01.ic.smcdn.pl/t043-1.mp3"
],
"Antyradio":[
"https://stream.antyradio.pl/stream.mp3"
],
"Tok FM":[
"https://radiostream.pl/tuba10-1.mp3"
],
"Polskie Radio Jedynka":[
"https://stream.polskieradio.pl/program1.mp3"
],
"Polskie Radio Trójka":[
"https://stream3.polskieradio.pl/pr3_aac128"
],
"Radio Wrocław":[
"https://stream4.nadaje.com/radiowroclaw"
],
"Radio Wnet":[
"https://stream.rcs.revma.com/wnet"
],
"Muzyczne Radio":[
"https://stream.rcs.revma.com/gzwc1xcq042vv"
]
};

/* =========================
   LIVE HEALTH CHECK
========================= */

async function healthCheck(url){

    return new Promise((resolve)=>{

        const test = new Audio();
        test.src = url;
        test.preload = "metadata";

        let done = false;

        const timeout = setTimeout(()=>{
            if(!done) resolve(false);
        }, 1500);

        test.oncanplay = () => {
            done = true;
            clearTimeout(timeout);
            resolve(true);
        };

        test.onerror = () => {
            done = true;
            clearTimeout(timeout);
            resolve(false);
        };
    });
}

/* =========================
   RESOLVER (SMART + CACHE + SCRAPE)
========================= */

async function resolveStream(name){

    // 1. cache first
    if(cache[name]){
        return cache[name];
    }

    // 2. known sources
    let list = baseSources[name];

    // 3. fallback scraping (Radio Browser)
    if(!list){
        try{
            const res = await fetch(
                `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?limit=5`
            );
            const data = await res.json();

            list = data.map(s => s.url_resolved).filter(Boolean);
        }catch(e){
            return null;
        }
    }

    if(!list || list.length === 0) return null;

    // 4. health check loop
    for(let url of list){

        let ok = await healthCheck(url);

        if(ok){
            cache[name] = url;
            saveCache();
            return url;
        }
    }

    return null;
}

/* ========================= */

function setLogo(name){
    document.getElementById("stationLogo").src =
    "https://via.placeholder.com/220x120?text=" + encodeURIComponent(name);
}

function setActiveUI(){
    document.querySelectorAll(".station").forEach((el,i)=>{
        el.classList.toggle("active", i === index);
    });
}

/* ========================= */

let index = 0;
let playing = false;

const audio = document.getElementById("audio");
const sidebar = document.getElementById("sidebar");

async function load(i){

    index = i;
    const name = stations[i];

    setLogo(name);

    let url = await resolveStream(name);

    if(!url){
        url = "https://stream.rcs.revma.com/gzwc1xcq042vv";
    }

    audio.src = url;

    if(playing){
        audio.play().catch(()=>{});
    }

    setUI();
    setActiveUI();
}

/* ========================= */

function toggle(){

    if(!audio.src) load(index);

    if(playing){
        audio.pause();
        playing = false;
    }else{
        audio.play().catch(()=>{});
        playing = true;
    }

    setUI();
}

function setUI(){
    document.getElementById("bigPlay").innerText = playing ? "⏸" : "▶";
    document.getElementById("playIcon").innerText = playing ? "⏸" : "▶";
}

function prev(){
    index = (index - 1 + stations.length) % stations.length;
    load(index);
}

function next(){
    index = (index + 1) % stations.length;
    load(index);
}

function mute(){
    audio.muted = !audio.muted;
}

/* =========================
   UI BUILD
========================= */

stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerText = s;
    div.onclick = () => load(i);
    sidebar.appendChild(div);
});

/* INIT */
load(0);

</script>

</body>
</html>
