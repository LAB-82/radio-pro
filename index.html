<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio App</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

/* SEKCJE */
.section{
width:95%;
max-width:500px;
margin:20px auto;
}

h2{
font-size:14px;
color:#aaa;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

/* TILE */
.tile{
background:#111;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:10px;
cursor:pointer;
border:1px solid #222;
}

.tile.active{
border:1px solid red;
}

/* IKONA 1cm */
.tile img{
width:38px;
height:38px;
object-fit:contain;
margin-bottom:5px;
}

/* TEXT fallback */
.tile span{
font-size:10px;
text-align:center;
}

/* HEART */
.heart{
font-size:12px;
margin-top:4px;
opacity:0.5;
}

.heart.active{
color:red;
opacity:1;
}

/* PLAYER */
#player{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}

button{
padding:10px;
background:#000;
color:#fff;
border:1px solid red;
}
</style>
</head>

<body>

<div class="section">
<h2>⭐ ULUBIONE</h2>
<div id="fav" class="grid"></div>
</div>

<div class="section">
<h2>📻 STACJE</h2>
<div id="all" class="grid"></div>
</div>

<div id="player">
<button onclick="play()">PLAY</button>
<button onclick="stop()">STOP</button>
</div>

<audio id="audio"></audio>

<script>

/* 🔥 TYLKO PEWNE STREAMY */
const stations=[

{ id:1,name:"PR1",stream:"https://stream.polskieradio.pl/pr1_mp3" },
{ id:2,name:"PR2",stream:"https://stream.polskieradio.pl/pr2_mp3" },
{ id:3,name:"PR3",stream:"https://stream.polskieradio.pl/pr3_mp3" },
{ id:4,name:"PR4",stream:"https://stream.polskieradio.pl/pr4_mp3" },

{ id:5,name:"BBC1",stream:"https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one" },
{ id:6,name:"BBC1X",stream:"https://stream.live.vc.bbcmedia.co.uk/bbc_1xtra" },

{ id:7,name:"SLAM",stream:"https://stream.slam.nl/slam_mp3" },

{ id:8,name:"1FM",stream:"https://strm112.1.fm/club_mobile_mp3" }

];

/* IKONY LOKALNE (PEWNE) */
function getIcon(name){
return "data:image/svg+xml;utf8," + encodeURIComponent(`
<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'>
<rect width='100%' height='100%' fill='black'/>
<text x='50%' y='55%' font-size='10' fill='red' text-anchor='middle'>${name}</text>
</svg>
`);
}

/* SYSTEM */
const audio=document.getElementById("audio");
let current=null;
let fav=JSON.parse(localStorage.getItem("fav"))||[];

/* TILE */
function tile(s){

let d=document.createElement("div");
d.className="tile";

let img=document.createElement("img");
img.src=getIcon(s.name);

let txt=document.createElement("span");
txt.textContent=s.name;

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

if(fav.includes(s.id)) heart.classList.add("active");

/* PLAY */
d.onclick=()=>{
current=s;
audio.src=s.stream;
audio.play().catch(e=>alert("Błąd audio"));

document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
d.classList.add("active");
};

/* FAVORITE */
heart.onclick=(e)=>{
e.stopPropagation();

if(fav.includes(s.id)){
fav=fav.filter(i=>i!==s.id);
}else{
if(fav.length>=6) return alert("Max 6");
fav.push(s.id);
}

localStorage.setItem("fav",JSON.stringify(fav));
render();
};

d.appendChild(img);
d.appendChild(txt);
d.appendChild(heart);

return d;
}

/* RENDER */
function render(){

let favDiv=document.getElementById("fav");
let allDiv=document.getElementById("all");

favDiv.innerHTML="";
allDiv.innerHTML="";

stations.forEach(s=>{
if(fav.includes(s.id)) favDiv.appendChild(tile(s));
allDiv.appendChild(tile(s));
});
}

render();

/* PLAYER */
function play(){ if(current) audio.play(); }
function stop(){ audio.pause(); }

</script>

</body>
</html>
