<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>LOTTO AI SINGULARITY MODE</title>

<style>
*{box-sizing:border-box;}
html,body{
 margin:0;height:100%;
 background:#ffd800;
 font-family:Arial,Helvetica,sans-serif;
 display:flex;justify-content:center;align-items:flex-start;
 overflow:hidden;
}
#app{
 width:1200px;height:800px;
 display:flex;flex-direction:column;padding-top:10px;
}

/* ===== HEADER JAK NA SCREENIE ===== */
header{
 height:120px;
 margin:0 10px 5px 10px;
 border-radius:12px;
 overflow:hidden;
 padding:0;
 display:block;
}

/* obraz jako prawdziwy element */
header img{
 width:100%;
 height:100%;
 object-fit:cover;
 display:block;
}

.panel{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;}
.game{
 height:62px;background:linear-gradient(#ffe95e,#f2d43c);
 border-radius:12px;padding:6px 12px;
 display:flex;align-items:center;gap:10px;
}
.title{
 display:flex;align-items:center;gap:8px;
 font-size:16px;font-weight:bold;min-width:320px;color:#003a8f;
}
.icon{font-size:18px;}
.icon.lotto{color:#0b6cd4;}
.icon.mini{color:#c8a200;}
.icon.multi{color:#6a1b9a;}
.icon.keno{color:#ff9800;}
.icon.pensja{color:#2e7d32;}
.icon.euro{color:#d4af37;}
.icon.szybkie{color:#ff7043;}

select{
 margin-left:6px;padding:3px 6px;
 border-radius:5px;border:1px solid #003c8f;
 font-weight:bold;font-size:14px;background:white;
}

.balls{
 flex:1;height:40px;display:flex;flex-wrap:wrap;gap:5px;overflow:hidden;
}

.ball{
 width:32px;height:32px;border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 font-weight:bold;color:white;font-size:13px;
 box-shadow:
  inset 0 3px 6px rgba(255,255,255,0.4),
  inset 0 -3px 6px rgba(0,0,0,0.4),
  0 2px 4px rgba(0,0,0,0.3);
}

.ball.lotto{background:radial-gradient(circle at 30% 30%, #6bd0ff, #0b6cd4 60%, #003a8f);}
.ball.mini{background:radial-gradient(circle at 30% 30%, #fff176, #fbc02d 60%, #8d6e00);}
.ball.multi{background:radial-gradient(circle at 30% 30%, #ba68c8, #6a1b9a 60%, #2e003e);}
.ball.keno{background:radial-gradient(circle at 30% 30%, #ffcc80, #ff9800 60%, #6d3b00);}
.ball.pensja{background:radial-gradient(circle at 30% 30%, #a5d6a7, #2e7d32 60%, #1b5e20);}
.ball.euro{background:radial-gradient(circle at 30% 30%, #fff8c4, #d4af37 60%, #6b5500);}
.ball.szybkie{background:radial-gradient(circle at 30% 30%, #ffab91, #ff7043 60%, #bf360c);}

.extra{filter:brightness(1.1);color:black;}

button{
 background:#003c8f;color:white;border:none;
 padding:5px 10px;border-radius:6px;
 cursor:pointer;font-weight:bold;font-size:13px;
}
</style>
</head>

<body>

<div id="app">

<header>
 <img src="header.png">
</header>

<div class="panel">
