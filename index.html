<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio App</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

.section{
width:95%;
max-width:500px;
margin:20px auto;
}

h2{
font-size:14px;
color:#aaa;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

/* TILE */
.tile{
background:#111;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:10px;
cursor:pointer;
border:1px solid #222;
transition:0.2s;
}

.tile:active{
transform:scale(0.95);
border:1px solid red;
}

/* IKONA 1cm */
.tile img{
width:38px;
height:38px;
margin-bottom:5px;
}

/* TEXT */
.tile span{
font-size:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="section">
<h2>📻 STACJE RADIOWE</h2>
<div id="grid" class="grid"></div>
</div>

<script>

/* 🔥 DZIAŁAJĄCE STRONY */
const stations=[

{ name:"Muzyczne", url:"https://www.muzyczneradio.pl" },
{ name:"PR1", url:"https://jedynka.polskieradio.pl" },
{ name:"PR2", url:"https://dwojka.polskieradio.pl" },
{ name:"PR3", url:"https://trojka.polskieradio.pl" },
{ name:"PR4", url:"https://czworka.polskieradio.pl" },

{ name:"TokFM", url:"https://www.tokfm.pl" },
{ name:"Antyradio", url:"https://www.antyradio.pl" },

{ name:"Wrocław", url:"https://www.radiowroclaw.pl" },
{ name:"RDC", url:"https://www.rdc.pl" },

{ name:"BBC1", url:"https://www.bbc.co.uk/sounds/play/live:bbc_radio_one" },
{ name:"BBC1X", url:"https://www.bbc.co.uk/sounds/play/live:bbc_1xtra" },

{ name:"SLAM", url:"https://www.slam.nl" },

{ name:"Ibiza", url:"https://ibizaglobalradio.com" },
{ name:"Sonica", url:"https://ibizasonica.com" },

{ name:"1FM", url:"https://www.1.fm/station/club" }

];

/* IKONA SVG (ZAWSZE DZIAŁA) */
function icon(name){
return "data:image/svg+xml;utf8," + encodeURIComponent(`
<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'>
<rect width='100%' height='100%' fill='black'/>
<text x='50%' y='55%' font-size='10' fill='red' text-anchor='middle'>${name}</text>
</svg>
`);
}

/* RENDER */
const grid=document.getElementById("grid");

stations.forEach(s=>{

let div=document.createElement("div");
div.className="tile";

let img=document.createElement("img");
img.src=icon(s.name);

let txt=document.createElement("span");
txt.textContent=s.name;

/* 🔥 OTWARCIE STRONY */
div.onclick=()=>{
window.open(s.url,"_blank");
};

div.appendChild(img);
div.appendChild(txt);
grid.appendChild(div);

});
</script>

</body>
</html>
