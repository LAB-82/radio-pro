<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:"Orbitron",sans-serif;
color:#ff2a2a;
}

/* ================= ARASAKA BACKGROUND (subtelny, nie chaos) ================= */
body{
background:
radial-gradient(circle at center, #0b0000 0%, #000 60%, #000 100%),
repeating-linear-gradient(
90deg,
rgba(255,0,0,0.03),
rgba(255,0,0,0.03) 1px,
transparent 1px,
transparent 8px
);
}

/* ================= TITLE (NIE PRZESUNIĘTE) ================= */
#title{
font-size:78px;
margin-top:35px;
text-align:center;
letter-spacing:8px;
color:#ff2a2a;
text-shadow:0 0 12px #ff0000;
}

/* ================= CANVAS FIX (KLUCZOWE – BRAK ROZJEŻDŻANIA) ================= */
#proEqualizer{
display:block;
margin:20px auto;
width:90vw;
max-width:1000px;
height:260px;

border:1px solid rgba(255,0,0,0.25);
border-radius:8px;

box-shadow:0 0 20px #ff0000;
background:rgba(0,0,0,0.3);
}

canvas{
display:block;
width:100%;
height:260px;
}

/* ================= CONTROLS (UKŁAD BEZ ZMIAN) ================= */
#controls{
display:flex;
gap:10px;
justify-content:center;
align-items:center;
flex-wrap:wrap;
margin-top:15px;
}

/* ================= BUTTONS (ARASAKA CLEAN STYLE) ================= */
button{
width:150px;
height:44px;

background:#0a0000;
color:#ff2a2a;

border:1px solid #ff2a2a;

font-family:"Orbitron",sans-serif;
letter-spacing:2px;

box-shadow:0 0 12px #ff0000;

cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ff0000;
}

/* ================= VOLUME (STABILNY) ================= */
.volumeWrapper{
width:150px;
height:44px;
display:flex;
align-items:center;
justify-content:center;

background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 12px #ff0000;
}

#volume{
width:120px;
height:6px;
appearance:none;
background:#000;
border:1px solid #ff2a2a;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:14px;
height:14px;
background:#ff2a2a;
box-shadow:0 0 10px #ff0000;
cursor:pointer;
}

/* ================= MODE ================= */
#modeBtn{
width:60px;
height:44px;
background:#000;
border:1px solid #ff2a2a;
color:#ff2a2a;
box-shadow:0 0 10px #ff0000;
}

/* ================= STATUS ================= */
.playActive{ text-shadow:0 0 15px #ff0000; }
.stopActive{ text-shadow:0 0 15px #aa0000; }
.muteActive{ text-shadow:0 0 15px orange; }

/* ================= MOBILE ================= */
@media (max-width: 768px){

#title{
font-size:38px;
letter-spacing:4px;
}

#proEqualizer{
height:180px;
width:95vw;
}

button, .volumeWrapper{
width:130px;
height:40px;
}

}

/* ================= FIX KLUCZOWY: BRAK ROZJEŻDŻANIA EQ ================= */
canvas{
image-rendering: crisp-edges;
}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">

<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn">🌙</button>

</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>

const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

let audio=document.getElementById("audio");
let volume=document.getElementById("volume");
let canvas=document.getElementById("proEqualizer");
let ctx=canvas.getContext("2d");

let playBtn=document.getElementById("playBtn");
let stopBtn=document.getElementById("stopBtn");
let muteBtn=document.getElementById("muteBtn");

audio.volume=volume.value;

let audioCtx, analyser, source, dataArray;
let animationStarted=false;

/* ================= AUDIO ================= */
function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

/* ================= PLAY ================= */
function playRadio(){
setupAudio();

if(audioCtx.state==="suspended") audioCtx.resume();

audio.src=STREAM_URL;
audio.play();

playBtn.classList.add("playActive");
stopBtn.classList.remove("stopActive");

if(!animationStarted){
animationStarted=true;
draw();
}
}

/* ================= STOP ================= */
function stopRadio(){
audio.pause();
stopBtn.classList.add("stopActive");
playBtn.classList.remove("playActive");

setTimeout(()=>stopBtn.classList.remove("stopActive"),800);
}

/* ================= MUTE ================= */
function muteRadio(){
audio.muted=!audio.muted;
muteBtn.classList.toggle("muteActive");
}

/* ================= VOLUME ================= */
volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

/* ================= FIXED EQ (NIE ROZJEŻDŻA SIĘ) ================= */
function draw(){
requestAnimationFrame(draw);

if(!analyser||!dataArray) return;

analyser.getByteFrequencyData(dataArray);

let w=canvas.width=canvas.offsetWidth;
let h=canvas.height=canvas.offsetHeight;

ctx.clearRect(0,0,w,h);

/* STABILNA SIATKA ARASAKA */
let bars=70;
let barWidth=w/bars;

for(let i=0;i<bars;i++){

let v=dataArray[i]||0;
let bh=(v/255)*h;

ctx.fillStyle="#ff2a2a";
ctx.fillRect(i*barWidth,h-bh,barWidth*0.6,bh);
}
}

</script>

</body>
</html>
