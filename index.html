<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  background:#111;
  color:#fff;
  overflow:hidden;
}
body{
  background:linear-gradient(180deg,#1c1c1c 0%,#101010 100%);
}

#app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,#2a2a2a 0%,#181818 100%);
}

#topbar{
  height:60px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 14px;
  background:#2b2b2b;
  border-bottom:1px solid rgba(255,255,255,.08);
}

#menu-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:#ddd;
  user-select:none;
}

#title{
  flex:1;
  font-size:20px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#clock{
  min-width:70px;
  text-align:center;
  font-family:monospace;
  font-size:15px;
  opacity:.9;
}

#content{
  flex:1;
  min-height:0;
  overflow:auto;
  padding:10px 10px 104px;
}

.group{
  margin-bottom:16px;
}

.group-title{
  font-size:14px;
  font-weight:700;
  letter-spacing:.4px;
  color:#d0d0d0;
  margin:0 0 8px 2px;
  text-transform:uppercase;
}

.stations-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:10px;
}

.station{
  min-height:110px;
  background:#f5f5f5;
  border-radius:12px;
  overflow:hidden;
  border:2px solid transparent;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px;
  transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
}

.station:hover{transform:translateY(-1px)}
.station.active{
  border-color:#28a7d8;
  box-shadow:0 0 0 2px rgba(40,167,216,.18);
}

.station img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.station .label{
  text-align:center;
  font-size:12px;
  line-height:1.08;
  color:#111;
  padding:4px;
}

#status{
  position:absolute;
  left:12px;
  bottom:112px;
  font-size:12px;
  opacity:.75;
  pointer-events:none;
}

#playerbar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:98px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  background:#171717;
  border-top:1px solid rgba(255,255,255,.08);
}

#playbtn{
  width:58px;
  height:58px;
  border:none;
  border-radius:50%;
  background:linear-gradient(180deg,#f7f7f7,#cfcfcf);
  color:#222;
  font-size:24px;
  cursor:pointer;
  flex:0 0 auto;
}

#soundbtn{
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:#2e2e2e;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  flex:0 0 auto;
}

#seek{
  flex:1;
  height:8px;
  appearance:none;
  background:linear-gradient(90deg,#33aee4 0%,#33aee4 var(--p,50%),#4c4c4c var(--p,50%),#4c4c4c 100%);
  border-radius:999px;
  outline:none;
}
#seek::-webkit-slider-thumb{
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#33aee4;
  border:3px solid #2b90b6;
  cursor:pointer;
}
#seek::-moz-range-thumb{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#33aee4;
  border:3px solid #2b90b6;
  cursor:pointer;
}

#vol-wrap{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:120px;
  flex:0 0 auto;
}
#vol{
  width:70px;
  height:6px;
  appearance:none;
  background:linear-gradient(90deg,#33aee4 0%,#33aee4 var(--v,85%),#3d3d3d var(--v,85%),#3d3d3d 100%);
  border-radius:999px;
  outline:none;
}
#vol::-webkit-slider-thumb{
  appearance:none;
  width:16px;
  height:16px;
  border-radius:50%;
  background:#33aee4;
  border:3px solid #2b90b6;
  cursor:pointer;
}
#vol::-moz-range-thumb{
  width:16px;
  height:16px;
  border-radius:50%;
  background:#33aee4;
  border:3px solid #2b90b6;
  cursor:pointer;
}

@media (max-width: 900px){
  .stations-grid{grid-template-columns:repeat(auto-fit,minmax(95px,1fr))}
}
@media (max-width: 640px){
  #title{font-size:15px}
  .stations-grid{grid-template-columns:repeat(auto-fit,minmax(88px,1fr))}
  .station{min-height:96px}
  #playerbar{gap:10px}
  #vol-wrap{min-width:100px}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="menu-btn">☰</div>
    <div id="title">Radio online</div>
    <div id="clock">00:00</div>
  </div>

  <div id="content"></div>

  <div id="status">Gotowy</div>

  <div id="playerbar">
    <button id="playbtn">▶</button>
    <button id="soundbtn">🔊</button>
    <input id="seek" type="range" min="0" max="100" value="50">
    <div id="vol-wrap">
      <span>Głośność</span>
      <input id="vol" type="range" min="0" max="1" step="0.01" value="0.85">
    </div>
  </div>
</div>

<script>
const stationGroups = {
  "Popularne FM": [
    "Muzyczne Radio Polska",
    "RMF FM",
    "Radio ZET",
    "Radio ESKA",
    "Radio Plus",
    "PR Radio Wrocław",
    "Radio Tok FM",
    "Radio Kolor FM",
    "Planeta FM",
    "Meloradio FM",
    "Radio Kampus",
    "Radio Rekord FM",
    "Antyradio"
  ],
  "Polskie Radio": [
    "PR24 Polskie Radio 24",
    "PR Radio Kierowców",
    "Radio Rodzina",
    "Polskie Radio - Dzieciom",
    "RMF - Bajkowe Piosenki",
    "Radio Maryja"
  ],
  "Muzyczne": [
    "CYBERStacja",
    "Disco Party - Polo",
    "Radio Dobra Nuta",
    "Polmax 2",
    "Eska 2 - Dla Dzieci",
    "Eska 2 - Kultowe Polskie",
    "Hit Radio PL",
    "House of Fun K",
    "Pure FM",
    "Radio Nowej Generacji",
    "MOD FM",
    "Sound FM"
  ],
  "Elektronika": [
    "Minimal Mix Radio",
    "Radio Tube - Drum and Bass",
    "Rave FM",
    "Radio FTB Trance",
    "Psyradio - Progressive",
    "Sunshine Live",
    "HBR1 - I.D.M. Tranceponder"
  ],
  "Metal / Rock": [
    "Kombinat Metal",
    "Metal Live Radio",
    "Bear Metal Radio"
  ]
};

const streams = {
  "Muzyczne Radio Polska":"http://stream.rcs.revma.com/gzwc1xcq042vv",
  "RMF FM":"https://rs6-krk2.rmfstream.pl/rmf_fm",
  "Radio ZET":"https://n-16-10.dcs.redcdn.pl/sc/o2/Eurozet/live/audio.livx",
  "Radio ESKA":"https://waw.ic.smcdn.pl/t043-1.mp3",
  "Radio Plus":"http://pla.cdn.eurozet.pl/pla-net.mp3",
  "PR Radio Wrocław":"https://stream4.nadaje.com:8176/prw",
  "Radio Tok FM":"https://radiostream.pl/tuba9-1.mp3",
  "Radio Kolor FM":"https://stream.rcs.revma.com/zbq79057xd3vv",
  "Planeta FM":"http://pla.cdn.eurozet.pl/pla-net.mp3",
  "Meloradio FM":"https://melo-01.cdn.eurozet.pl/melro.mp3",
  "Radio Kampus":"https://stream.radiokampus.fm/kampus.mp3",
  "Radio Rekord FM":"https://stream2.nadaje.com:8880/rekordfm",
  "Antyradio":"https://player.antyradio.pl",
  "PR24 Polskie Radio 24":"https://stream3.polskieradio.pl/pr24_aac128",
  "PR Radio Kierowców":"https://stream3.polskieradio.pl/pkr_aac128",
  "Radio Rodzina":"https://stream3.nadaje.com:8400/radirodzina_mp3",
  "Polskie Radio - Dzieciom":"https://stream3.polskieradio.pl/prd_aac128",
  "RMF - Bajkowe Piosenki":"https://stream.rmfon.pl/playlist_fb.mp3",
  "Radio Maryja":"http://s1.slotex.pl:7070/stream",
  "CYBERStacja":"https://cyberstacja.pl/listen.pls",
  "Disco Party - Polo":"https://stream.radioagora.pl/discoparty_polo.mp3",
  "Radio Dobra Nuta":"https://stream.dobranuta.pl/radio.mp3",
  "Polmax 2":"https://stream.polmax2.pl/radio.mp3",
  "Eska 2 - Dla Dzieci":"https://stream.eska2.pl/dladzieci.mp3",
  "Eska 2 - Kultowe Polskie":"https://stream.eska2.pl/kultowe.mp3",
  "Hit Radio PL":"https://hitradio.pl/stream",
  "House of Fun K":"https://houseoffunk.pl/stream",
  "Kombinat Metal":"https://kombinatmetal.pl/stream",
  "Metal Live Radio":"https://metal-live-radio.pl/stream",
  "Bear Metal Radio":"https://bearmetalradio.pl/stream",
  "Minimal Mix Radio":"https://minimalmixradio.pl/stream",
  "Pure FM":"https://purefm.pl/stream",
  "Radio Nowej Generacji":"https://rng.radio/stream",
  "Radio Tube - Drum and Bass":"https://radiotube.pl/dnb.mp3",
  "MOD FM":"https://modfm.pl/stream",
  "Sound FM":"https://soundfm.pl/stream",
  "Rave FM":"https://ravefm.pl/stream",
  "Radio FTB Trance":"https://radioftb.net/trance.mp3",
  "Psyradio - Progressive":"https://psyradio.pl/progressive.mp3",
  "Sunshine Live":"https://sunshinelive.de/live.mp3",
  "HBR1 - I.D.M. Tranceponder":"https://hbr1.com/idm.mp3"
};

const content = document.getElementById("content");
const audio = new Audio();
audio.preload = "none";

const playbtn = document.getElementById("playbtn");
const soundbtn = document.getElementById("soundbtn");
const seek = document.getElementById("seek");
const vol = document.getElementById("vol");
const status = document.getElementById("status");
const clock = document.getElementById("clock");

let current = null;
let playing = false;
let muted = false;

function updateClock(){
  const d = new Date();
  clock.textContent = d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

function setBar(el, value, key){
  el.style.setProperty(key, value + '%');
}
setBar(seek, 50, '--p');
setBar(vol, 85, '--v');

function setActive(name){
  document.querySelectorAll('.station').forEach(el => el.classList.toggle('active', el.dataset.name === name));
}

function tileFor(name){
  const tile = document.createElement('div');
  tile.className = 'station';
  tile.dataset.name = name;

  const img = document.createElement('img');
  img.alt = name;
  img.loading = 'lazy';
  img.src = `https://www.radio-browser.info/backends/logos/${encodeURIComponent(name)}.png?${Date.now()}`;
  img.onerror = () => {
    img.remove();
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = name;
    tile.appendChild(label);
  };

  tile.appendChild(img);
  tile.addEventListener('click', () => selectStation(name));
  return tile;
}

function render(){
  content.innerHTML = '';
  for(const [groupName, groupStations] of Object.entries(stationGroups)){
    const wrap = document.createElement('section');
    wrap.className = 'group';

    const h = document.createElement('div');
    h.className = 'group-title';
    h.textContent = groupName;

    const grid = document.createElement('div');
    grid.className = 'stations-grid';

    groupStations.forEach(name => grid.appendChild(tileFor(name)));

    wrap.appendChild(h);
    wrap.appendChild(grid);
    content.appendChild(wrap);
  }
}

async function selectStation(name){
  current = name;
  setActive(name);
  status.textContent = 'Ładowanie: ' + name;
  const url = streams[name];
  if(!url){
    status.textContent = 'Brak streamu: ' + name;
    return;
  }
  try{
    audio.src = url;
    audio.volume = muted ? 0 : parseFloat(vol.value);
    await audio.play();
    playing = true;
    playbtn.textContent = '❚❚';
    status.textContent = 'Gra: ' + name;
  }catch(e){
    playing = false;
    playbtn.textContent = '▶';
    status.textContent = 'Kliknij ▶ aby uruchomić: ' + name;
  }
}

playbtn.addEventListener('click', async () => {
  if(!current){
    await selectStation(Object.keys(streams)[0]);
    return;
  }
  if(playing){
    audio.pause();
    playing = false;
    playbtn.textContent = '▶';
    status.textContent = 'Wstrzymane';
  }else{
    try{
      await audio.play();
      playing = true;
      playbtn.textContent = '❚❚';
      status.textContent = 'Gra: ' + current;
    }catch(e){
      status.textContent = 'Nie można uruchomić odtwarzania';
    }
  }
});

soundbtn.addEventListener('click', () => {
  muted = !muted;
  if(muted){
    audio.volume = 0;
    soundbtn.textContent = '🔇';
  }else{
    audio.volume = parseFloat(vol.value);
    soundbtn.textContent = '🔊';
  }
});

seek.addEventListener('input', () => setBar(seek, seek.value, '--p'));
vol.addEventListener('input', () => {
  const v = parseFloat(vol.value);
  if(!muted) audio.volume = v;
  setBar(vol, Math.round(v * 100), '--v');
});

audio.addEventListener('waiting', () => status.textContent = 'Buforowanie...');
audio.addEventListener('playing', () => {
  playing = true;
  playbtn.textContent = '❚❚';
  if(current) status.textContent = 'Gra: ' + current;
});
audio.addEventListener('pause', () => {
  playing = false;
  playbtn.textContent = '▶';
});
audio.addEventListener('error', () => {
  status.textContent = 'Błąd streamu';
});

render();
setActive(Object.keys(streams)[0]);
</script>
</body>
</html>
