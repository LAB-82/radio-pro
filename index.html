<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio Platform v1</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:340px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}
.station:hover { background:#222; }

.badge {
    font-size:11px;
    padding:2px 6px;
    border-radius:6px;
    background:#333;
}

.ok { color:#00ff99; }
.fail { color:#ff4d4d; }

#main {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#logo {
    width:220px;
    height:120px;
    object-fit:contain;
    margin-bottom:20px;
}

#status {
    margin-top:10px;
    color:#aaa;
}

button {
    font-size:50px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
    <img id="logo">
    <button onclick="toggle()">▶</button>
    <div id="status">INITIALIZING PLATFORM...</div>
</div>

<audio id="audio"></audio>

<script>

/* =========================
   STACJE PLATFORMY
   ========================= */

const stations = [
{
    name:"Muzyczne Radio",
    url:"https://stream.rc.fm/muzyczne",
    logo:"https://www.muzyczneradio.pl/wp-content/uploads/logo.png"
},
{
    name:"RMF FM",
    url:"https://rs6-krk2.rmfstream.pl/RMFFM48",
    logo:"https://upload.wikimedia.org/wikipedia/commons/2/2e/RMF_FM_logo.png"
},
{
    name:"Radio Zet",
    url:"https://zt01.cdn.eurozet.pl/ZET010.mp3",
    logo:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Radio_ZET_logo.png"
},
{
    name:"Radio Eska",
    url:"https://waw01-01.cdn.eurozet.pl/eska.mp3",
    logo:"https://upload.wikimedia.org/wikipedia/commons/9/9f/Radio_Eska_logo.png"
},
{
    name:"Tok FM",
    url:"https://audioserver.interia.pl/tokfm.mp3",
    logo:"https://upload.wikimedia.org/wikipedia/commons/5/5b/TOK_FM_logo.png"
}
];

const audio = document.getElementById("audio");

let readyList = [];
let current = 0;

/* =========================
   STREAM TESTER (CORE PLATFORM FEATURE)
   ========================= */

function testStream(station){
    return new Promise((resolve)=>{
        const testAudio = new Audio();

        let done = false;

        const timeout = setTimeout(()=>{
            if(!done){
                done = true;
                resolve(false);
            }
        }, 4000);

        testAudio.src = station.url;

        testAudio.oncanplay = () => {
            if(done) return;
            done = true;
            clearTimeout(timeout);
            resolve(true);
        };

        testAudio.onerror = () => {
            if(done) return;
            done = true;
            clearTimeout(timeout);
            resolve(false);
        };
    });
}

/* =========================
   PLATFORM INIT
   ========================= */

async function initPlatform(){

    setStatus("TESTING STREAMS...");

    readyList = [];

    for(let st of stations){
        const ok = await testStream(st);

        if(ok){
            readyList.push(st);
        }

        renderSidebar();
    }

    setStatus(`READY (${readyList.length}/${stations.length})`);

    if(readyList.length > 0){
        load(0);
    } else {
        setStatus("NO WORKING STREAMS");
    }
}

/* =========================
   LOAD ENGINE
   ========================= */

function load(i){

    current = i;

    const st = readyList[i];

    if(!st){
        setStatus("EMPTY PLATFORM");
        return;
    }

    document.getElementById("logo").src = st.logo;

    setStatus("CONNECTING...");

    audio.pause();
    audio.src = st.url;
    audio.load();

    audio.play()
    .then(()=>{
        setStatus("LIVE");
    })
    .catch(()=>{
        setStatus("PLAY BLOCKED");
    });
}

/* =========================
   UI
   ========================= */

function renderSidebar(){

    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";

    readyList.forEach((s,i)=>{

        const div = document.createElement("div");
        div.className = "station";

        div.innerHTML = `
            <span>${s.name}</span>
            <span class="badge ok">LIVE</span>
        `;

        div.onclick = ()=>load(i);

        sidebar.appendChild(div);
    });
}

function toggle(){
    if(audio.paused){
        load(current);
    } else {
        audio.pause();
        setStatus("PAUSED");
    }
}

function setStatus(t){
    document.getElementById("status").innerText = t;
}

/* START PLATFORM */
initPlatform();

</script>

</body>
</html>
