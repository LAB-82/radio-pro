<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- 🌐 METAVERSE NEON FONT -->
<link href="https://fonts.googleapis.com/css2?family=Tilt+Neon&display=swap" rel="stylesheet">

<style>

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
}

/* ================= ONLY FONT CHANGE ================= */
body{
background: radial-gradient(circle at center, #050000 0%, #000000 60%, #000000 100%);
color:#ff2a2a;

/* 🌐 METAVERSE FONT */
font-family:"Tilt Neon","Orbitron",sans-serif;

display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

/* ================= TITLE ================= */
#title{
font-size:92px;
margin-top:50px;
text-align:center;

text-transform:uppercase;
letter-spacing:8px;
font-weight:800;

color:#ff1e1e;
background: linear-gradient(180deg, #ff4d4d, #b30000);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 5px #ff1e1e,
0 0 15px #ff0000,
0 0 30px #cc0000,
0 0 60px #8b0000;

position:relative;
}

/* ================= CANVAS ================= */
#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:10px;
overflow:hidden;
box-shadow:
0 0 20px #ff0000,
0 0 40px #aa0000;
}

canvas{
display:block;
height:260px;
border-radius:10px;
}

/* ================= CONTROLS ================= */
#controls{
display:flex;
gap:10px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

button{
width:160px;
height:45px;

background: linear-gradient(145deg, #0a0000, #120000);
color:#ff2a2a;

font-family:"Tilt Neon","Orbitron",sans-serif;

cursor:pointer;
transition:0.2s;

border:1px solid #ff2a2a;

box-shadow:
0 0 10px #ff0000,
inset 0 0 10px rgba(255,0,0,0.2);

display:flex;
align-items:center;
justify-content:center;

letter-spacing:2px;
text-transform:uppercase;
}

button:hover{
transform:scale(1.05);
box-shadow:
0 0 20px #ff2a2a,
0 0 40px #ff0000;
border-color:#ff6666;
}

button:active{
transform:scale(0.95);
box-shadow:0 0 5px #ff0000;
}

/* ================= 🔥 FIXED VOLUME SLIDER ================= */
.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;

background: linear-gradient(145deg, #0a0000, #120000);

/* FIX: stronger neon frame */
border:2px solid #ff2a2a;

box-shadow:
0 0 12px #ff0000,
0 0 25px rgba(255,0,0,0.6),
inset 0 0 10px rgba(255,0,0,0.2);

border-radius:6px;
}

/* slider track */
#volume{
width:120px;
height:6px;
appearance:none;

background:#0a0000;

/* FIX: visible inner glow border */
border:1px solid #ff2a2a;

box-shadow:
0 0 10px #ff0000,
inset 0 0 8px rgba(255,0,0,0.5);

border-radius:10px;
}

/* slider thumb */
#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:14px;
height:14px;
background:#ff2a2a;
box-shadow:0 0 12px #ff0000;
border-radius:3px;
cursor:pointer;
}

/* ================= MODE BUTTON ================= */
#modeBtn{
font-size:22px;
width:66px;
height:49px;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 15px #ff0000;
color:#ff2a2a;
font-family:"Tilt Neon","Orbitron",sans-serif;
}

/* ================= STATUS ================= */
.playActive{
color:#ff2a2a;
text-shadow:0 0 10px #ff0000;
}

.stopActive{
color:#ff0000;
text-shadow:0 0 10px #aa0000;
}

.muteActive{
color:#ff8800;
text-shadow:0 0 10px orange;
animation:pulseMute 0.8s infinite alternate;
}

@keyframes pulseMute{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* ================= MOBILE ================= */
@media (max-width: 768px){

#title{
font-size:44px;
margin-top:20px;
letter-spacing:4px;
}

canvas{
width:95vw;
height:200px;
}

#controls{
justify-content:center;
gap:8px;
}

button, .volumeWrapper{
width:140px;
height:44px;
}
}

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
text-shadow:0 0 10px #ff0000;
font-size:18px;
}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">

<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>

</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

/* BEZ ZMIAN JS */
let audio=document.getElementById("audio");
let volume=document.getElementById("volume");
let playBtn=document.getElementById("playBtn");
let stopBtn=document.getElementById("stopBtn");
let muteBtn=document.getElementById("muteBtn");
let modeBtn=document.getElementById("modeBtn");
let title=document.getElementById("title");
let controls=document.getElementById("controls");
let canvas=document.getElementById("proEqualizer");
let ctx=canvas.getContext("2d");

audio.volume=parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let peaks=[];
let animationStarted=false;

function setupAudio(){
if(audioCtx) return;
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);
analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
source.connect(analyser);
analyser.connect(audioCtx.destination);
dataArray=new Uint8Array(analyser.frequencyBinCount);
for(let i=0;i<300;i++) peaks[i]=0;
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src=STREAM_URL;
audio.play();
playBtn.classList.add("playActive");
stopBtn.classList.remove("stopActive");
if(!animationStarted){animationStarted=true;draw();}
}

function stopRadio(){
audio.pause();
stopBtn.classList.add("stopActive");
playBtn.classList.remove("playActive");
setTimeout(()=>stopBtn.classList.remove("stopActive"),1000);
for(let i=0;i<peaks.length;i++) peaks[i]=0;
}

function muteRadio(){
audio.muted=!audio.muted;
muteBtn.classList.toggle("muteActive");
}

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

function resizeCanvas(){
let dpr=window.devicePixelRatio||1;
let width=title.offsetWidth;
canvas.width=width*dpr;
canvas.height=260*dpr;
canvas.style.width=width+"px";
canvas.style.height="260px";
ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);
controls.style.width=width+"px";
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

function draw(){
requestAnimationFrame(draw);
if(!analyser||!dataArray)return;
analyser.getByteFrequencyData(dataArray);
let w=canvas.width/window.devicePixelRatio;
let h=canvas.height/window.devicePixelRatio;
ctx.clearRect(0,0,w,h);
let bars=Math.floor(w/8);
for(let i=0;i<bars;i++){
let v=dataArray[i]||0;
let bh=(v/255)*h;
ctx.fillStyle="#ff2a2a";
ctx.fillRect(i*8,h-bh,6,bh);
}
}
</script>

</body>
</html>
