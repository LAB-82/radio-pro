<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio Polska App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    height: 100vh;
}

/* LEWA LISTA */
#sidebar {
    width: 320px;
    background: #151515;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #222;
    transition: 0.2s;
}

.station:hover {
    background: #222;
}

.station img {
    width: 45px;
    height: 45px;
    border-radius: 8px;
}

.station span {
    font-size: 14px;
}

/* PRAWA STRONA */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#player {
    flex: 1;
    background: black;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* DOLNY BAR */
#nowPlaying {
    height: 60px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 0 15px;
    border-top: 1px solid #222;
    font-size: 14px;
    color: #aaa;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div id="main">
    <div id="player">
        <iframe id="frame" src=""></iframe>
    </div>
    <div id="nowPlaying">Wybierz stację aby rozpocząć</div>
</div>

<script>

// 📻 LISTA STACJI (MyRadioOnline - stabilne linki embed)
const stations = [
    {
        name: "Radio 357",
        img: "https://upload.wikimedia.org/wikipedia/commons/2/2c/Radio_357_logo.png",
        url: "https://myradioonline.pl/radio-357"
    },
    {
        name: "Radio Nowy Świat",
        img: "https://upload.wikimedia.org/wikipedia/commons/6/6f/Radio_Nowy_%C5%9Awiat_logo.png",
        url: "https://myradioonline.pl/radio-nowy-swiat"
    },
    {
        name: "TOK FM",
        img: "https://myradioonline.pl/images/tokfm.png",
        url: "https://myradioonline.pl/tok-fm"
    },
    {
        name: "Antyradio",
        img: "https://myradioonline.pl/images/antyradio.png",
        url: "https://myradioonline.pl/antyradio"
    },
    {
        name: ":contentReference[oaicite:0]{index=0}",
        img: "https://myradioonline.pl/images/muzyczneradio.png",
        url: "https://myradioonline.pl/muzyczne-radio"
    },
    {
        name: "Radio Wrocław",
        img: "https://myradioonline.pl/images/radiowroclaw.png",
        url: "https://myradioonline.pl/radio-wroclaw"
    },
    {
        name: "Radio Kraków",
        img: "https://myradioonline.pl/images/radiokrakow.png",
        url: "https://myradioonline.pl/radio-krakow"
    },
    {
        name: "Radio Poznań",
        img: "https://myradioonline.pl/images/radiopoznan.png",
        url: "https://myradioonline.pl/radio-poznan"
    }
];

const sidebar = document.getElementById("sidebar");
const frame = document.getElementById("frame");
const nowPlaying = document.getElementById("nowPlaying");

function play(station) {
    nowPlaying.textContent = "🎧 Teraz gra: " + station.name;

    // 🔥 KLUCZ: radio gra w środku aplikacji
    frame.src = station.url;
}

function render() {
    stations.forEach(station => {
        const div = document.createElement("div");
        div.className = "station";

        div.innerHTML = `
            <img src="${station.img}" onerror="this.src='https://via.placeholder.com/45'">
            <span>${station.name}</span>
        `;

        div.onclick = () => play(station);

        sidebar.appendChild(div);
    });
}

render();

</script>

</body>
</html>
