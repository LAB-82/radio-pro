<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO FIX (CLEAN MAP ONLY)</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
transition:0.2s;
font-size:12px;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#playerBox{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

#radioPlayer{
width:90%;
height:90%;
background:#111;
border-radius:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#logoBox img{
width:180px;
height:180px;
border-radius:12px;
background:#222;
margin-bottom:10px;
object-fit:contain;
}

#controls{
display:flex;
gap:10px;
align-items:center;
margin-top:10px;
}

button{
background:#222;
color:#fff;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
}

button:hover{background:#333;}

#volume{width:120px;}
#status{margin-top:10px;font-size:12px;opacity:0.7;}
</style>

</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE (NO CHANGES MODE)</div>

<div id="playerBox">
<div id="radioPlayer">

<div id="logoBox">
<img id="logo"/>
</div>

<div id="controls">
<button onclick="play()">PLAY</button>
<button onclick="stop()">STOP</button>
<button onclick="mute()">MUTE</button>
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.6">
</div>

<div id="status">READY</div>

</div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
  EXACT LIST (UNCHANGED)
========================= */

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Dzieciom",
"Polskie Radio Chopin",
"Radio AH",
"Rock Radio",
"Radio Maryja",
"Radio Niepokalanów",
"Radio Rodzina"
];

/* =========================
  STREAMS (FIXED LINKS)
========================= */

const STREAMS = {

"Muzyczne Radio":"https://stream.muzyczneradio.pl:8000/stream.mp3",

"Polskie Radio Jedynka":"https://mp3.polskieradio.pl:8900/stream",

"Polskie Radio Dwójka":"https://mp3.polskieradio.pl:8910/stream",

"Polskie Radio Trójka":"https://mp3.polskieradio.pl:8000/stream",

"Polskie Radio Czwórka":"https://mp3.polskieradio.pl:8920/stream",

"Radio Plus":"https://pl2-playout.iplay.pl/radioplus.mp3",

"RMF FM":"https://rs6-krk2-cyfronet.rmfstream.pl/RMFFM48",

"Radio Zet":"https://zt.cdn.eurozet.pl/ZET128.mp3",

"Radio Eska":"https://waw01-01.ic.smcdn.pl/t043-1.mp3",

"Radio Wrocław":"https://stream4.nadaje.com:10000/radiowroclaw",

"Radio Wnet":"https://stream.rcs.revma.com/wnet.mp3",

"Tok FM":"https://radiostream.pl/tuba10-1.mp3",

"Antyradio":"https://stream.antyradio.pl/stream.mp3",

"Radio Kolor":"https://stream.rcs.revma.com/radiokolor.mp3",

"Radio Złote Przeboje":"https://zt.cdn.eurozet.pl/ZLOTE.mp3",

"Planeta FM":"https://stream.rcs.revma.com/planeta.mp3",

"Radio Kampus":"https://stream.rcs.revma.com/kampus.mp3",

"Radio Dzieciom":"https://mp3.polskieradio.pl:8904/stream",

"Polskie Radio Chopin":"https://mp3.polskieradio.pl:8906/stream",

"Radio AH":"",

"Rock Radio":"https://stream.rcs.revma.com/rockradio.mp3",

"Radio Maryja":"http://s1.slotex.pl:7070/stream",

"Radio Niepokalanów":"http://s7.radiohost.pl:8000/stream",

"Radio Rodzina":"https://stream.radirodzina.pl/stream"

};

const audio=document.getElementById("audio");
const logo=document.getElementById("logo");
const status=document.getElementById("status");
const volume=document.getElementById("volume");

let current=0;

volume.oninput=()=>audio.volume=volume.value;

/* =========================
  NO AI RESOLVER (DISABLED LOGIC)
========================= */

function getStream(name){
return STREAMS[name] || null;
}

/* LOGO */
function setLogo(name){
logo.src=`https://www.radio-browser.info/backends/logos/${encodeURIComponent(name)}.png`;
}

/* ACTIVE */
function setActive(i){
document.querySelectorAll(".station").forEach((el,idx)=>{
el.classList.toggle("active",idx===i);
});
}

/* LOAD */
function load(i){

current=i;
const name=stations[i];

setActive(i);
setLogo(name);

const url=getStream(name);

if(!url){
audio.removeAttribute("src");
status.innerText="NO STREAM (AS PROVIDED)";
return;
}

audio.src=url;
audio.play().catch(()=>{});

status.innerText="PLAYING: "+name;
}

function play(){load(current);}
function stop(){audio.pause();audio.src="";status.innerText="STOPPED";}
function mute(){audio.muted=!audio.muted;}

/* BUILD UI */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;
div.onclick=()=>load(i);
document.getElementById("stations").appendChild(div);
});

load(0);

</script>

</body>
</html>
