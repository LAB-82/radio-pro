<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <title>Odtwarzacz Radiowy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .station {
            background-color: #fff;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .station h2 {
            margin-top: 0;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Odtwarzacz Radia</h1>

    <div class="station">
        <h2>Muzyczne Radio</h2>
        <audio controls>
            <source src="https://stream4.nadaje.com:9001/muzyczneradio" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Radio Plus</h2>
        <audio controls>
            <source src="https://pl-play.adtonos.com/radio-plus" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>RMF FM</h2>
        <audio controls>
            <source src="https://rs7-krk2-cyfronet.rmfstream.pl/rmf_fm" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Radio Zet</h2>
        <audio controls>
            <source src="https://zt02.cdn.eurozet.pl/ZET010.mp3" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Radio Wrocław</h2>
        <audio controls>
            <source src="https://stream4.nadaje.com:9020/radiowroclaw" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Tok FM</h2>
        <audio controls>
            <source src="https://radiostream.pl/tuba10-1.mp3" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Radio Kolor</h2>
        <audio controls>
            <source src="https://radiokolor-stream.pl:8443/stream" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Złote Przeboje</h2>
        <audio controls>
            <source src="https://stream.open.fm/88" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Radio Kampus</h2>
        <audio controls>
            <source src="https://stream10.radioagora.pl/tuba9-1.mp3" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Radio Rodzina</h2>
        <audio controls>
            <source src="https://stream.radioplus.pl/radio_rodzina" type="audio/mpeg" />
        </audio>
    </div>

    <div class="station">
        <h2>Polskie Radio Program 1</h2>
        <audio controls>
            <source src="https://stream.polskieradio.pl/program1" type="audio/mpeg" />
        </audio>
    </div>

</body>
</html>
