<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{
background:#eaeaea;
color:#000;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}

canvas{
display:block;
height:260px;
border-radius:8px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}

body.day .volumeWrapper{
background:#d6d6d6;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

/* === BUTTON CLICK EFFECT (REALNY) === */
button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:all 0.12s ease;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 18px #ff0000;
}

button:active{
transform:scale(0.92);
box-shadow:0 0 5px #ff0000 inset;
}

button:focus{
outline:none;
box-shadow:none;
}

/* TRYB bez niebieskiego */
#modeBtn{
font-size:22px;
width:66px;
height:49px;
}
#modeBtn:focus{
outline:none;
box-shadow:none;
}

/* DAY/NIGHT styling */
body:not(.day) #modeBtn{
color:#ffff00;
background:#111;
}

body.day #modeBtn{
color:#ffff00;
background:#00ccff;
box-shadow:0 0 12px #00ccff,0 0 24px #00aaff;
}

/* STATES */
.playActive{ color:#00ff00; text-shadow:0 0 10px #00ff00; }
.stopActive{ color:#ff4444; text-shadow:0 0 10px red; }

.muteActive{
color:#ffaa00;
text-shadow:0 0 10px orange;
animation:pulseMute 0.8s infinite alternate;
}

@keyframes pulseMute{
from{ transform:scale(1); }
to{ transform:scale(1.1); }
}

/* LINK + ICON */
#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
text-shadow:0 0 6px red;
font-size:20px;
display:inline-flex;
align-items:center;
gap:10px;
}

.radioIcon{
width:48px;
height:48px; /* +50% */
transition:0.3s;
}

/* volume */
#volume{
width:120px;
height:10px;
appearance:none;
border-radius:10px;
outline:none;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red;
cursor:pointer;
}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">
Muzyczne Radio
<img id="radioIcon" class="radioIcon">
</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

function updateIcon(){
radioIcon.src = document.body.classList.contains("day") ? ICON_LIGHT : ICON_DARK;
}
updateIcon();

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
updateIcon();
}

/* AUDIO */
const audio=document.getElementById("audio");
audio.volume=volume.value;

let audioCtx, analyser, source, dataArray;
let peaks=[];
let animationStarted=false;

function setupAudio(){
if(audioCtx) return;
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);
analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
source.connect(analyser);
analyser.connect(audioCtx.destination);
dataArray=new Uint8Array(analyser.frequencyBinCount);
for(let i=0;i<300;i++) peaks[i]=0;
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src="https://stream.rcs.revma.com/gzwc1xcq042vv";
audio.play();
playBtn.classList.add("playActive");
stopBtn.classList.remove("stopActive");
if(!animationStarted){animationStarted=true;draw();}
}

function stopRadio(){
audio.pause();
stopBtn.classList.add("stopActive");
playBtn.classList.remove("playActive");
setTimeout(()=>stopBtn.classList.remove("stopActive"),1000);
for(let i=0;i<peaks.length;i++) peaks[i]=0;
}

function muteRadio(){
audio.muted=!audio.muted;
muteBtn.classList.toggle("muteActive");
}

/* VISUAL */
function draw(){
requestAnimationFrame(draw);
if(!analyser||!dataArray) return;
analyser.getByteFrequencyData(dataArray);

ctx.clearRect(0,0,canvas.width,canvas.height);
let bars=60;
for(let i=0;i<bars;i++){
let v=dataArray[i*2]||0;
let h=(v/255)*canvas.height*0.9;
ctx.fillStyle="#ff0000";
ctx.fillRect(i*(canvas.width/bars),canvas.height-h,(canvas.width/bars)-2,h);
}
}
