<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0000;
  --panel:rgba(30,5,5,.82);
  --panel2:rgba(40,10,10,.92);
  --red:#ff0033;
  --red2:#ff4066;
  --pink:#ff6699;
  --white:#fafafa;
  --text:#ffffff;
  --muted:#cccccc;
  --line:rgba(255,0,33,.35);
}

*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,102,153,.10), transparent 28%),
    radial-gradient(circle at 80% 30%, rgba(255,0,33,.12), transparent 26%),
    radial-gradient(circle at 50% 80%, rgba(255,230,240,.08), transparent 30%),
    linear-gradient(180deg,#080000 0%, #120303 40%, #060000 100%);
  color:var(--text);
  font-family:'Orbitron',sans-serif;
}

#app{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 18px 18px;
}

#shell{
  width:min(1120px,100%);
  height:100%;
  display:flex;
  flex-direction:column;
  gap:16px;
}

#title{
  position:relative;
  font-size:clamp(34px,6vw,86px);
  line-height:1;
  text-align:center;
  margin-top:8px;
  color:var(--red);
  letter-spacing:2px;
  text-transform:uppercase;
  text-shadow:
    0 0 6px rgba(255,0,33,.95),
    0 0 18px rgba(255,0,33,.65),
    0 0 36px rgba(255,102,153,.35);
  filter:drop-shadow(0 0 12px rgba(255,0,33,.18));
}

#title::before,
#title::after{
  content:attr(data-text);
  position:absolute;
  inset:0;
  pointer-events:none;
  mix-blend-mode:screen;
}

#title::before{
  transform:translate(2px,0);
  color:var(--pink);
  opacity:.72;
  clip-path:inset(0 0 55% 0);
}
#title::after{
  transform:translate(-2px,0);
  color:var(--red);
  opacity:.5;
  clip-path:inset(45% 0 0 0);
}

#subline{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:-4px;
}

#proEqualizer{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:
    linear-gradient(180deg, rgba(255,0,33,.10), transparent 35%),
    linear-gradient(180deg, rgba(255,102,153,.10), transparent 75%),
    var(--panel);
  border:1px solid var(--line);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 0 18px rgba(255,0,33,.20),
    0 0 48px rgba(255,102,153,.10);
  position:relative;
}

#proEqualizer::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(transparent 0%, rgba(255,255,255,.04) 50%, transparent 100%);
  pointer-events:none;
  opacity:.35;
}

canvas{
  display:block;
  width:100%;
  height:260px;
}

#controls{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  padding:14px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(40,10,10,.95), rgba(20,5,5,.92));
  border:1px solid var(--line);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.03) inset,
    0 0 18px rgba(255,0,33,.10);
}

button{
  height:48px;
  min-width:128px;
  padding:0 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:'Orbitron',sans-serif;
  font-weight:700;
  letter-spacing:1px;
  color:var(--text);
  background:
    linear-gradient(180deg, rgba(255,0,33,.12), rgba(255,102,153,.10)),
    linear-gradient(180deg, #1a0505, #120303);
  border:1px solid rgba(255,0,33,.35);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.05) inset,
    0 0 14px rgba(255,0,33,.16);
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease, filter .15s ease;
}
button:hover{
  transform:translateY(-1px);
  border-color:rgba(255,102,153,.65);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.05) inset,
    0 0 18px rgba(255,102,153,.24),
    0 0 22px rgba(255,0,33,.10);
}
button:active{
  transform:translateY(1px) scale(.99);
}

#playBtn.playActive{
  color:#ff8080;
  text-shadow:0 0 10px rgba(255,128,128,.9);
}
#stopBtn.stopActive{
  color:#ff5b5b;
  text-shadow:0 0 10px rgba(255,91,91,.9);
}
#muteBtn.muteActive{
  color:#ffd0d0;
  text-shadow:0 0 10px rgba(255,208,208,.95);
  animation:pulseMute .8s infinite alternate;
}

@keyframes pulseMute{
  from{ transform:translateY(0) scale(1); }
  to{ transform:translateY(-1px) scale(1.06); }
}

.volumeWrapper{
  width:220px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:0 14px;
  border-radius:12px;
  background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(40,10,10,.92));
  border:1px solid rgba(255,102,153,.35);
  box-shadow:0 0 18px rgba(255,102,153,.12);
}

#volume{
  width:140px;
  height:10px;
  appearance:none;
  border-radius:999px;
  outline:none;
  background:
    linear-gradient(90deg, var(--red) 0%, var(--red) var(--v,50%), rgba(255,255,255,.08) var(--v,50%), rgba(255,255,255,.08) 100%);
  border:1px solid rgba(255,0,33,.45);
  box-shadow:0 0 8px rgba(255,0,33,.18);
}
#volume.active{
  border-color:rgba(255,102,153,.75);
  box-shadow:0 0 10px rgba(255,102,153,.22);
}
#volume::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:4px;
  background:linear-gradient(180deg, #fff, #ffd0d0);
  border:2px solid var(--red);
  box-shadow:0 0 12px rgba(255,0,33,.95), 0 0 22px rgba(255,102,153,.45);
  cursor:pointer;
}
#volume::-moz-range-thumb{
  width:18px;
  height:18px;
  border:none;
  border-radius:4px;
  background:linear-gradient(180deg, #fff, #ffd0d0);
  box-shadow:0 0 12px rgba(255,0,33,.95), 0 0 22px rgba(255,102,153,.45);
  cursor:pointer;
}

#bottomLink{
  text-align:center;
  padding-top:4px;
}

#bottomLink a{
  color:var(--red);
  text-decoration:none;
  font-size:16px;
  letter-spacing:1px;
  text-shadow:0 0 10px rgba(255,0,33,.55);
}

#status{
  min-height:22px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
  letter-spacing:1px;
}

.scanline{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(180deg, transparent 0%, rgba(255,255,255,.05) 50%, transparent 100%);
  opacity:.09;
  mix-blend-mode:screen;
}
.gridfx{
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,0,33,.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,33,.08) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image:linear-gradient(180deg, rgba(0,0,0,.55), transparent 85%);
  opacity:.22;
}

@media (max-width: 700px){
  #app{padding:14px}
  #title{font-size:30px}
  canvas{height:220px}
  button{min-width:110px}
  .volumeWrapper{width:100%;justify-content:space-between}
  #controls{justify-content:center}
}
</style>
</head>
<body>
<div class="gridfx"></div>
<div class="scanline"></div>

<div id="app">
  <div id="shell">
    <div id="title" data-text="Muzyczne Radio">Muzyczne Radio</div>
    <div id="subline">Cybernetic broadcast console</div>

    <div id="proEqualizer">
      <canvas id="eqCanvas"></canvas>
    </div>

    <div id="controls">
      <button id="playBtn" onclick="playRadio()">PLAY</button>
      <button id="stopBtn" onclick="stopRadio()">STOP</button>
      <button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>
      <div class="volumeWrapper">
        <span>VOL</span>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
      </div>
    </div>

    <div id="status">Gotowy do nadawania</div>

    <div id="bottomLink">
      <a href="https://www.muzyczneradio.pl" target="_blank" rel="noopener noreferrer">www.muzyczneradio.pl</a>
    </div>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL = "https://stream.rcs.revma.com/gzwc1xcq042vv";
const audio = document.getElementById("audio");
const volume = document.getElementById("volume");
const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");
const muteBtn = document.getElementById("muteBtn");
const title = document.getElementById("title");
const shell = document.getElementById("shell");
const canvas = document.getElementById("eqCanvas");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");

audio.volume = parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let peaks = [];
let animationStarted = false;

function setupAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  source = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.55;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  for(let i = 0; i < 300; i++) peaks[i] = 0;
}

async function playRadio(){
  setupAudio();
  if(audioCtx.state === "suspended") await audioCtx.resume();
  audio.src = STREAM_URL;
  try{
    await audio.play();
    playBtn.classList.add("playActive");
    stopBtn.classList.remove("stopActive");
    statusEl.textContent = "Transmisja aktywna";
    if(!animationStarted){
      animationStarted = true;
      draw();
    }
  }catch(e){
    statusEl.textContent = "Nie udało się uruchomić streamu";
  }
}

function stopRadio(){
  audio.pause();
  stopBtn.classList.add("stopActive");
  playBtn.classList.remove("playActive");
  statusEl.textContent = "Transmisja zatrzymana";
  setTimeout(() => stopBtn.classList.remove("stopActive"), 800);
  for(let i = 0; i < peaks.length; i++) peaks[i] = 0;
}

function muteRadio(){
  audio.muted = !audio.muted;
  muteBtn.classList.toggle("muteActive");
  muteBtn.textContent = audio.muted ? "MUTE 🔇" : "MUTE 🔊";
  statusEl.textContent = audio.muted ? "Wyciszono" : "Dźwięk włączony";
}

// USUNIĘTO FUNKCJĘ toggleMode() oraz bindings dla trybu dzień/noc

volume.addEventListener("input", () => {
  const val = parseFloat(volume.value);
  audio.volume = val;
  volume.classList.toggle("active", Math.abs(val - 0.5) >= 0.02);
});
volume.dispatchEvent(new Event("input"));

function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const width = title.offsetWidth;
  const height = 260;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

function draw(){
  requestAnimationFrame(draw);
  if(!analyser || !dataArray) return;
  analyser.getByteFrequencyData(dataArray);
  drawEQ();
}

function drawEQ(){
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.width / dpr;
  const height = canvas.height / dpr;
  ctx.clearRect(0, 0, width, height);

  const bars = Math.max(1, Math.floor(width / 8));
  const barWidth = width / bars;
  const step = Math.max(1, Math.floor(dataArray.length / bars));
  const maxHeight = height * 0.9;
  const yOffset = 5;

  for(let i = 0; i < bars; i++){
    const index = i * step;
    const value = dataArray[index] || 0;
    const percent = value / 255;
    const h = Math.min(maxHeight, height * percent);
    const x
