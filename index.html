<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{ background:#eaeaea; color:#000; }

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 6px #ff2a2a,0 0 12px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}

canvas{ display:block; height:260px; border-radius:8px; }

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}

.volumeWrapper{
width:160px;height:45px;
display:flex;align-items:center;justify-content:center;
background:#111;border:2px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

button{
width:160px;height:45px;
background:#111;color:white;
cursor:pointer;font-family:'Orbitron';
border:2px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

#volume{
width:120px;height:10px;
background:#000;border:1px solid #ff2a2a;
}

#bottomLink a{ color:#ff2a2a;text-decoration:none; }

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const playBtn=document.getElementById("playBtn");
const stopBtn=document.getElementById("stopBtn");
const muteBtn=document.getElementById("muteBtn");
const modeBtn=document.getElementById("modeBtn");

const title=document.getElementById("title");
const controls=document.getElementById("controls");

const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

let audioCtx, source, splitter;
let analyserL, analyserR;
let dataL, dataR;
let peaks=[];

function setupAudio(){

if(audioCtx) return;

audioCtx = new (window.AudioContext||window.webkitAudioContext)();

source = audioCtx.createMediaElementSource(audio);

/* REAL STEREO SPLIT */
splitter = audioCtx.createChannelSplitter(2);

analyserL = audioCtx.createAnalyser();
analyserR = audioCtx.createAnalyser();

analyserL.fftSize = 512;
analyserR.fftSize = 512;

source.connect(splitter);
splitter.connect(analyserL,0);
splitter.connect(analyserR,1);

analyserL.connect(audioCtx.destination);
analyserR.connect(audioCtx.destination);

dataL = new Uint8Array(analyserL.frequencyBinCount);
dataR = new Uint8Array(analyserR.frequencyBinCount);

for(let i=0;i<300;i++) peaks[i]=0;
}

function playRadio(){

setupAudio();

if(audioCtx.state==="suspended") audioCtx.resume();

audio.src=STREAM_URL;
audio.play();

draw();
}

function stopRadio(){
audio.pause();
for(let i=0;i<peaks.length;i++) peaks[i]=0;
}

function muteRadio(){
audio.muted=!audio.muted;
}

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

function resizeCanvas(){
let dpr=window.devicePixelRatio||1;
let width=title.offsetWidth;

canvas.width=width*dpr;
canvas.height=260*dpr;

canvas.style.width=width+"px";
canvas.style.height="260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);

controls.style.width=width+"px";
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

function draw(){
requestAnimationFrame(draw);

if(!analyserL||!analyserR) return;

analyserL.getByteFrequencyData(dataL);
analyserR.getByteFrequencyData(dataR);

render();
}

function render(){

let dpr=window.devicePixelRatio||1;
let width=canvas.width/dpr;
let h=canvas.height/dpr;

ctx.clearRect(0,0,width,h);

/* HUD */
ctx.strokeStyle="rgba(255,255,255,0.08)";
for(let y=0;y<h;y+=20){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(width,y);ctx.stroke();
}

let bars=60;
let half=width/2;
let bw=half/bars;

function drawSide(data, offset){

for(let i=0;i<bars;i++){

let v=data[i]||0;
let hh=(v/255)*(h*0.9);

let x=offset+i*bw;
let y=h-hh+5;

ctx.fillStyle="#ff2a2a";
ctx.shadowBlur=6;
ctx.shadowColor="#ff0000";

ctx.fillRect(x,y,bw-1,hh);

ctx.shadowBlur=0;
}
}

drawSide(dataL,0);
drawSide(dataR,half);
}
</script>

</body>
</html>
