<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;font-family:Arial,Helvetica,sans-serif;background:#111;color:#fff;overflow:hidden}
body{background:linear-gradient(180deg,#1c1c1c 0%,#101010 100%)}

#app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,#2a2a2a 0%,#181818 100%);
}

#topbar{
  height:60px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 14px;
  background:#2b2b2b;
  border-bottom:1px solid rgba(255,255,255,.08);
}

#menu-btn{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#ddd;user-select:none;
}

#title{
  flex:1;
  font-size:20px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#clock{
  min-width:70px;
  text-align:center;
  font-family:monospace;
  font-size:15px;
  opacity:.9;
}

#grid-wrap{
  flex:1;
  min-height:0;
  overflow:hidden;
  padding:10px 10px 98px;
}

#stations{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:repeat(8,minmax(0,1fr));
  gap:8px;
  align-content:start;
}

.station{
  aspect-ratio:1/1;
  background:#f5f5f5;
  border-radius:12px;
  overflow:hidden;
  border:2px solid transparent;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px;
}

.station.active{
  border-color:#28a7d8;
  box-shadow:0 0 0 2px rgba(40,167,216,.18);
}

.station img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.station .label{
  text-align:center;
  font-size:13px;
  line-height:1.05;
  color:#111;
  padding:4px;
}

#status{
  position:absolute;
  left:12px;
  bottom:106px;
  font-size:12px;
  opacity:.75;
  pointer-events:none;
}

#playerbar{
  position:fixed;
  left:0;right:0;bottom:0;
  height:98px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  background:#171717;
  border-top:1px solid rgba(255,255,255,.08);
}

#playbtn{
  width:58px;height:58px;
  border:none;border-radius:50%;
  background:linear-gradient(180deg,#f7f7f7,#cfcfcf);
  color:#222;font-size:24px;
  cursor:pointer;
  flex:0 0 auto;
}

#seek{
  flex:1;
  height:8px;
  appearance:none;
  background:linear-gradient(90deg,#33aee4 0%,#33aee4 var(--p,50%),#4c4c4c var(--p,50%),#4c4c4c 100%);
  border-radius:999px;
  outline:none;
}
#seek::-webkit-slider-thumb{
  appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:#33aee4;border:3px solid #2b90b6;
  cursor:pointer;
}
#seek::-moz-range-thumb{
  width:20px;height:20px;border-radius:50%;
  background:#33aee4;border:3px solid #2b90b6;
  cursor:pointer;
}

#vol-wrap{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:120px;
  flex:0 0 auto;
}
#vol{
  width:70px;
  height:6px;
  appearance:none;
  background:linear-gradient(90deg,#33aee4 0%,#33aee4 var(--v,85%),#3d3d3d var(--v,85%),#3d3d3d 100%);
  border-radius:999px;
  outline:none;
}
#vol::-webkit-slider-thumb{
  appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:#33aee4;
  border:3px solid #2b90b6;
  cursor:pointer;
}
#vol::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;
  background:#33aee4;
  border:3px solid #2b90b6;
  cursor:pointer;
}

@media (max-width: 1200px){
  #stations{grid-template-columns:repeat(6,minmax(0,1fr))}
