<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
overflow: hidden;
transition:0.4s;
position: relative;
}

/* 🔥 CYBERPUNK GRID + SCANLINE */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background:
    linear-gradient(transparent 95%, rgba(255, 0, 0, 0.08) 95%),
    linear-gradient(90deg, transparent 95%, rgba(255, 0, 0, 0.08) 95%);
  background-size: 40px 40px;
  animation: gridMove 6s linear infinite;
  z-index: -1;
  opacity: 0.3;
  pointer-events: none;
}

body.day::before {
  background:
    linear-gradient(transparent 95%, rgba(255, 0, 0, 0.05) 95%),
    linear-gradient(90deg, transparent 95%, rgba(255, 0, 0, 0.05) 95%);
  opacity: 0.2;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-40px, -40px); }
}

/* 🔥 SCANLINES */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(0, 0, 0, 0) 0px,
    rgba(0, 0, 0, 0) 2px,
    rgba(255, 0, 0, 0.03) 3px,
    rgba(0, 0, 0, 0) 4
