<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
/* 🔥 Cyberpunk 2077 Red / Noir Theme – czerwony zamiast białego */
:root{
  --red:#ff0000;
  --red2:#ff3333;
  --red3:#ff6666;
  --text:#ff2a2a;
  --muted:#ff2a2a;
  --accent:#ff2a2a;
  --line:rgba(255,0,0,.35);
}

/* 🌌 Czarny tło z czerwonymi neonymi, zero białego */
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Orbitron',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  position: relative;
  overflow: hidden;
}

/* 🌪️ Delikatny glitch / scanline nad całością (bez uszkodzenia UI) */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,0,.08), transparent 28%),
    radial-gradient(circle at 70% 20%, rgba(255,0,0,.06), transparent 28%),
    linear-gradient(180deg, rgba(255,0,0,.05) 0%, transparent 100%);
  background-size: 40px 40px;
  mix-blend-mode: screen;
  opacity:.12;
  pointer-events: none;
}

/* 🔌 TYTUŁ – glitch tylko na tekście */
#title{
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:#ff2a2a;
  text-shadow:
    0 0 5px #ff2a2a,
    0 0 15px #ff0000,
    0 0 30px #ff0000,
    0 0 60px #ff0000,
    0 0 80px #ff0000;
  position:relative;
}
#title::before,
#title::after{
  content:attr(data-text);
  position:absolute;
  inset:0;
  mix-blend-mode: screen;
  animation:glitch 1.5s linear infinite alternate;
  clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%);
}
#title::before{
  color:#ff0000;
  opacity:.8;
  transform:translateX(1px);
}
#title::after{
  color:#ff0000;
  opacity:.5;
  transform:translateX(-1px);
}
@keyframes glitch{
  0%   { transform:translate(0,0); }
  50%  { transform:translate(2px,-1px); }
  100% { transform:translate(-1px,1px); }
}

/* 🔌 ProEqualizer – bez zmian, bez glitchu */
#proEqualizer{
  display:block;
  margin:0 auto;
  margin-top:30px;
  margin-bottom:30px;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(255,0,0,.3);
}
canvas{
  display:block;
  height:260px;
  border-radius:8px;
}

/* 🔌 Kontrolki – bez zmian, tylko czerwony glitch tylko na krawędziach */
#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
  align-items:center;
  justify-content:space-between;
}
.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  border:2px solid #ff2a2a;
  box-shadow:0 0 10px #ff2a2a;
}
