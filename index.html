<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
position: relative;
overflow: hidden;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000, 0 0 10px rgba(255,255,255,0.3);
animation: cyberpunk-glow 4s ease-in-out infinite alternate;
filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
}

@keyframes cyberpunk-glow {
  0% { text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000; }
  100% { text-shadow:0 0 10px #ff2a2a,0 0 25px #ff0000,0 0 40px #ff0000, 0 0 20px rgba(255,255,255,0.4); }
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
box-shadow:0 0 30px rgba(255,42,42,0.5), inset 0 0 20px rgba(255,255,255,0.1);
position: relative;
}

canvas{
display:block;
height:260px;
border-radius:8px;
filter: drop-shadow(0 0 15px rgba(255,0,0,0.6)) brightness(1.05);
animation: canvas-glow 2s ease-in-out infinite alternate;
}

@keyframes canvas-glow {
  0% { filter: drop-shadow(0 0 15px rgba(255,0,0,0.6)) brightness(1.05); }
  100% { filter: drop-shadow(0 0 25px rgba(255,0,0,0.8)) brightness(1.08); }
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
position: relative;
z-index: 20;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 15px #ff2a2a, 0 0 25px rgba(255,255,255,0.2), inset 0 0 10px rgba(255,255,255,0.1);
transition: all 0.3s ease;
position: relative;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 15px #ff2a2a, 0 0 25px rgba(255,255,255,0.15), inset 0 0 10px rgba(255,255,255,0.05);
position: relative;
overflow: hidden;
}
