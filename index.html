<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026 FULL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
position:relative;
transition:0.2s;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}
.station.live{background:#1f7a3a;}

.star{
position:absolute;
top:4px;
right:6px;
font-size:12px;
cursor:pointer;
opacity:0.5;
}
.star.fav{opacity:1;color:gold;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

/* LOGO */
#logo{
width:180px;
height:120px;
object-fit:contain;
border-radius:10px;
background:#111;
padding:10px;
}

/* SEPARATOR */
.separator{
grid-column:1/-1;
text-align:center;
font-size:13px;
opacity:0.6;
padding:6px;
}

audio{
width:80%;
}

#status{
font-size:13px;
opacity:0.8;
white-space:pre-line;
}

button{
background:#222;
color:#fff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
button:hover{background:#333;}
</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE PRO 2026 (SELF HEALING)</div>

<div id="player">

<img id="logo"/>

<audio id="audio" controls></audio>

<div>
<button onclick="clearCache()">CLEAR CACHE</button>
</div>

<div id="status">READY</div>

</div>

</div>

<script>

const stations = [
"Muzyczne Radio",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Wrocław",
"Tok FM",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Rodzina",
"Radio Afera",

"__SEPARATOR__",

"BBC Radio 1",
"BBC Radio 1Xtra",
"SLAM!",
"Radio Deejay",
"RTL 102.5",
"Ibiza Global Radio",
"Ibiza Sonica Radio",
"1.FM Club Radio",
"Housebeats FM",
"Trance Energy Radio",
"Psyndora Psytrance",
"Radio Schizoid"
];

const audio = document.getElementById("audio");
const status = document.getElementById("status");
const logo = document.getElementById("logo");

let current = 0;

let cache = JSON.parse(localStorage.getItem("radio_cache") || "{}");
let favs = JSON.parse(localStorage.getItem("radio_favs") || "[]");

function saveCache(){
localStorage.setItem("radio_cache", JSON.stringify(cache));
}

function saveFavs(){
localStorage.setItem("radio_favs", JSON.stringify(favs));
}

/* LOGO + FALLBACK */
function setLogo(name){
const primary = `https://www.radio-browser.info/backends/logos/${encodeURIComponent(name)}.png`;
const fallback = `https://api.radio-browser.info/img/${encodeURIComponent(name)}`;

logo.src = primary;

logo.onerror = ()=>{
logo.src = fallback;
};
}

/* STREAM RESOLVER */
async function resolveStream(name){

if(cache[name]){
return cache[name];
}

try{
const res = await fetch(
`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=8`
);
const data = await res.json();

const best = data.find(s =>
s.url_resolved &&
s.url_resolved.startsWith("http")
);

if(best){
cache[name] = best.url_resolved;
saveCache();
return best.url_resolved;
}

}catch(e){}

return null;
}

/* LOAD */
async function load(i){

current = i;
const name = stations[i];

if(name==="__SEPARATOR__") return;

setLogo(name);

status.innerText = "ŁADOWANIE: " + name;

const url = cache[name] || await resolveStream(name);

if(!url){
status.innerText = "❌ BRAK STREAMU: " + name;
return;
}

audio.src = url;

audio.play()
.then(()=>{
status.innerText = "▶ GRA: " + name;
markLive(i);
})
.catch(()=>{
status.innerText = "⚠️ kliknij PLAY ręcznie";
});
}

/* LIVE MARKER */
function markLive(i){
document.querySelectorAll(".station").forEach((el,idx)=>{
el.classList.toggle("live", idx===i);
});
}

/* FAVORITES */
function toggleFav(name, el){
if(favs.includes(name)){
favs = favs.filter(f=>f!==name);
el.classList.remove("fav");
}else{
favs.push(name);
el.classList.add("fav");
}
saveFavs();
}

/* AUTO CACHE CLEANER */
setInterval(()=>{
cache = {};
localStorage.removeItem("radio_cache");
console.log("🧹 auto cache cleaned");
}, 600000);

/* SELF HEALING */
setInterval(async ()=>{
for(let i=0;i<stations.length;i++){
const name = stations[i];
if(name==="__SEPARATOR__") continue;

if(!cache[name]){
try{
const res = await fetch(
`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=1`
);
const data = await res.json();
if(data[0]?.url_resolved){
cache[name] = data[0].url_resolved;
saveCache();
}
}catch(e){}
}
}
}, 300000);

/* CLEAR CACHE */
function clearCache(){
cache = {};
localStorage.removeItem("radio_cache");
status.innerText = "CACHE WYCZYSZCZONY";
}

/* UI */
stations.forEach((s,i)=>{

if(s==="__SEPARATOR__"){
const sep=document.createElement("div");
sep.className="separator";
sep.innerText="Stacje zagraniczne";
document.getElementById("stations").appendChild(sep);
return;
}

const div=document.createElement("div");
div.className="station";
div.innerText=s;

const star=document.createElement("div");
star.className="star";
star.innerText="★";

if(favs.includes(s)) star.classList.add("fav");

star.onclick=(e)=>{
e.stopPropagation();
toggleFav(s, star);
};

div.appendChild(star);
div.onclick=()=>load(i);

document.getElementById("stations").appendChild(div);
});

</script>

</body>
</html>
