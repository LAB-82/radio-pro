<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polskie Radio App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    height: 100vh;
    display: flex;
}

/* LEWA LISTA */
#list {
    width: 320px;
    background: #151515;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #222;
    transition: 0.2s;
}

.station:hover {
    background: #242424;
}

.station img {
    width: 40px;
    height: 40px;
    border-radius: 6px;
}

.station span {
    font-size: 14px;
}

/* PRAWA STRONA */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#player {
    flex: 1;
    background: black;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* PANEL POD PLAYEREM */
#panel {
    height: 90px;
    background: #111;
    border-top: 1px solid #222;
    display: flex;
    align-items: center;
    padding: 10px;
    font-size: 13px;
    color: #aaa;
}
</style>
</head>

<body>

<!-- LISTA -->
<div id="list"></div>

<!-- PLAYER -->
<div id="main">
    <div id="player">
        <iframe id="frame" src=""></iframe>
    </div>
    <div id="panel">Wybierz stację aby rozpocząć</div>
</div>

<script>

// 📻 LISTA STACJI (Twoja + MyRadioOnline search fallback)
const stations = [
    "Muzyczne Radio Jelenia Góra",
    "Polskie Radio Jedynka",
    "Polskie Radio Dwójka",
    "Polskie Radio Trójka",
    "Polskie Radio Czwórka",
    "Radio Plus",
    "RMF FM",
    "Radio Zet",
    "Radio Eska",
    "Radio Wrocław",
    "Radio Wnet",
    "Tok FM",
    "Antyradio",
    "Radio Kolor",
    "Open FM",
    "Open FM Disco Polo",
    "Disco Radio",
    "Polish Radio London 24",
    "Polskie Radio Dzieciom",
    "Polskie Radio Chopin",
    "Radio Yanosik",
    "Radio Republika",
    "Radio dla Ciebie",
    "Radio Maryja",
    "Radio Jasna Góra"
];

// 🔥 MyRadioOnline search fallback (działa dla wszystkich stacji)
function getUrl(name) {
    return "https://myradioonline.pl/?s=" + encodeURIComponent(name);
}

const list = document.getElementById("list");
const frame = document.getElementById("frame");
const panel = document.getElementById("panel");

// 🎧 ODTWARZANIE W IFRAME (jak aplikacja)
function play(name) {
    panel.textContent = "🎧 Ładowanie: " + name;

    frame.src = getUrl(name);

    setTimeout(() => {
        panel.textContent = "📻 Teraz gra: " + name;
    }, 1200);
}

// 🧩 RENDER LISTY
stations.forEach(name => {
    const div = document.createElement("div");
    div.className = "station";

    div.innerHTML = `
        <img src="https://www.google.com/s2/favicons?domain=myradioonline.pl&sz=64">
        <span>${name}</span>
    `;

    div.onclick = () => play(name);

    list.appendChild(div);
});

</script>

</body>
</html>
