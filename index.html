<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
transition:0.4s;
position: relative;
overflow-x: hidden;
}

/* 🔥 CYBERPUNK GRID */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 200%;
  height: 200%;
  background:
    linear-gradient(transparent 95%, rgba(255, 0, 0, 0.08) 95%),
    linear-gradient(90deg, transparent 95%, rgba(255, 0, 0, 0.08) 95%);
  background-size: 40px 40px;
  animation: gridMove 6s linear infinite;
  z-index: 0;
  opacity: 0.3;
  pointer-events: none;
}

body.day::before {
  background:
    linear-gradient(transparent 95%, rgba(255, 0, 0, 0.05) 95%),
    linear-gradient(90deg, transparent 95%, rgba(255, 0, 0, 0.05) 95%);
  opacity: 0.2;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-40px, -40px); }
}

/* 🔥 SCANLINES */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(0, 0, 0, 0) 0px,
    rgba(0, 0, 0, 0) 2px,
    rgba(255, 0, 0, 0.03) 3px,
    rgba(0, 0, 0, 0) 4px
  );
  z-index: 1;
  pointer-events: none;
  animation: scanline 8s linear infinite;
}

@keyframes scanline {
  0% { transform: translateY(0); }
  100% { transform: translateY(10px); }
}

body.day{
background:#eaeaea;
color:#000;
}

/* 🔥 GLITCH TITLE */
#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
position: relative;
z-index: 10;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
animation: glitch 3s ease infinite alternate;
}

#title::before,
#title::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  width: 100%;
  overflow: hidden;
  pointer-events: none;
}

#title::before {
  color: #ff0000;
  z-index: -1;
  animation: glitchTop 3s infinite alternate;
  opacity: 0.9;
}

#title::after {
  color: #ff0000;
  z-index: -2;
  animation: glitchBottom 2.5s infinite alternate;
  opacity: 0.6;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(2px, -2px); }
  40% { transform: translate(-2px, 2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(-2px, -2px); }
  100% { transform: translate(0); }
}

@keyframes glitchTop {
  0% { clip-path: inset(0 0 80% 0); transform: translate(-3px, -3px); }
  50% { clip-path: inset(0 0 10% 0); transform: translate(3px, 0); }
  100% { clip-path: inset(80% 0 0 0); transform: translate(-3px, 3px); }
}

@keyframes glitchBottom {
  0% { clip-path: inset(80% 0 0 0); transform: translate(3px, 3px); }
  50% { clip-path: inset(10% 0 0 0); transform: translate(-3px, 0); }
  100% { clip-path: inset(0 0 80% 0); transform: translate(3px, -3px); }
}

body.day #title{
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
border: 1px solid rgba(255, 0, 0, 0.3);
position: relative;
z-index: 10;
}

body.day #proEqualizer{
box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
}

canvas{
display:block;
height:260px;
border-radius:8px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
position: relative;
z-index: 10;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a, inset 0 0 10px rgba(255, 0, 0, 0.2);
}

body.day .volumeWrapper{
background:#d6d6d6;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
text-transform: uppercase;
letter-spacing: 1px;
}

button:hover{
background: rgba(255, 0, 0, 0.1);
box-shadow:0 0 20px #ff2a2a, inset 0 0 10px rgba(255, 0, 0, 0.3);
transform: translateY(-1px);
}

body.day button{
background:#d6d6d6;
color:#000;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

#volume{
width:120px;
height:10px;
appearance:none;
border-radius:10px;
outline:none;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

#volume.active{
box-shadow:0 0 10px #ff0000;
border:1px solid #ff0000;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red;
cursor:pointer;
}

#volume::-moz-range-thumb{
width:16px;
height:16px;
border:none;
border-radius:4px;
background:#ff0000
