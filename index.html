<script>

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Dzieciom",
"Polskie Radio Chopin",
"Radio AH",
"Rock Radio",
"Radio Maryja",
"Radio Niepokalanów",
"Radio Rodzina"
];

/* 🔥 AUTO STREAM FINDER (ZAMIANA STREAMS) */

async function findStream(name){
try{
const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=1`);
const data = await res.json();
return data?.[0]?.url_resolved || null;
}catch(e){
return null;
}
}

/* AUDIO */
const audio=document.getElementById("audio");
const status=document.getElementById("status");

let current=0;

async function load(i){

current=i;
const name=stations[i];

status.innerText="SEARCHING STREAM: "+name;

const url = await findStream(name);

if(!url){
status.innerText="NO STREAM FOUND: "+name;
return;
}

audio.src=url;

audio.play()
.then(()=>status.innerText="PLAYING: "+name)
.catch(err=>status.innerText="PLAY BLOCKED: "+err);
}

function play(){load(current);}
function stop(){audio.pause();audio.src="";status.innerText="STOPPED";}
function mute(){audio.muted=!audio.muted;}

/* UI */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;
div.onclick=()=>load(i);
document.getElementById("stations").appendChild(div);
});

</script>
