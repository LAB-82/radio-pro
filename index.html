<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Moje Radio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* TWÓJ CSS – BEZ ZMIAN */
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}
body.day{background:#eaeaea;color:#000;}
#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}
canvas{display:block;height:260px;border-radius:8px;}
#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}
button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
border:2px solid #ff2a2a;
}
#stations{
width:90%;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.station{
background:#111;
padding:10px;
border-radius:10px;
cursor:pointer;
text-align:center;
}
</style>
</head>

<body>

<div id="title">Moje Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button onclick="playRadio()">PLAY</button>
<button onclick="stopRadio()">STOP</button>
<button onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button onclick="toggleMode()">🌙</button>
</div>

<div id="stations"></div>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio");
let hls;

/* 🔥 STACJE (MP3 + HLS) */
const stations = [

{ name:"Muzyczne Radio", url:"https://stream.rcs.revma.com/gzwc1xcq042vv" },

{ name:"Polskie Radio Jedynka", url:"https://stream.polskieradio.pl/pr1/pr1.m3u8" },
{ name:"Polskie Radio Dwójka", url:"https://stream.polskieradio.pl/pr2/pr2.m3u8" },
{ name:"Polskie Radio Trójka", url:"https://stream.polskieradio.pl/pr3/pr3.m3u8" },
{ name:"Polskie Radio Czwórka", url:"https://stream.polskieradio.pl/pr4/pr4.m3u8" },
{ name:"Polskie Radio Chopin", url:"https://stream.polskieradio.pl/chopin/chopin.m3u8" },

{ name:"Radio Wrocław", url:"https://stream4.nadaje.com:9001/radiowroclaw" },
{ name:"Radio Wnet", url:"https://stream.rcs.revma.com/wnet" },
{ name:"Radio dla Ciebie", url:"https://stream.rdc.pl/stream" }

];

/* UI */
const container = document.getElementById("stations");

stations.forEach(s=>{
const div = document.createElement("div");
div.className="station";
div.innerText = s.name;
div.onclick = ()=>loadStation(s.url);
container.appendChild(div);
});

/* 🔥 KLUCZ – OBSŁUGA HLS + MP3 */
function loadStation(url){

stopRadio();

if(url.includes(".m3u8")){
if(Hls.isSupported()){
hls = new Hls();
hls.loadSource(url);
hls.attachMedia(audio);
hls.on(Hls.Events.MANIFEST_PARSED, function() {
audio.play();
});
}
}else{
audio.src = url;
audio.play();
}

}

/* Twoje przyciski */
function playRadio(){
if(audio.src) audio.play();
}

function stopRadio(){
audio.pause();
audio.src="";
if(hls){
hls.destroy();
hls=null;
}
}

function muteRadio(){
audio.muted = !audio.muted;
}

function toggleMode(){
document.body.classList.toggle("day");
}

document.getElementById("volume").addEventListener("input",(e)=>{
audio.volume = e.target.value;
});

</script>

</body>
</html>
