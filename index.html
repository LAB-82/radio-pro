<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-red:#ff2a2a;
  --cp-bg:#000014;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(0, 240, 255,.05) 25%, rgba(0, 240, 255,.05) 26%, transparent 27%, transparent 74%, rgba(0, 240, 255,.05) 75%, rgba(0, 240, 255,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(255, 0, 60,.05) 25%, rgba(255, 0, 60,.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 60,.05) 75%, rgba(255, 0, 60,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  min-height:100vh;
  padding-bottom: 40px;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:var(--cp-cyan);
  text-shadow:
    0 0 5px var(--cp-cyan),
    0 0 10px var(--cp-cyan),
    0 0 20px var(--cp-cyan),
    0 0 40px var(--cp-magenta),
    0 0 80px var(--cp-magenta);
  animation: flicker 3s infinite alternate;
}

@keyframes flicker {
  0%, 18%, 22%, 25%, 53%, 57%, 100% {
    text-shadow:
      0 0 5px var(--cp-cyan),
      0 0 10px var(--cp-cyan),
      0 0 20px var(--cp-cyan),
      0 0 40px var(--cp-magenta),
      0 0 80px var(--cp-magenta);
    opacity: 1;
  }
  20%, 24%, 55% {
    text-shadow: none;
    opacity: 0.8;
  }
}

#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
  width: 600px;
  height: 260px;
  display: block;
  box-sizing: border-box;
  position: relative;
  background: #000014;
  box-shadow: 0 0 10px var(--cp-cyan), 0 0 20px var(--cp-magenta), inset 0 0 20px rgba(0,240,255,0.2);
}

#proEqualizer::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border: 2px solid var(--cp-cyan);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  pointer-events: none;
}

canvas{
  display: block;
  width: 100%;
  height: 100%;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
  margin-bottom:20px;
  align-items: center;
}

.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a1a;
  position: relative;
  box-sizing: border-box;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.3);
}

.volumeWrapper::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border: 2px solid var(--cp-cyan);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  pointer-events: none;
}

button{
  width:160px;
  height:45px;
  background:#0a0a1a;
  color:var(--cp-cyan);
  cursor:pointer;
  font-family:'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 0 8px var(--cp-cyan), inset 0 0 8px rgba(0,240,255,0.2);
  transition: all 0.15s ease;
  box-sizing: border-box;
  position: relative;
  border: none;
}

button::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border: 2px solid var(--cp-cyan);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  pointer-events: none;
}

button:hover{
  background:var(--cp-cyan);
  color:#000014;
  box-shadow: 0 0 15px var(--cp-cyan), 0 0 30px var(--cp-magenta);
  transform: translateY(-1px);
}

button:active{
  transform: translateY(1px);
  box-shadow: 0 0 5px var(--cp-cyan);
}

#volume{
  width:120px;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #0a0a1a;
  border: 1px solid var(--cp-cyan);
  outline: none;
  margin: 0;
}

#volume::-webkit-slider-thumb{
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  background: var(--cp-yellow);
  cursor: pointer;
  border: 2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
  border-radius: 2px;
  margin-top: -7px;
}

#volume::-moz-range-thumb{
  width: 16px;
  height: 16px;
  background: var(--cp-yellow);
  cursor: pointer;
  border: 2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
  border-radius: 2px;
}

#volume::-webkit-slider-runnable-track{
  background: linear-gradient(90deg, var(--cp-magenta), var(--cp-cyan));
  height: 4px;
}

#volume::-moz-range-track{
  background: linear-gradient(90deg, var(--cp-magenta), var(--cp-cyan));
  height: 4px;
}

#volume.center::-webkit-slider-thumb{
  background: var(--cp-yellow);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
}

#volume.center::-moz-range-thumb{
  background: var(--cp-yellow);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
}

#volume.changed::-webkit-slider-thumb{
  background: var(--cp-red);
  box-shadow: 0 0 8px var(--cp-red), 0 0 15px var(--cp-magenta);
}

#volume.changed::-moz-range-thumb{
  background: var(--cp-red);
  box-shadow: 0 0 8px var(--cp-red), 0 0 15px var(--cp-magenta);
}

.playActive{
  color:#000014!important;
  background: var(--cp-cyan)!important;
  box-shadow: 0 0 20px var(--cp-cyan), 0 0 40px var(--cp-cyan)!important;
}
.stopActive{
  color:#000014!important;
  background: var(--cp-magenta)!important;
  box-shadow: 0 0 20px var(--cp-magenta), 0 0 40px var(--cp-magenta)!important;
}
.stopActive::before{
  border-color: var(--cp-magenta)!important;
}
.muteActive{
  color:#000014!important;
  background: var(--cp-yellow)!important;
  box-shadow: 0 0 20px var(--cp-yellow), 0 0 40px var(--cp-yellow)!important;
}
.muteActive::before{
  border-color: var(--cp-yellow)!important;
}

#bottomLink{
  margin-top:10px;
}

#bottomLink a{
  color:var(--cp-cyan);
  text-decoration:none;
  font-family:'Orbitron', sans-serif;
  text-shadow: 0 0 5px var(--cp-cyan);
  transition: 0.2s;
}

#bottomLink a:hover{
  color:var(--cp-yellow);
  text-shadow: 0 0 10px var(--cp-yellow), 0 0 20px var(--cp-magenta);
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<div id="proEqualizer"><canvas id="eqCanvas"></canvas></div>

<div id="controls">
  <button id="playBtn" onclick="playRadio()">PLAY</button>
  <button id="stopBtn" onclick="stopRadio()">STOP</button>
  <button id="muteBtn" onclick="muteRadio()">MUTE</button>

  <div class="volumeWrapper">
    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
  </div>
</div>

<div id="bottomLink">
  <a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" preload="none"></audio>

<script>
// MUZYCZNE RADIO JELENIA GÓRA - konkretna stacja
const STREAM_URL = "https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio = document.getElementById("audio");
const volume = document.getElementById("volume");
const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");
const muteBtn = document.getElementById("muteBtn");
const canvas = document.getElementById("eqCanvas");
const ctx = canvas.getContext("2d");

audio.volume = parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let peaks = [];
let animationStarted = false;
let isPlaying = false;
let corsBlocked = false;

function setupAudio() {
  if (audioCtx) return true;

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.8;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    for(let i = 0; i < 300; i++) peaks[i] = 0;
    return true;
  } catch(e) {
    console.warn("CORS blokuje AnalyserNode - EQ wyłączony");
    corsBlocked = true;
    return false;
  }
}

function playRadio() {
  if (isPlaying) return;

  audio.src = STREAM_URL;

  // Najpierw spróbuj z AnalyserNode
  if (setupAudio() &&!corsBlocked) {
    audioCtx.resume().then(() => {
      return audio.play();
    }).then(() => {
      isPlaying = true;
      playBtn.classList.add("playActive");
      stopBtn.classList.remove("stopActive");
      if (!animationStarted) {
        animationStarted = true;
        draw();
      }
    }).catch(err => {
      // Fallback bez EQ jeśli CORS blokuje
      console.warn("Fallback bez EQ:", err);
      audio.play().then(() => {
        isPlaying = true;
        playBtn.classList.add("playActive");
        stopBtn.classList.remove("stopActive");
        corsBlocked = true;
        if (!animationStarted) {
          animationStarted = true;
          draw();
        }
      }).catch(e => {
        console.error("Całkowity błąd:", e);
        playBtn.classList.remove("playActive");
      });
    });
  } else {
    // Gra bez EQ od razu
    audio.play().then(() => {
      isPlaying = true;
      playBtn.classList.add("playActive");
      stopBtn.classList.remove("stopActive");
      if (!animationStarted) {
        animationStarted = true;
        draw();
      }
    }).catch(err => {
      console.error("Błąd odtwarzania:", err);
      playBtn.classList.remove("playActive");
    });
  }
}

function stopRadio() {
  audio.pause();
  audio.src = "";
  isPlaying = false;

  stopBtn.classList.add("stopActive");
  playBtn.classList.remove("playActive");

  setTimeout(() => {
    stopBtn.classList.remove("stopActive");
  }, 1000);

  for(let i = 0; i < peaks.length; i++) {
    peaks[i] = 0;
  }
}

function muteRadio() {
  audio.muted =!audio.muted;
  muteBtn.classList.toggle("muteActive");
  updateVolumeThumb();
}

function updateVolumeThumb() {
  let val = parseFloat(volume.value);
  volume.classList.remove("center", "changed");

  if (audio.muted) return;

  if (Math.abs(val - 0.5) < 0.02) {
    volume.classList.add("center");
  } else {
    volume.classList.add("changed");
  }
}

volume.addEventListener("input", () => {
  let val = parseFloat(volume.value);
  audio.volume = val;

  if (audio.muted && val > 0) {
    audio.muted = false;
    muteBtn.classList.remove("muteActive");
  }

  updateVolumeThumb();
});

function resizeCanvas() {
  let dpr = window.devicePixelRatio || 1;
  let width = 600;
  let height = 260;

  canvas.width = width * dpr;
  canvas.height = height * dpr;

  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}

window.addEventListener("load", () => {
  resizeCanvas();
  updateVolumeThumb();
});
window.addEventListener("resize", resizeCanvas);

function draw() {
  requestAnimationFrame(draw);

  if (!corsBlocked && analyser && dataArray) {
    analyser.getByteFrequencyData(dataArray);
  }

  drawEQ();
}

function drawEQ() {
  const width = 600;
  const heightCanvas = 260;

  ctx.fillStyle = '#000014';
  ctx.fillRect(0, 0, width, heightCanvas);

  if (corsBlocked) {
    ctx.fillStyle = '#ff003c';
    ctx.font = '16px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillText('RADIO GRA - EQ ZABLOKOWANY PRZEZ CORS', 300, 130);
    return;
  }

  const bars = 80;
  const barWidth = width / bars;
  const step = Math.floor(dataArray.length / bars * 1.5);

  const yOffset = 8;
  const maxHeight = heightCanvas * 0.92;

  const barGradient = ctx.createLinearGradient(0, heightCanvas, 0, 0);
  barGradient.addColorStop(0, '#ff003c');
  barGradient.addColorStop(0.5, '#00f0ff');
  barGradient.addColorStop(1, '#fcee09');

  for (let i = 0; i < bars; i++) {
    const index = i * step;

    let value = dataArray[index] || 0;
    let percent = value / 255;
    let h = Math.pow(percent, 0.6) * maxHeight;

    const x = i * barWidth;
    const y = heightCanvas - h + yOffset;

    ctx.fillStyle = barGradient;
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 10;
    ctx.fillRect(x, y, barWidth, h);
    ctx.shadowBlur = 0;

    if (!peaks[i]) peaks[i] = 0;

    if (h > peaks[i]) {
      peaks[i] = h;
    } else {
      peaks[i] *= 0.92;
    }

    if (peaks[i] < 2) peaks[i] = 0;

    const peakY = heightCanvas - peaks[i] + yOffset;
    ctx.fillStyle = "#fcee09";
    ctx.shadowColor = '#fcee09';
    ctx.shadowBlur = 15;
    ctx.fillRect(x + 1, peakY, barWidth - 2, 4);
    ctx.shadowBlur = 0;
  }
}

resizeCanvas();
</script>

</body>
</html>
