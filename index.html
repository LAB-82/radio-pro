<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial;
}

header{
text-align:center;
padding:12px;
color:#ff2a2a;
font-size:20px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:12px;
padding:14px;
text-align:center;
cursor:pointer;
}

.card:active{
transform:scale(0.96);
border-color:#ff2a2a;
}

#player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:10px;
display:flex;
justify-content:center;
gap:10px;
border-top:1px solid #222;
}

button{
background:black;
color:white;
border:1px solid red;
padding:10px 14px;
border-radius:8px;
}
</style>
</head>

<body>

<header>📻 RADIO PRO (REAL SYSTEM A)</header>

<div class="grid" id="grid"></div>

<div id="player">
<button onclick="stopRadio()">STOP</button>
</div>

<audio id="audio" controls style="width:100%;position:fixed;bottom:60px;left:0;"></audio>

<script>

const PROXY = "https://YOUR-WORKER.workers.dev/?url=";

const stations = [
{
name:"RMF FM",
url:"https://rs8-krk2-cyfronet.rmfstream.pl/RMFFM48.mp3"
},
{
name:"Radio ZET",
url:"https://zt01.cdn.eurozet.pl/ZET128.mp3"
},
{
name:"Radio Eska",
url:"https://waw01-02.cdn.eurozet.pl/ESKA.mp3"
},
{
name:"TOK FM",
url:"https://radiostream.pl/tuba9-1.mp3"
},
{
name:"BBC Radio 1",
url:"https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one"
}
];

const audio = document.getElementById("audio");

function play(url){

stopRadio();

fetch(PROXY + encodeURIComponent(url))
.then(r => r.text())
.then(stream => {

audio.src = stream;
audio.play().catch(e=>{
alert("PLAY ERROR");
console.log(e);
});

});

}

function stopRadio(){
audio.pause();
audio.src = "";
}

const grid = document.getElementById("grid");

stations.forEach(s=>{

const div = document.createElement("div");
div.className = "card";
div.innerHTML = s.name;

div.onclick = ()=>play(s.url);

grid.appendChild(div);

});

</script>

</body>
</html>
