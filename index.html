<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIO DEBUG</title>
<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;padding:20px;}
button{padding:15px;margin:10px;border:1px solid red;background:#111;color:#fff;}
#log{margin-top:20px;font-size:14px;color:#0f0;white-space:pre-wrap;}
</style>
</head>
<body>

<h2>RADIO DEBUG TEST</h2>

<button onclick="testPlay()">PLAY TEST</button>
<button onclick="stop()">STOP</button>

<audio id="audio" controls></audio>

<div id="log"></div>

<script>

const audio = document.getElementById("audio");
const log = document.getElementById("log");

/* 🔥 NAJPROSTSZY PEWNY STREAM */
const STREAM = "https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one";

function write(msg){
log.textContent += msg + "\n";
}

async function testPlay(){

write("▶ klik PLAY");

try{

audio.src = STREAM;
audio.load();

await audio.play();

write("✅ PLAY OK");

}catch(e){

write("❌ ERROR:");
write(e.message);

console.log(e);

}

}

function stop(){
audio.pause();
audio.src="";
write("⏹ STOP");
}

</script>

</body>
</html>
