<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE V3 2026</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
}
.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

audio{
width:80%;
}

#status{
font-size:13px;
opacity:0.8;
text-align:center;
white-space:pre-line;
}
</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE V3 (2026 AUTO STREAM)</div>

<div id="player">
<audio id="audio" controls></audio>
<div id="status">READY</div>
</div>

</div>

<script>

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Dzieciom",
"Polskie Radio Chopin",
"Radio AH",
"Rock Radio",
"Radio Maryja",
"Radio Niepokalanów",
"Radio Rodzina"
];

const audio = document.getElementById("audio");
const status = document.getElementById("status");

let current = 0;

/* 🔥 CORE ENGINE: szuka działających streamów */
async function resolveStream(name){
status.innerText = "🔎 SZUKAM STREAMU: " + name;

const urls = await fetch(
`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=8`
).then(r=>r.json()).catch(()=>[]);

/* filtr tylko działających audio streamów */
const valid = urls.find(s =>
s.url_resolved &&
!s.url_resolved.includes(".m3u8") &&   // HLS out
!s.hls
);

return valid?.url_resolved || urls?.[0]?.url_resolved || null;
}

async function load(i){
current = i;
const name = stations[i];

status.innerText = "⏳ ŁADOWANIE: " + name;

const url = await resolveStream(name);

if(!url){
status.innerText = "❌ BRAK DZIAŁAJĄCEGO STREAMU";
return;
}

audio.src = url;

audio.play()
.then(()=>status.innerText = "▶ GRA: " + name)
.catch(err=>{
status.innerText = "⚠️ BLOKADA ODTWARZANIA (kliknij PLAY)";
console.log(err);
});
}

/* UI */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;
div.onclick=()=>load(i);
document.getElementById("stations").appendChild(div);
});

</script>

</body>
</html>
