<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio Player FIX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    height:100vh;
}

#sidebar{
    width:300px;
    background:#141414;
    overflow-y:auto;
}

.station{
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.station.active{
    background:#333;
    font-weight:bold;
}

#main{
    flex:1;
    display:flex;
    flex-direction:column;
}

#header{
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

#player{
    width:400px;
    height:300px;
    background:#111;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
}

#logo{
    width:200px;
    height:100px;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
}

#controls{
    display:flex;
    gap:15px;
}

button{
    font-size:20px;
    cursor:pointer;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#222;
    color:white;
}

button:hover{
    background:#333;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 RADIO PLAYER</div>

<div id="playerBox">

<div id="player">

<div id="logo">RADIO</div>

<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶ / ⏸</button>
<button onclick="next()">⏭</button>
<button onclick="mute()">🔊</button>

</div>

</div>

<audio id="audio"></audio>

</div>

<script>

const stations = [
"Muzyczne Radio",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Tok FM"
];

// REALNY test stream (BBC - działa)
const streams = stations.map(()=> 
"https://stream.live.vc.bbcmedia.co.uk/bbc_radio_fourlw"
);

let i = 0;
let playing = false;

const audio = document.getElementById("audio");
const sidebar = document.getElementById("sidebar");
const logo = document.getElementById("logo");

function load(x){
    i = x;

    document.querySelectorAll(".station").forEach((el,idx)=>{
        el.classList.toggle("active", idx===i);
    });

    logo.innerText = stations[i];

    audio.src = streams[i];

    if(playing){
        audio.play();
    }
}

stations.forEach((s,idx)=>{
    const div = document.createElement("div");
    div.className="station";
    div.innerText=s;
    div.onclick=()=>load(idx);
    sidebar.appendChild(div);
});

function toggle(){
    playing = !playing;

    if(playing){
        audio.play();
    } else {
        audio.pause();
    }
}

function prev(){
    load((i-1+stations.length)%stations.length);
}

function next(){
    load((i+1)%stations.length);
}

function mute(){
    audio.muted = !audio.muted;
}

load(0);

</script>

</body>
</html>
