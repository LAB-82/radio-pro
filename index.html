<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio - NIGHT CITY UI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- 🌐 CYBERPUNK FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
}

/* 🌆 NIGHT CITY BACKGROUND */
body{
background:
radial-gradient(circle at center, #0a0000 0%, #000 60%, #000 100%),
repeating-linear-gradient(
0deg,
rgba(255,0,0,0.05),
rgba(255,0,0,0.05) 1px,
transparent 1px,
transparent 4px
);

font-family:"Orbitron",sans-serif;
color:#ff2a2a;

display:flex;
flex-direction:column;
align-items:center;
height:100vh;

/* cyber glow */
box-shadow: inset 0 0 150px rgba(255,0,0,0.2);
}

/* 🌆 GLITCH TITLE */
#title{
font-size:90px;
margin-top:40px;
text-transform:uppercase;
letter-spacing:12px;

color:#ff2a2a;

text-shadow:
0 0 10px #ff0000,
0 0 30px #ff0000,
0 0 60px #8b0000;

position:relative;
animation: glitch 2.5s infinite;
}

/* glitch effect */
@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(2px,-1px);}
60%{transform:translate(-1px,1px);}
80%{transform:translate(1px,-2px);}
100%{transform:translate(0);}
}

/* 🌆 VISUALIZER */
#proEqualizer{
margin-top:30px;
margin-bottom:30px;
border-radius:10px;
box-shadow:
0 0 25px #ff0000,
0 0 80px rgba(255,0,0,0.4);
}

canvas{
display:block;
height:260px;
}

/* 🌆 CONTROL PANEL */
#controls{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

/* 🔴 CYBER BUTTONS */
button{
width:160px;
height:45px;

background: rgba(10,0,0,0.8);
color:#ff2a2a;

font-family:"Orbitron",sans-serif;

border:1px solid #ff2a2a;

box-shadow:
0 0 15px #ff0000,
inset 0 0 10px rgba(255,0,0,0.2);

cursor:pointer;
transition:0.2s;

text-transform:uppercase;
letter-spacing:2px;
}

button:hover{
transform:scale(1.08);
box-shadow:
0 0 30px #ff0000,
0 0 80px #ff2a2a;
}

/* 🌆 VOLUME SLIDER */
.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;

background: rgba(0,0,0,0.7);
border:1px solid #ff2a2a;
box-shadow:0 0 20px #ff0000;
}

#volume{
width:120px;
appearance:none;
height:6px;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 10px #ff0000;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:14px;
height:14px;
background:#ff2a2a;
box-shadow:0 0 15px #ff0000;
cursor:pointer;
}

/* 🌆 HUD LABEL */
#bottomLink a{
color:#ff2a2a;
text-shadow:0 0 15px #ff0000;
text-decoration:none;
font-size:16px;
}

/* 🌆 SCANLINES */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
repeating-linear-gradient(
0deg,
rgba(255,0,0,0.05),
rgba(0,0,0,0.0) 2px,
transparent 4px
);
pointer-events:none;
mix-blend-mode:overlay;
}

/* 🌆 FLICKER */
@keyframes flicker{
0%{opacity:1;}
50%{opacity:0.8;}
100%{opacity:1;}
}

#title{
animation:glitch 2s infinite, flicker 3s infinite;
}

</style>
</head>

<body>

<div id="title">MUZYCZNE RADIO</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">

<button onclick="playRadio()">PLAY</button>
<button onclick="stopRadio()">STOP</button>
<button onclick="muteRadio()">MUTE</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

</div>

<div id="bottomLink">
<a href="#">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

let audio=document.getElementById("audio");
let volume=document.getElementById("volume");
let canvas=document.getElementById("proEqualizer");
let ctx=canvas.getContext("2d");

audio.volume=volume.value;

let audioCtx, analyser, source, dataArray;
let animationStarted=false;

function setupAudio(){
if(audioCtx) return;
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);
analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
source.connect(analyser);
analyser.connect(audioCtx.destination);
dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src=STREAM_URL;
audio.play();
if(!animationStarted){animationStarted=true;draw();}
}

function stopRadio(){
audio.pause();
}

function muteRadio(){
audio.muted=!audio.muted;
}

volume.addEventListener("input",()=>{
audio.volume=volume.value;
});

function draw(){
requestAnimationFrame(draw);
if(!analyser||!dataArray)return;
analyser.getByteFrequencyData(dataArray);

let w=canvas.width=window.innerWidth;
let h=canvas.height=260;

ctx.clearRect(0,0,w,h);

for(let i=0;i<100;i++){
let v=dataArray[i]||0;
let bh=(v/255)*h;

ctx.fillStyle="#ff2a2a";
ctx.fillRect(i*10,h-bh,6,bh);
}
}
</script>

</body>
</html>
