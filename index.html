<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026 FULL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
position:relative;
transition:0.2s;
}

.station:hover{background:#2a2a2a;}
.station.live{background:#1f7a3a;}

.star{
position:absolute;
top:4px;
right:6px;
font-size:12px;
cursor:pointer;
opacity:0.5;
}
.star.fav{opacity:1;color:gold;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

audio{
width:80%;
}

#logo{
width:160px;
height:120px;
object-fit:contain;
background:#111;
padding:8px;
border-radius:10px;
}

#status{
font-size:13px;
opacity:0.8;
white-space:pre-line;
}
</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">
<div id="header">🎧 RADIO ENGINE PRO 2026 (SELF HEALING)</div>
<div id="player">
<img id="logo"/>
<audio id="audio" controls></audio>
<div id="status">READY</div>
</div>
</div>

<script>
const stations = [
"Muzyczne Radio",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Wrocław",
"Tok FM",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Rodzina",
"Polskie Radio"
];

const audio = document.getElementById("audio");
const status = document.getElementById("status");
const logo = document.getElementById("logo");

let current = 0;

let favs = JSON.parse(localStorage.getItem("radio_favs") || "[]");

const manualStreams = {
"Muzyczne Radio":"https://www.muzyczneradio.pl/index.php/player/lo.html?type=lo",
"Radio Plus":"https://www.radio-polska.pl/radio-plus-legnica",
"RMF FM":"https://www.radio-polska.pl/rmf-fm",
"Radio Zet":"https://www.radio-polska.pl/radio-zet",
"Radio Wrocław":"https://www.radio-polska.pl/pr-radio-wroclaw-1023",
"Tok FM":"https://www.radio-polska.pl/tok-fm",
"Radio Kolor":"https://www.radio-polska.pl/radio-kolor-103-fm",
"Radio Złote Przeboje":"https://www.radio-polska.pl/radio-zlote-przeboje",
"Planeta FM":"https://www.radio-polska.pl/planeta-fm",
"Radio Kampus":"https://www.radio-polska.pl/radio-kampus-971",
"Radio Rodzina":"https://www.radio-polska.pl/katolickie-radio-rodzina",
"Polskie Radio":"http://e.radio-polska.pl/embed/radio-poland-411263"
};

/* Funkcja ustawiająca logo */
async function setLogo(name){
logo.src = "https://via.placeholder.com/160x120?text=" + encodeURIComponent(name);
}

/* Funkcja ładowania stacji */
async function load(i){
current = i;
const name = stations[i];

status.innerText = "ŁADOWANIE: " + name;

/* reset */
audio.pause();
audio.src = "";
document.querySelectorAll(".station").forEach(el => el.classList.remove("live"));
const stationDivs = document.querySelectorAll(".station");
if(stationDivs[i]) stationDivs[i].classList.add("live");

const url = manualStreams[name];

if(!url){
status.innerText = "❌ BRAK LINKU: " + name;
 return;
}

/* embed */
if(url.includes("radio-polska.pl") || url.includes("radio-poland") || url.includes("muzyczneradio.pl")){
frame.style.display = "block";
frame.src = url;
status.innerText = "▶ GRA (EMBED): " + name;
return;
}

/* audio fallback */
frame.style.display = "none";
audio.src = url;
audio.volume = 0.85;

try {
  await audio.play();
  status.innerText = "▶ GRA: " + name;
} catch(e) {
  status.innerText = "⚠️ Kliknij odtwarzanie ręcznie.";
}
}

/* Funkcja ustawiania logo */
setLogo(stations[0]);

/* Tworzenie elementów stacji */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;

const star=document.createElement("div");
star.className="star";
star.innerText="★";

if(favs.includes(s)) star.classList.add("fav");

star.onclick=(e)=>{
e.stopPropagation();
if(favs.includes(s)){
favs = favs.filter(f=>f!==s);
star.classList.remove("fav");
} else {
favs.push(s);
star.classList.add("fav");
}
localStorage.setItem("radio_favs", JSON.stringify(favs));
};

div.appendChild(star);
div.onclick=()=>load(i);
document.getElementById("stations").appendChild(div);
});

// Załaduj domyślnie pierwszą stację i odtwórz ją automatycznie po załadowaniu
window.onload = () => {
  load(0);
};
</script>

</body>
</html>
