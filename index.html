<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE FIX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#playerBox{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

#status{
padding:10px;
font-size:13px;
opacity:0.8;
}

audio{
width:90%;
}
</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE FIX</div>

<div id="playerBox">
<div>
<audio id="audio" controls></audio>
<div id="status">READY</div>
</div>
</div>

</div>

<script>

const stations = [
"RMF FM",
"Radio Zet",
"Radio Eska",
"Antyradio",
"Tok FM"
];

const STREAMS = {
"RMF FM":"https://rs6-krk2-cyfronet.rmfstream.pl/RMFFM48",
"Radio Zet":"https://zt.cdn.eurozet.pl/ZET128.mp3",
"Radio Eska":"https://waw.ic.smcdn.pl/t043-1.mp3",
"Antyradio":"https://stream.antyradio.pl/stream.mp3",
"Tok FM":"https://radiostream.pl/tuba10-1.mp3"
};

const audio = document.getElementById("audio");
const status = document.getElementById("status");

function load(name){
const url = STREAMS[name];

status.innerText = "ŁADOWANIE: " + name;

if(!url){
status.innerText = "BRAK STREAMU: " + name;
return;
}

audio.src = url;

audio.play()
.then(()=>status.innerText="GRA: "+name)
.catch(err=>{
status.innerText="BLOKADA ODTWARZANIA: kliknij PLAY ręcznie";
console.log(err);
});
}

/* UI */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;
div.onclick=()=>load(s);
document.getElementById("stations").appendChild(div);
});

</script>

</body>
</html>
