<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio FIX RESTORE</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
}

.station:hover { background:#222; }

.station.active {
    background:#2a2a2a;
    color:#00ff90;
    font-weight:bold;
}

.station img{
    width:20px;
    height:20px;
    border-radius:4px;
}

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#radioPlayer{
    width:90%;
    height:90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

#logoBox img{
    width:220px;
    margin-bottom:20px;
    border-radius:10px;
    background:#222;
}

/* BIG PLAY */
#bigPlay{
    font-size:70px;
    cursor:pointer;
}

/* RIGHT CONTROL PANEL (NOWY ELEMENT – zgodnie z Twoją prośbą) */
#sideControls{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#1a1a1a;
    padding:10px;
    border-radius:12px;
}

.ctrlBtn{
    cursor:pointer;
    padding:8px;
    background:#222;
    text-align:center;
    border-radius:6px;
    font-size:14px;
}

.ctrlBtn:hover{
    background:#333;
}

#bottomBar{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 18px;
    border-radius:30px;
    display:flex;
    gap:18px;
}

#controls {
    height:70px;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.btn { cursor:pointer; font-size:20px; }
</style>

</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 RADIO FIX RESTORE</div>

<div id="playerBox">
    <div id="radioPlayer">

        <div id="logoBox">
            <img id="stationLogo" src="">
        </div>

        <div id="bigPlay" onclick="toggle()">▶</div>

        <!-- RIGHT PANEL (PLAY / STOP / MUTE / VOLUME) -->
        <div id="sideControls">
            <div class="ctrlBtn" onclick="toggle()">Play</div>
            <div class="ctrlBtn" onclick="stopRadio()">Stop</div>
            <div class="ctrlBtn" onclick="mute()">Mute</div>
            <div class="ctrlBtn" onclick="volumeUp()">Vol+</div>
        </div>

        <div id="bottomBar">
            <div onclick="prev()">⏮</div>
            <div onclick="toggle()" id="playIcon">▶</div>
            <div onclick="next()">⏭</div>
            <div onclick="mute()">🔊</div>
        </div>

    </div>
</div>

<div id="controls">
    <div class="btn" onclick="prev()">⏮</div>
    <div class="btn" onclick="toggle()">⏯</div>
    <div class="btn" onclick="next()">⏭</div>
    <div class="btn" onclick="mute()">🔊</div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   STATIONS
========================= */

const stations = [
"Muzyczne Radio",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Polskie Radio Jedynka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Tok FM",
"Antyradio",
"Radio Wrocław",
"Radio Wnet"
];

/* =========================
   WORKING STREAMS ONLY
========================= */

const STREAMS = {
"Muzyczne Radio":"https://stream.rcs.revma.com/gzwc1xcq042vv",
"RMF FM":"https://rs6-krk2.rmfstream.pl/rmf_fm",
"Radio Zet":"https://zt.cdn.eurozet.pl/ZET.mp3",
"Radio Eska":"https://waw01-01.ic.smcdn.pl/t043-1.mp3",
"Polskie Radio Jedynka":"https://stream.polskieradio.pl/program1.mp3",
"Polskie Radio Trójka":"https://stream3.polskieradio.pl/pr3_aac128",
"Polskie Radio Czwórka":"https://stream4.polskieradio.pl/pr4_aac128",
"Tok FM":"https://radiostream.pl/tuba10-1.mp3",
"Antyradio":"https://antyradio-01.cdn.eurozet.pl/antyradio.mp3",
"Radio Wrocław":"https://stream4.nadaje.com/radiowroclaw",
"Radio Wnet":"https://stream.rcs.revma.com/wnet"
};

let index=0;
let playing=false;

const audio=document.getElementById("audio");
const sidebar=document.getElementById("sidebar");

let volumeStep=0.2;

function getStream(name){
    return STREAMS[name] || null;
}

/* ICONS */
function icon(name){
    return `https://www.google.com/s2/favicons?sz=64&domain=${name.replace(/ /g,"")}.pl`;
}

function setLogo(name){
 document.getElementById("stationLogo").src =
 "https://via.placeholder.com/220x120?text="+encodeURIComponent(name);
}

function setActive(){
 document.querySelectorAll(".station").forEach((el,i)=>{
    el.classList.toggle("active", i===index);
 });
}

function load(i){

index=i;
let name=stations[i];

setLogo(name);

let url=getStream(name);

if(!url){
    audio.removeAttribute("src");
    document.getElementById("playIcon").innerText="❌";
    return;
}

audio.src=url;

if(playing){
    audio.play().catch(()=>{});
}

setUI();
setActive();
}

function toggle(){

if(!audio.src) load(index);

if(!audio.src) return;

if(playing){
    audio.pause();
    playing=false;
}else{
    audio.play().catch(()=>{});
    playing=true;
}

setUI();
}

function stopRadio(){
audio.pause();
audio.removeAttribute("src");
playing=false;
setUI();
}

function mute(){
audio.muted=!audio.muted;
}

function volumeUp(){
audio.volume = Math.min(1, audio.volume + volumeStep);
}

function setUI(){
document.getElementById("bigPlay").innerText=playing?"⏸":"▶";
document.getElementById("playIcon").innerText=playing?"⏸":"▶";
}

function prev(){
index=(index-1+stations.length)%stations.length;
load(index);
}

function next(){
index=(index+1)%stations.length;
load(index);
}

/* SIDEBAR */
stations.forEach((s,i)=>{
let div=document.createElement("div");
div.className="station";
div.innerHTML=`
<img src="${icon(s)}" onerror="this.src='https://via.placeholder.com/20'">
<span>${s}</span>
`;
div.onclick=()=>load(i);
sidebar.appendChild(div);
});

load(0);

</script>

</body>
</html>
