<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
}

body{
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{
background:#eaeaea;
color:#000;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}

canvas{
display:block;
height:260px;
border-radius:8px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
border:2px solid #ff2a2a;
display:flex;
align-items:center;
justify-content:center;
box-sizing:border-box;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-sizing:border-box;
}

#volume{
width:120px;
height:10px;
appearance:none;
background:#000;
border:1px solid #ff2a2a;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
background:#ff2a2a;
cursor:pointer;
}

#modeBtn{
font-size:22px;
width:66px;
height:49px;
background:#111;
color:#fff;
border:2px solid #ff2a2a;
box-sizing:border-box;
}

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
font-size:20px;
}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">

<button onclick="playRadio()">PLAY</button>
<button onclick="stopRadio()">STOP</button>
<button onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>

</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");
const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");
const controls=document.getElementById("controls");
const title=document.getElementById("title");

audio.volume=parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let animationStarted=false;

/* ================= HARD PWA FIX ================= */
if('serviceWorker' in navigator){

window.addEventListener('load', async () => {

try {

// USUŃ WSZYSTKIE STARE SW
const regs = await navigator.serviceWorker.getRegistrations();
for(let reg of regs){
await reg.unregister();
}

// NOWA REJESTRACJA Z WERSJĄ (BYPASS CACHE)
const reg = await navigator.serviceWorker.register('sw.js?v=final-' + Date.now());
await reg.update();

} catch(e){
console.log("SW error", e);
}

});
}

/* AUDIO */
function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
analyser.smoothingTimeConstant=0.5;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();

if(audioCtx.state==="suspended"){
audioCtx.resume();
}

audio.src=STREAM_URL;
audio.play();

if(!animationStarted){
animationStarted=true;
draw();
}
}

function stopRadio(){
audio.pause();
}

function muteRadio(){
audio.muted=!audio.muted;
}

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

function resizeCanvas(){
let dpr=window.devicePixelRatio||1;
let width=title.offsetWidth;

canvas.width=width*dpr;
canvas.height=260*dpr;

canvas.style.width=width+"px";
canvas.style.height="260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);

controls.style.width=width+"px";
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

function draw(){
requestAnimationFrame(draw);

if(!analyser)return;

analyser.getByteFrequencyData(dataArray);

ctx.clearRect(0,0,canvas.width,canvas.height);

let width=canvas.width/window.devicePixelRatio;
let height=canvas.height/window.devicePixelRatio;

let bars=Math.max(1,Math.floor(width/8));
let barWidth=width/bars;
let step=Math.floor(dataArray.length/bars);

ctx.fillStyle="#ff2a2a";

for(let i=0;i<bars;i++){
let value=dataArray[i*step]||0;
let h=(value/255)*height;

ctx.fillRect(i*barWidth,height-h,barWidth-1,h);
}
}
</script>

</body>
</html>
