<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
}

/* 🔥 TŁO ZOSTAJE 1:1 (NIE DOTYKAMY) */
body{
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.3s;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff0000;
text-shadow:0 0 8px #ff0000,0 0 20px #ff0000,0 0 40px #ff0000;
}

canvas{
display:block;
height:260px;
margin:30px auto;
}

#controls{
display:flex;
gap:8px;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

button{
width:160px;
height:45px;
background:#111;
color:#ff0000;
cursor:pointer;
font-family:'Orbitron';
border:2px solid #ff0000;
box-shadow:0 0 10px #ff0000;
display:flex;
align-items:center;
justify-content:center;
box-sizing:border-box;
}

button:hover{
box-shadow:0 0 20px #ff0000;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff0000;
box-shadow:0 0 10px #ff0000;
box-sizing:border-box;
}

#volume{
width:120px;
height:10px;
appearance:none;
background:#000;
border:1px solid #ff0000;
box-shadow:0 0 6px #ff0000;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
background:#ff0000;
box-shadow:0 0 12px #ff0000;
cursor:pointer;
}

#modeBtn{
font-size:22px;
width:66px;
height:49px;
background:#111;
color:#ff0000;
border:2px solid #ff0000;
box-shadow:0 0 15px #ff0000;
}

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
}

#bottomLink a{
color:#ff0000;
text-decoration:none;
text-shadow:0 0 10px #ff0000;
font-size:20px;
}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="proEqualizer"></canvas>

<div id="controls">

<button onclick="playRadio()">PLAY</button>
<button onclick="stopRadio()">STOP</button>
<button onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>

</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");
const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

audio.volume=parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let animationStarted=false;

/* PWA CLEAN (NO UI IMPACT) */
if('serviceWorker' in navigator){
window.addEventListener('load', async () => {
try{
const regs = await navigator.serviceWorker.getRegistrations();
for(const reg of regs){
await reg.unregister();
}
}catch(e){}
});
}

/* AUDIO */
function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
analyser.smoothingTimeConstant=0.5;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();

if(audioCtx.state==="suspended"){
audioCtx.resume();
}

audio.src=STREAM_URL;
audio.play();

if(!animationStarted){
animationStarted=true;
draw();
}
}

function stopRadio(){
audio.pause();
}

function muteRadio(){
audio.muted=!audio.muted;
}

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

/* CANVAS */
function resizeCanvas(){
let dpr=window.devicePixelRatio||1;

canvas.width=800*dpr;
canvas.height=260*dpr;

canvas.style.width="800px";
canvas.style.height="260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

/* EQ */
function draw(){
requestAnimationFrame(draw);

if(!analyser)return;

analyser.getByteFrequencyData(dataArray);

ctx.clearRect(0,0,canvas.width,canvas.height);

let width=800;
let height=260;

let bars=80;
let barWidth=width/bars;
let step=Math.floor(dataArray.length/bars);

ctx.fillStyle="#ff0000";

for(let i=0;i<bars;i++){
let value=dataArray[i*step]||0;
let h=(value/255)*height;

ctx.fillRect(i*barWidth,height-h,barWidth-2,h);
}
}
</script>

</body>
</html>
