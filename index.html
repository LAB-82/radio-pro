<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio STABLE</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial;
}

h1{
text-align:center;
color:#ff2a2a;
font-size:18px;
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
border:1px solid #222;
}

.card:active{
transform:scale(0.96);
border-color:red;
}

.logo{
width:40px;
height:40px;
margin:auto;
border-radius:10px;
background:#ff2a2a;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
}

#player{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:flex;
justify-content:center;
}

button{
padding:10px 14px;
background:black;
color:white;
border:1px solid red;
}
</style>
</head>

<body>

<h1>RADIO STABLE (REAL STREAMS)</h1>

<div class="grid" id="grid"></div>

<div id="player">
<button onclick="stop()">STOP</button>
</div>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio");

/* 🔥 TYLKO STREAMY KTÓRE SĄ REALNIE PUBLICZNE I STABILNE */
const stations = [
{ name:"RMF FM", url:"https://rs8-krk2-cyfronet.rmfstream.pl/RMFFM48.mp3" },
{ name:"Radio ZET", url:"https://zt01.cdn.eurozet.pl/ZET128.mp3" },
{ name:"Radio Eska", url:"https://waw01-02.cdn.eurozet.pl/ESKA.mp3" },
{ name:"TOK FM", url:"https://radiostream.pl/tuba9-1.mp3" },
{ name:"BBC Radio 1", url:"https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one" }
];

function play(url){

stop();

audio.src = url;
audio.load();

audio.play().catch(e=>{
alert("PLAY ERROR: " + e.message);
console.log(e);
});

}

function stop(){
audio.pause();
audio.src="";
}

const grid = document.getElementById("grid");

stations.forEach(s=>{

let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<div class="logo">${s.name.slice(0,3)}</div>
<div>${s.name}</div>
`;

d.onclick=()=>play(s.url);

grid.appendChild(d);

});

</script>

</body>
</html>
