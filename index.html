<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#ff0000;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

#title{
font-size:80px;
margin-top:40px;
text-shadow:0 0 10px #ff0000;
}

canvas{
margin-top:20px;
height:260px;
}

#infoPanel{
margin-top:10px;
text-align:center;
width:100%;
}

.infoBox{
margin:5px auto;
font-size:18px;
text-shadow:0 0 10px #ff0000;
}

#controls{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

button{
width:160px;
height:45px;
background:#111;
border:2px solid #ff0000;
color:#ff0000;
box-shadow:0 0 10px #ff0000;
font-family:'Orbitron';
cursor:pointer;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #ff0000;
}

#volume{
width:120px;
}

</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>

<canvas id="eq"></canvas>

<!-- 🔥 NOWY PANEL INFO -->
<div id="infoPanel">

<div class="infoBox" id="nowPlaying">
🎵 Teraz gramy: ładowanie...
</div>

<div class="infoBox" id="djInfo">
🎙️ Audycja: ładowanie...
</div>

</div>

<div id="controls">

<button onclick="playRadio()">PLAY</button>
<button onclick="stopRadio()">STOP</button>
<button onclick="muteRadio()">MUTE</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>

const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const nowPlaying=document.getElementById("nowPlaying");
const djInfo=document.getElementById("djInfo");

audio.volume=0.5;

/* RADIO */
function playRadio(){
audio.src=STREAM_URL;
audio.play();
draw();
}

function stopRadio(){
audio.pause();
}

function muteRadio(){
audio.muted=!audio.muted;
}

volume.addEventListener("input",()=>{
audio.volume=volume.value;
});

/* EQ */
const canvas=document.getElementById("eq");
const ctx=canvas.getContext("2d");

canvas.width=800;
canvas.height=260;

let audioCtx, analyser, source, dataArray;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();
source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=256;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function draw(){
requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<60;i++){
let v=dataArray[i]||0;
let h=(v/255)*canvas.height;

ctx.fillStyle="#ff0000";
ctx.fillRect(i*13,canvas.height-h,10,h);
}
}

/* ================= PRO DISPLAY API (READY HOOK) ================= */

/* TU MOŻESZ PODPIĄĆ PRAWDZIWE API W PRZYSZŁOŚCI */
async function updateInfo(){

/* teraz demo / fallback */
nowPlaying.innerText="🎵 Teraz gramy: (brak API)";
djInfo.innerText="🎙️ Audycja: (brak danych)";
}

setInterval(updateInfo,5000);
updateInfo();

</script>

</body>
</html>
