<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIO FIXED</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center;}
button{padding:12px;margin:8px;border:1px solid red;background:#111;color:#fff;width:90%;}
h2{color:red;}
</style>
</head>

<body>

<h2>📻 WORKING RADIO ONLY</h2>

<button onclick="play('https://rs8-krk2-cyfronet.rmfstream.pl/RMFFM48.mp3')">RMF FM</button>

<button onclick="play('https://zt01.cdn.eurozet.pl/ZET128.mp3')">Radio ZET</button>

<button onclick="play('https://waw01-02.cdn.eurozet.pl/ESKA.mp3')">Radio Eska</button>

<button onclick="play('https://radiostream.pl/tuba9-1.mp3')">TOK FM</button>

<button onclick="stop()">STOP</button>

<audio id="audio" controls style="width:100%;margin-top:20px;"></audio>

<script>

const audio = document.getElementById("audio");

function play(url){

stop();

audio.src = url;
audio.load();

audio.play().catch(e=>{
alert("NIE DZIAŁA W TWOJEJ PRZEGLĄDARCE");
console.log(e);
});

}

function stop(){
audio.pause();
audio.src="";
}

</script>

</body>
</html>
