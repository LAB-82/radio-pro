<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>REAL WORKING RADIO ENGINE</title>
<style>
body { background:#0b0b0b; color:white; font-family:Arial; display:flex; }
#sidebar { width:300px; background:#141414; height:100vh; overflow:auto; }
.station { padding:10px; border-bottom:1px solid #333; cursor:pointer; }
.station.ok { color:#00ff88; }
.station.bad { color:#ff4d4d; }
#main { flex:1; display:flex; justify-content:center; align-items:center; flex-direction:column; }
#status { margin-top:10px; font-size:14px; color:#aaa; }
button { font-size:40px; background:none; color:white; border:none; cursor:pointer; }
img { width:220px; height:120px; object-fit:contain; }
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
    <img id="logo">
    <button onclick="toggle()">▶</button>
    <div id="status">READY</div>
</div>

<audio id="audio"></audio>

<script>

const stations = [
{ name:"Muzyczne Radio", url:"https://stream.rc.fm/muzyczne", logo:"https://www.muzyczneradio.pl/wp-content/uploads/logo.png" },
{ name:"Polskie Radio Jedynka", url:"https://stream.polskieradio.pl/program1.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3f/PR1_logo.png" },
{ name:"RMF FM", url:"https://rs6-krk2.rmfstream.pl/RMFFM48", logo:"https://upload.wikimedia.org/wikipedia/commons/2/2e/RMF_FM_logo.png" },
{ name:"Radio Zet", url:"https://zt01.cdn.eurozet.pl/ZET010.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Radio_ZET_logo.png" },
{ name:"Radio Eska", url:"https://waw01-01.cdn.eurozet.pl/eska.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/9/9f/Radio_Eska_logo.png" }
];

const audio = document.getElementById("audio");

let current = 0;
let ready = false;

function setStatus(t){
    document.getElementById("status").innerText = t;
}

function load(i){

    current = i;
    const st = stations[i];

    document.getElementById("logo").src = st.logo;

    setStatus("TESTING STREAM...");

    audio.src = st.url;
    audio.load();

    audio.oncanplay = () => {
        ready = true;
        setStatus("READY → PLAY");
        play();
    };

    audio.onerror = () => {
        ready = false;
        setStatus("STREAM FAILED → NEXT");
        next();
    };

    // HARD TIMEOUT (klucz!)
    setTimeout(()=>{
        if(!ready){
            setStatus("TIMEOUT → NEXT");
            next();
        }
    }, 6000);
}

function play(){
    audio.play()
    .then(()=> setStatus("LIVE"))
    .catch(()=>{
        setStatus("BLOCKED → NEXT");
        next();
    });
}

function toggle(){
    if(audio.paused){
        play();
    } else {
        audio.pause();
        setStatus("PAUSED");
    }
}

function next(){
    current = (current + 1) % stations.length;
    load(current);
}

stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerText = s.name;
    div.onclick = ()=>load(i);
    document.getElementById("sidebar").appendChild(div);
});

load(0);

</script>

</body>
</html>
