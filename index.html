<!DOCTYPE html> 
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio App UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    height: 100vh;
}

/* LEWA LISTA */
#sidebar {
    width: 300px;
    background: #141414;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.station {
    padding: 10px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

.station:hover {
    background: #222;
}

.station.active {
    background: #2a2a2a;
    font-weight: bold;
}

/* PRAWA STRONA */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
#header {
    padding: 12px;
    background: #1a1a1a;
    font-size: 18px;
    font-weight: bold;
}

/* META */
#meta {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #151515;
    color: #ccc;
    font-size: 13px;
}

/* PLAYER AREA */
#playerBox {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
}

/* PLAYER */
#radioPlayer {
    width: 90%;
    height: 90%;
    background: #111;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* LOGO */
#logoBox img {
    width: 220px;
    height: auto;
    border-radius: 8px;
    margin-bottom: 20px;
}

/* BIG PLAY */
#bigPlay {
    font-size: 70px;
    cursor: pointer;
    user-select: none;
}

/* BOTTOM BAR */
#bottomBar {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    padding: 10px 18px;
    border-radius: 30px;
    display: flex;
    gap: 18px;
    font-size: 18px;
    cursor: pointer;
}

/* CONTROLS */
#controls {
    height: 70px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    border-top: 1px solid #222;
}

.btn {
    cursor: pointer;
    font-size: 20px;
    user-select: none;
}

audio {
    display: none;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 Radio Player</div>

<div id="meta">
    <div>⭐⭐⭐⭐☆</div>
    <div>Głosy: 1070 • Średnia: 4.8</div>
</div>

<div id="playerBox">

<div id="radioPlayer">

    <div id="logoBox">
        <img id="stationLogo" src="https://via.placeholder.com/220x120?text=RADIO"/>
    </div>

    <div id="bigPlay" onclick="togglePlay()">▶</div>

    <div id="bottomBar">
        <div onclick="prev()">⏮</div>
        <div onclick="togglePlay()" id="playIcon">▶</div>
        <div onclick="next()">⏭</div>
        <div onclick="mute()">🔊</div>
    </div>

</div>

</div>

<div id="controls">
    <div class="btn" onclick="prev()">⏮</div>
    <div class="btn" onclick="togglePlay()">⏯</div>
    <div class="btn" onclick="next()">⏭</div>
    <div class="btn" onclick="mute()">🔊</div>
</div>

<audio id="audio"></audio>

</div>

<script>

// 📻 TWOJA LISTA (NIC NIE USUNIĘTE)
const stations = [
"Muzyczne Radio Jelenia Góra",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Open FM",
"Open FM Disco Polo",
"Disco Radio",
"Polish Radio London 24",
"Polskie Radio Dzieciom",
"Polskie Radio Chopin",
"Radio Yanosik",
"Radio Republika",
"Radio dla Ciebie",
"Radio Maryja",
"Radio Jasna Góra"
];

// ⚠️ jeden działający stream testowy (ważne!)
const streamURL = "https://stream.live.vc.bbcmedia.co.uk/bbc_radio_fourlw";

let index = 0;
let playing = false;

const sidebar = document.getElementById("sidebar");
const audio = document.getElementById("audio");
const logo = document.getElementById("stationLogo");

function setActive(){
    document.querySelectorAll(".station").forEach((el,i)=>{
        el.classList.toggle("active", i === index);
    });
}

function load(i){
    index = i;

    setActive();

    logo.src = "https://via.placeholder.com/220x120?text=" + encodeURIComponent(stations[i]);

    audio.pause();
    audio.src = streamURL;
    audio.load();

    if(playing){
        audio.play().catch(()=>{});
    }

    document.getElementById("bigPlay").innerText = playing ? "⏸" : "▶";
    document.getElementById("playIcon").innerText = playing ? "⏸" : "▶";
}

stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerText = s;
    div.onclick = () => load(i);
    sidebar.appendChild(div);
});

function togglePlay(){
    playing = !playing;

    if(playing){
        audio.play().catch(()=>{});
    } else {
        audio.pause();
    }

    document.getElementById("bigPlay").innerText = playing ? "⏸" : "▶";
    document.getElementById("playIcon").innerText = playing ? "⏸" : "▶";
}

function prev(){
    load((index-1+stations.length)%stations.length);
}

function next(){
    load((index+1)%stations.length);
}

function mute(){
    audio.muted = !audio.muted;
}

load(0);

</script>

</body>
</html>
