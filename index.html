<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Player</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f0f;
        color: #fff;
        padding: 20px;
        min-height: 100vh;
    }

   .player {
        max-width: 480px;
        margin: 0 auto;
        background: #1a1a1a;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

   .header {
        padding: 24px;
        text-align: center;
        background: #242424;
        border-bottom: 1px solid #333;
    }

   .clock {
        font-size: 48px;
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 8px;
        font-variant-numeric: tabular-nums;
    }

   .now-playing {
        font-size: 14px;
        color: #888;
        min-height: 20px;
    }

   .now-playing.active {
        color: #1db954;
    }

   .controls {
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        background: #1a1a1a;
    }

   .play-btn {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: none;
        background: #1db954;
        color: #000;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s, background 0.2s;
    }

   .play-btn:hover {
        transform: scale(1.05);
        background: #1ed760;
    }

   .play-btn:active {
        transform: scale(0.95);
    }

   .stations {
        max-height: 60vh;
        overflow-y: auto;
    }

   .station {
        padding: 18px 24px;
        border-bottom: 1px solid #2a2a2a;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

   .station:hover {
        background: #242424;
    }

   .station.active {
        background: #282828;
        border-left: 3px solid #1db954;
        padding-left: 21px;
    }

   .station-name {
        font-size: 16px;
        font-weight: 500;
    }

   .station.active.station-name {
        color: #1db954;
    }

   .playing-indicator {
        display: none;
        width: 4px;
        height: 16px;
        background: #1db954;
        animation: pulse 1s infinite;
    }

   .station.active.playing-indicator {
        display: block;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

   .stations::-webkit-scrollbar {
        width: 8px;
    }

   .stations::-webkit-scrollbar-track {
        background: #1a1a1a;
    }

   .stations::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
    }
</style>
</head>
<body>

<div class="player">
    <div class="header">
        <div class="clock" id="clock">00:00:00</div>
        <div class="now-playing" id="nowPlaying">Wybierz stację</div>
    </div>

    <div class="controls">
        <button class="play-btn" id="playBtn">▶</button>
    </div>

    <div class="stations" id="stations"></div>
</div>

<audio id="audioPlayer"></audio>

<script>
    // Tylko 100% działające oficjalne streamy
    const stations = [
        { name: "Polskie Radio Jedynka", url: "https://stream.rcs.revma.com/ypqt40u0x1zuv" },
        { name: "Polskie Radio Dwójka", url: "https://stream.rcs.revma.com/9w0y5a1wz1zuv" },
        { name: "Polskie Radio Trójka", url: "https://stream.rcs.revma.com/ejz9zxtc1tzuv" },
        { name: "Polskie Radio Czwórka", url: "https://stream.rcs.revma.com/dq5qg5yw5tzuv" },
        { name: "RMF FM", url: "https://rs101-krk.rmfstream.pl/rmf_fm" },
        { name: "Radio ZET", url: "https://zt.cdn.eurozet.pl/zet-tun.mp3" },
        { name: "Radio ESKA", url: "https://ic1.smcdn.pl/2330-1.mp3" },
        { name: "TOK FM", url: "https://pl.cdn.eurozet.pl/tok.mp3" },
        { name: "Antyradio", url: "https://an.cdn.eurozet.pl/ant-waw.mp3" },
        { name: "Radio Maryja", url: "https://radiomaryja.fastcast4u.com/proxy/radiomaryja?mp=/1" }
    ];

    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const stationsEl = document.getElementById('stations');
    const nowPlayingEl = document.getElementById('nowPlaying');
    const clockEl = document.getElementById('clock');

    let currentStation = null;
    let isPlaying = false;

    // Zegarek
    function updateClock() {
        const now = new Date();
        const time = now.toLocaleTimeString('pl-PL', { hour12: false });
        clockEl.textContent = time;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Render stacji
    stations.forEach((station, index) => {
        const div = document.createElement('div');
        div.className = 'station';
        div.innerHTML = `
            <span class="station-name">${station.name}</span>
            <div class="playing-indicator"></div>
        `;
        div.onclick = () => selectStation(index);
        stationsEl.appendChild(div);
    });

    function selectStation(index) {
        document.querySelectorAll('.station').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.station')[index].classList.add('active');

        currentStation = stations[index];
        audio.src = currentStation.url;
        nowPlayingEl.textContent = currentStation.name;
        nowPlayingEl.classList.add('active');

        play();
    }

    function play() {
        if (!currentStation) {
            selectStation(0);
            return;
        }
        audio.play().then(() => {
            isPlaying = true;
            playBtn.textContent = '❚❚';
        }).catch(e => {
            console.error('Błąd odtwarzania:', e);
            nowPlayingEl.textContent = 'Błąd streamu';
        });
    }

    function pause() {
        audio.pause();
        isPlaying = false;
        playBtn.textContent = '▶';
    }

    playBtn.onclick = () => {
        if (isPlaying) {
            pause();
        } else {
            play();
        }
    };

    audio.onended = () => pause();
    audio.onerror = () => {
        nowPlayingEl.textContent = 'Stacja niedostępna';
        pause();
    };

    // Start z pierwszą stacją
    selectStation(0);
</script>

</body>
</html>
