<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>
<!-- Cyberpunk 2077 fonts -->
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;800&family=OCR-A&display=swap" rel="stylesheet">
<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Rajdhani', 'OCR-A', monospace;
font-weight: 500;
letter-spacing: 1px;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
position: relative;
overflow: hidden;
text-rendering: optimizeLegibility;
-webkit-font-smoothing: antialiased;
}

/* TYLKO subtelny static noise - bez blokowania */
body::before {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
opacity: 0.04;
background-image:
radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.3), transparent),
radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.2), transparent);
background-repeat: repeat;
background-size: 80px 80px;
animation: static-noise 0.2s steps(1) infinite;
pointer-events: none;
z-index: 1;
mix-blend-mode: screen;
}

@keyframes static-noise {
0% { transform: translate(0, 0); }
100% { transform: translate(1px, 1px); }
}

#title{
font-family: 'Rajdhani', 'OCR-A', monospace;
font-weight: 800;
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000,
0 0 10px rgba(255,255,255,0.2);
animation: cyberpunk-title 4s ease-in-out infinite alternate;
filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
letter-spacing: 4px;
text-transform: uppercase;
}

@keyframes cyberpunk-title {
0% { text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000; }
100%
