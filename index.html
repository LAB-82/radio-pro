<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{
background:#eaeaea;
color:#000;
}

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 5px #ff2a2a,0 0 15px #ff0000,0 0 30px #ff0000,0 0 60px #ff0000;
}

#proEqualizer{
display:block;
margin:0 auto;
margin-top:30px;
margin-bottom:30px;
border-radius:8px;
overflow:hidden;
}

canvas{
display:block;
height:260px;
border-radius:8px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}

.volumeWrapper{
width:160px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}

body.day .volumeWrapper{
background:#d6d6d6;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

button{
width:160px;
height:45px;
background:#111;
color:white;
cursor:pointer;
font-family:'Orbitron';
transition:0.2s;
border:2px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a;
}

body.day button{
background:#d6d6d6;
color:#000;
box-shadow:0 0 40px #ff2a2a,0 0 80px #ff0000;
}

#volume{
width:120px;
height:10px;
appearance:none;
border-radius:10px;
outline:none;
background:#000;
border:1px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

#volume.active{
box-shadow:0 0 10px #ff0000;
border:1px solid #ff0000;
}

#volume::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red;
cursor:pointer;
}

#volume::-moz-range-thumb{
width:16px;
height:16px;
border:none;
border-radius:4px;
background:#ff0000;
box-shadow:0 0 10px red,0 0 20px red;
cursor:pointer;
}

.playActive{ color:#00ff00; text-shadow:0 0 10px #00ff00; }
.stopActive{ color:#ff4444; text-shadow:0 0 10px red; }

.muteActive{
color:#ffaa00;
text-shadow:0 0 10px orange;
animation:pulseMute 0.8s infinite alternate;
}

@keyframes pulseMute{
from{ transform:scale(1); }
to{ transform:scale(1.1); }
}

#modeBtn{
font-size:22px;
width:66px;
height:49px;
}

body:not(.day) #modeBtn{
color:#ffff00;
text-shadow:0 0 8px #ffff00,0 0 16px #ffff66;
background:#111;
}

body.day #modeBtn{
color:#ffff00;
text-shadow:0 0 8px #ffff00,0 0 16px #ffff66;
background:#00ccff;
box-shadow:0 0 12px #00ccff,0 0 24px #00aaff;
}

#bottomLink{
margin-top:10px;
text-align:center;
width:100%;
}

#bottomLink a{
color:#ff2a2a;
text-decoration:none;
text-shadow:0 0 6px red;
font-size:20px;
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<div id="bottomLink">
<a href="https://www.muzyczneradio.pl" target="_blank">www.muzyczneradio.pl</a>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");

const playBtn=document.getElementById("playBtn");
const stopBtn=document.getElementById("stopBtn");
const muteBtn=document.getElementById("muteBtn");
const modeBtn=document.getElementById("modeBtn");

const title=document.getElementById("title");
const controls=document.getElementById("controls");

const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

audio.volume=parseFloat(volume.value);

let audioCtx, analyser, source, dataArray;
let peaks=[];
let animationStarted=false;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=512;
analyser.smoothingTimeConstant=0.5;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);

for(let i=0;i<300;i++) peaks[i]=0;
}

function playRadio(){

setupAudio();

if(audioCtx.state === "suspended"){
audioCtx.resume();
}

audio.src=STREAM_URL;
audio.play();

playBtn.classList.add("playActive");
stopBtn.classList.remove("stopActive");

if(!animationStarted){
animationStarted=true;
draw();
}
}

function stopRadio(){

audio.pause();

stopBtn.classList.add("stopActive");
playBtn.classList.remove("playActive");

setTimeout(()=>{
stopBtn.classList.remove("stopActive");
},1000);

for(let i=0;i<peaks.length;i++){
peaks[i]=0;
}
}

function muteRadio(){
audio.muted=!audio.muted;
muteBtn.classList.toggle("muteActive");
}

function toggleMode(){
document.body.classList.toggle("day");
modeBtn.innerText=document.body.classList.contains("day")?"☀️":"🌙";
}

volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

function resizeCanvas(){
let dpr = window.devicePixelRatio || 1;
let width = title.offsetWidth;

canvas.width = width * dpr;
canvas.height = 260 * dpr;

canvas.style.width = width + "px";
canvas.style.height = "260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr, dpr);

controls.style.width = width + "px";
}

function draw(){
requestAnimationFrame(draw);

if(!analyser || !dataArray) return;

analyser.getByteFrequencyData(dataArray);
drawEQ();
}

/* =========================
   🔥 ONLY FIXED EQ (optimized)
========================= */
function drawEQ(){

let dpr = window.devicePixelRatio || 1;
let width = canvas.width / dpr;
let heightCanvas = canvas.height / dpr;

ctx.clearRect(0,0,width,heightCanvas);

let bars = 64;
let barWidth = width / bars;
let step = Math.floor(dataArray.length / bars);

for(let i=0;i<bars;i++){

let value = dataArray[i * step] || 0;
let target = (value / 255) * heightCanvas * 0.85;

/* smooth motion */
if(!peaks[i]) peaks[i]=0;
peaks[i] += (target - peaks[i]) * 0.25;

let h = peaks[i];

let x = i * barWidth;
let y = heightCanvas - h;

/* gradient (UNCHANGED STYLE) */
let gradient = ctx.createLinearGradient(0,heightCanvas,0,0);
gradient.addColorStop(0,"#ff0000");
gradient.addColorStop(0.6,"#ff5555");
gradient.addColorStop(1,"#ffffff");

ctx.fillStyle = gradient;

/* lighter shadow (performance fix) */
ctx.shadowBlur = 3;
ctx.shadowColor = "red";

ctx.fillRect(x, y, barWidth - 1, h);

ctx.shadowBlur = 0;

/* peak line */
ctx.fillStyle = "#ff2222";
ctx.fillRect(x, heightCanvas - h, barWidth - 1, 2);

}
}
</script>

</body>
</html>
