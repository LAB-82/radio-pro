<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE V2 AUTO FIX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
display:flex;
height:100vh;
}

#sidebar{
width:420px;
background:#141414;
overflow:auto;
border-right:1px solid #222;
padding:10px;
}

#stations{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.station{
background:#1a1a1a;
padding:10px;
cursor:pointer;
border-radius:8px;
text-align:center;
font-size:12px;
}

.station:hover{background:#2a2a2a;}
.station.active{background:#00aa66;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
background:#1a1a1a;
font-weight:bold;
}

#playerBox{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

#status{
padding:10px;
font-size:13px;
opacity:0.8;
}

audio{
width:90%;
}
</style>
</head>

<body>

<div id="sidebar">
<div id="stations"></div>
</div>

<div id="main">

<div id="header">🎧 RADIO ENGINE V2 (AUTO STREAM FIX)</div>

<div id="playerBox">
<div>
<audio id="audio" controls></audio>
<div id="status">READY</div>
</div>
</div>

</div>

<script>

const stations = [
"Muzyczne Radio",
"Polskie Radio Jedynka",
"Polskie Radio Dwójka",
"Polskie Radio Trójka",
"Polskie Radio Czwórka",
"Radio Plus",
"RMF FM",
"Radio Zet",
"Radio Eska",
"Radio Wrocław",
"Radio Wnet",
"Tok FM",
"Antyradio",
"Radio Kolor",
"Radio Złote Przeboje",
"Planeta FM",
"Radio Kampus",
"Radio Dzieciom",
"Polskie Radio Chopin",
"Radio AH",
"Rock Radio",
"Radio Maryja",
"Radio Niepokalanów",
"Radio Rodzina"
];

const audio = document.getElementById("audio");
const status = document.getElementById("status");

let current = 0;

/* 🔥 KLUCZ: AUTOMATYCZNE SZUKANIE DZIAŁAJĄCEGO STREAMU */
async function findStream(name){
try{
const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(name)}&limit=5`);
const data = await res.json();

for(const s of data){
if(s.url_resolved && (s.codec === "MP3" || s.codec === "AAC" || !s.hls)){
return s.url_resolved;
}
}

return data?.[0]?.url_resolved || null;

}catch(e){
return null;
}
}

async function load(i){
current = i;
const name = stations[i];

status.innerText = "SZUKAM: " + name;

const url = await findStream(name);

if(!url){
status.innerText = "BRAK STREAMU: " + name;
return;
}

audio.src = url;

audio.play()
.then(()=>status.innerText = "GRA: " + name)
.catch(err=>{
status.innerText = "BLOKADA ODTWARZANIA - kliknij PLAY";
console.log(err);
});
}

/* UI */
stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerText=s;
div.onclick=()=>load(i);
document.getElementById("stations").appendChild(div);
});

</script>

</body>
</html>
