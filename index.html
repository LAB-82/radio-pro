<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Moje Radio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
}

#title{
font-size:40px;
margin:20px;
color:#ff2a2a;
}

#stations{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

button{
padding:14px;
background:#111;
color:white;
border:1px solid red;
font-size:16px;
cursor:pointer;
}

#player{
margin-top:10px;
height:200px;
}

iframe{
width:100%;
height:100%;
border:none;
}
</style>
</head>

<body>

<div id="title">📻 Moje Radio</div>

<div id="stations">

<button onclick="loadStation('https://www.muzyczneradio.pl/player')">Muzyczne Radio</button>

<button onclick="loadStation('https://www.rmf.fm/player')">RMF FM</button>

<button onclick="loadStation('https://player.radiozet.pl/')">Radio ZET</button>

<button onclick="loadStation('https://www.eska.pl/player')">Radio ESKA</button>

<button onclick="loadStation('https://www.antyradio.pl/player')">Antyradio</button>

<button onclick="loadStation('https://www.radioplus.pl/player')">Radio Plus</button>

<button onclick="loadStation('https://www.radiowroclaw.pl/player')">Radio Wrocław</button>

<button onclick="loadStation('https://nowyswiat.online/player')">Nowy Świat</button>

</div>

<div id="player"></div>

<script>

function loadStation(url){
document.getElementById("player").innerHTML =
`<iframe src="${url}"></iframe>`;
}

</script>

</body>
</html>
