<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADIO ENGINE PRO 2026 GRID</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#1f1f1f;
  color:#fff;
  height:100vh;
  overflow:hidden;
}

#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#262626;
}

#topbar{
  height:88px;
  display:flex;
  align-items:center;
  gap:18px;
  padding:0 18px;
  background:#2a2a2a;
  border-bottom:1px solid rgba(255,255,255,.08);
  flex:0 0 auto;
}

#menu-btn{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  line-height:1;
  color:#ddd;
  user-select:none;
}

#title{
  font-size:30px;
  font-weight:400;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
  color:#f2f2f2;
}

#top-icons{
  display:flex;
  align-items:center;
  gap:18px;
  font-size:28px;
  color:#eaeaea;
  opacity:.95;
}

.icon{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  user-select:none;
}

#grid-wrap{
  flex:1;
  overflow:auto;
  padding:18px 16px 140px;
}

#stations{
  display:grid;
  grid-template-columns:repeat(6, minmax(0, 1fr));
  gap:16px;
}

.station{
  aspect-ratio:1/1;
  background:#f6f6f6;
  border-radius:22px;
  color:#111;
  box-shadow:0 2px 0 rgba(0,0,0,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  cursor:pointer;
  overflow:hidden;
  border:3px solid transparent;
  position:relative;
}

.station:hover{
  transform:translateY(-1px);
}

.station.active{
  border-color:#28a7d8;
  box-shadow:0 0 0 3px rgba(40,167,216,.22);
}

.station .label{
  text-align:center;
  font-size:28px;
  line-height:1.05;
  font-weight:500;
  white-space:pre-line;
  padding:8px;
  width:100%;
}

.station img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

#playerbar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:160px;
  background:#1d1d1d;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;
  align-items:center;
  padding:18px 18px 22px;
  gap:18px;
}

#playbtn{
  width:94px;
  height:94px;
  border-radius:50%;
  border:none;
  background:linear-gradient(180deg,#f7f7f7,#cfcfcf);
  color:#222;
  font-size:42px;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.18), 0 0 0 8px rgba(255,255,255,.08);
  cursor:pointer;
}

#seek{
  flex:1;
  height:8px;
  appearance:none;
  background:linear-gradient(90deg,#4cb6e3 0%, #4cb6e3 var(--p,50%), #4c4c4c var(--p,50%), #4c4c4c 100%);
  border-radius:999px;
  outline:none;
}

#seek::-webkit-slider-thumb{
  appearance:none;
  width:30px;
  height:30px;
  border-radius:50%;
  background:#4cb6e3;
  border:4px solid #2b90b6;
  box-shadow:0 0 0 4px rgba(76,182,227,.15);
  cursor:pointer;
}

#controls-right{
  display:flex;
  align-items:center;
  gap:14px;
}

.ctrl{
  width:66px;
  height:66px;
  border-radius:18px;
  background:#343434;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:#fff;
  user-select:none;
}

#clock{
  min-width:92px;
  text-align:center;
  font-size:18px;
  color:#eee;
  font-family:monospace;
  opacity:.9;
}

#status{
  position:absolute;
  left:18px;
  bottom:168px;
  font-size:13px;
  color:#d8d8d8;
  opacity:.75;
  pointer-events:none;
}

@media (max-width: 1200px){
  #stations{grid-template-columns:repeat(4, minmax(0, 1fr));}
  #title{font-size:24px;}
}
@media (max-width: 760px){
  #topbar{height:74px;padding:0 12px;gap:12px;}
  #title{font-size:18px;}
  #top-icons{gap:8px;font-size:22px;}
  #stations{grid-template-columns:repeat(2, minmax(0, 1fr));}
  #playerbar{height:132px;padding:14px;gap:12px;}
  #playbtn{width:72px;height:72px;font-size:32px;}
  .ctrl{width:54px;height:54px;font-size:24px;border-radius:14px;}
  #clock{min-width:72px;font-size:15px;}
  #status{bottom:142px;}
}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div id="menu-btn">☰</div>
    <div id="title">Radio online</div>
    <div id="top-icons">
      <div class="icon" style="opacity:.15;">♡</div>
      <div class="icon" id="clock">00:00</div>
      <div class="icon" style="opacity:.15;">⌕</div>
    </div>
  </div>

  <div id="grid-wrap">
    <div id="stations"></div>
  </div>

  <div id="status">Gotowy</div>

  <div id="playerbar">
    <button id="playbtn">▶</button>
    <input id="seek" type="range" min="0" max="100" value="50">
    <div id="controls-right">
      <div class="ctrl">☰</div>
      <div class="ctrl">🔒</div>
      <div class="ctrl" style="color:#f7d21b;">👍</div>
    </div>
  </div>
</div>

<script>
const stations = [
  "RMF FM",
  "Radio Zet",
  "Tok FM",
  "Radio Plus Legnica",
  "Planeta FM",
  "Muzyczne Radio",
  "Radio Kolor",
  "Radio Wrocław",
  "Radio Złote Przeboje",
  "Radio Kampus",
  "Radio Rodzina"
];

const streams = {
  "RMF FM":"https://rs6-krk2.rmfstream.pl/rmf_fm",
  "Radio Zet":"https://zt03.cdn.eurozet.pl/zet-net.mp3",
  "Tok FM":"https://radiostream.pl/tuba9-1.mp3",
  "Radio Plus Legnica":"http://pla.cdn.eurozet.pl/pla-net.mp3",
  "Planeta FM":"http://pla.cdn.eurozet.pl/pla-net.mp3",
  "Muzyczne Radio":"http://stream.rcs.revma.com/gzwc1xcq042vv",
  "Radio Kolor":"https://stream.rcs.revma.com/zbq79057xd3vv",
  "Radio Wrocław":"https://stream4.nadaje.com:8176/prw",
  "Radio Złote Przeboje":"https://zt02.cdn.eurozet.pl/zlote-przeboje.mp3",
  "Radio Kampus":"https://stream.radiokampus.fm/kampus.mp3",
  "Radio Rodzina":"https://stream3.nadaje.com:8400/radirodzina_mp3"
};

const stationsEl = document.getElementById("stations");
const audio = new Audio();
audio.preload = "none";
audio.crossOrigin = "anonymous";

const playbtn = document.getElementById("playbtn");
const seek = document.getElementById("seek");
const status = document.getElementById("status");
const clock = document.getElementById("clock");

let current = null;
let playing = false;

function updateClock(){
  const d = new Date();
  clock.textContent = d.toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

function render(){
  stationsEl.innerHTML = "";
  stations.forEach(name => {
    const tile = document.createElement("div");
    tile.className = "station";
    tile.dataset.name = name;

    const img = document.createElement("img");
    img.alt = name;
    img.src = `https://www.radio-browser.info/backends/logos/${encodeURIComponent(name)}.png`;
    img.onerror = () => {
      img.remove();
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = name;
      tile.appendChild(label);
    };

    tile.appendChild(img);

    tile.addEventListener("click", async () => {
      await selectStation(name);
    });

    stationsEl.appendChild(tile);
  });
}

function setActive(name){
  document.querySelectorAll(".station").forEach(el => {
    el.classList.toggle("active", el.dataset.name === name);
  });
}

async function selectStation(name){
  current = name;
  setActive(name);
  status.textContent = "Ładowanie: " + name;
  const url = streams[name];
  if(!url){
    status.textContent = "Brak streamu: " + name;
    return;
  }
  try{
    audio.src = url;
    audio.volume = 0.85;
    await audio.play();
    playing = true;
    playbtn.textContent = "❚❚";
    status.textContent = "Gra: " + name;
  }catch(e){
    playing = false;
    playbtn.textContent = "▶";
    status.textContent = "Kliknij ▶ aby uruchomić: " + name;
  }
}

playbtn.addEventListener("click", async () => {
  if(!current){
    await selectStation(stations[0]);
    return;
  }
  if(playing){
    audio.pause();
    playing = false;
    playbtn.textContent = "▶";
    status.textContent = "Wstrzymane";
  }else{
    try{
      await audio.play();
      playing = true;
      playbtn.textContent = "❚❚";
      status.textContent = "Gra: " + current;
    }catch(e){
      status.textContent = "Nie można uruchomić odtwarzania";
    }
  }
});

seek.addEventListener("input", () => {
  const p = seek.value;
  seek.style.setProperty('--p', p + '%');
});
seek.style.setProperty('--p', seek.value + '%');

audio.addEventListener("waiting", () => status.textContent = "Buforowanie...");
audio.addEventListener("playing", () => {
  playing = true;
  playbtn.textContent = "❚❚";
  if(current) status.textContent = "Gra: " + current;
});
audio.addEventListener("pause", () => {
  playing = false;
  playbtn.textContent = "▶";
});

render();
setActive(stations[0]);
</script>
</body>
</html>
