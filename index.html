<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Moje Radio PRO</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
}

#title{
font-size:40px;
margin:20px;
color:red;
}

button{
width:90%;
margin:6px;
padding:14px;
background:#111;
color:white;
border:1px solid red;
cursor:pointer;
}
</style>
</head>

<body>

<div id="title">📻 Moje Radio PRO</div>

<div id="list"></div>

<audio id="audio" controls style="width:100%"></audio>

<script>

const API = "https://TWOJ-WORKER.workers.dev/stations";
const PROXY = "https://TWOJ-WORKER.workers.dev?url=";

const audio = document.getElementById("audio");

/* 🔥 LOAD STATIONS */
fetch(API)
.then(r=>r.json())
.then(data=>{

data.forEach(s=>{

const btn = document.createElement("button");
btn.innerText = s.name;

btn.onclick = ()=>{

audio.src = PROXY + encodeURIComponent(s.stream);
audio.play().catch(e=>{
alert("STREAM ERROR");
console.log(e);
});

};

document.getElementById("list").appendChild(btn);

});

});

</script>

</body>
</html>
