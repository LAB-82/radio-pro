<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>LOTTO AI SINGULARITY MODE</title>

<style>
*{box-sizing:border-box;}
html,body{
 margin:0;height:100%;
 background:#ffd800;
 font-family:Arial,Helvetica,sans-serif;
 display:flex;justify-content:center;align-items:flex-start;
 overflow:hidden;
}
#app{
 width:1200px;height:800px;
 display:flex;flex-direction:column;padding-top:10px;
}
header{
 height:120px;margin:0 10px;border-radius:12px;

 /* === TU JEST DODANE ZDJĘCIE === */
 background-image:url('header.png');
 background-size:cover;
 background-position:center;

 display:flex;justify-content:space-between;align-items:center;
 padding:0;
 color:transparent;
 font-size:0;
}
.header-right{display:none;}

.panel{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;}
.game{
 height:62px;background:linear-gradient(#ffe95e,#f2d43c);
 border-radius:12px;padding:6px 12px;
 display:flex;align-items:center;gap:10px;
}
.title{
 display:flex;align-items:center;gap:8px;
 font-size:16px;font-weight:bold;min-width:320px;color:#003a8f;
}
.icon{font-size:18px;}
.icon.lotto{color:#0b6cd4;}
.icon.mini{color:#c8a200;}
.icon.multi{color:#6a1b9a;}
.icon.keno{color:#ff9800;}
.icon.pensja{color:#2e7d32;}
.icon.euro{color:#d4af37;}
.icon.szybkie{color:#ff7043;}

select{
 margin-left:6px;padding:3px 6px;
 border-radius:5px;border:1px solid #003c8f;
 font-weight:bold;font-size:14px;background:white;
}

.balls{
 flex:1;height:40px;display:flex;flex-wrap:wrap;gap:5px;overflow:hidden;
}

.ball{
 width:32px;height:32px;border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 font-weight:bold;color:white;font-size:13px;
 box-shadow:
  inset 0 3px 6px rgba(255,255,255,0.4),
  inset 0 -3px 6px rgba(0,0,0,0.4),
  0 2px 4px rgba(0,0,0,0.3);
}

.ball.lotto{background:radial-gradient(circle at 30% 30%, #6bd0ff, #0b6cd4 60%, #003a8f);}
.ball.mini{background:radial-gradient(circle at 30% 30%, #fff176, #fbc02d 60%, #8d6e00);}
.ball.multi{background:radial-gradient(circle at 30% 30%, #ba68c8, #6a1b9a 60%, #2e003e);}
.ball.keno{background:radial-gradient(circle at 30% 30%, #ffcc80, #ff9800 60%, #6d3b00);}
.ball.pensja{background:radial-gradient(circle at 30% 30%, #a5d6a7, #2e7d32 60%, #1b5e20);}
.ball.euro{background:radial-gradient(circle at 30% 30%, #fff8c4, #d4af37 60%, #6b5500);}
.ball.szybkie{background:radial-gradient(circle at 30% 30%, #ffab91, #ff7043 60%, #bf360c);}

.extra{filter:brightness(1.1);color:black;}

button{
 background:#003c8f;color:white;border:none;
 padding:5px 10px;border-radius:6px;
 cursor:pointer;font-weight:bold;font-size:13px;
}
</style>
</head>

<body>

<div id="app">

<header>
 <div></div>
 <div class="header-right"></div>
</header>

<div class="panel">

<div class="game">
 <div class="title"><span class="icon lotto">⭐</span>Lotto
  <select id="lottoCount"><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select>
 </div>
 <div class="balls" id="lottoBalls"></div>
 <button onclick="drawGame('lotto')">LOSUJ</button>
</div>

<div class="game">
 <div class="title"><span class="icon mini">⭐</span>Mini Lotto
  <select id="miniCount"><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select>
 </div>
 <div class="balls" id="miniBalls"></div>
 <button onclick="drawGame('mini')">LOSUJ</button>
</div>

<div class="game">
 <div class="title"><span class="icon multi">🔢</span>Multi Multi
  <select id="multiCount"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select>
 </div>
 <div class="balls" id="multiBalls"></div>
 <button onclick="drawGame('multi')">LOSUJ</button>
</div>

<div class="game">
 <div class="title"><span class="icon keno">❗</span>Keno
  <select id="kenoCount"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select>
 </div>
 <div class="balls" id="kenoBalls"></div>
 <button onclick="drawGame('keno')">LOSUJ</button>
</div>

<div class="game">
 <div class="title"><span class="icon pensja">☘️</span>Ekstra Pensja</div>
 <div class="balls" id="pensjaBalls"></div>
 <button onclick="drawGame('pensja')">LOSUJ</button>
</div>

<div class="game">
 <div class="title"><span class="icon euro">🏆</span>EuroJackpot
  <select id="euroCount"><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option selected>10</option></select>
  <select id="euroExtra"><option>0</option><option>1</option><option selected>2</option></select>
 </div>
 <div class="balls" id="euroBalls"></div>
 <button onclick="drawGame('euro')">LOSUJ</button>
</div>

<div class="game">
 <div class="title"><span class="icon szybkie">☄️</span>Szybkie 600
  <select id="szybkieCount"><option>6</option><option>7</option><option>8</option><option>9</option><option selected>10</option></select>
 </div>
 <div class="balls" id="szybkieBalls"></div>
 <button onclick="drawGame('szybkie')">LOSUJ</button>
</div>

</div>
</div>

<script>

const clock=document.getElementById("clock");
const date=document.getElementById("date");

setInterval(()=>{
 let d=new Date();
 if(clock) clock.textContent=d.toLocaleTimeString();
 if(date) date.textContent=d.toLocaleDateString();
},1000);

/* ===== SINGULARITY ENGINE ===== */

let db=JSON.parse(localStorage.getItem("singularityDB")||"{}");

function save(){localStorage.setItem("singularityDB",JSON.stringify(db));}

function update(max,nums){
 if(!db[max]) db[max]=[];
 db[max].push(...nums);
 if(db[max].length>20000) db[max].splice(0,5000);
 save();
}

function buildStats(max){
 let freq=Array(max+1).fill(0);
 if(db[max]) db[max].forEach(n=>freq[n]++);
 let total=freq.reduce((a,b)=>a+b,0)||1;

 return freq.map(f=>f/total);
}

function entropy(set){
 let diffs=[];
 for(let i=1;i<set.length;i++) diffs.push(set[i]-set[i-1]);
 return diffs.reduce((a,b)=>a+b,0);
}

function score(set,max){
 let freq=buildStats(max);
 let s=0;

 set.forEach(n=>{
  s+=1/(freq[n]+0.01);
 });

 s+=entropy(set)*0.3;

 let seq=0;
 for(let i=1;i<set.length;i++){
  if(set[i]-set[i-1]===1) seq++;
 }
 s-=seq*2;

 return s;
}

function singularity(max,count){

 let best=null, bestScore=-Infinity;

 for(let i=0;i<200;i++){

  let s=new Set();
  while(s.size<count) s.add(Math.floor(Math.random()*max)+1);

  let arr=[...s].sort((a,b)=>a-b);
  let sc=score(arr,max);

  if(sc>bestScore){
   bestScore=sc;
   best=arr;
  }
 }

 if(!best){
  let f=new Set();
  while(f.size<count) f.add(Math.floor(Math.random()*max)+1);
  return [...f];
 }

 return best;
}

function drawGame(game){

 let main=[],extra=[],max=0;

 if(game==="lotto"){max=49;main=singularity(max,lottoCount.value);}
 else if(game==="mini"){max=42;main=singularity(max,miniCount.value);}
 else if(game==="multi"){max=80;main=singularity(max,multiCount.value);}
 else if(game==="keno"){max=70;main=singularity(max,kenoCount.value);}

 else if(game==="pensja"){
  max=35;
  main=singularity(max,5);
  extra=[Math.floor(Math.random()*4)+1];
 }

 else if(game==="euro"){
  max=50;
  main=singularity(max,euroCount.value);
  extra=singularity(12,euroExtra.value);
 }

 else if(game==="szybkie"){max=32;main=singularity(max,szybkieCount.value);}

 update(max,main);
 render(game,main,extra);
}

function render(id,main,extra){
 let div=document.getElementById(id+"Balls");
 div.innerHTML="";
 main.forEach(n=>{
  let el=document.createElement("div");
  el.className="ball "+id;
  el.textContent=n;
  div.appendChild(el);
 });
 extra.forEach(n=>{
  let el=document.createElement("div");
  el.className="ball extra "+id;
  el.textContent=n;
  div.appendChild(el);
 });
}

</script>

</body>
</html>
