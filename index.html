<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root{
  --cp-cyan:#00f0ff;
  --cp-magenta:#ff003c;
  --cp-yellow:#fcee09;
  --cp-red:#ff2a2a;
  --cp-bg:#000014;
}

body{
  margin:0;
  background:var(--cp-bg);
  background-image:
    linear-gradient(0deg, transparent 24%, rgba(0, 240, 255,.05) 25%, rgba(0, 240, 255,.05) 26%, transparent 27%, transparent 74%, rgba(0, 240, 255,.05) 75%, rgba(0, 240, 255,.05) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(255, 0, 60,.05) 25%, rgba(255, 0, 60,.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 60,.05) 75%, rgba(255, 0, 60,.05) 76%, transparent 77%, transparent);
  background-size:50px 50px;
  color:#fff;
  font-family:'Rajdhani', 'Orbitron', monospace;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding-bottom: 40px;
}

#title{
  font-family:'Orbitron', sans-serif;
  font-weight: 900;
  font-size:88px;
  margin-top:50px;
  text-align:center;
  color:var(--cp-cyan);
  text-shadow:
    0 0 5px var(--cp-cyan),
    0 0 10px var(--cp-cyan),
    0 0 20px var(--cp-cyan),
    0 0 40px var(--cp-magenta);
  animation: flicker 3s infinite alternate;
}

@keyframes flicker {
  0%, 18%, 22%, 25%, 53%, 57%, 100% {
    text-shadow:
      0 0 5px var(--cp-cyan),
      0 0 10px var(--cp-cyan),
      0 0 20px var(--cp-cyan),
      0 0 40px var(--cp-magenta);
    opacity: 1;
  }
  20%, 24%, 55% {
    text-shadow: none;
    opacity: 0.8;
  }
}

#proEqualizer{
  margin-top:30px;
  margin-bottom:30px;
  width:600px;
  height:260px;
  position:relative;
  background:#000014;
  border: 2px solid var(--cp-cyan);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  filter: drop-shadow(0 0 10px var(--cp-cyan)) drop-shadow(0 0 20px var(--cp-magenta));
}

/* 🔧 FIX tylko techniczny — nie wizualny */
canvas{
  width:100%;
  height:100%;
  display:block;
  position: relative;
  z-index: 1;
}

#controls{
  display:flex;
  gap:8px;
  margin-top:20px;
}

button{
  width:160px;
  height:45px;
  background:#0a0a1a;
  color:var(--cp-cyan);
  font-family:'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  border: 2px solid var(--cp-cyan);
  cursor:pointer;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  filter: drop-shadow(0 0 8px var(--cp-cyan));
  transition: all 0.15s ease;
  position: relative;
  z-index: 1;
}

button:hover{
  background:var(--cp-cyan);
  color:#000014;
  filter: drop-shadow(0 0 15px var(--cp-cyan)) drop-shadow(0 0 30px var(--cp-magenta));
  transform: translateY(-1px);
}

button:active{
  transform: translateY(1px);
  filter: drop-shadow(0 0 5px var(--cp-cyan));
}

.volumeWrapper{
  width:160px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a1a;
  border: 2px solid var(--cp-cyan);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  filter: drop-shadow(0 0 8px var(--cp-cyan));
  position: relative;
  box-sizing: border-box;
}

#volume{
  width:120px;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #0a0a1a;
  border: 1px solid var(--cp-cyan);
  outline: none;
  margin: 0;
}

#volume::-webkit-slider-thumb{
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  background: var(--cp-yellow);
  cursor: pointer;
  border: 2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
  border-radius: 2px;
  margin-top: -7px;
}

#volume::-moz-range-thumb{
  width: 16px;
  height: 16px;
  background: var(--cp-yellow);
  cursor: pointer;
  border: 2px solid var(--cp-cyan);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
  border-radius: 2px;
}

#volume::-webkit-slider-runnable-track{
  background: linear-gradient(90deg, var(--cp-magenta), var(--cp-cyan));
  height: 4px;
}

#volume::-moz-range-track{
  background: linear-gradient(90deg, var(--cp-magenta), var(--cp-cyan));
  height: 4px;
}

/* DODANE: tylko klasy dla suwaka */
#volume.center::-webkit-slider-thumb{
  background: var(--cp-yellow);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
}
#volume.center::-moz-range-thumb{
  background: var(--cp-yellow);
  box-shadow: 0 0 8px var(--cp-yellow), 0 0 15px var(--cp-cyan);
}
#volume.changed::-webkit-slider-thumb{
  background: var(--cp-red);
  box-shadow: 0 0 8px var(--cp-red), 0 0 15px var(--cp-magenta);
}
#volume.changed::-moz-range-thumb{
  background: var(--cp-red);
  box-shadow: 0 0 8px var(--cp-red), 0 0 15px var(--cp-magenta);
}

/* DODANE: tylko link */
#bottomLink{
  margin-top:20px;
}

#bottom
