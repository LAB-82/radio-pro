<!DOCTYPE html>  
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Muzyczne Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
transition:0.4s;
}

body.day{ background:#eaeaea; color:#000; }

#title{
font-size:88px;
margin-top:50px;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 6px #ff2a2a,0 0 12px #ff0000;
}

canvas{
display:block;
height:260px;
border-radius:8px;
}

#controls{
display:flex;
gap:8px;
margin-top:20px;
margin-bottom:20px;
align-items:center;
justify-content:space-between;
}

.volumeWrapper{
width:160px;height:45px;
display:flex;align-items:center;justify-content:center;
background:#111;
border:2px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
}

button{
width:160px;height:45px;
background:#111;color:white;
border:2px solid #ff2a2a;
box-shadow:0 0 6px #ff2a2a;
cursor:pointer;
}

#volume{
width:120px;height:10px;
background:#000;
border:1px solid #ff2a2a;
}
</style>
</head>

<body>

<div id="title">Muzyczne Radio</div>
<canvas id="proEqualizer"></canvas>

<div id="controls">
<button id="playBtn" onclick="playRadio()">PLAY</button>
<button id="stopBtn" onclick="stopRadio()">STOP</button>
<button id="muteBtn" onclick="muteRadio()">MUTE 🔊</button>

<div class="volumeWrapper">
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<button id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL="https://stream.rcs.revma.com/gzwc1xcq042vv";

const audio=document.getElementById("audio");
const volume=document.getElementById("volume");
const canvas=document.getElementById("proEqualizer");
const ctx=canvas.getContext("2d");

let audioCtx, analyser, source, dataArray;

function setupAudio(){
if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

source=audioCtx.createMediaElementSource(audio);

analyser=audioCtx.createAnalyser();
analyser.fftSize=1024;
analyser.smoothingTimeConstant=0.75;

source.connect(analyser);
analyser.connect(audioCtx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function playRadio(){
setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
audio.src=STREAM_URL;
audio.play();
draw();
}

function stopRadio(){ audio.pause(); }
function muteRadio(){ audio.muted=!audio.muted; }

volume.addEventListener("input",()=>{
audio.volume=parseFloat(volume.value);
});

/* RESIZE */
function resizeCanvas(){
let dpr=window.devicePixelRatio||1;
let width=document.getElementById("title").offsetWidth;

canvas.width=width*dpr;
canvas.height=260*dpr;

canvas.style.width=width+"px";
canvas.style.height="260px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);
}

window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);
render();
}

/* ===== NEW RAINBOW EQ STYLE ===== */
function render(){

let dpr=window.devicePixelRatio||1;
let w=canvas.width/dpr;
let h=canvas.height/dpr;

ctx.clearRect(0,0,w,h);

let bars=80;
let barWidth=w/bars;

for(let i=0;i<bars;i++){

let v=dataArray[Math.floor(i*(dataArray.length/bars))]||0;
let percent=v/255;
let barHeight=percent*h*0.9;

let x=i*barWidth;
let y=h-barHeight;

/* rainbow gradient per bar */
let hue=(i/bars)*280+10;

ctx.fillStyle=`hsl(${hue},100%,55%)`;

ctx.shadowBlur=18;
ctx.shadowColor=`hsl(${hue},100%,60%)`;

/* rounded bar look */
roundRect(x,y,barWidth-2,barHeight,6);
ctx.fill();

ctx.shadowBlur=0;
}
}

/* rounded rect helper */
function roundRect(x,y,w,h,r){
ctx.beginPath();
ctx.moveTo(x+r,y);
ctx.lineTo(x+w-r,y);
ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);
ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);
ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);
ctx.quadraticCurveTo(x,y,x+r,y);
ctx.closePath();
ctx.fill();
}
</script>

</body>
</html>
