<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spotify-Style Radio Engine</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#sidebar {
    width:320px;
    background:#141414;
    overflow:auto;
    border-right:1px solid #222;
}

.station {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}
.station:hover { background:#222; }

#main {
    flex:1;
    display:flex;
    flex-direction:column;
}

#header {
    padding:12px;
    background:#1a1a1a;
    font-weight:bold;
}

#playerBox {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#radioPlayer{
    width:90%;
    height:90%;
    background:#111;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#logoBox img{
    width:220px;
    height:120px;
    object-fit:contain;
    margin-bottom:20px;
}

#bigPlay{
    font-size:80px;
    cursor:pointer;
    user-select:none;
}

#status{
    font-size:12px;
    color:#888;
    margin-top:10px;
}
</style>

</head>

<body>

<div id="sidebar"></div>

<div id="main">

<div id="header">🎧 SPOTIFY-STYLE RADIO ENGINE</div>

<div id="playerBox">
    <div id="radioPlayer">

        <div id="logoBox">
            <img id="stationLogo" src="">
        </div>

        <div id="bigPlay" onclick="toggle()">▶</div>

        <div id="status">READY</div>

    </div>
</div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   STACJE (bez zmian)
   ========================= */

const stations = [
{ name:"Muzyczne Radio", url:"https://stream.rc.fm/muzyczne", logo:"https://www.muzyczneradio.pl/wp-content/uploads/logo.png" },
{ name:"Polskie Radio Jedynka", url:"https://stream.polskieradio.pl/program1.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3f/PR1_logo.png" },
{ name:"Polskie Radio Dwójka", url:"https://stream.polskieradio.pl/program2.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/8/8f/PR2_logo.png" },
{ name:"Polskie Radio Trójka", url:"https://stream.polskieradio.pl/program3.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/1/1b/PR3_logo.png" },
{ name:"RMF FM", url:"https://rs6-krk2.rmfstream.pl/RMFFM48", logo:"https://upload.wikimedia.org/wikipedia/commons/2/2e/RMF_FM_logo.png" },
{ name:"Radio Zet", url:"https://zt01.cdn.eurozet.pl/ZET010.mp3", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Radio_ZET_logo.png" }
];

const audio = document.getElementById("audio");

let current = 0;
let preloaded = null;
let isSwitching = false;

/* =========================
   ENGINE CORE
   ========================= */

function setStatus(t){
    document.getElementById("status").innerText = t;
}

function load(i, autoplay=true){
    current = i;

    const st = stations[i];

    document.getElementById("stationLogo").src = st.logo;

    setStatus("LOADING...");

    if(isSwitching){
        return;
    }

    isSwitching = true;

    // preload next stream BEFORE switch
    const tempAudio = new Audio();
    tempAudio.src = st.url;
    tempAudio.preload = "auto";

    tempAudio.oncanplay = () => {

        // płynne przełączenie
        audio.src = st.url;

        audio.play()
        .then(()=>{
            setStatus("LIVE");
            updateUI();
        })
        .catch(()=>{
            setStatus("RETRY...");
            setTimeout(()=>load(i), 800);
        })
        .finally(()=>{
            isSwitching = false;
        });
    };

    tempAudio.onerror = () => {
        setStatus("FAILED → NEXT");

        isSwitching = false;
        next();
    };
}

function toggle(){
    if(audio.paused){
        load(current);
    } else {
        audio.pause();
        setStatus("PAUSED");
    }
}

function next(){
    current = (current + 1) % stations.length;
    load(current);
}

/* =========================
   UI
   ========================= */

function updateUI(){
    document.getElementById("bigPlay").innerText =
        audio.paused ? "▶" : "⏸";
}

/* sidebar */
stations.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "station";
    div.innerText = s.name;
    div.onclick = ()=>load(i);
    document.getElementById("sidebar").appendChild(div);
});

load(0);

</script>

</body>
</html>
